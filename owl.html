<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Owl's Zone</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Owl's Zone">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#04091a">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;overflow-x:hidden}
body{
  font-family:'Nunito',sans-serif;
  background:#04091a;
  color:#fff;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(30,100,255,0.1) 1px,transparent 1px);
  background-size:18px 18px;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(0,80,255,0.05) 25%,transparent 25%) -10px 0,
    linear-gradient(225deg,rgba(0,80,255,0.05) 25%,transparent 25%) -10px 0;
  background-size:20px 20px;
}
.glow{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.g1{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(0,100,255,0.15),transparent 70%);top:-300px;left:-200px;animation:p1 6s ease-in-out infinite alternate}
.g2{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,60,200,0.12),transparent 70%);bottom:-200px;right:-100px;animation:p2 8s ease-in-out infinite alternate}
.g3{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(100,180,255,0.08),transparent 70%);top:40%;right:20%;animation:p1 10s ease-in-out infinite alternate}
@keyframes p1{to{transform:scale(1.3) translate(40px,30px)}}
@keyframes p2{to{transform:scale(1.2) translate(-30px,-40px)}}
.crack{position:fixed;top:0;right:0;z-index:0;pointer-events:none;opacity:0.07}
.crack svg{width:400px;height:400px}

.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:calc(40px + env(safe-area-inset-top)) 24px 100px}

/* HEADER */
header{text-align:center;margin-bottom:48px}
.speech-header{
  display:inline-block;background:#1a5fff;color:#fff;
  font-family:'Bangers',cursive;font-size:0.9rem;letter-spacing:3px;
  padding:6px 20px;border-radius:4px;margin-bottom:20px;
  transform:rotate(-1deg);box-shadow:3px 3px 0 #000;position:relative;
}
.speech-header::after{content:'';position:absolute;bottom:-10px;left:24px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid #1a5fff}
.owl-wrap{display:inline-block;margin-bottom:16px;animation:owlbob 2s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(30,120,255,0.5));cursor:default}
@keyframes owlbob{0%,100%{transform:rotate(-4deg) translateY(0)}50%{transform:rotate(4deg) translateY(-8px)}}
h1{font-family:'Bangers',cursive;font-size:clamp(4rem,12vw,8rem);letter-spacing:8px;color:#fff;text-shadow:4px 4px 0 #1a5fff,8px 8px 0 #000,0 0 40px rgba(30,120,255,0.6);line-height:1;transform:rotate(-1deg);display:inline-block}
.zap{display:inline-block;font-family:'Bangers',cursive;font-size:1rem;letter-spacing:3px;color:#7df9ff;transform:rotate(8deg);text-shadow:2px 2px 0 #000;margin-left:10px;animation:zb 1s ease-in-out infinite alternate}
@keyframes zb{from{transform:rotate(8deg) scale(1)}to{transform:rotate(12deg) scale(1.15)}}

/* ── COMIC GRID ── */
/* Uneven comic panel layout */
.comic-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:auto auto auto;
  gap:14px;
}

/* Base panel style */
.panel{
  position:relative;
  background:#06102a;
  text-decoration:none;color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:28px 16px 22px;
  text-align:center;
  transition:all .15s;
  cursor:pointer;
  overflow:visible;
}
.panel:hover{transform:translate(-2px,-4px)}
.panel.coming{opacity:0.3;cursor:default;pointer-events:none}

.b-emoji{font-size:2.4rem;filter:drop-shadow(0 0 6px rgba(30,120,255,0.4))}
.b-name{font-family:'Bangers',cursive;font-size:1rem;letter-spacing:2px;color:#fff;line-height:1.3;text-shadow:1px 1px 0 #1a5fff}
.b-soon{font-size:0.55rem;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;font-weight:700}

/* action word badge */
.action{
  position:absolute;top:-14px;right:-10px;
  font-family:'Bangers',cursive;font-size:1rem;letter-spacing:2px;
  color:#ffd700;text-shadow:1px 1px 0 #000;
  transform:rotate(12deg);
  background:#1a5fff;
  padding:3px 10px;border-radius:3px;
  box-shadow:2px 2px 0 #000;
  opacity:0;transition:opacity .15s;
  z-index:10;
}
.panel:hover .action{opacity:1}

/* ── PANEL STYLE VARIANTS ── */

/* 1. Standard sharp comic border */
.style-sharp{
  border:3px solid #1a5fff;
  border-radius:4px;
  box-shadow:5px 5px 0 #1a5fff, 9px 9px 0 rgba(0,0,0,0.6);
}
.style-sharp::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:repeating-linear-gradient(90deg,#1a5fff 0,#1a5fff 8px,transparent 8px,transparent 16px);
}
.style-sharp:hover{box-shadow:8px 8px 0 #1a5fff,12px 12px 0 rgba(0,0,0,0.5)}

/* 2. Jagged/explosion border — using clip-path */
.style-burst{
  border:3px solid #7df9ff;
  border-radius:0;
  clip-path: polygon(
    5% 0%, 95% 0%, 100% 5%,
    100% 95%, 95% 100%, 5% 100%,
    0% 95%, 0% 5%,
    3% 25%, 0% 30%, 4% 35%,
    0% 65%, 3% 70%,
    96% 20%, 100% 25%, 97% 30%,
    100% 70%, 96% 75%
  );
  box-shadow:5px 5px 0 rgba(125,249,255,0.3);
  background:#061828;
}
.style-burst:hover{box-shadow:0 0 20px rgba(125,249,255,0.4),5px 5px 0 rgba(125,249,255,0.3)}
.style-burst .b-name{color:#7df9ff;text-shadow:1px 1px 0 #000}

/* 3. Tilted panel */
.style-tilted{
  border:3px solid #1a5fff;
  border-radius:4px;
  transform:rotate(1.5deg);
  box-shadow:5px 5px 0 #1a5fff,9px 9px 0 rgba(0,0,0,0.6);
}
.style-tilted:hover{transform:rotate(1.5deg) translate(-2px,-4px);box-shadow:8px 8px 0 #1a5fff,12px 12px 0 rgba(0,0,0,0.5)}

/* 4. Speech bubble panel */
.style-speech{
  border:3px solid #ffd700;
  border-radius:24px;
  box-shadow:4px 4px 0 #b8960a, 8px 8px 0 rgba(0,0,0,0.5);
  background:#0a1a06;
}
.style-speech::after{
  content:'';position:absolute;bottom:-22px;left:32px;
  width:0;height:0;
  border-left:14px solid transparent;
  border-right:8px solid transparent;
  border-top:22px solid #ffd700;
  filter:drop-shadow(3px 3px 0 rgba(0,0,0,0.4));
}
.style-speech .b-name{color:#ffd700;text-shadow:1px 1px 0 #000}
.style-speech:hover{box-shadow:7px 7px 0 #b8960a,11px 11px 0 rgba(0,0,0,0.5)}

/* 5. Torn/rough edge */
.style-torn{
  border:3px solid #1a5fff;
  border-radius:2px;
  box-shadow:5px 5px 0 #1a5fff,9px 9px 0 rgba(0,0,0,0.6);
  clip-path:polygon(0 3%,2% 0,98% 0,100% 2%,100% 97%,98% 100%,3% 100%,0 98%,1% 60%,0 55%,1% 50%,0 30%,2% 25%);
}
.style-torn:hover{box-shadow:8px 8px 0 #1a5fff,12px 12px 0 rgba(0,0,0,0.5)}

/* 6. Double border */
.style-double{
  border:3px solid #1a5fff;
  border-radius:4px;
  outline:2px solid rgba(125,249,255,0.3);
  outline-offset:4px;
  box-shadow:5px 5px 0 #1a5fff,9px 9px 0 rgba(0,0,0,0.6);
}
.style-double:hover{box-shadow:8px 8px 0 #1a5fff,12px 12px 0 rgba(0,0,0,0.5);outline-color:rgba(125,249,255,0.6)}

/* 7. Rounded comic */
.style-round{
  border:3px solid #1a5fff;
  border-radius:20px;
  box-shadow:5px 5px 0 #1a5fff,9px 9px 0 rgba(0,0,0,0.6);
}
.style-round:hover{box-shadow:8px 8px 0 #1a5fff,12px 12px 0 rgba(0,0,0,0.5)}

/* 8. Negative/inverted */
.style-inverted{
  border:3px solid #7df9ff;
  border-radius:4px;
  background:#1a5fff;
  box-shadow:5px 5px 0 #7df9ff,9px 9px 0 rgba(0,0,0,0.6);
}
.style-inverted:hover{box-shadow:8px 8px 0 #7df9ff,12px 12px 0 rgba(0,0,0,0.5)}
.style-inverted .b-name{text-shadow:none;color:#fff}

/* 9. Starry gold panel for Spelling Stars */
.style-star{
  border:3px solid #ffd700;
  border-radius:4px;
  background:#141004;
  box-shadow:5px 5px 0 #b8960a,9px 9px 0 rgba(0,0,0,0.6);
}
.style-star .b-name{color:#ffd700;text-shadow:1px 1px 0 #000}
.style-star:hover{box-shadow:8px 8px 0 #b8960a,12px 12px 0 rgba(0,0,0,0.5)}

/* Grid placement — comic-style uneven sizes */
.panel:nth-child(1){grid-column:1/2;grid-row:1/2}
.panel:nth-child(2){grid-column:2/3;grid-row:1/2}
.panel:nth-child(3){grid-column:3/4;grid-row:1/3} /* tall panel */
.panel:nth-child(3){padding-top:50px;padding-bottom:50px}
.panel:nth-child(4){grid-column:1/2;grid-row:2/3}
.panel:nth-child(5){grid-column:2/3;grid-row:2/3}
/* mission row */
.panel:nth-child(6){grid-column:1/2;grid-row:3/4}
.panel:nth-child(7){grid-column:2/3;grid-row:3/4}
.panel:nth-child(8){grid-column:3/4;grid-row:3/4}
.panel:nth-child(9){grid-column:1/4;grid-row:4/5}

@media(max-width:640px){
  .comic-grid{grid-template-columns:1fr 1fr;gap:12px}
  .panel:nth-child(3){grid-column:1/2;grid-row:2/3;padding-top:28px;padding-bottom:22px}
  .panel:nth-child(4){grid-column:2/3;grid-row:2/3}
  .panel:nth-child(5){grid-column:1/2;grid-row:3/4}
  .panel:nth-child(6){grid-column:2/3;grid-row:3/4}
  .panel:nth-child(7){grid-column:1/2;grid-row:4/5}
  .panel:nth-child(8){grid-column:2/3;grid-row:4/5}
  .panel:nth-child(9){grid-column:1/3;grid-row:5/6}
}

footer{text-align:center;margin-top:50px;font-family:'Bangers',cursive;font-size:1rem;letter-spacing:4px;color:rgba(30,100,255,0.4)}
</style>
</head>
