<style>

.story-body{font-size:0.93rem;line-height:1.88;color:#bbdefb}

.ks3-pull strong{display:block;color:#f0b429;margin-bottom:3px;font-size:0.75rem;text-transform:uppercase;letter-spacing:.5px}
.portugal-pull{background:rgba(79,195,247,0.07);border-left:3px solid #4fc3f7;border-radius:0 10px 10px 0;padding:12px 15px;margin:12px 0;font-size:0.85rem;color:#b3d9f0}

.q-text{font-size:0.97rem;font-weight:700;color:white;line-height:1.5;margin-bottom:12px}

.score-banner{background:linear-gradient(135deg,rgba(21,101,192,0.2),rgba(13,71,161,0.2));border:1px solid rgba(100,181,246,0.2);border-radius:14px;padding:20px;text-align:center;animation:pop .4s ease}

.back-btn:hover{background:rgba(255,255,255,0.13);color:white}
.btn-blue{background:linear-gradient(135deg,#1565c0,#0d47a1);color:#bbdefb;border:none;border-radius:22px;padding:9px 18px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all .15s}
.btn-blue:hover{transform:scale(1.03)}
.section-label{font-family:'Fredoka One',cursive;color:#64b5f6;font-size:0.78rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;opacity:.7}
.ks-tag{display:inline-block;background:rgba(100,181,246,0.07);border:1px solid rgba(100,181,246,0.13);color:#64b5f6;font-size:0.62rem;font-weight:800;padding:2px 8px;border-radius:20px;margin-bottom:10px;letter-spacing:.5px}
.ks-tag.ks3{background:rgba(240,180,41,0.07);border-color:rgba(240,180,41,.13);color:#f0b429}
.progress-overview{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:18px}
.prog-tile{background:rgba(255,255,255,0.03);border-radius:9px;padding:8px 3px;text-align:center;border:1px solid rgba(255,255,255,0.05)}
.prog-tile.done{border-color:rgba(100,181,246,0.35);background:rgba(100,181,246,0.06)}
.prog-icon{font-size:1.1rem}
.prog-name{font-size:0.52rem;color:#555;margin-top:2px}
.prog-tile.done .prog-name{color:#64b5f6}

<body>
<div class="wrap" id="app"></div>
<script>
const CHILDREN=[
  {id:"owl",name:"Owl",age:12,avatar:"🦉",ks:"KS3",level:"KS3 — Secondary Level"},
  {id:"cub",name:"Cub",age:9,avatar:"🐻",ks:"KS2",level:"KS2 — Primary Level"},
  {id:"bay",name:"Bay",age:7,avatar:"🌿",ks:"KS1",level:"KS1/KS2 — Foundation"}
];
const STORY=[
  {emoji:"🌍",text:(id)=>`<p>Atlas had never seen the whole world at once.</p><p>Then one day, from somewhere very high — a satellite, a dream, the top of an impossibly tall mountain — Atlas looked down and saw it all. Every continent, every ocean, every mountain range and river delta, the whole blue-green marble of it, wrapped in swirls of cloud.</p><p>It was, Atlas thought, the most beautiful thing imaginable. And also the most mysterious. Because from up here it looked simple — seven continents, five oceans, one world. But Atlas knew that getting closer would reveal complexity within complexity, stories within stories, worlds within worlds.</p><div class="fact-pull"><strong>🌍 Seven continents — some wild facts</strong>Asia is so big it contains 60% of all humans on Earth. Africa is larger than the USA, China, India and most of Europe combined — you'd never guess it from most maps. Antarctica has no permanent human population but contains 70% of Earth's fresh water, locked in ice. Australia is the only country that is also an entire continent. And all seven together? They only cover 29% of Earth's surface. The rest — 71% — is ocean.</div><p>The Earth is <span class="hl">4.5 billion years old</span>. For most of that time, the continents looked nothing like they do today. They have been drifting, colliding, breaking apart and reforming for billions of years — and they are still moving now, right beneath your feet, at the speed of a fingernail growing.</p>${id==="owl"?`<div class="ks3-pull"><strong>🦉 The scientist everyone laughed at — then proved right</strong>Alfred Wegener noticed in 1912 that South America and Africa look like puzzle pieces that fit together. He said they were once one landmass. Scientists mocked him for 50 years. Then in the 1960s, seafloor spreading was discovered — and Wegener was completely vindicated.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>300 million years ago: one supercontinent called <strong>Pangaea</strong></li><li>Evidence: matching coastlines, identical fossils on different continents, same rock types across oceans</li><li>The plates are still moving — at roughly the speed your fingernails grow</li><li>In 250 million years, the continents will have merged again into a new supercontinent</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if scientists mocked Wegener for 50 years and he was still right, what does that tell you about how science actually works?</em></div>`:""}`},
  {emoji:"🌊",text:(id)=>`<p>Then Atlas looked at the water.</p><p>More than two-thirds of Earth's surface is ocean — and yet most maps show it as empty blue space, as if the ocean were merely the gap between the important parts. This, Atlas realised, was exactly backwards. The ocean is not the gap. The ocean is the story.</p><p>The five oceans — <span class="hl">Pacific, Atlantic, Indian, Arctic and Southern</span> — are really one connected body of water. Water flows between them all, in enormous circular currents called gyres, and in deep cold rivers that move slowly along the ocean floor, connecting every sea to every other. The Pacific alone covers more area than all of Earth's land combined.</p><div class="fact-pull"><strong>🌊 The ocean is not the gap — it's the story</strong>We've mapped more of the surface of Mars than we have of the ocean floor. More than 80% of Earth's oceans have never been explored. The deepest point — Challenger Deep in the Pacific — is 11,034m down. If you dropped Mount Everest into it, the peak would still be 2km underwater. The Pacific Ocean alone is bigger than all of Earth's land combined. We live on a water planet. We just drew the maps to make it look like a land one.</div><div class="portugal-pull"><strong>🇵🇹 YOUR CONNECTION — Portugal Faces the Atlantic</strong>Portugal sits at the western edge of Europe, facing directly onto the Atlantic Ocean. This position — once the edge of the known world — gave Portugal its greatest historical advantage: Atlantic winds that enabled the Age of Discovery. Cabo da Roca, 40km from Lisbon, is the westernmost point of mainland Europe. From there, the next land west is North America. When Portuguese explorers set sail in the 15th century, they were stepping off the edge of everything Europeans knew.</div>${id==="owl"?`<div class="ks3-pull"><strong>🦉 The ocean current keeping Portugal warm — and it's slowing down</strong>Portugal should be as cold as Canada. Same latitude as Quebec. The reason it isn't is a giant ocean conveyor belt — and climate change is breaking it.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>AMOC</strong> carries warm tropical water north, keeping Europe 5-10°C warmer than it should be</li><li>Melting Greenland ice disrupts it — cold fresh water breaks the circulation pattern</li><li>Scientists confirmed AMOC is already slowing — fastest weakening in 1,000 years</li><li>A collapse could cool northwest Europe even as global temperatures rise</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: climate change could make Portugal colder and wetter while also making it drier overall. How can both be true at once?</em></div>`:""}`},
  {emoji:"🗺️",text:(id)=>`<p>Every map is a lie.</p><p>Not a malicious lie — a necessary one. The Earth is a sphere. A map is flat. Getting from sphere to flat requires distortion. Every map projection distorts something: area, shape, distance or direction. There is no perfect map.</p><p>The most famous map projection — the <span class="hl">Mercator projection</span>, invented in 1569 — preserves compass directions (useful for sailors) but massively distorts area near the poles. On a Mercator map, Greenland looks the same size as Africa. In reality, <span class="hl">Africa is 14× larger than Greenland</span>. The map most of us grew up with makes northern countries look far bigger than they are and makes tropical countries — where most of the world's population lives — look far smaller.</p><div class="fact-pull"><strong>🗺️ FACT — Map Projections and Power</strong>The choice of which map to use is never neutral. The Peters projection (1974) shows countries in correct relative size — and caused controversy because it made Africa and South America visually much larger than in the Mercator, while shrinking Europe and North America. A map is always a political statement about what the mapmaker considers important. The fact that most world maps put Europe or North America at the centre (rather than, say, the Pacific) reflects the cultural origins of modern cartography.</div>${id==="owl"?`<div class="ks3-pull"><strong>🦉 Every map is lying to you — and it knows it</strong>The map most of us grew up with makes Europe look huge and Africa look small. That's not a mistake. It's the consequence of who drew the maps, when, and why. Greenland looks the same size as Africa on a Mercator map. Africa is actually 14 times larger.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>The <strong>Peters projection</strong> (1974) showed correct sizes — caused huge controversy</li><li>Most world maps put Europe at the centre — that's a choice, not a fact</li><li>Colonial powers used maps to claim land they'd never even visited</li><li>Today GIS maps can show crime, poverty, health — whoever controls the data controls the story</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if you redrew the standard world map with the Pacific at the centre instead of the Atlantic, everything would look different. Why do you think that map never became the standard?</em></div>`:""}`},
  {emoji:"🌐",text:(id)=>`<p>Where exactly was Atlas standing?</p><p>The answer required two numbers: <span class="hl">latitude</span> and <span class="hl">longitude</span>. Latitude measures how far north or south of the equator you are, from 0° at the equator to 90° at the poles. Longitude measures how far east or west of the prime meridian (an imaginary line through Greenwich, London) you are, from 0° to 180°.</p><p>Together, these two coordinates give an exact location for every point on Earth. <span class="hl">Lisbon</span> — if that is where Atlas was — sits at approximately <span class="hl">38.7°N, 9.1°W</span>. Which means it is 38.7 degrees north of the equator, and 9.1 degrees west of Greenwich.</p><div class="portugal-pull"><strong>🇵🇹 Where you live — on the edge of the world</strong>Portugal is at the far southwestern corner of Europe — the last land before the Atlantic Ocean begins. For most of human history, this meant Portugal was at the edge of the known world. Then one day, that edge became the perfect launch pad for exploring everything beyond it. Your home is at coordinates 38.7°N, 9.1°W — meaning Lisbon is roughly the same distance from the equator as Tokyo, Beijing and Washington DC. The Azores, technically also Portugal, sit almost halfway to North America in the middle of the Atlantic.</div><div class="fact-pull"><strong>🌐 Your coordinates — and what they actually mean</strong>One degree of latitude = roughly 111km. Lisbon at 38.7°N means it is about 4,300km from the equator — roughly the same distance as flying from Lisbon to New York. Longitude lines are trickier: they are wide apart at the equator but squeeze together at the poles, which is why Greenland looks huge on flat maps but is actually much smaller. Every time your phone shows your location, it is using exactly this coordinate system — the same one sailors invented hundreds of years ago to avoid getting lost at sea.</div>${id==="owl"?`<div class="ks3-pull"><strong>🦉 Why is 0° longitude through London? Because Britain said so.</strong>There's no geographical reason the prime meridian runs through Greenwich. It runs there because in 1884, Britain was the most powerful empire on Earth and most of the world's ships used British charts. Power decided where zero is.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>1884: International Meridian Conference — 25 countries voted, mostly went with Britain</li><li>France refused and kept using Paris as their meridian until 1911</li><li>All world time zones still measure from London — that's a political legacy, not a scientific one</li><li>This is one tiny example of how empire shaped everything — including things that seem neutral</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: what other things that seem like neutral facts — numbers, standards, units — might actually reflect who had the most power when they were established?</em></div>`:""}`},
  {emoji:"🌱",text:(id)=>`<p>Atlas understood something, looking at the whole world at once.</p><p>The world is not a collection of separate places. It is one system. The Amazon rainforest produces rain that falls on the Andes that feeds the rivers that water the farmlands of South America. The Arctic ice reflects sunlight that keeps the planet cool. The Atlantic currents carry heat that warms northwest Europe. Remove one part and the whole system shifts.</p><p>This is what geographers study — not just places, but connections. Not just what is where, but why, and what happens when things change.</p><div class="fact-pull"><strong>🌱 THE BIG IDEA — Earth as System</strong>Earth has four interconnected spheres: the <strong>lithosphere</strong> (rocks, tectonic plates), the <strong>hydrosphere</strong> (water — oceans, rivers, ice, groundwater), the <strong>atmosphere</strong> (air and weather), and the <strong>biosphere</strong> (all living things). These four spheres interact constantly. Volcanic eruptions (lithosphere) release gases that change the atmosphere. Climate change (atmosphere + hydrosphere) is killing coral reefs (biosphere). Human activity (biosphere) is reshaping the lithosphere through mining and building. Geography is the study of how these four spheres interact — and how humans fit within them.</div>${id==="owl"?`<div class="ks3-pull"><strong>🦉 The most important idea in geography — and nobody tells you it upfront</strong>Everything connects to everything else. That's not a nice metaphor — it's the actual structure of how the world works. Geographers call it systems thinking, and once you see it you can't unsee it.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>Feedback loops:</strong> A causes B which makes A worse (positive) or better (negative)</li><li><strong>Example:</strong> Arctic ice melts → ocean absorbs more heat → more ice melts → repeat. That's a positive feedback loop running right now</li><li><strong>Threshold:</strong> the point where a small push causes a massive sudden change — like the last straw that breaks the camel's back</li><li><strong>The four spheres:</strong> lithosphere (rock), hydrosphere (water), atmosphere (air), biosphere (life) — all constantly affecting each other</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: find one connection between something in Portugal and something happening on the other side of the world. The connection is there. You just have to look.</em></div>`:""}`}
];

  {id:"asia",name:"Asia",emoji:"🏔️",color:"rgba(239,83,80,0.2)",area:"44.6 million km²",population:"4.7 billion (60% of world)",countries:"49",highest:"Everest (8,849m)",rivers:"Yangtze, Ganges, Mekong",story:"Asia is the world's largest and most populous continent. It contains the world's highest mountains (Himalayas), the world's largest lake by volume (Baikal), the world's longest coastline, and enormous cultural diversity — from Arctic Siberia to tropical Southeast Asia. China and India together contain nearly 3 billion people — more than the rest of the world outside Asia.",portugal:"Portugal's Age of Discovery was largely motivated by finding sea routes to Asia — specifically to the spice-producing regions of India and Southeast Asia. Vasco da Gama reached India in 1498. Portugal established trading posts across Asia including in Goa (India), Malacca (Malaysia) and Macao (China). Macao remained Portuguese territory until 1999.",ks3:"Asia's economic rise — particularly China and India — is the defining geopolitical shift of the 21st century. China became the world's largest economy by purchasing power parity in 2014. India is projected to overtake the USA by 2030. The centre of global economic gravity is moving east. Understanding Asian geography, history and development is essential for KS3 geopolitics."},
  {id:"africa",name:"Africa",emoji:"🌍",color:"rgba(240,180,41,0.2)",area:"30.4 million km²",population:"1.4 billion (18% of world)",countries:"54",highest:"Kilimanjaro (5,895m)",rivers:"Nile (longest), Congo, Niger",story:"Africa is the second-largest continent and the most genetically diverse — because modern humans evolved here approximately 300,000 years ago. It contains the world's largest hot desert (Sahara), the world's longest river (Nile), and extraordinary biodiversity in the Congo Basin and East African savanna. Africa's 54 countries make it the continent with the most nations.",portugal:"Portugal was the first European country to establish sustained contact with sub-Saharan Africa, beginning in the 1440s. Portuguese traders established forts along the West African coast and were the first Europeans to round the Cape of Good Hope (1488) and sail up the East African coast. Tragically, Portugal also initiated the transatlantic slave trade. Portuguese colonies in Africa (Angola, Mozambique, Guinea-Bissau, Cape Verde, São Tomé and Príncipe) gained independence in 1974-75.",ks3:"Africa has the world's fastest-growing population — projected to reach 2.5 billion by 2050 and over 4 billion by 2100. By mid-century, Africa will have more young people than anywhere else on Earth. Understanding African geography, economics and politics is increasingly central to KS3 development geography. The continent has vast natural resources (minerals, agricultural land, renewable energy potential) but also faces significant challenges from artificial colonial borders, climate vulnerability and governance issues."},
  {id:"north_america",name:"North America",emoji:"🗽",color:"rgba(100,181,246,0.2)",area:"24.7 million km²",population:"597 million",countries:"23",highest:"Denali (6,190m)",rivers:"Mississippi, Missouri, Rio Grande",story:"North America stretches from the Arctic tundra of Canada and Alaska to the tropical forests of Central America. It contains extraordinary geographical diversity: the Rocky Mountains, the Great Plains, the Great Lakes (20% of world's fresh surface water), the Mississippi river system, and the desert Southwest. The USA alone has 9.8 million km² making it the world's third or fourth largest country.",portugal:"Portuguese explorer João Vaz Corte-Real may have reached Newfoundland in 1472 — before Columbus. Portuguese fishermen certainly visited the Grand Banks (off Newfoundland) from the late 1400s, catching the salt cod that became central to Portuguese cuisine. The Portuguese word for the region that became 'Labrador' comes from the Portuguese explorer Gaspar Corte-Real.",ks3:"The USA's geography has shaped its history and politics in fundamental ways: the vast interior plains enabled industrial-scale agriculture; the east-west mountain ranges channelled westward expansion; the Atlantic and Pacific coasts enabled global trade while the continent's size initially encouraged isolationism. Today, the USA-Mexico border — one of the world's sharpest economic divides — generates enormous migration pressure that illustrates push-pull factors in real time."},
  {id:"south_america",name:"South America",emoji:"🌿",color:"rgba(129,199,132,0.2)",area:"17.8 million km²",population:"434 million",countries:"12",highest:"Aconcagua (6,961m)",rivers:"Amazon (largest by flow), Paraná, Orinoco",story:"South America contains the Amazon rainforest — the world's largest tropical rainforest, covering 5.5 million km² and producing approximately 20% of the world's oxygen. The Andes run the entire length of the continent's west coast. The continent has extraordinary biodiversity — the Amazon alone contains 10% of all species on Earth. The Atacama Desert in Chile is the world's driest non-polar desert.",portugal:"Brazil — the largest country in South America and fifth largest country in the world — speaks Portuguese because Portuguese navigator Pedro Álvares Cabral claimed it for Portugal in 1500. With 215 million people, Brazil has more Portuguese speakers than Portugal itself. Brazilian culture — a unique fusion of indigenous, African and Portuguese influences — is one of the world's most vibrant.",ks3:"The Amazon is both a geography and a politics topic at KS3. Deforestation (currently losing approximately 4,000 km²/year under various pressures) affects global carbon cycling, biodiversity, indigenous peoples' rights and Brazil's development path simultaneously. The tension between Brazil's sovereign right to develop its territory and the global importance of the Amazon ecosystem is a classic example of the conflict between national interest and global commons — one of the central themes in KS3 environmental geography."},
  {id:"europe",name:"Europe",emoji:"🏰",color:"rgba(206,147,216,0.2)",area:"10.5 million km²",population:"748 million",countries:"44",highest:"Mont Blanc (4,808m) — or Elbrus (5,642m) depending on definition",rivers:"Danube, Rhine, Volga",story:"Europe is the second-smallest continent but has had outsized global influence through its imperial history, scientific revolutions and cultural output. It contains the world's oldest wine regions (Georgia, then France, Italy, Spain and Portugal), the world's oldest democracy traditions (Athens), and the European Union — the world's most ambitious experiment in multinational governance. Europe's geography — mild climate, navigable rivers, long coastlines — facilitated trade and communication.",portugal:"Portugal is the westernmost country in continental Europe. It occupies the southwestern corner of the Iberian Peninsula, sharing a land border only with Spain. Portugal has been a stable nation-state since 1143 CE — with essentially the same borders for nearly 900 years, making it one of Europe's oldest countries. It joined the EU in 1986 and has been a democracy since 1974.",ks3:"The European Union is a KS3 case study in supranational governance. 27 member states share a single market, a common currency (for 20 of them), open internal borders and a parliament. Brexit (UK's departure in 2020) demonstrated both the tensions within European integration and the economic costs of reversing it. Understanding the EU requires engaging with questions of sovereignty, identity, economics and political union simultaneously."}

const QUIZ={
  owl:[
    {q:"What evidence supports the theory that the continents were once joined as a single landmass called Pangaea?",opts:["The continents look similar in size","Matching coastlines, identical fossils found on now-separated continents, and matching rock formations across different continents","The names of the continents suggest they were joined","Scientists discovered ancient maps showing Pangaea"],ans:1,fact:"Pangaea evidence comes from three independent sources: geometric (South America and Africa fit together like puzzle pieces), biological (identical Mesosaurus fossils found in both South America and Africa — an animal that couldn't have swum the Atlantic), and geological (identical rock sequences and mountain chains that continue across continents now separated by ocean). Alfred Wegener proposed continental drift in 1912 but was ridiculed because he couldn't explain the mechanism — which was only discovered with seafloor spreading theory in the 1960s."},
    {q:"Why does the Mercator map projection make Greenland appear the same size as Africa, when Africa is actually 14 times larger?",opts:["Greenland is actually the same size as Africa","Mercator projection preserves compass directions (angle) but distorts area — areas near the poles are stretched enormously relative to areas near the equator","The projection was deliberately made to make European countries look larger","Greenland has been measured incorrectly"],ans:1,fact:"The Mercator projection conformal — it preserves local angles and shapes, making it useful for navigation (compass bearings are straight lines). But preserving angle distorts area. On a Mercator map, every point on Earth is at the correct angle from every other point — but areas near the poles are massively exaggerated. This is why Greenland (2.2M km²) looks the same size as Africa (30.4M km²) on most common world maps."},
    {q:"The Atlantic Meridional Overturning Circulation (AMOC) keeps northwest Europe significantly warmer than equivalent latitudes elsewhere. What threatens it?",opts:["Air pollution from European industry","Melting Greenland ice adding cold fresh water, disrupting the salinity-driven density differences that power the circulation","Increased shipping in the Atlantic","Changes in Atlantic wind patterns"],ans:1,fact:"AMOC is driven by the sinking of cold, salty, dense water in the North Atlantic — which pulls warm surface water northward from the tropics. Melting Greenland ice adds enormous quantities of fresh, less dense water, potentially disrupting this sinking mechanism. Studies show AMOC has weakened significantly since the mid-20th century. A collapse would dramatically cool northwest Europe — making Britain's climate more like equivalent latitudes in Canada."},
    {q:"The prime meridian (0° longitude) runs through Greenwich, London rather than any geographically logical location. What does this tell us about how scientific standards are established?",opts:["London is the geographic centre of the world","Scientific standards reflect power at the moment they are established — Britain's imperial dominance in 1884 made Greenwich the internationally accepted reference point","The Greenwich meridian was chosen because it passes through the most land","It was established randomly by vote"],ans:1,fact:"The 1884 International Meridian Conference chose Greenwich partly because British navigation charts (using Greenwich as reference) were already used by 72% of the world's shipping. Britain's naval and commercial dominance made its system the de facto standard. France continued using Paris as its prime meridian until 1911. This is one of many examples where apparently neutral scientific or technical standards embed the power relations of the era that created them."},
    {q:"Africa is the most genetically diverse continent on Earth despite containing only about 17% of the world's population. Why?",opts:["African people have mutated more rapidly","Humans evolved in Africa approximately 300,000 years ago — all other populations are descended from a subset of African genetic diversity that left in waves from 70,000 years ago, carrying only a fraction of African genetic variation","Africa has more varied environments","African populations have been less isolated historically"],ans:1,fact:"This is the 'founder effect' and 'Out of Africa' theory confirmed by genetic analysis. When small groups left Africa, they carried only a subset of the genetic diversity existing in Africa. Each successive founding population further reduced diversity. This explains why African populations are more genetically diverse than all non-African populations combined — and why the Khoisan people of southern Africa have the oldest genetic lineages on Earth, diverging from other human populations approximately 100,000-150,000 years ago."}

    {q:"Which ocean is the largest on Earth?",opts:["Atlantic Ocean","Indian Ocean","Arctic Ocean","Pacific Ocean"],ans:3,fact:"The Pacific Ocean! It covers 165 million km² — bigger than all of Earth's land combined. It stretches from the Arctic in the north to the Antarctic in the south, and from the Americas in the east to Asia and Australia in the west. The deepest point on Earth (Challenger Deep, 11,034m) is in the Pacific."},

      </div></div></div>`;
  }
  const q=qs[idx];const answers=s.quizAnswers||[];const thisAns=answers[idx];
  let h=`<div class="quiz-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✅ ${child.ks} Quiz</div>
    <div class="section-label">Quiz · Q${idx+1} of ${qs.length}</div>
    <div class="score-dots">`;
  qs.forEach((_,i)=>{const a=answers[i];h+=`<div class="sdot ${i===idx?"current":a===undefined?"":a===qs[i].ans?"done":"wrong"}"></div>`;});
  h+=`</div><div class="q-text">${q.q}</div><div class="q-opts">`;
  q.opts.forEach((opt,i)=>{
    let cls="q-opt";
    if(thisAns!==undefined){if(i===q.ans)cls+=" correct";else if(i===thisAns&&i!==q.ans)cls+=" wrong";}
    h+=`<button class="${cls}" ${thisAns!==undefined?"disabled":""} onclick="answerQuiz(${i})">${opt}</button>`;
  });
  h+=`</div>`;
  if(thisAns!==undefined){
    h+=`<div class="q-fact">🤩 ${q.fact}</div>`;
    h+=`<div style="text-align:right;margin-top:8px"><button class="btn-blue" onclick="nextQuiz()">Next →</button></div>`;
  }
  return h+`</div>`;
}
function selectChild(id){ui.child=id;ui.view="learn";ui.section="story";render();}
function backToProfiles(){ui.view="profiles";render();}
function switchSection(s){ui.section=s;render();}
function completeSection(s){const comp=state[ui.child].sectionsComplete||[];if(!comp.includes(s))state[ui.child].sectionsComplete=[...comp,s];saveState();}
function nextPage(){if(state[ui.child].storyPage<STORY.length-1){state[ui.child].storyPage++;saveState();render();}}
function selectContinent(id){state[ui.child].selectedContinent=id;saveState();render();}
function answerFlag(i){
  const id=ui.child;const s=state[id];const flagSet=FLAG_GAME[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const max=id==="owl"?15:id==="cub"?12:8;const flags=flagSet.slice(0,max);
  const idx=s.flagIdx||0;const q=flags[idx];
  const answers=[...(s.flagAnswers||[])];while(answers.length<=idx)answers.push(undefined);
  answers[idx]=i===q.ans;if(i===q.ans)state[id].flagScore=(s.flagScore||0)+1;
  state[id].flagAnswers=answers;state[id].flagChosen=i;saveState();render();
}
function nextFlag(){
  const id=ui.child;const s=state[id];const flagSet=FLAG_GAME[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const max=id==="owl"?15:id==="cub"?12:8;
  const next=(s.flagIdx||0)+1;state[id].flagIdx=next;state[id].flagChosen=null;
  if(next>=flagSet.slice(0,max).length)state[id].flagDone=true;saveState();render();
}
function resetFlags(){const id=ui.child;state[id].flagIdx=0;state[id].flagAnswers=[];state[id].flagDone=false;state[id].flagScore=0;state[id].flagChosen=null;saveState();render();}
function updateMath(idx,v){if(!state[ui.child].mathInputs)state[ui.child].mathInputs={};state[ui.child].mathInputs[idx]=v;}
function checkMath(idx){
  const id=ui.child;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];const ch=chs[idx];
  const input=(state[id].mathInputs&&state[id].mathInputs[idx]||"").trim().replace(/,/g,"");
  const correctVal=ch.answer.replace(/,/g,"");
  const userNum=parseFloat(input);const correctNum=parseFloat(correctVal);
  const correct=!isNaN(userNum)&&!isNaN(correctNum)&&Math.abs(userNum-correctNum)/Math.max(correctNum,0.001)<0.05;
  if(!state[id].mathAnswered)state[id].mathAnswered={};
  state[id].mathAnswered[idx]=correct?"correct":"wrong";saveState();render();
}
function answerQuiz(i){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const idx=s.quizIdx||0;const q=qs[idx];
  const answers=[...(s.quizAnswers||[])];while(answers.length<=idx)answers.push(undefined);
  answers[idx]=i;if(i===q.ans)state[id].quizScore=(s.quizScore||0)+1;
  state[id].quizAnswers=answers;saveState();render();
}
function nextQuiz(){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const next=(s.quizIdx||0)+1;state[id].quizIdx=next;
  if(next>=qs.length)state[id].quizDone=true;saveState();render();
}
function resetQuiz(){const id=ui.child;state[id].quizIdx=0;state[id].quizAnswers=[];state[id].quizDone=false;state[id].quizScore=0;saveState();render();}
render();
</script>
