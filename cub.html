<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cub's Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;overflow-x:hidden}
body{font-family:'Nunito',sans-serif;background:#006994;color:#1a1a2e}

.sky{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,#87ceeb 0%,#b8e4f7 25%,#d4f0fa 40%,#e8f8ff 55%,#b8d4e8 65%,#5b9bc8 75%,#2a7aaa 85%,#006994 100%)}
.sun{position:fixed;top:30px;right:80px;z-index:1;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#fffde7,#ffd700 50%,#ffb300);box-shadow:0 0 0 15px rgba(255,215,0,0.12),0 0 50px rgba(255,200,0,0.3);animation:sungl 4s ease-in-out infinite alternate}
@keyframes sungl{to{box-shadow:0 0 0 22px rgba(255,215,0,0.18),0 0 80px rgba(255,200,0,0.4)}}

/* clouds */
.cloud{position:fixed;z-index:1;pointer-events:none;animation:drift var(--ct) var(--cd) linear infinite}
@keyframes drift{from{transform:translateX(-300px)}to{transform:translateX(calc(100vw + 300px))}}

/* ── SURFER GIRL ── */
.surfer-wrap{position:fixed;bottom:90px;right:-20px;z-index:4;pointer-events:none;animation:surfbob 3s ease-in-out infinite}
@keyframes surfbob{0%,100%{transform:translateY(0) rotate(2deg)}50%{transform:translateY(-12px) rotate(-2deg)}}

/* waves */
.waves-wrap{position:fixed;bottom:0;left:0;right:0;z-index:3;pointer-events:none;height:260px}
.wave-svg{position:absolute;bottom:0;left:0;width:200%;animation:wavemove var(--ws) linear infinite}
@keyframes wavemove{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.wave1{--ws:8s;bottom:20px;opacity:0.6}
.wave2{--ws:11s;bottom:10px;opacity:0.4;animation-direction:reverse}
.wave3{--ws:6s;bottom:0;opacity:0.9}

/* kisses */
.kisses{position:fixed;inset:0;z-index:5;pointer-events:none;overflow:hidden}
.kiss{position:absolute;font-size:var(--ks);opacity:0;animation:kissfl var(--kt) var(--kd) ease-in-out infinite}
@keyframes kissfl{0%{opacity:0;transform:translateY(20px) scale(0.5) rotate(var(--kr))}20%{opacity:0.7}80%{opacity:0.4}100%{opacity:0;transform:translateY(-70px) scale(1.3) rotate(var(--kr))}}

.wrap{position:relative;z-index:10;max-width:900px;margin:0 auto;padding:40px 24px 140px;text-align:center}

header{margin-bottom:44px}
.tiger-wrap{display:inline-block;margin-bottom:10px;animation:tigerbob 2.5s ease-in-out infinite;filter:drop-shadow(0 4px 16px rgba(255,140,0,0.35))}
@keyframes tigerbob{0%,100%{transform:rotate(-4deg) translateY(0)}50%{transform:rotate(4deg) translateY(-10px)}}
h1{font-family:'Pacifico',cursive;font-size:clamp(3rem,9vw,5.5rem);color:#fff;text-shadow:3px 3px 0 rgba(255,140,0,0.5);line-height:1.1;margin-bottom:8px}
.sub{font-size:1rem;font-weight:800;color:rgba(255,255,255,0.7);letter-spacing:1px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:18px}
.bubble{position:relative;border-radius:24px;padding:28px 16px 24px;text-align:center;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:12px;transition:all .25s cubic-bezier(.34,1.4,.64,1);cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.12),0 8px 20px rgba(0,0,0,0.1);overflow:hidden}
.bubble::after{content:'';position:absolute;inset:4px;border-radius:20px;border:2px solid rgba(255,255,255,0.45);pointer-events:none}
.bubble:hover{transform:translateY(-8px) rotate(-1deg) scale(1.03);box-shadow:0 14px 0 rgba(0,0,0,0.1),0 24px 40px rgba(0,0,0,0.15)}
.bubble:nth-child(1){background:linear-gradient(135deg,#ffe4b5,#ffcc66)}
.bubble:nth-child(2){background:linear-gradient(135deg,#e8d5ff,#c9a0ff)}
.bubble:nth-child(3){background:linear-gradient(135deg,#d4f4dd,#90e4a8)}
.bubble:nth-child(4){background:linear-gradient(135deg,#dde8ff,#aabbff)}
.bubble:nth-child(5){background:linear-gradient(135deg,#ffe8d6,#ffb88c)}
.bubble:nth-child(6){background:linear-gradient(135deg,#ffd6ec,#ff9ed2)}
.bubble::before{content:'💋';position:absolute;top:6px;right:10px;font-size:0.9rem;opacity:0.35;animation:kp 3s ease-in-out infinite alternate}
@keyframes kp{from{transform:scale(0.8) rotate(-10deg)}to{transform:scale(1.1) rotate(10deg)}}
.b-emoji{font-size:2.6rem}
.b-name{font-family:'Pacifico',cursive;font-size:0.85rem;line-height:1.3;color:#2a1a0a}

footer{text-align:center;margin-top:50px;font-family:'Pacifico',cursive;font-size:0.85rem;color:rgba(255,255,255,0.5)}
</style>
</head>
