<body>
<div class="wrap" id="app"></div>
<script>
const CHILDREN=[
  {id:"owl",name:"Owl",age:12,avatar:"🦉",ks:"KS3",level:"KS3 — Secondary Level"},
  {id:"cub",name:"Cub",age:9,avatar:"🐻",ks:"KS2",level:"KS2 — Primary Level"},
  {id:"bay",name:"Bay",age:7,avatar:"🌿",ks:"KS1",level:"KS1/KS2 — Foundation"}
];
const STORY=[
  {emoji:"🌍",text:(id)=>`<p>Empires are how the modern world was made. And how it was broken.</p><p>For most of recorded history, large states expanded by force, extracting resources from conquered territories and using them to fund further expansion. The Roman Empire, the Mongol Empire, the Ottoman Empire — all built on the same fundamental logic: conquer, extract, project power. What changed in the 15th century was scale and reach. European maritime empires could operate globally, not just regionally. The consequences were permanent and are not yet finished.</p>
<div class="fact-pull"><strong>🌍 Empire — the scale is almost incomprehensible</strong>At its peak in 1920, the British Empire covered approximately 24% of Earth's land surface and governed 412 million people — about 23% of the world's population. The French Empire covered 8.6 million km². The combined European empires controlled approximately 84% of Earth's land surface by 1914. These are not ancient history numbers — 1914 is four generations ago. Many people alive today had grandparents who lived under colonial rule.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal — the first and last European empire</strong>Portugal established the first European overseas empire (starting with Ceuta in 1415) and gave up the last major piece of it when Macau was returned to China in 1999 — a 584-year span. At its 16th-century peak, the Portuguese Empire stretched across Brazil, West Africa, East Africa, India, Southeast Asia and China. It was never as large as the later British or French empires, but it was first. Portugal shaped the template that all subsequent European empires followed: the fortified trading post, the missionary alongside the merchant, the sea route as the lifeline.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Empire — the three things nobody tells you upfront</strong>Standard histories of empire focus on dates and territory. Here are the three things that matter more.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>Economic extraction was the point:</strong> empires were not primarily about spreading civilisation — they were wealth transfer systems. The British economist Utsa Patnaik estimated Britain extracted $45 trillion from India between 1765-1938</li><li><strong>The legacy is structural:</strong> colonial borders drawn without reference to existing ethnic, cultural or geographical realities created conflicts that continue today (Middle East, Africa, South Asia)</li><li><strong>It was recent:</strong> most African countries became independent after 1960. The economic structures colonialism created (commodity export, debt, infrastructure serving extraction rather than development) did not disappear with the flags</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if Britain extracted $45 trillion from India over 173 years, what would a fair reparations framework look like — and why has none ever been implemented?</em></div>`:""}`},
  {emoji:"⚔️",text:(id)=>`<p>Not all empires looked the same.</p><p>The Mongol Empire (1206-1368) was the largest contiguous land empire in history — 24 million km² at its peak, stretching from China to Poland. It was built through extraordinary military violence (Genghis Khan's conquests may have killed 40 million people, reducing the world's population by 10%) but it also created the Pax Mongolica — a period of relative peace and trade along the Silk Road that allowed ideas, diseases, technologies and merchants to move freely across Eurasia. The Black Death reached Europe via this Mongol trade network.</p><p>The Ottoman Empire (1299-1922) was simultaneously a territorial empire, a caliphate, a trade network and a multicultural state. At its peak it governed 600 different ethnic groups in relative coexistence — more diverse than most modern states. Its decline and the way European powers carved up its territory created the modern Middle East.</p>
<div class="fact-pull"><strong>⚔️ The Scramble for Africa — 30 years that shaped a century</strong>In 1870, Europeans controlled about 10% of Africa. By 1914, they controlled 90% — in 44 years. The Berlin Conference of 1884-85 divided Africa between European powers without a single African representative in the room. Borders were drawn with rulers along lines of latitude and longitude — straight lines that cut across rivers, mountain ranges, trade routes, ethnic territories and existing kingdoms. Of Africa's 54 modern borders, 44% are straight lines. Every straight border on an African map is a colonial legacy.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal's African empire — and why decolonisation was late and violent</strong>Portugal held its African colonies — Angola, Mozambique, Guinea-Bissau, Cape Verde, São Tomé and Príncipe — until 1975, long after most European powers had decolonised. The Carnation Revolution of April 25, 1974, which ended the Salazar/Caetano dictatorship in Portugal, also ended the colonial wars that had been draining Portugal for 13 years. Independence came rapidly — sometimes chaotically — and was followed by civil wars in Angola and Mozambique that lasted decades. The speed of decolonisation created instability that Portugal's colonial rule had itself caused.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The Scramble for Africa — and why its borders still cause wars</strong>The Berlin Conference (1884-85) is one of the most consequential meetings in history. No African nation was invited. European powers divided a continent they had not fully explored, drawing borders that ignored:<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Pre-existing kingdoms and political boundaries (the Zulu Kingdom, the Kingdom of Dahomey, the Sokoto Caliphate)</li><li>Ethnic and linguistic groupings (splitting the Yoruba between Nigeria and Benin; dividing the Somali across five countries)</li><li>Geographical features that naturally define territories</li><li>The 2017-2019 Cameroon-Nigeria border dispute, the Darfur conflict, the DRC civil wars — all have colonial border origins</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: African nations inherited borders they didn't choose and now face the dilemma of either respecting them (preserving order) or challenging them (triggering chaos). What would you do?</em></div>`:""}`},
  {emoji:"💰",text:(id)=>`<p>Colonialism was an economic system, not just a political one.</p><p>The purpose of empire was wealth extraction. Raw materials flowed from colonies to the imperial centre; manufactured goods flowed back. This was not free trade — it was a rigged system enforced by military power. India under British rule went from producing 25% of world GDP in 1700 to 4% in 1947. The industrial revolution in Britain was built partly on capital accumulated from slave plantations in the Caribbean and cotton grown by enslaved people in America.</p><p>The economist Ha-Joon Chang argues that the countries that are rich today became rich partly by doing things — protectionist tariffs, state investment, technology theft — that they now tell developing countries not to do. The rules of the global economy were written by people who had already won.</p>
<div class="fact-pull"><strong>💰 How colonialism transferred wealth — and why the gap persists</strong>In 1757, the East India Company won the Battle of Plassey and began extracting wealth from Bengal. By 1780, Bengal — formerly one of the wealthiest regions in the world — was experiencing famine. By 1947, India's share of world manufacturing had fallen from ~25% to under 2%. The mechanisms: forcing India to buy British manufactured goods (destroying local textile industry), extracting raw cotton and selling finished cloth back to India, taxing Indians to pay for the British army that occupied India. The development gap between former colonial powers and former colonies is not an accident.</div>
<div class="portugal-pull"><strong>🇵🇹 Brazil — the colony that became bigger than the empire</strong>Brazil was Portugal's most valuable colony — by far. For the first century, it was pau-brasil (the dye wood). Then came sugar, grown by enslaved Africans on a massive scale. Then gold (in the 18th century, the Brazilian gold rush sent so much gold to Portugal that it was re-exported to Britain — funding the British industrial revolution). Then coffee and rubber. Brazil became independent in 1822 but the economic structure — commodity export, dependent on foreign investment — persisted. The term 'path dependency' applies: colonial economic structures outlast colonial rule.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Dependency theory — why some countries stay poor</strong>Why are former colonies generally poorer than former colonial powers? Dependency theory (Andre Gunder Frank, 1960s) argues the global economy is structured to keep it that way.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Colonial economies were restructured to export raw materials and import manufactured goods — a structure that persisted after independence</li><li>Commodity prices (coffee, copper, cotton) are volatile and generally declining relative to manufactured goods</li><li>International debt, often inherited from colonial governments, creates structural dependency on the IMF and World Bank</li><li>Counter-argument: South Korea, Taiwan, Singapore — former colonial or occupied territories that became wealthy through active industrial policy</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if the global economic rules were written by the countries that are now rich (mostly former colonial powers), is it possible for poor countries to become rich by following those rules?</em></div>`:""}`},
  {emoji:"✊",text:(id)=>`<p>Empires ended because people refused to accept them.</p><p>Colonialism was not simply given up by generous imperial powers — it was fought for, argued for, and in many cases died for by people who were being colonised. The Indian independence movement led by Gandhi was one of the 20th century's most remarkable political achievements: a non-violent mass movement that ended the British Raj. The Haitian Revolution (1791-1804) was the only successful slave revolt in history — enslaved people overthrew the French colonial government and created the first Black republic.</p><p>But decolonisation was also messy, violent and incomplete. Borders drawn by colonisers remained. Economic structures created by colonisers remained. And in some cases, political power simply transferred from foreign elites to local ones, without meaningful change for ordinary people.</p>
<div class="fact-pull"><strong>✊ Independence movements — some facts that deserve to be better known</strong>Haiti achieved independence in 1804 — the first Caribbean nation to do so. France then demanded 150 million francs in "reparations" for the loss of its slave colony (i.e. Haiti had to pay France for the privilege of not being enslaved). Haiti finished paying this debt in 1947 — 143 years. During this time, the debt prevented Haiti from investing in development. Some economists argue this debt explains a significant part of Haiti's poverty today. Ho Chi Minh's Vietnamese declaration of independence (1945) quoted directly from the American Declaration of Independence. He hoped the US would support Vietnamese independence. Instead the US backed French re-colonisation.</div>
<div class="portugal-pull"><strong>🇵🇹 April 25, 1974 — Portugal liberates itself and its colonies simultaneously</strong>The Carnation Revolution is one of the most extraordinary events in 20th-century European history. On April 25, 1974, Portuguese military officers overthrew the 48-year-old Salazar/Caetano dictatorship with almost no violence — the signal was two songs played on national radio. Flowers (carnations) were placed in soldiers' gun barrels. Within 18 months, Portugal had transitioned to democracy and its African colonies had independence. Portugal went from being the last European country with a large colonial empire to a liberal democracy in under two years. April 25th is still celebrated as Portugal's national holiday.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Neo-colonialism — when the empire ends but the structure remains</strong>Kwame Nkrumah (Ghana's first president, 1957) coined "neo-colonialism" to describe what he saw: political independence without economic independence.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Former colonies remain dependent on former colonial powers for trade, investment, and debt financing</li><li>IMF and World Bank structural adjustment programmes (1980s-90s) required countries to privatise state assets and reduce government spending — effectively preventing the state-led development that Western countries had used to become rich</li><li>The CFA franc: 14 African countries still use a currency pegged to the euro and partly controlled by France — a direct remnant of French colonialism</li><li>Chinese investment in Africa is often described as "neo-colonialism" by Western critics — who rarely acknowledge the Western neo-colonialism that preceded it</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: is it possible to have genuine political independence without economic independence? What would economic independence for a former colony actually require?</em></div>`:""}`},
  {emoji:"🌱",text:(id)=>`<p>The world is still living in the aftermath of empire.</p><p>The borders of most African, Middle Eastern and South Asian countries were drawn by Europeans. The languages of government in most former colonies are European languages. The international economic system — trade rules, financial institutions, intellectual property law — was designed by countries that were already wealthy and industrialised, mostly former colonial powers. The global inequality between North and South is not a natural condition; it is a historical product.</p><p>This is not to say that former colonies have no agency or that all their problems are colonial legacies. But understanding the present requires understanding how it was made. History is not background — it is structure.</p>
<div class="fact-pull"><strong>🌱 Post-colonial theory — what it actually says</strong>Post-colonial theory (Edward Said, Frantz Fanon, Gayatri Spivak) examines how colonial power shaped not just political and economic structures but knowledge itself — how the world is known, described, and valued. Said's Orientalism (1978) argued that Western scholarship on the Middle East and Asia served colonial power by constructing "the East" as exotic, irrational and backward — justifying domination. This is not just about the past: school curricula, media representation, and international institutions still reflect colonial knowledge hierarchies in ways that are often invisible to people in former colonial powers.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal's post-colonial identity — ongoing and contested</strong>Portugal's relationship with its colonial past is complex and still being negotiated. The CPLP (Community of Portuguese Language Countries) provides a diplomatic framework, but post-colonial debates about reparations, cultural restitution, and historical honesty are ongoing. The Padrão dos Descobrimentos in Belém celebrates the Age of Discovery without contextualising the slave trade. Some Portuguese historians and activists argue for a more honest public reckoning. Others argue that Portugal should be proud of the cultural connections its history created. This debate is not unique to Portugal — every former colonial power has some version of it.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Reparations — the argument everyone avoids</strong>The reparations debate asks a simple question: if wealth was transferred from colonies to imperial centres through violence and exploitation, should former colonial powers pay it back? The arguments are substantive on both sides.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>For:</strong> the economic extraction was documented, quantified, and created measurable disadvantage that persists today; Haiti's forced debt payments provide a clear case for repayment</li><li><strong>Against:</strong> impractical to quantify; current citizens didn't benefit directly; money without structural change is insufficient</li><li><strong>Alternative approaches:</strong> debt cancellation, technology transfer, trade reform, repatriation of cultural artefacts</li><li>In 2023, the Caribbean Community (CARICOM) formally renewed calls for reparations from European nations for the slave trade</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if you were designing a reparations framework, what would be the most fair and practical form — money, debt cancellation, trade reform, or something else? What would be the obstacles?</em></div>`:""}`}
];
const EMPIRES=[
  {id:"british",name:"British Empire",emoji:"🇬🇧",peak:"1920 — 35.5 million km², 412 million people",period:"1583-1997 (handover of Hong Kong)",story:"The British Empire was the largest in history, covering a quarter of the Earth's surface at its peak. It was built through a combination of trade (the East India Company was effectively a state), military conquest, and settler colonialism in Australia, Canada, New Zealand and South Africa. Its lasting legacies include: the English language (now spoken by 1.5 billion people), cricket (played in 150 countries), common law legal systems, parliamentary democracy frameworks, and the borders of dozens of countries. Its negative legacies include: the Atlantic slave trade, the Bengal famine, the partition of India (which killed up to 2 million people), and the artificial borders of the Middle East, Africa and South Asia.",portugal:"British investment in Portugal (particularly in port wine, cork and textiles) was a direct result of the Treaty of Windsor (1386) — the oldest alliance between two nations still in force. Britain and Portugal have been formal allies for 638 years. British capital funded much of Portugal's economic development in the 19th century. The Douro Valley wine trade was significantly controlled by British merchant families (Symington, Graham, Taylor) for centuries — you can still see their names on port wine bottles today.",ks3:"The British Empire's economic model — raw materials from colonies, manufactured goods exported back — is the template for understanding global inequality. India's de-industrialisation under British rule (from 25% to 2% of world manufacturing) is the most documented example. The Bengal Famine of 1943, which killed 2-3 million people while Bengal was exporting food to Britain, illustrates the most extreme consequences of colonial extraction. Churchill's response ('I hate Indians. They are a beastly people with a beastly religion') is a matter of historical record."},
  {id:"mongol",name:"Mongol Empire",emoji:"🏹",peak:"1279 — 24 million km², largest contiguous empire ever",period:"1206-1368",story:"The Mongol Empire was built with a speed and completeness that no military force has matched before or since. In 25 years under Genghis Khan, the Mongols conquered more territory than Rome did in 400 years. Their method combined terrifying violence (cities that resisted were destroyed; populations that surrendered were spared) with sophisticated organisation — the Mongol postal system (yam) could carry messages 300km per day. The Pax Mongolica they established allowed goods, ideas and diseases to move freely across Eurasia, connecting Chinese, Islamic and European civilisations in ways that had profound consequences.",portugal:"The Mongol invasions of Europe (1241) reached Poland and Hungary — and were stopped by the death of the Great Khan, not by European military resistance. If the Mongols had continued west, Portugal might have been conquered. The Mongol trade routes that the Pax Mongolica opened allowed Asian goods and knowledge to reach European markets — contributing to the curiosity about Asia that eventually motivated Portuguese exploration. Marco Polo's journeys (1271-95) through the Mongol Empire directly inspired Columbus and other explorers.",ks3:"The Mongol Empire challenges comfortable narratives about violence and progress. The Mongol conquests killed an estimated 40 million people — possibly 10% of the world's population. They also created the most extensive free trade zone in world history, accelerated the exchange of technologies between Asia and Europe (gunpowder, printing, the stirrup all moved westward), and inadvertently helped end the Middle Ages by disrupting existing power structures. Can mass killing and the acceleration of progress coexist in historical assessment? The honest answer is: yes, and this is why history is difficult."},
  {id:"ottoman",name:"Ottoman Empire",emoji:"🌙",peak:"17th century — 5.2 million km², 3 continents",period:"1299-1922",story:"The Ottoman Empire lasted 623 years and at its peak governed one of the most diverse and sophisticated states in history — over 600 ethnic groups in relative coexistence across three continents. Istanbul (Constantinople) was one of the world's great cities: the largest in Europe from the 15th to 19th centuries. The Ottoman millet system allowed Christian, Jewish and Muslim communities to govern themselves by their own laws in many respects — a form of managed multiculturalism that predates modern diversity frameworks by 500 years. The Empire's decline and the way European powers carved it up at the Paris Peace Conference (1919) created the modern Middle East's borders — including the lines that underlie current conflicts in Iraq, Syria and Israel-Palestine.",portugal:"The Ottoman Empire controlled the eastern Mediterranean and the overland spice routes to Asia — which is precisely why Portugal needed to find an alternative sea route around Africa. The Ottoman expansion into Egypt in 1517 threatened even the existing overland routes. Portugal's Age of Discovery and the Ottoman Empire's expansion were directly connected: Portuguese maritime exploration was in part a strategic response to Ottoman land power. The two empires competed for control of the spice trade from different directions.",ks3:"The Ottoman Empire's collapse and the subsequent partition of the Middle East by Britain and France (Sykes-Picot Agreement, 1916) is directly connected to current conflicts in Iraq, Syria, Lebanon and Israel-Palestine. The borders drawn in 1916 (literally with a pencil on a map, as the negotiators later admitted) divided Arab populations between French and British spheres without reference to local political realities. Understanding this origin does not resolve current conflicts — but it is impossible to understand them without it."},
  {id:"portuguese_empire",name:"Portuguese Empire",emoji:"🇵🇹",peak:"16th century — trading posts on 5 continents",period:"1415 (Ceuta) — 1999 (Macau)",story:"The Portuguese Empire was the first, the longest-lasting, and the most geographically dispersed European empire. It was built not on territorial conquest (Portugal rarely had enough soldiers for that) but on maritime trade routes and fortified ports — feitorias (trading posts) from Brazil to Japan. Its model: control the sea lanes, tax the trade, plant the flag, bring the missionaries. This template was copied by every subsequent European empire. At its peak, Portugal controlled the most profitable trade routes in the world: spices from Asia, gold and slaves from Africa, sugar and later gold from Brazil.",portugal:"The Portuguese Empire is the reason that 264 million people speak Portuguese, that Brazil is a country, that Mozambique and Angola are nations, that Goa was part of India only from 1961, and that Macau was part of China only from 1999. The Empire ended but its linguistic and cultural legacy is extraordinary. The CPLP (Community of Portuguese Language Countries) represents this legacy diplomatically. The question Portugal still grapples with is how to acknowledge both the achievements and the atrocities of this history simultaneously.",ks3:"Portugal's empire offers a case study in the relationship between size and impact. Portugal, with a population of about 1-2 million throughout the empire's most active centuries, controlled territories with hundreds of millions of inhabitants. The mechanism was not manpower but technology, organisation, and ruthless exploitation of commercial advantage. The slave trade was central: Portugal transported approximately 5.8 million enslaved Africans across the Atlantic — more than any other nation. Understanding Portugal's history requires simultaneously holding enormous navigational and cultural achievement alongside the largest single act of human trafficking in history."},
  {id:"decolonisation",name:"Decolonisation",emoji:"✊",peak:"1945-1975 — most rapid political transformation in history",period:"Haiti 1804 → ongoing",story:"Decolonisation was not given — it was won. The process by which empires ended combined: independence movements (Gandhi's non-violence in India, Nkrumah's pan-Africanism in Ghana, Ho Chi Minh's resistance in Vietnam), the weakening of European powers after two world wars, the Cold War competition between the US and USSR (both rhetorically anti-colonial), and the moral force of ideas about self-determination that colonial powers had proclaimed but not practised. The result: approximately 80 new countries came into existence between 1945 and 1975, the fastest political transformation in world history.",portugal:"Portugal's decolonisation was unique in Europe: it happened simultaneously with the end of dictatorship in a single revolutionary moment — April 25, 1974. The Carnation Revolution brought democracy to Portugal and independence to five African colonies within 18 months. It was not bloodless — years of colonial war had preceded it — but the revolution itself was nearly violence-free. Portugal went from Europe's last colonial power to a liberal democracy almost overnight. The anniversary is still the country's most celebrated public holiday.",ks3:"Decolonisation's incompleteness is visible everywhere. The DRC (Democratic Republic of Congo) became independent in 1960 but Belgian-designed borders and the extraction of its vast mineral wealth have generated conflict ever since. The arbitrary borders of the Middle East created by Britain and France in 1916 have produced a century of conflict. The economic structures of colonialism — commodity export, foreign debt, infrastructure serving extraction — proved more durable than political colonialism. Political independence without economic independence is, at minimum, a very different thing than full sovereignty."}

    {q:"What is 'path dependency' in the context of colonial economies, and why does it matter for understanding current global inequality?",opts:["The tendency for countries to follow their leaders' paths","The concept that economic structures, once established, create their own inertia — colonial economies built around commodity export and import of manufactured goods tended to persist after independence because the physical infrastructure, trade relationships, and institutional arrangements were all designed for extraction rather than development","The geographical routes used by colonial trade ships","The idea that colonial borders determined migration paths"],ans:1,fact:"Path dependency is one of the most useful concepts for understanding why development gaps between former colonial powers and former colonies are so persistent. When the British built Indian railways, they built them to move raw materials to ports, not to connect Indian cities to each other. When mining infrastructure was built in the Congo, it served export, not local industrialisation. These physical, institutional and trade structures outlast the political end of colonialism. Changing them requires active policy intervention — which is precisely what IMF structural adjustment programmes (1980s-90s) often prevented."},
    {q:"How did the Scramble for Africa's borders create conditions for 21st-century conflicts?",opts:["It created too many small countries that couldn't sustain themselves","The Berlin Conference borders cut across pre-existing ethnic, linguistic and political territories, splitting some groups across multiple countries and forcing others together who had no common political tradition. When colonial authorities left, these artificial states lacked the internal coherence needed for stability, and ethnic or regional groups competing for state control often had no other mechanism for resolving disputes","African conflicts are caused by resource wealth, not borders","Modern African conflicts are unrelated to colonialism"],ans:1,fact:"The clearest examples: the Yoruba people are divided between Nigeria and Benin; the Somali people are divided across five countries; the Kurdish people are divided across four countries. In each case, colonial borders created minorities within states who might have had their own state in a different border configuration. The DRC contains 200+ ethnic groups with no shared political tradition — because Belgian colonisers drew borders to maximise resource extraction, not political viability. 44% of Africa's borders are straight lines drawn by Europeans who had never visited the territories they were dividing."},

    {q:"What made the Haitian Revolution (1791-1804) uniquely significant in world history?",opts:["It was the first revolution in the Caribbean","It was the only successful slave revolt in history that resulted in the creation of an independent state — enslaved people defeated the French colonial army (and a Napoleonic expedition sent to crush them) and founded the first Black republic. France then demanded 150 million francs in compensation for the 'loss' of its slave colony, which Haiti paid until 1947 — draining resources that could have funded development","Haiti was the first country in the Americas to achieve independence","It was the first revolution to use guerrilla tactics"],ans:1,fact:"The Haitian Revolution is one of the most extraordinary events in history — and one of the least taught in European schools. Enslaved people, treated as property and brutally exploited on sugar plantations, organised, fought, and defeated the most powerful military force in the world at the time (post-Revolutionary France). The price they paid: 143 years of debt payments to France for the 'loss' of their slavery. Haiti finished paying in 1947. The economic consequences of this debt are still debated by economists as a significant factor in Haitian poverty today."},
    {q:"What is 'neo-colonialism' and what evidence exists for it today?",opts:["A new type of colonialism involving space exploration","The continuation of colonial economic relationships after formal political independence — former colonies remaining dependent on former colonial powers through trade structures, debt, currency arrangements, and international institution rules. Evidence: the CFA franc (14 African countries using a currency linked to and partly controlled by France), debt structures inherited from colonial governments, trade rules that continue to disadvantage commodity exporters","The colonisation of digital space by tech companies","Former colonies voluntarily choosing to maintain economic ties"],ans:1,fact:"Nkrumah's 1965 concept remains analytically powerful. The CFA franc example is particularly striking: 14 West and Central African countries use currencies pegged to the euro and are required to deposit 50% of their foreign reserves with the French Treasury (recently reduced to 30%). France holds veto power over monetary policy through the arrangement. This is not a relic — it is a current arrangement that African economists have called a form of financial colonialism. Critics argue it prevents the monetary policy flexibility needed for development; defenders argue it provides stability."}

    {q:"What is the Carnation Revolution and why is April 25th a special day in Portugal?",opts:["A flower-growing festival celebrated every spring","The day in 1974 when Portuguese military officers overthrew the 48-year-old dictatorship with almost no violence — soldiers put carnations in their gun barrels instead of firing them — and Portugal became a democracy. It also led to independence for Portugal's African colonies.","A day when Portuguese people plant carnation flowers","A celebration of Portugal's discovery of Brazil"],ans:1,fact:"April 25, 1974 is one of the most extraordinary days in 20th-century European history. The military signal to begin the revolution was two songs played on national radio. Soldiers didn't fire — instead, people came into the streets and put red carnations (it was carnation season) into the soldiers' gun barrels. The 48-year-old dictatorship fell almost without bloodshed. Within 18 months, Portugal had a new democratic constitution and its African colonies had independence. Every April 25th, Portugal celebrates this day with the national holiday Dia da Liberdade (Freedom Day)."},
    {q:"How did colonialism affect the economies of colonised countries?",opts:["It made them stronger by giving them access to European technology","It made them weaker — colonial economies were structured to send raw materials to Europe and buy back manufactured goods, preventing local industries from developing. After independence, these economic structures often remained.","It had no lasting economic effect","It helped them become more equal societies"],ans:1,fact:"Colonial economic structures were designed for extraction, not development. India went from producing 25% of world goods in 1700 to only 2% in 1947 — after 200 years of British rule. Brazil sent gold, sugar, rubber and coffee to Portugal and received manufactured goods back. Congo's railways were built to bring minerals to ports, not to connect Congolese cities. After independence, these structures were hard to change — the infrastructure, trade relationships and debt all pointed in the same direction. This is why many economists say colonial economic legacies are as important as political ones."},
    {q:"What was unusual about Haiti's independence in 1804?",opts:["It was the first country in South America to become independent","Haiti was the first successful slave revolt in history — enslaved people defeated the French colonial army and created the first Black republic. France then made Haiti pay 150 million francs as compensation for losing its slave colony, which took 143 years to repay","Haiti was given independence peacefully by France","Haiti was the first country to gain independence from Spain"],ans:1,fact:"Haiti's story is extraordinary and heartbreaking. Enslaved people fought for and won their freedom — defeating Napoleon's army in the process — and then France made them pay for it. The 150 million franc debt (about $21 billion in today's money) took from 1825 to 1947 to repay — 122 years. During those 122 years, Haiti was paying money to France rather than investing it in schools, hospitals, and infrastructure. Many historians and economists argue this debt is a major reason Haiti is the poorest country in the Western hemisphere today."}

    {title:"The Scale of Colonial Extraction",story:"Economist Utsa Patnaik estimated Britain extracted approximately $45 trillion from India between 1765-1938 (173 years), using British tax and trade data. Current UK GDP is approximately $3.1 trillion per year.",q:"The total extraction was approximately how many years of current UK GDP? And what was the average annual extraction in today's money?",working:"Years of GDP: 45,000 ÷ 3,100 = 14.5 years of current GDP. Annual average: 45,000 ÷ 173 = $260 billion per year (in 2017 values).",answer:"14.5",unit:"years of current UK GDP extracted from India (£260bn/year average)",fact:"$260 billion extracted per year — roughly equivalent to the entire annual GDP of a country like Chile or Portugal, year after year for 173 years. This calculation has been disputed by some economists but the methodology (using British trade records and tax data) is transparent and auditable. The argument that India was 'underdeveloped' before British colonialism is directly contradicted by the fact that India produced 25% of world manufacturing in 1700. The question of reparations becomes more concrete when the numbers are this specific."},
    {title:"Haiti's Impossible Debt",story:"France demanded 150 million francs from Haiti in 1825 as compensation for Haitian independence. Haiti finally finished paying the debt (with interest) in 1947. Haiti's first payment was due in 1826.",q:"How many years did Haiti spend paying this debt? And if Haiti had instead invested the same money in domestic development at 3% annual growth, approximately how much would it have accumulated by 1947?",working:"Years paying: 1947 - 1826 = 121 years. Compound growth: 150 million × (1.03)^121 = 150 million × 35.0 = approximately 5.25 billion francs equivalent.",answer:"121",unit:"years paying France (equivalent value grown to ~5.25bn francs if invested domestically)",fact:"121 years of debt payments — and the compound growth calculation shows what Haiti could have accumulated instead. This is why some economists call the debt one of the primary causes of Haitian poverty. The irony: Haiti was paying France for the privilege of not being enslaved. The people who had been treated as property were made to compensate the people who had owned them. In 2022, a New York Times investigation found that these forced debt payments were even larger than previously known — Haiti paid approximately $21 billion in today's equivalent."},
    {title:"Decolonisation Speed",story:"In 1945, there were approximately 51 members of the United Nations (most of the world's sovereign states at the time). By 1975, there were approximately 144 UN member states.",q:"How many new countries came into existence in 30 years? What is the average number per year?",working:"New countries: 144-51 = 93. Per year: 93/30 = 3.1 new countries per year.",answer:"93",unit:"new countries in 30 years (3.1 per year)",fact:"93 new countries in 30 years — the fastest political transformation in human history. For comparison, the previous 5,000 years had produced about 51 stable states. Almost all 93 new countries were former colonies. They inherited: the borders drawn by their colonisers, the debts accumulated by colonial governments, the economic structures designed for extraction, and (in many cases) civil conflict between groups that colonialism had either pitted against each other or artificially united. The new countries started with the deck stacked against them."}

  cub:[
    {title:"The Scramble for Africa",story:"In 1870, Europeans controlled approximately 10% of Africa. In 1914, they controlled approximately 90%.",q:"How many percentage points did European control increase in 44 years? And if Africa's total area is approximately 30 million km², how many km² came under European control in those 44 years?",working:"Percentage increase: 90-10 = 80 percentage points. Additional area: 30,000,000 × 80% = 24,000,000 km² in 44 years.",answer:"80",unit:"percentage point increase (24 million km² seized in 44 years)",fact:"24 million km² in 44 years — about the same area as all of North and South America combined, seized by European countries in less than half a century. To put it another way: that's an average of 545,000 km² per year, or 1,493 km² per day. The speed shows how systematic the process was — not random adventuring but deliberate, coordinated land-grabbing by powerful governments. The consequences: economic extraction, forced labour, cultural destruction, and the artificial borders that still shape Africa today."},
    {title:"Languages of Colonialism",story:"Portuguese is spoken by 264 million people across 9 countries, all as a direct result of colonialism. English is spoken by approximately 1.5 billion people across dozens of countries.",q:"English is approximately how many times more widely spoken than Portuguese? And what percentage of English speakers are native speakers (approximately 400 million)?",working:"Times more: 1,500/264 = 5.7 times more. % native: 400/1,500 × 100 = 26.7%",answer:"5.7",unit:"times more English speakers than Portuguese (only 27% are native speakers)",fact:"Only 27% of English speakers are native English speakers — 73% learned it as a second language. This shows how completely English has become the global lingua franca of business, science and diplomacy — people learn it because it's economically necessary, not because they chose it culturally. This is the legacy of British colonialism + American cultural dominance in the 20th century. Portuguese's 264 million speakers are similarly a colonial legacy — but with a crucial difference: Brazil's growing population means Portuguese is still spreading."},

  bay:[
    {title:"Big Empires",story:"The British Empire at its peak in 1920 covered approximately 35.5 million km². The total land area of Earth is approximately 149 million km².",q:"What percentage of Earth's land did the British Empire cover at its peak?",working:"35.5/149 × 100 = 23.8% — about 24%",answer:"23.8",unit:"% of Earth's land in the British Empire",fact:"About 1 in 4 pieces of land on Earth was part of the British Empire at its biggest! That's an incredible amount of land for one country to control. The British Empire included countries in every continent: India, Australia, Canada, South Africa, Nigeria, Jamaica, and many more. Managing all of this from a small island in the North Atlantic seems almost impossible — but they did it through a combination of military force, trade networks, and the English language. The Empire officially ended when Hong Kong returned to China in 1997."},
    {title:"Portugal's Empire Age",story:"Portugal captured Ceuta in 1415 and returned Macau to China in 1999.",q:"How many years did Portugal have an overseas empire?",working:"1999 - 1415 = 584 years",answer:"584",unit:"years Portugal had an overseas empire",fact:"584 years — Portugal had the longest-lasting empire in European history! It started when Portugal was a medieval kingdom and ended when Portugal was a modern democracy in the European Union. The first piece (Ceuta, in Morocco) was captured in 1415. The last piece (Macau, in China) was returned in 1999. In between: Brazil (1500-1822), Angola and Mozambique (until 1975), Goa in India (until 1961), and many more. Portugal's tiny size (about the size of Ireland) makes this 584-year global empire all the more extraordinary."},
    {title:"How Many New Countries?",story:"In 1945 there were 51 countries in the United Nations. By 1975 there were 144.",q:"How many new countries joined between 1945 and 1975?",working:"144 - 51 = 93 new countries",answer:"93",unit:"new countries in 30 years",fact:"93 new countries in just 30 years — almost all of them former colonies that had won their independence! Before World War Two, most of Africa and Asia was controlled by European empires. After the war, independence movements grew so strong that one by one the empires gave up their colonies. Some decolonisations were peaceful (like Ghana in 1957), others were violent (like Algeria, which fought France for 8 years). Portugal was the last European country to give up its colonies, finally doing so after the Carnation Revolution of 1974."}
  ]
};
const TASKS={
  owl:{icon:"🦉",title:"Empires and Their Legacies — An Analytical Essay",level:"KS3 Extended Writing",
   brief:`<p>Write an analytical essay responding to:</p>
<blockquote style="border-left:3px solid #81c784;padding:8px 14px;color:#c8e6c9;font-style:italic;margin:10px 0">"The economic legacy of colonialism is more significant than its political legacy." Evaluate this claim.</blockquote>
<ul><li>Define what you mean by political and economic legacies</li><li>Use at least two specific case studies (from the empires explored in this chapter)</li><li>Address the concept of neo-colonialism</li><li>Consider the counter-argument: political legacies (borders, ethnic conflict) may be equally significant</li><li>Reach a clear, evidenced conclusion</li></ul>`,
   placeholder:"Introduction — defining terms:\n\nEconomic legacies (with case studies):\n\nPolitical legacies:\n\nNeo-colonialism argument:\n\nConclusion:"},
  cub:{icon:"🐻",title:"A Letter from an Independence Leader",level:"KS2 History + Creative Writing",
   brief:`<p>You are a leader of an independence movement in an African country in 1960. Write a letter to the leader of the European country that controls yours, explaining:</p>
<ul><li>Why your country deserves independence</li><li>What the colonial government has done that is unfair</li><li>What you plan to do when your country is free</li><li>That you want a peaceful handover, not a war</li></ul>`,
   placeholder:"Dear [European Leader],\n\nI am writing to demand the independence of our country...\n\nUnder your rule, we have suffered...\n\nWhen we are free, we plan to...\n\nWe want this to be peaceful because...\n\nYours,\n[Your Name], Independence Movement"},
  bay:{icon:"🌿",title:"What I Learned About Empires",level:"KS1/KS2 Foundation",
   brief:`<p>Write about what you've learned about empires. Tell us:</p>
<ul><li>What an empire is in your own words</li><li>One amazing or surprising fact about any empire</li><li>Something important about Portugal's empire</li><li>Why you think April 25th is important to Portugal</li></ul>`,
   placeholder:"An empire is...\n\nA surprising fact I learned:\n\nAbout Portugal's empire:\n\nApril 25th is important because:"}
};
const SAVE_KEY="atlas_ch9_v1";
function defaultState(){const s={};CHILDREN.forEach(c=>{s[c.id]={storyPage:0,selectedEmpire:null,quizIdx:0,quizAnswers:[],quizDone:false,quizScore:0,mathInputs:{},mathAnswered:{},taskText:"",taskSaved:false,sectionsComplete:[]};});return s;}
function loadState(){try{const s=localStorage.getItem(SAVE_KEY);if(s)return{...defaultState(),...JSON.parse(s)};}catch(e){}return defaultState();}
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}}
let state=loadState();let ui={view:"profiles",child:null,section:"story"};
function render(){
  const app=document.getElementById("app");const child=CHILDREN.find(c=>c.id===ui.child);
  let h=`<div class="hero"><h1>🌍 The Atlas Chronicles</h1><p>Chapter 9: Empires and Colonies</p><div class="ks-badges"><span class="ks-badge">📚 KS1 Bay</span><span class="ks-badge">📚 KS2 Cub</span><span class="ks-badge" style="background:rgba(240,180,41,0.1);border-color:rgba(240,180,41,0.2);color:#f0b429">📚 KS3 Owl</span></div></div>`;
  if(ui.view==="profiles")h+=renderProfiles();
  else if(ui.view==="learn"&&child)h+=renderLearn(child);
  app.innerHTML=h;
}
function renderProfiles(){
  let h=`<div class="section-label">Choose your explorer</div><div class="profile-grid">`;
  CHILDREN.forEach(c=>{const s=state[c.id];const comp=(s.sectionsComplete||[]).length;h+=`<div class="profile-card ${ui.child===c.id?"active":""}" onclick="selectChild('${c.id}')"><div style="font-size:2.8rem">${c.avatar}</div><div class="pname">${c.name}</div><div class="plevel">${c.level}</div><div class="pstars">${comp>0?"⭐".repeat(comp)+" ("+comp+"/5)":"Ready!"}</div></div>`;});
  return h+`</div>`;
}
function renderLearn(child){
  const s=state[child.id];const comp=s.sectionsComplete||[];
  const sections=[{id:"story",icon:"📖",name:"Story"},{id:"empires",icon:"🌍",name:"Empires"},{id:"maths",icon:"📐",name:"Maths"},{id:"task",icon:"✍️",name:"Task"},{id:"quiz",icon:"✅",name:"Quiz"}];
  let h=`<a href="index.html" class="back-btn">← Home</a>`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:2rem">${child.avatar}</span><div><div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#81c784">${child.name} — Chapter 9</div><div style="color:#666;font-size:0.73rem">${child.level} · ⭐ ${comp.length}/${sections.length} done</div></div></div>`;
  h+=`<div class="progress-overview">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<div class="prog-tile ${done?"done":""}"><div class="prog-icon">${sec.icon}</div><div class="prog-name">${done?"✓ ":""}${sec.name}</div></div>`;});
  h+=`</div><div class="nav-tabs">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<button class="nav-tab ${ui.section===sec.id?"active":""} ${done?"done":""}" onclick="switchSection('${sec.id}')">${sec.icon} ${sec.name}</button>`;});
  h+=`</div>`;
  if(ui.section==="story")h+=renderStory(child,s);
  else if(ui.section==="empires")h+=renderEmpires(child,s);
  else if(ui.section==="maths")h+=renderMaths(child,s);
  else if(ui.section==="task")h+=renderTask(child,s);
  else if(ui.section==="quiz")h+=renderQuiz(child,s);
  return h;
}
function renderStory(child,s){
  const pg=Math.min(s.storyPage,STORY.length-1);const page=STORY[pg];const isLast=pg>=STORY.length-1;
  let h=`<div class="story-panel"><div class="chapter-label">Chapter 9 · Page ${pg+1} of ${STORY.length}</div><div class="story-h">Empires and Colonies</div><div class="story-emoji">${page.emoji}</div><div class="story-body">${page.text(child.id)}</div><div class="page-nav"><span class="page-ctr">${pg+1}/${STORY.length}</span>`;
  if(!isLast)h+=`<button class="cont-btn" onclick="nextPage()">Continue →</button>`;
  else h+=`<button class="cont-btn" onclick="completeSection('story');switchSection('empires')">Explore Empires! 🌍</button>`;
  return h+`</div></div>`;
}
function renderEmpires(child,s){
  let h=`<div class="explorer-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">🌍 ${child.ks}: Empires and Their Legacies</div><div class="explorer-title">🌍 Empire Explorer</div><div class="explorer-sub">Click each empire — rise, fall, and what was left behind</div><div class="empire-grid">`;
  EMPIRES.forEach(e=>{h+=`<div class="empire-card ${s.selectedEmpire===e.id?"selected":""}" onclick="selectEmpire('${e.id}')"><div class="empire-emoji">${e.emoji}</div><div class="empire-name">${e.name}</div><div class="empire-sub">${e.period}</div></div>`;});
  h+=`</div>`;
  if(s.selectedEmpire){
    const e=EMPIRES.find(x=>x.id===s.selectedEmpire);
    if(e){
      h+=`<div class="empire-detail"><div style="font-family:'Fredoka One',cursive;color:#81c784;font-size:1.2rem;margin-bottom:8px">${e.emoji} ${e.name}</div><div class="emp-stats">`;
      [["📅 Period",e.period],["🌍 Peak",e.peak],["💰 Economy","Extraction-based"],["🗺️ Legacy","Still shaping today"]].forEach(([l,v])=>{h+=`<div class="empstat"><div class="empstat-label">${l}</div><div class="empstat-val" style="font-size:0.74rem">${v}</div></div>`;});
      h+=`</div><div style="font-size:0.85rem;color:#c8e6c9;line-height:1.65;margin-bottom:8px">${e.story}</div>`;
      h+=`<div class="portugal-pull"><strong>🇵🇹 Portugal Connection</strong>${e.portugal}</div>`;
      if(child.id==="owl")h+=`<div class="ks3-pull"><strong>🦉 The bigger picture</strong>${e.ks3}</div>`;
      h+=`</div>`;
    }
    h+=`<div style="margin-top:12px;text-align:center"><button class="btn-green" onclick="completeSection('empires');switchSection('maths')">Maths! 📐</button></div>`;
  } else h+=`<div style="text-align:center;padding:14px;color:#555;font-size:0.82rem">👆 Click any empire to explore</div>`;
  return h+`</div>`;
}
function renderMaths(child,s){
  const id=child.id;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="math-panel"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">📐 ${child.ks}: Empire Numbers</div><div style="font-family:'Fredoka One',cursive;color:#f0b429;font-size:1.2rem;margin-bottom:4px">📐 Empires in Numbers</div><div style="color:#777;font-size:0.78rem;margin-bottom:14px">The real scale of empire — in figures</div>`;
  chs.forEach((ch,idx)=>{
    const answered=s.mathAnswered&&s.mathAnswered[idx];const inputVal=(s.mathInputs&&s.mathInputs[idx])||"";
    h+=`<div class="challenge-card"><div class="ch-title">📐 ${ch.title}</div><div class="ch-story">${ch.story}</div><div class="ch-q">${ch.q}</div>`;
    if(!answered){h+=`<div class="math-row"><input class="math-in" type="text" value="${inputVal.replace(/"/g,'&quot;')}" placeholder="Answer..." oninput="updateMath(${idx},this.value)" onkeydown="if(event.key==='Enter')checkMath(${idx})"><span class="math-unit">${ch.unit}</span><button class="math-go" onclick="checkMath(${idx})">Check ✓</button></div>`;if(s.mathAnswered&&s.mathAnswered[idx]==="wrong")h+=`<div class="math-no">Not quite — try again!</div>`;}
    else{h+=`<div class="math-ok">✅ Correct!</div><div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 12px;font-size:0.78rem;color:#aaa;line-height:1.6;margin-top:6px"><strong style="color:#f0b429">Working:</strong> ${ch.working}</div><div class="math-fact">🤩 ${ch.fact}</div>`;}
    h+=`</div>`;});
  const allDone=chs.every((_,i)=>s.mathAnswered&&s.mathAnswered[i]==="correct");
  if(allDone)h+=`<div style="text-align:center;margin-top:12px"><button class="btn-green" onclick="completeSection('maths');switchSection('task')">Do the Task! ✍️</button></div>`;
  return h+`</div>`;
}
function renderTask(child,s){
  const id=child.id;const task=TASKS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="task-box"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✍️ ${child.ks}: Writing Task</div><div class="task-title">${task.icon} ${task.title}</div><div class="task-level">${task.level}</div><div class="task-brief">${task.brief}</div><textarea class="task-ta" placeholder="${task.placeholder}" oninput="updateTask(this.value)">${s.taskText||""}</textarea><br><button class="task-btn" onclick="saveTask()">Save 💾</button>`;
  if(s.taskSaved)h+=`<div class="saved-ok">✅ Saved!</div>`;
  if((s.taskText||"").length>80)h+=`<div style="margin-top:10px"><button class="btn-green" onclick="completeSection('task');switchSection('quiz')">Take the Quiz! ✅</button></div>`;
  return h+`</div>`;
}
function renderQuiz(child,s){
  const id=child.id;const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];const idx=s.quizIdx||0;
  if(s.quizDone||idx>=qs.length){
    const score=s.quizScore||0;const pct=Math.round((score/qs.length)*100);
    return`<div class="quiz-wrap"><div class="score-banner"><h2>Chapter 9 Complete! 🌍</h2><div style="font-size:3rem;margin:8px 0">${pct>=80?"🏆":pct>=60?"⭐":"💪"}</div><div style="color:#ccc">${score}/${qs.length} (${pct}%)</div><div style="display:flex;gap:8px;justify-content:center;margin-top:12px"><button onclick="resetQuiz()" style="background:rgba(255,255,255,0.07);color:#ccc;border:1px solid rgba(255,255,255,0.12);padding:9px 18px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer">Try Again 🔄</button><a href="chapter10.html" class="btn-green" style="padding:9px 18px;text-decoration:none">Chapter 10 → The Modern World</a></div></div></div>`;
  }
  const q=qs[idx];const answers=s.quizAnswers||[];const thisAns=answers[idx];
  let h=`<div class="quiz-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✅ ${child.ks} Quiz</div><div class="section-label">Quiz · Q${idx+1} of ${qs.length}</div><div class="score-dots">`;
  qs.forEach((_,i)=>{const a=answers[i];h+=`<div class="sdot ${i===idx?"current":a===undefined?"":a===qs[i].ans?"done":"wrong"}"></div>`;});
  h+=`</div><div class="q-text">${q.q}</div><div class="q-opts">`;
  q.opts.forEach((opt,i)=>{let cls="q-opt";if(thisAns!==undefined){if(i===q.ans)cls+=" correct";else if(i===thisAns&&i!==q.ans)cls+=" wrong";}h+=`<button class="${cls}" ${thisAns!==undefined?"disabled":""} onclick="answerQuiz(${i})">${opt}</button>`;});
  h+=`</div>`;
  if(thisAns!==undefined){h+=`<div class="q-fact">🤩 ${q.fact}</div><div style="text-align:right;margin-top:8px"><button class="btn-green" onclick="nextQuiz()">Next →</button></div>`;}
  return h+`</div>`;
}
function selectChild(id){ui.child=id;ui.view="learn";ui.section="story";render();}
function switchSection(s){ui.section=s;render();}
function completeSection(s){const comp=state[ui.child].sectionsComplete||[];if(!comp.includes(s))state[ui.child].sectionsComplete=[...comp,s];saveState();}
function nextPage(){if(state[ui.child].storyPage<STORY.length-1){state[ui.child].storyPage++;saveState();render();}}
function selectEmpire(id){state[ui.child].selectedEmpire=id;saveState();render();}
function updateMath(idx,v){if(!state[ui.child].mathInputs)state[ui.child].mathInputs={};state[ui.child].mathInputs[idx]=v;}
function checkMath(idx){
  const id=ui.child;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];const ch=chs[idx];
  const input=(state[id].mathInputs&&state[id].mathInputs[idx]||"").trim().replace(/,/g,"");
  const correctVal=ch.answer.replace(/,/g,"");
  const userNum=parseFloat(input);const correctNum=parseFloat(correctVal);
  const correct=!isNaN(userNum)&&!isNaN(correctNum)&&Math.abs(userNum-correctNum)/Math.max(correctNum,0.001)<0.05;
  if(!state[id].mathAnswered)state[id].mathAnswered={};state[id].mathAnswered[idx]=correct?"correct":"wrong";saveState();render();
}
function answerQuiz(i){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const idx=s.quizIdx||0;const q=qs[idx];
  const answers=[...(s.quizAnswers||[])];while(answers.length<=idx)answers.push(undefined);
  answers[idx]=i;if(i===q.ans)state[id].quizScore=(s.quizScore||0)+1;
  state[id].quizAnswers=answers;saveState();render();
}
function nextQuiz(){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const next=(s.quizIdx||0)+1;state[id].quizIdx=next;if(next>=qs.length)state[id].quizDone=true;saveState();render();
}
function resetQuiz(){const id=ui.child;state[id].quizIdx=0;state[id].quizAnswers=[];state[id].quizDone=false;state[id].quizScore=0;saveState();render();}
function updateTask(v){state[ui.child].taskText=v;}
function saveTask(){state[ui.child].taskSaved=true;saveState();render();}
render();
</script>
