<body>
<div class="wrap" id="app"></div>
<script>
const CHILDREN=[
  {id:"owl",name:"Owl",age:12,avatar:"🦉",ks:"KS3",level:"KS3 — Secondary Level"},
  {id:"cub",name:"Cub",age:9,avatar:"🐻",ks:"KS2",level:"KS2 — Primary Level"},
  {id:"bay",name:"Bay",age:7,avatar:"🌿",ks:"KS1",level:"KS1/KS2 — Foundation"}
];
const STORY=[
  {emoji:"⛵",text:(id)=>`<p>Portugal had no business doing what it did.</p><p>In 1400, Portugal was a tiny kingdom at the edge of Europe — population roughly 1 million, no great wealth, no large army, no particular reason for the rest of the world to notice it. By 1500, Portuguese ships had rounded Africa, reached India, Brazil, Japan and China. By 1550, Portugal controlled the most important trading routes in the world and had established a maritime empire that touched every continent. A country of 1 million people had connected the entire globe.</p><p>How? The answer is a combination of geography, technology, determination, and one crucial piece of knowledge that nobody else had.</p>
<div class="fact-pull"><strong>⛵ The numbers that make Portugal's achievement extraordinary</strong>In 1415, Portugal captured Ceuta in North Africa — the first step. Over the next 85 years, Portuguese navigators explored 25,000km of previously unmapped African coastline, established trading posts on every continent, and created the first genuinely global trade network. The country that did this had approximately the same population as present-day Birmingham (UK). The ships they used were roughly the size of a modern fishing trawler. The navigation instruments they had were the compass, the astrolabe, and their own knowledge of the stars.</div>
<div class="portugal-pull"><strong>🇵🇹 It started in Lagos — and ended everywhere</strong>The Lagos in Portugal's Algarve (not Nigeria) was the operational base for many of Prince Henry the Navigator's early expeditions. Ships departed from here to explore the African coast. The technology, the sailors, the maps, the captains — all organised from this small coastal town. Today Lagos is a tourist town with beaches and bars. Five hundred years ago it was the most strategically important port in the known world — the place where Europe's connection to the rest of the globe began.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Why Portugal, why then, why at all?</strong>This is the central historical puzzle. Several factors converged in 15th-century Portugal that existed nowhere else simultaneously.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>Geography:</strong> Portugal faces the Atlantic, not the Mediterranean. It was the natural starting point for ocean exploration.</li><li><strong>The volta do mar:</strong> Portuguese sailors discovered the return wind route using Atlantic westerlies — a trade secret that gave them a structural advantage nobody else had for decades</li><li><strong>Institutional support:</strong> Prince Henry the Navigator (1394-1460) created the first systematic state-sponsored research and development programme in history — essentially a government-funded innovation centre for navigation</li><li><strong>Motivation:</strong> bypass the Arab/Venetian monopoly on spice trade routes — the equivalent of finding a new internet routing protocol</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: Portugal's exploration was not driven by scientific curiosity but by commercial competition. Does the motivation for a discovery change its significance?</em></div>`:""}`},
  {emoji:"🌍",text:(id)=>`<p>The volta do mar was Portugal's most important secret.</p><p>Every ship that sailed south along the African coast faced the same problem: the wind blows southward along the African coast, which means getting back north requires sailing directly into the wind — nearly impossible. For decades, expeditions that went too far south couldn't get back. Then Portuguese sailors discovered something extraordinary: if you sail far out into the Atlantic, past where the wind changes, westerly winds will carry you back north. The return route was not straight back — it was a great arc out into the Atlantic and back.</p><p>Portugal kept this secret for decades. It was their competitive advantage — the navigational knowledge that made their oceanic voyages possible and their rivals' impossible.</p>
<div class="fact-pull"><strong>🌍 The volta do mar — sailing with the wind, not against it</strong>The volta do mar (return from the sea) is one of the most important geographical discoveries in history. It revealed that the Atlantic has a predictable wind circulation system: trade winds blow southwest near the equator; westerlies blow northeast in the mid-latitudes. By understanding this system, Portuguese navigators could plan round-trip voyages of thousands of kilometres. Christopher Columbus used this system (learned, perhaps, from his time in Portugal) when he sailed west to the Americas in 1492.</div>
<div class="portugal-pull"><strong>🇵🇹 The school of Sagres — probably a myth, definitely an idea</strong>Tradition says Prince Henry the Navigator built a "school of navigation" at Sagres on Portugal's southwestern tip, where he gathered navigators, mathematicians, cartographers and astronomers to develop Portuguese naval technology. Modern historians are sceptical — there is little archaeological evidence. But whether or not the physical school existed, the intellectual project certainly did: Henry systematically recruited expertise, funded expeditions, and debriefed returning captains to compile an ever-improving picture of the world beyond Europe. It was the world's first organised R&D programme.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Longitude — the problem that took 300 years to solve</strong>Portuguese navigators could calculate latitude (north-south position) by measuring the angle of the sun or stars above the horizon. Longitude (east-west position) was almost impossible — you need to know the time difference between your current position and a reference point.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Without accurate longitude, navigators had to "dead reckon" — estimating position from speed, heading and time — accumulating errors over thousands of km</li><li>Ships ran aground constantly because they didn't know exactly where they were east-west</li><li>The Longitude Prize (1714, British government) offered £20,000 for a solution — equivalent to millions today</li><li>John Harrison's marine chronometer (1760s) solved it: an accurate clock that kept Greenwich time meant you could calculate longitude from time difference</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: GPS now tells you your position to within 3 metres anywhere on Earth. This was such an impossible dream that governments offered fortunes for a partial solution 300 years ago. What current "impossible" problem might be solved in 300 years?</em></div>`:""}`},
  {emoji:"🗺️",text:(id)=>`<p>Every voyage rewrote the map.</p><p>Before 1415, European maps of Africa showed a coastline that ended in uncertainty, or a giant land mass connecting Africa to Asia, making the Indian Ocean a landlocked sea. By 1500, Portuguese cartographers had mapped the entire African coastline accurately. By 1520, the first world map showing the Americas as a separate continent had been drawn. In 100 years, the European image of the world went from profoundly wrong to roughly correct.</p><p>These maps were state secrets. Portugal jealously guarded its cartographic knowledge — sharing maps with rival powers was treason, punishable by death. Knowledge was power, and Portugal's maps were its most valuable strategic asset.</p>
<div class="fact-pull"><strong>🗺️ The Cantino Planisphere — Portugal's stolen secret</strong>In 1502, an Italian spy named Alberto Cantino bribed a Portuguese cartographer to copy the most up-to-date secret world map. The Cantino Planisphere shows the African coastline, India, Brazil and the Caribbean with remarkable accuracy — and reveals exactly how much Portugal knew and was hiding. It is one of the most historically significant maps in existence. A copy made by a spy 520 years ago tells us more about Portuguese geographic knowledge than most official records. It is preserved in Modena, Italy.</div>
<div class="portugal-pull"><strong>🇵🇹 Cartography changed in Lisbon — and the world changed with it</strong>The Lisbon cartographic tradition of the late 15th and early 16th centuries produced some of the most accurate and comprehensive world maps ever made. Portuguese cartographers were the first to accurately map Africa's coastline, the Indian Ocean, the coasts of Brazil, and the Pacific. The naming convention for these discoveries — many places in Africa and Asia still carry their Portuguese names — is a direct legacy. Cape Verde, São Tomé, Mozambique, Malacca — all named by Portuguese sailors who were the first Europeans to see them.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Maps are power — who controls geographic knowledge controls the world</strong>In the 15th-16th centuries, accurate maps were the equivalent of classified military intelligence. Understanding this explains much of the period's geopolitics.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>The Treaty of Tordesillas (1494) was fundamentally a cartographic negotiation — dividing a world that neither party had fully mapped</li><li>Portugal executed cartographers who leaked information to rival powers</li><li>Columbus's funding was delayed partly because accurate Portuguese maps were secret — nobody knew if his western route was viable</li><li>Today, GPS, satellite imagery and Google Earth have made geographic knowledge free and universal — a revolution as significant as the printing press for knowledge access</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if Portugal's maps had been openly shared, would the Age of Discovery have happened differently? Does controlling knowledge slow or accelerate progress?</em></div>`:""}`},
  {emoji:"⚓",text:(id)=>`<p>Vasco da Gama reached India in 1498. It was the most consequential sea voyage in history.</p><p>When da Gama sailed into the port of Calicut on the Malabar Coast of India on 20 May 1498, he completed a journey of approximately 24,000km that had taken two years. He had lost half his fleet and two-thirds of his crew. But he had done it — he had found the sea route from Europe to Asia that Portugal had been trying to open for 80 years. The spice trade, which had flowed through Arab and Venetian middlemen for centuries, could now go directly to Lisbon.</p><p>The consequences were enormous and not all of them were good.</p>
<div class="fact-pull"><strong>⚓ Vasco da Gama — the voyage in numbers</strong>Departed Lisbon: July 1497. Reached India: May 1498. Total duration: approximately 2 years for round trip. Distance: approximately 24,000km each way. Fleet: 4 ships, 170 crew. Returned with: 2 ships, approximately 55 crew (more than half died). Cargo value: 60 times the cost of the entire expedition — in spices. Financial return on investment: approximately 6,000%. The most profitable commercial voyage in history up to that point. Portugal was never the same again.</div>
<div class="portugal-pull"><strong>🇵🇹 Vasco da Gama's tomb is in Lisbon — and so is the monument to what he started</strong>Da Gama died in India in 1524 on his third voyage there. His body was eventually returned to Lisbon and his tomb is in the Jerónimos Monastery in Belém — the same building commissioned to celebrate his first return from India in 1499. The Padrão dos Descobrimentos (Monument to the Discoveries) on the Belém waterfront shows 33 figures from the Age of Discovery — navigators, cartographers, missionaries, monarchs — all looking out to sea. It stands at the exact spot where they departed.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The Age of Discovery — triumph and catastrophe, simultaneously</strong>The Portuguese Age of Discovery is genuinely ambiguous. The same voyages that connected the world also initiated the Atlantic slave trade, destroyed indigenous cultures, and created the colonial system whose consequences are still felt today.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>1441: Portuguese sailors bring the first enslaved Africans to Europe — the beginning of the Atlantic slave trade</li><li>By 1500: Lisbon has a Black population of approximately 10% — the largest in any European city</li><li>The spice trade route da Gama opened impoverished Cairo and Venice; it enriched Lisbon; it funded further exploration and conquest</li><li>The same ships that brought spices to Europe brought smallpox to the Americas — accidentally killing an estimated 90% of indigenous Americans</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: how do you hold in mind simultaneously that Portugal's Age of Discovery was a genuine achievement of navigation and science AND the beginning of systematic exploitation of Africa and the Americas? Does it have to be one or the other?</em></div>`:""}`},
  {emoji:"🌏",text:(id)=>`<p>Magellan proved the Earth was a sphere. He also proved it was enormous.</p><p>Ferdinand Magellan was Portuguese. He was sailing for Spain when he departed in 1519 with 5 ships and 270 men to circumnavigate the globe. He was killed in the Philippines in 1521, in a battle he started unnecessarily. His navigator Juan Sebastian Elcano brought one remaining ship and 18 men back to Spain in 1522. They had sailed approximately 60,000km — the first humans to circle the Earth.</p><p>The circumnavigation proved two things: the Earth is a sphere (not just theoretically, but practically — you can go west and end up east). And the Pacific Ocean is vastly larger than anyone had imagined. Columbus had assumed it was a small sea. It is the largest single geographical feature on Earth.</p>
<div class="fact-pull"><strong>🌏 Magellan-Elcano circumnavigation — the numbers</strong>Departed: September 1519 from Seville. Returned: September 1522. Duration: 3 years. Ships: 5 departed, 1 returned. Crew: 270 departed, 18 returned. Distance: approximately 60,000km. Significance: first circumnavigation, first crossing of the Pacific, proof that the Americas are a separate continent from Asia. Two of the survivors were enslaved people from the Moluccas, who thus became the first people from the East Indies to complete a circumnavigation — typically absent from the history books.</div>
<div class="portugal-pull"><strong>🇵🇹 Magellan — Portuguese hero, or traitor?</strong>Magellan was born Portuguese and trained as a navigator in Portugal's service. After falling out with King Manuel I over a dispute about pay, he offered his services to Spain — and Spain accepted. His circumnavigation was a triumph for Spain, not Portugal. In Portugal, he is sometimes remembered as a traitor; in Spain as a hero. In both cases, his achievement was a product of Portuguese navigational training and knowledge. The greatest single achievement of the Age of Navigation was performed by a Portuguese navigator sailing for a rival power — the geopolitics of talent have always been complicated.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The Atlantic slave trade — Portugal's original sin, and its long shadow</strong>Portugal initiated the Atlantic slave trade in 1441. Between 1500 and 1900, approximately 12.5 million enslaved Africans were transported across the Atlantic — of whom approximately 4.9 million went to Brazil on Portuguese and Brazilian ships.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Portugal transported more enslaved people than any other nation — approximately 5.8 million people over the period</li><li>The trade was not incidental to Portuguese expansion — it was central to the economic model that funded continued exploration and colonisation</li><li>Brazil did not abolish slavery until 1888 — the last country in the Western hemisphere to do so</li><li>The economic effects of this extraction persist in wealth and development gaps between former slave-sending and slave-receiving regions today</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: the Jerónimos Monastery — Portugal's most celebrated building, built to honour the Age of Discovery — was funded partly by the profits of the spice trade and partly by the slave trade. How should Portugal memorialise this history?</em></div>`:""}`}

const EXPLORERS=[
  {id:"henry",name:"Prince Henry the Navigator",emoji:"🏰",dates:"1394-1460",role:"Organiser and funder of exploration",voyages:"Did not himself voyage — organised others",story:"Henry the Navigator never sailed beyond the Mediterranean, but he is arguably the most important figure in the history of exploration. As Governor of the Order of Christ (which funded the voyages) and a son of King João I, he had access to enormous resources and royal support. He systematically recruited navigators, cartographers, astronomers and mathematicians; funded expeditions; debriefed returning captains; and compiled the first systematic body of navigational knowledge about the African coast and Atlantic winds. He is the founder of the first state-sponsored research and development programme in history.",portugal:"Henry was born in Porto in 1394. His mother was Philippa of Lancaster — daughter of John of Gaunt — making him half-English. The connection to England through his mother's family gave Portugal access to English shipbuilding expertise that contributed to the development of the caravel. His court at Sagres became the intellectual centre of European navigation. The Escola de Sagres (School of Sagres) may or may not have had physical form — but as a concept, a systematic programme of state-sponsored exploration, it was entirely real and enormously consequential.",ks3:"Henry illustrates the importance of institutional structures in enabling individual achievement. The explorers who actually sailed — Dias, da Gama, Cabral — were extraordinarily brave and skilled. But they sailed within a system that Henry had built: funded, organised, with accumulated knowledge from previous voyages, with standardised ships (the caravel) and instruments. Individual genius requires institutional support. This has implications for how we think about innovation today: breakthrough discoveries usually happen within systems that invest in research and accumulate knowledge, not in isolated moments of individual brilliance."},
  {id:"dias",name:"Bartolomeu Dias",emoji:"⚓",dates:"c.1450-1500",role:"First European to round the Cape of Good Hope",voyages:"1488 — Cape of Good Hope voyage",story:"Bartolomeu Dias was the first person to prove that Africa had a southern tip — that it was possible to sail around it into the Indian Ocean. In 1488 he rounded what he called the Cape of Storms (renamed Cape of Good Hope by King João II, for obvious PR reasons). His crew refused to sail further and he had to turn back, but the proof of concept was established. Ten years later, Vasco da Gama sailed the same route all the way to India. Dias died in 1500 near the Cape he had discovered, in a storm, on the voyage that took Pedro Álvares Cabral to Brazil.",portugal:"Dias's 1488 voyage is the moment Portugal's entire 75-year programme of African exploration paid off. Every expedition from Ceuta in 1415 to Dias in 1488 had been working toward this: proving that the African continent had an end. When Dias returned to Lisbon with the news, it triggered the final preparations for da Gama's voyage to India. Dias was also part of the fleet that accidentally discovered Brazil in 1500 — and died in the same storm that nearly prevented Cabral from reaching it.",ks3:"Dias's voyage illustrates the concept of incremental progress in exploration: 75 years of systematically mapping coastline, each expedition going further than the last, each one building on accumulated knowledge. This is how most scientific and geographical progress actually works — not single heroic leaps but patient accumulation. The popular image of discovery as a 'eureka moment' is usually misleading. Most breakthroughs are the last step in a long staircase of incremental progress."},
  {id:"gama",name:"Vasco da Gama",emoji:"🧭",dates:"c.1460-1524",role:"First European to reach India by sea",voyages:"1497-99 (India), 1502-03, 1524",story:"Vasco da Gama completed the project that Henry the Navigator had started 80 years earlier. His 1497-99 voyage to India was the most commercially significant voyage in history: it opened a direct sea route to the spice trade, bypassing the Arab and Venetian middlemen who had controlled it for centuries. The financial return was approximately 6,000% — 60 times the cost of the voyage in spice profits. Da Gama was not a particularly nice man — he was capable of extraordinary cruelty on his later voyages — but as a navigator, he was unmatched.",portugal:"Da Gama is the central figure of Portugal's national identity in the Age of Discovery. Luís de Camões wrote Portugal's national epic poem, Os Lusíadas (1572), about his voyage — the equivalent of Homer's Odyssey, but true. His tomb in the Jerónimos Monastery in Belém is one of Portugal's most visited sites. The Vasco da Gama Bridge across the Tagus, the Vasco da Gama shopping centre — his name is everywhere. He is to Portugal what Columbus is to Spain, what Cook is to Britain: the face of an age of maritime power.",ks3:"Da Gama's voyages raise the question of how we evaluate historical figures who combined extraordinary achievement with documented atrocities. On his second voyage (1502-03), da Gama captured a ship carrying Muslim pilgrims and had it burned with 400 people locked inside, refusing to let them escape. He used violence systematically to establish Portuguese dominance in the Indian Ocean. His achievement (opening the sea route to India) and his methods (terror and mass murder) are inseparable. How should historians — and nations — handle this?"},
  {id:"cabral",name:"Pedro Álvares Cabral",emoji:"🌎",dates:"c.1467-c.1520",role:"First European to reach Brazil",voyages:"1500 — Brazil and India",story:"Pedro Álvares Cabral 'discovered' Brazil in April 1500 — though 'accidentally' is debated by historians. He was sailing the volta do mar route to India (swinging far west to catch the westerly winds) when he went far enough west to sight land that turned out to be South America. Was it a navigational error, or was Portugal already aware of Brazil's existence from earlier voyages and Cabral was sent to confirm it? The question has never been definitively answered. What is not debated: on the same voyage, during a storm near the Cape of Good Hope, Bartolomeu Dias died.",portugal:"Brazil's discovery by Cabral in 1500 is one of the most consequential moments in Portuguese history — it created the country's largest overseas territory. Brazil remained Portuguese until 1822. Its 215 million Portuguese speakers are the most enduring legacy of Cabral's voyage. The naming follows a pattern: Cabral called it 'Terra da Vera Cruz' (Land of the True Cross). It became known as 'Brasil' after the brazil wood (pau-brasil) that traders found there — a valuable red dye wood that was the colony's first export.",ks3:"Cabral's discovery of Brazil illustrates the concept of contingency in history — the idea that historical outcomes depend heavily on accidents, chance and small decisions. If the Treaty of Tordesillas had been drawn 500km further east, Brazil would have been Spanish. If Cabral had not swung so far west, someone else might have reached Brazil first. If da Gama's route had been more direct, the Brazil detour might not have happened. Counter-factual history (asking 'what if?') is not just speculation — it helps identify which historical outcomes were inevitable and which were contingent."},
  {id:"magellan",name:"Ferdinand Magellan",emoji:"🌏",dates:"c.1480-1521",role:"Led first circumnavigation of the Earth",voyages:"1519-1522 (killed 1521, voyage completed by Elcano)",story:"Magellan was Portuguese, trained in Portugal's service, and used Portuguese navigational knowledge — but was sailing for Spain when he led the first circumnavigation of the Earth. He departed in 1519 with 5 ships and 270 men. He navigated the strait that now bears his name at the tip of South America (Strait of Magellan), crossed the entire Pacific, reached the Philippines — and was killed there in a battle he started, possibly due to poor judgement or possibly due to deliberate provocation. Juan Sebastian Elcano brought one ship and 18 men home. The achievement was Magellan's concept; the completion was Elcano's.",portugal:"Magellan's story is a window into the politics of the Age of Discovery. He served Portugal loyally for years, including in India and Malacca. After a dispute with King Manuel I about pay (Magellan believed he had not been adequately rewarded), he offered his services to Spain. Spain, seeing the opportunity to challenge Portuguese dominance, funded the circumnavigation. The rivalry between Portugal and Spain drove much of the Age of Discovery — each country trying to find routes and territories that the other didn't control.",ks3:"The circumnavigation's significance went beyond proof that the Earth is round (educated Europeans already knew this from ancient Greek mathematics). Its major contributions: demonstrating the true scale of the Pacific (vast, not small as Columbus assumed); providing the first empirical proof that the Americas were separate from Asia; and completing a global trade circuit that would eventually make nation-states that controlled sea lanes enormously wealthy. The implications for global geography and trade were permanent."}

const QUIZ={
  owl:[
    {q:"What was the 'volta do mar' and why was it Portugal's most important strategic advantage?",opts:["A Portuguese dance performed on ships to maintain crew morale","The discovery that the Atlantic has predictable wind circulation — trade winds blow southwest near the equator, westerlies blow northeast in mid-latitudes — allowing planned round-trip ocean voyages of thousands of kilometres. Portugal kept this secret for decades, making their oceanic voyages possible while rivals couldn't replicate them","A type of Portuguese ship designed for Atlantic conditions","The name of the Portuguese royal family"],ans:1,fact:"The volta do mar was the navigational equivalent of a trade secret — the knowledge that made Portugal's oceanic programme possible. Without it, ships could sail south but couldn't return north. With it, Portugal could plan reliable round trips. Columbus almost certainly knew about the volta do mar from his time in Portugal — he used the same wind system when he sailed west in 1492. The knowledge that geography has predictable patterns that can be exploited is the foundation of all systematic exploration."},
    {q:"Why is the Age of Discovery considered both a triumph and a catastrophe?",opts:["Because the ships were badly built and many sank","Because the same programme that connected the global trading system and advanced geographical knowledge also initiated the Atlantic slave trade, destroyed indigenous American civilisations (partly through smallpox, partly through deliberate violence), and established a colonial system whose economic consequences persist today. Both things are true simultaneously.","Because Portugal eventually lost most of its empire","Because the spices were not as valuable as expected"],ans:1,fact:"The most honest historical assessment of the Age of Discovery requires holding contradictory things simultaneously: genuine achievement (navigational science, geographical knowledge, connecting the world's trading systems) and genuine catastrophe (the Atlantic slave trade, the destruction of indigenous American civilisations, colonial exploitation). Portugal initiated both. The temptation to choose one narrative — celebration or condemnation — and ignore the other is a form of historical dishonesty. The complexity is the truth."},
    {q:"Why did the longitude problem matter so much to oceanic navigation, and what solved it?",opts:["Longitude was a theoretical problem with no practical importance","Without accurate east-west positioning, ships 'dead-reckoned' from speed and heading, accumulating errors over thousands of kilometres that caused wrecks on coasts they thought were hundreds of kilometres away. John Harrison's marine chronometer (1760s) solved it: by keeping accurate Greenwich time, sailors could calculate longitude from the time difference between local noon (measured by sun) and Greenwich time","The problem was solved by better maps, not better clocks","Longitude was only a problem in the Southern Hemisphere"],ans:1,fact:"The Longitude Problem was one of the greatest practical challenges of the Age of Sail and killed thousands of sailors. Latitude was calculable by the altitude of the sun or Pole Star. Longitude required knowing the time difference between your current position and a reference point — meaning you needed an accurate clock that could survive months at sea. The British government's £20,000 Longitude Prize (1714) testifies to its importance. Harrison's chronometer solution was initially resisted by the astronomical establishment who wanted a celestial navigation solution. It is a case study in how practical solutions can be delayed by institutional bias toward existing approaches."},
    {q:"What does the Cantino Planisphere (1502) tell us about Portuguese attitudes to geographical knowledge?",opts:["That Portugal was happy to share its discoveries with other nations","That Portugal treated accurate world maps as classified state secrets — showing the African coastline, India and Brazil with remarkable accuracy — because geographical knowledge was its primary strategic asset. The map only survived because it was stolen by an Italian spy, suggesting Portugal would otherwise have kept it secret indefinitely","That Portuguese cartography was less advanced than Italian","That Portugal had already mapped the Americas before Columbus"],ans:1,fact:"The Cantino Planisphere is one of the most historically significant objects in existence — a stolen secret that reveals how much Portugal knew and was hiding. The fact that it survives in Italy rather than Portugal (where it would have been destroyed as a security breach) is an example of how historical preservation is often accidental. The Portuguese policy of treating maps as state secrets meant that much of their cartographic knowledge was eventually lost — they were too secretive to preserve it. The tension between secrecy (strategic advantage) and openness (knowledge accumulation) is permanent in innovation."},
    {q:"Magellan was Portuguese but sailed for Spain. What does this episode reveal about the relationship between individual talent and national identity in the Age of Discovery?",opts:["That Magellan was a traitor","That in the 16th century, skilled navigators were a scarce resource whose services could be purchased across national boundaries — Magellan offered his expertise to Spain after Portugal failed to reward him adequately, and Spain saw an opportunity to challenge Portuguese dominance. This is not unusual: Columbus was Italian sailing for Spain; Drake was English raiding Spanish ships. The Age of Discovery was as much about individual talent markets as national programmes","That Spain was a more generous employer than Portugal","That Portuguese and Spanish navigators were effectively interchangeable"],ans:1,fact:"The talent market of the Age of Discovery was genuinely international. Columbus (Italian) sailed for Spain. Magellan (Portuguese) sailed for Spain. Amerigo Vespucci (Italian) sailed for both Spain and Portugal. John Cabot (Italian) sailed for England. Sebastian Cabot (born in Venice) served both England and Spain at different times. The 'national' character of exploration was to a significant degree a fiction — nations funded voyages, but the human capital was hired wherever it could be found. This pattern of international talent competing for national patronage is recognisable in modern science and technology."}

    {q:"What was Vasco da Gama's most important achievement?",opts:["He discovered Brazil","He became King of Portugal","He was the first European to reach India by sea (1498), opening a direct trade route for spices that bypassed Arab and Venetian middlemen who had controlled the spice trade for centuries","He built the Jerónimos Monastery"],ans:2,fact:"Reaching India by sea was the achievement Portugal had been working toward for 80 years! The spices of Asia — pepper, cinnamon, nutmeg, cloves — were enormously valuable in Europe (used to preserve food, make medicine, and as status symbols). They had always been controlled by Arab traders and Venetian merchants. Da Gama's sea route let Portugal buy spices directly in India and sell them in Europe at enormous profit. The financial return on his first voyage was approximately 6,000% — 60 times the cost of the expedition."},
    {q:"How big was Portugal when it built its global empire?",opts:["It was one of Europe's largest countries, with 10 million people","It was a tiny country of about 1 million people — similar to a large modern city","It was a powerful empire that already controlled much of Europe","It had the largest army in the world"],ans:1,fact:"About 1 million people — roughly the population of modern Birmingham or Dublin. Portugal is one of the most extraordinary stories in history: a tiny kingdom at the edge of Europe that became the first global maritime empire, with trading posts on every continent. The key was not the size of the country but the quality of its navigational knowledge, the determination of its navigators, and the systematic programme of exploration that Prince Henry the Navigator organised. Quality of organisation matters more than size."},
    {q:"What did Ferdinand Magellan prove by completing the first circumnavigation of the Earth?",opts:["That the Earth was much smaller than people thought","That you could sail from Europe to Asia going west, and that the Pacific Ocean is vastly larger than anyone had imagined — as well as proving practically that the Earth is a sphere","That Portugal was the greatest sailing nation","That there was no land between Europe and Asia going west"],ans:1,fact:"Magellan's circumnavigation (completed by Elcano in 1522 after Magellan was killed) proved that you could sail right around the Earth — which confirmed it was a sphere, not flat. It also revealed just how enormous the Pacific Ocean is: Columbus had assumed it was a short crossing; it turned out to be the largest geographical feature on Earth. Magellan and his crew were the first people to experience that realisation. Only 18 of the original 270 men survived to complete the journey."},
    {q:"Where in Portugal did many of the great voyages of discovery begin?",opts:["Porto","Coimbra","Braga","Lisbon and Lagos in the Algarve"],ans:3,fact:"Lisbon was the main base and capital, but many early expeditions departed from Lagos in the Algarve — where Prince Henry the Navigator had his operational headquarters. Today Lagos is known for its beautiful beaches, but 500-600 years ago it was one of the most strategically important ports in the world. The Jerónimos Monastery in Belém (in Lisbon) was built on the exact spot where explorers departed and returned — and it's still there today, one of Portugal's most magnificent buildings."}

  bay:[
    {q:"What is Portugal famous for discovering in the Age of Explorers?",opts:["Mountains and volcanoes","The sea route to India and Brazil, and helping to map the world","The North Pole","The highest mountain in Europe"],ans:1,fact:"Portugal's navigators were the first Europeans to find the sea route around Africa to India (Vasco da Gama, 1498), the first Europeans to reach Brazil (Pedro Álvares Cabral, 1500), and the people who organised the first voyage to sail all the way around the Earth (Ferdinand Magellan, 1519). For about 100 years, Portugal was the greatest exploring nation in the world — extraordinary for a small country at the edge of Europe."},
    {q:"Who was Vasco da Gama?",opts:["A Portuguese king who built Lisbon","A Portuguese navigator who was the first European to reach India by sea in 1498","A Portuguese inventor who built the first ship","A Portuguese artist who painted maps"],ans:1,fact:"Vasco da Gama was one of the greatest navigators in history. He sailed from Lisbon in 1497 with 4 ships and reached India in May 1498 — completing a journey of about 24,000km that took almost a year each way. More than half his crew died on the way. But he brought back enough spices to make his voyage worth 60 times what it had cost. His tomb is in the Jerónimos Monastery in Belém in Lisbon — you might have visited it!"},
    {q:"What is special about Ferdinand Magellan's voyage?",opts:["He was the first person to swim across the Atlantic Ocean","He led the first expedition to sail all the way around the entire Earth, proving it is a sphere","He discovered Portugal","He sailed to the Moon"],ans:1,fact:"Magellan led the first circumnavigation of the Earth — the first voyage to sail all the way around the world! He set off in 1519 with 5 ships and 270 people. Sadly, Magellan was killed in the Philippines in 1521 before finishing the journey. His navigator Elcano brought just one ship and 18 survivors home to Spain in 1522. They had been at sea for 3 years and sailed about 60,000km — the distance from the Earth to the Moon is only 384,000km, so they sailed about 1/6 of the way to the Moon!"},
    {q:"Why is the Jerónimos Monastery in Lisbon special?",opts:["It is the oldest building in Europe","It was built to celebrate Vasco da Gama's return from India — on the exact spot where the explorers departed and returned — and contains his tomb","It is where the Portuguese government meets","It is the tallest building in Portugal"],ans:1,fact:"The Jerónimos Monastery is one of Portugal's most beautiful and important buildings. King Manuel I ordered it built in 1501 to celebrate Vasco da Gama's successful voyage to India — using money from the new spice trade. It stands in Belém, right at the spot where explorers said their prayers before sailing into the unknown and where their families waited for them to return. Inside, you can see the carved stone tombs of Vasco da Gama and Portugal's most famous poet, Luís de Camões."},
    {q:"What was Prince Henry the Navigator most famous for?",opts:["He sailed to India himself","He organised and funded Portugal's programme of exploration — even though he rarely sailed himself — bringing together the best navigators, mapmakers and scientists to advance Portuguese knowledge of the seas","He discovered the Americas","He was king of Portugal"],ans:1,fact:"Prince Henry never sailed much himself — but he was the person who made Portugal's Age of Discovery possible by organising everything. He used his wealth and royal connections to fund expeditions, bring together the best navigators and mapmakers, study the stars and winds, and build better ships. Think of him like a modern tech company CEO — he didn't write the code himself, but he created the environment where great things could happen. Without Henry's organisation and funding, there might have been no da Gama, no Magellan, no discovery of Brazil."}

    {title:"Da Gama's Return on Investment",story:"Vasco da Gama's first voyage to India (1497-99) cost approximately 8,000 gold cruzados to outfit. The spices he returned with were worth approximately 480,000 gold cruzados.",q:"What was the return on investment as a percentage? And if you invested €1,000 at the same rate, how much would you get back?",working:"ROI: (480,000-8,000)/8,000 × 100 = 5,900%. €1,000 at same rate: 1,000 × (1+59) = €60,000",answer:"5900",unit:"% return on investment (€60,000 back for every €1,000 invested)",fact:"5,900% return — making da Gama's first voyage the most profitable commercial expedition in history at that point. To put this in perspective: a good stock market investment returns about 7-10% per year. Da Gama returned 5,900% in 2 years. This is why Portugal was willing to spend decades and enormous resources finding this route — the potential financial reward was extraordinary. It also explains why Spain was so desperate to find an alternative route (westward, via Columbus) — whoever controlled the spice trade controlled European wealth."},
    {title:"Magellan's Survival Rate",story:"Magellan departed with 270 crew members and 5 ships. 18 men returned on 1 ship, approximately 3 years later.",q:"What percentage of the crew survived? What percentage of ships survived? And what was the death rate per month?",working:"Crew survival: 18/270 × 100 = 6.7%. Ship survival: 1/5 × 100 = 20%. Duration: ~36 months. Monthly deaths: (270-18)/36 = 7 deaths per month.",answer:"6.7",unit:"% crew survival rate (7 deaths per month)",fact:"6.7% survival — meaning 93.3% of the crew died on a voyage that lasted 3 years. The causes: scurvy (vitamin C deficiency from lack of fresh food), starvation (the Pacific crossing took 4 months with almost no food or water), combat (Magellan's death in the Philippines), and storm. The circumnavigation was not an adventure — it was an ordeal. The 18 survivors who returned to Seville were celebrated as heroes; they had seen things no European had ever seen, survived conditions that killed almost everyone around them. Understanding what these voyages actually cost in human lives changes how we read the history."},
    {title:"The Spice Trade Route",story:"The overland spice route from India to Venice was approximately 8,000km and involved multiple intermediary traders, each adding cost. The sea route from Lisbon to India was approximately 24,000km.",q:"The sea route is how many times longer than the overland route? If the overland route cost 10 units of spice to transport (in fees and taxes), and the sea route cost only 2 units, what was the cost saving per 100 units of spice?",working:"Route length ratio: 24,000/8,000 = 3 times longer. Cost saving: 10-2 = 8 units saved per 100 spice. % saving: 8/10 × 100 = 80% cheaper.",answer:"3",unit:"times longer sea route (80% cheaper to transport)",fact:"3 times longer but 80% cheaper — because the overland route passed through Arab traders, Ottoman Empire toll points, and Venetian merchants, each taking a cut. The sea route, though much longer in distance, went directly from producer to Portuguese trading posts to Lisbon. This is why Portugal's discovery was so commercially significant: it was not just a geographical achievement but an economic disruption — cutting out all the middlemen who had controlled the spice trade for centuries. The same dynamic (cutting out middlemen) drives much of modern business innovation."}

  cub:[
    {title:"Da Gama's Voyage Distance",story:"Vasco da Gama sailed approximately 24,000km from Lisbon to Calicut, India in 1497-98. The circumference of the Earth is approximately 40,075km.",q:"What percentage of the Earth's circumference did da Gama's one-way voyage cover?",working:"24,000/40,075 × 100 = 59.9% — about 60% of the way around the Earth.",answer:"59.9",unit:"% of Earth's circumference",fact:"Da Gama sailed nearly 60% of the way around the entire Earth — without GPS, without radio, without weather forecasts, and largely without accurate maps for much of the route. He had a compass, an astrolabe to calculate latitude from the stars, knowledge of Atlantic wind patterns, and the accumulated information from previous Portuguese expeditions down the African coast. The voyage took about 10 months to reach India. To put it in perspective, a modern passenger jet would fly the same distance in about 25 hours."},
    {title:"Magellan's Crew",story:"Magellan departed with 270 crew and 18 survived. The voyage lasted approximately 3 years.",q:"How many crew members died? And what is the average number who died per year?",working:"Deaths: 270-18 = 252 died. Per year: 252/3 = 84 per year.",answer:"252",unit:"crew members died (84 per year)",fact:"252 people died out of 270 — that's more than 93%. Dying on these voyages was the normal outcome, not the exception. Sailors died from scurvy (the disease caused by not having vitamin C — their teeth fell out, their joints swelled, they bled internally), starvation, storms, battles, and simple exhaustion. Yet people kept signing up for these voyages — because the alternative was poverty in Portugal or Spain, and a successful voyage meant riches. The risk calculation was grimly rational."},

  owl:{icon:"🦉",title:"The Age of Discovery — Achievement and Accountability",level:"KS3 Extended Writing",
   brief:`<p>Write an essay responding to:</p>
<blockquote style="border-left:3px solid #64b5f6;padding:8px 14px;color:#bbdefb;font-style:italic;margin:10px 0">"Portugal's Age of Discovery should be celebrated as a triumph of human achievement." How far do you agree?</blockquote>
<ul><li>Acknowledge the genuine navigational and scientific achievements</li><li>Address the slave trade and colonial violence — these must not be minimised</li><li>Consider whether achievement and atrocity can coexist in historical assessment</li><li>Use specific explorers and voyages as evidence</li><li>Address the question: how should Portugal memorialise this period today?</li></ul>`,
   placeholder:"Introduction — my position:\n\nThe genuine achievements:\n\nThe atrocities and their scale:\n\nCan both be true simultaneously?:\n\nHow Portugal should memorialise it:\n\nConclusion:"},
  cub:{icon:"🐻",title:"Design a 1497 Explorer's Logbook",level:"KS2 Creative Writing + History",
   brief:`<p>You are a sailor on Vasco da Gama's first voyage to India (1497-99). Write 5 logbook entries from different points in the journey:</p>
<ul><li>Leaving Lisbon — how do you feel?</li><li>Rounding the Cape of Good Hope in a storm</li><li>Arriving in East Africa and meeting Arab traders</li><li>First sight of India</li><li>Returning home to Lisbon</li></ul>`,
   placeholder:"LOGBOOK — Voyage to India, 1497\n\nEntry 1 — Leaving Lisbon:\n\nEntry 2 — The Cape of Good Hope:\n\nEntry 3 — East Africa:\n\nEntry 4 — First sight of India:\n\nEntry 5 — Home!:"},
  bay:{icon:"🌿",title:"My Explorer Report",level:"KS1/KS2 Foundation",
   brief:`<p>Choose your favourite Portuguese explorer and write a report about them:</p>
<ul><li>Who they were and when they lived</li><li>What voyage they are famous for</li><li>One amazing or surprising fact about them</li><li>Why they were brave</li><li>How their voyage changed the world</li></ul>`,
   placeholder:"My explorer is...\nThey lived in...\n\nTheir most famous voyage:\n\nOne amazing fact:\n\nWhy they were brave:\n\nHow they changed the world:"}
};
const SAVE_KEY="atlas_ch8_v1";
function defaultState(){const s={};CHILDREN.forEach(c=>{s[c.id]={storyPage:0,selectedExp:null,quizIdx:0,quizAnswers:[],quizDone:false,quizScore:0,mathInputs:{},mathAnswered:{},taskText:"",taskSaved:false,sectionsComplete:[]};});return s;}
function loadState(){try{const s=localStorage.getItem(SAVE_KEY);if(s)return{...defaultState(),...JSON.parse(s)};}catch(e){}return defaultState();}
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}}
let state=loadState();let ui={view:"profiles",child:null,section:"story"};
function render(){
  const app=document.getElementById("app");const child=CHILDREN.find(c=>c.id===ui.child);
  let h=`<div class="hero"><h1>🌍 The Atlas Chronicles</h1><p>Chapter 8: Age of Explorers — Portugal's Greatest Story</p><div class="ks-badges"><span class="ks-badge">📚 KS1 Bay</span><span class="ks-badge">📚 KS2 Cub</span><span class="ks-badge" style="background:rgba(240,180,41,0.1);border-color:rgba(240,180,41,0.2);color:#f0b429">📚 KS3 Owl</span></div></div>`;
  if(ui.view==="profiles")h+=renderProfiles();
  else if(ui.view==="learn"&&child)h+=renderLearn(child);
  app.innerHTML=h;
}
function renderProfiles(){
  let h=`<div class="section-label">Choose your explorer</div><div class="profile-grid">`;
  CHILDREN.forEach(c=>{const s=state[c.id];const comp=(s.sectionsComplete||[]).length;h+=`<div class="profile-card ${ui.child===c.id?"active":""}" onclick="selectChild('${c.id}')"><div style="font-size:2.8rem">${c.avatar}</div><div class="pname">${c.name}</div><div class="plevel">${c.level}</div><div class="pstars">${comp>0?"⭐".repeat(comp)+" ("+comp+"/5)":"Ready!"}</div></div>`;});
  return h+`</div>`;
}
function renderLearn(child){
  const s=state[child.id];const comp=s.sectionsComplete||[];
  const sections=[{id:"story",icon:"📖",name:"Story"},{id:"explorers",icon:"⚓",name:"Explorers"},{id:"maths",icon:"📐",name:"Maths"},{id:"task",icon:"✍️",name:"Task"},{id:"quiz",icon:"✅",name:"Quiz"}];
  let h=`<a href="index.html" class="back-btn">← Home</a>`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:2rem">${child.avatar}</span><div><div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#64b5f6">${child.name} — Chapter 8</div><div style="color:#666;font-size:0.73rem">${child.level} · ⭐ ${comp.length}/${sections.length} done</div></div></div>`;
  h+=`<div class="progress-overview">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<div class="prog-tile ${done?"done":""}"><div class="prog-icon">${sec.icon}</div><div class="prog-name">${done?"✓ ":""}${sec.name}</div></div>`;});
  h+=`</div><div class="nav-tabs">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<button class="nav-tab ${ui.section===sec.id?"active":""} ${done?"done":""}" onclick="switchSection('${sec.id}')">${sec.icon} ${sec.name}</button>`;});
  h+=`</div>`;
  if(ui.section==="story")h+=renderStory(child,s);
  else if(ui.section==="explorers")h+=renderExplorers(child,s);
  else if(ui.section==="maths")h+=renderMaths(child,s);
  else if(ui.section==="task")h+=renderTask(child,s);
  else if(ui.section==="quiz")h+=renderQuiz(child,s);
  return h;
}
function renderStory(child,s){
  const pg=Math.min(s.storyPage,STORY.length-1);const page=STORY[pg];const isLast=pg>=STORY.length-1;
  let h=`<div class="story-panel"><div class="chapter-label">Chapter 8 · Page ${pg+1} of ${STORY.length}</div><div class="story-h">Age of Explorers</div><div class="story-emoji">${page.emoji}</div><div class="story-body">${page.text(child.id)}</div><div class="page-nav"><span class="page-ctr">${pg+1}/${STORY.length}</span>`;
  if(!isLast)h+=`<button class="cont-btn" onclick="nextPage()">Continue →</button>`;
  else h+=`<button class="cont-btn" onclick="completeSection('story');switchSection('explorers')">Meet the Explorers! ⚓</button>`;
  return h+`</div></div>`;
}
function renderExplorers(child,s){
  let h=`<div class="expl-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">⚓ ${child.ks}: Age of Explorers</div><div class="expl-title">⚓ Explorer Files</div><div class="expl-sub">The people who mapped the world — click each one to read their story</div><div class="explorer-grid">`;
  EXPLORERS.forEach(e=>{h+=`<div class="exp-card ${s.selectedExp===e.id?"selected":""}" onclick="selectExp('${e.id}')"><div class="exp-emoji">${e.emoji}</div><div class="exp-name">${e.name}</div><div class="exp-sub">${e.dates}</div></div>`;});
  h+=`</div>`;
  if(s.selectedExp){
    const e=EXPLORERS.find(x=>x.id===s.selectedExp);
    if(e){
      h+=`<div class="exp-detail"><div style="font-family:'Fredoka One',cursive;color:#64b5f6;font-size:1.2rem;margin-bottom:8px">${e.emoji} ${e.name}</div><div class="e-stats">`;
      [["📅 Dates",e.dates],["🎯 Role",e.role],["⛵ Voyages",e.voyages],["🌍 Significance","Changed the world"]].forEach(([l,v])=>{h+=`<div class="estat"><div class="estat-label">${l}</div><div class="estat-val" style="font-size:0.74rem">${v}</div></div>`;});
      h+=`</div><div style="font-size:0.85rem;color:#bbdefb;line-height:1.65;margin-bottom:8px">${e.story}</div>`;
      h+=`<div class="portugal-pull"><strong>🇵🇹 Portugal Connection</strong>${e.portugal}</div>`;
      if(child.id==="owl")h+=`<div class="ks3-pull"><strong>🦉 The bigger picture</strong>${e.ks3}</div>`;
      h+=`</div>`;
    }
    h+=`<div style="margin-top:12px;text-align:center"><button class="btn-blue" onclick="completeSection('explorers');switchSection('maths')">Maths! 📐</button></div>`;
  } else h+=`<div style="text-align:center;padding:14px;color:#555;font-size:0.82rem">👆 Click any explorer to read their story</div>`;
  return h+`</div>`;
}
function renderMaths(child,s){
  const id=child.id;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="math-panel"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">📐 ${child.ks}: Explorer Maths</div><div style="font-family:'Fredoka One',cursive;color:#f0b429;font-size:1.2rem;margin-bottom:4px">📐 The Age of Discovery in Numbers</div><div style="color:#777;font-size:0.78rem;margin-bottom:14px">Real calculations from history's greatest voyages</div>`;
  chs.forEach((ch,idx)=>{
    const answered=s.mathAnswered&&s.mathAnswered[idx];const inputVal=(s.mathInputs&&s.mathInputs[idx])||"";
    h+=`<div class="challenge-card"><div class="ch-title">📐 ${ch.title}</div><div class="ch-story">${ch.story}</div><div class="ch-q">${ch.q}</div>`;
    if(!answered){h+=`<div class="math-row"><input class="math-in" type="text" value="${inputVal.replace(/"/g,'&quot;')}" placeholder="Answer..." oninput="updateMath(${idx},this.value)" onkeydown="if(event.key==='Enter')checkMath(${idx})"><span class="math-unit">${ch.unit}</span><button class="math-go" onclick="checkMath(${idx})">Check ✓</button></div>`;if(s.mathAnswered&&s.mathAnswered[idx]==="wrong")h+=`<div class="math-no">Not quite — try again!</div>`;}
    else{h+=`<div class="math-ok">✅ Correct!</div><div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 12px;font-size:0.78rem;color:#aaa;line-height:1.6;margin-top:6px"><strong style="color:#f0b429">Working:</strong> ${ch.working}</div><div class="math-fact">🤩 ${ch.fact}</div>`;}
    h+=`</div>`;});
  const allDone=chs.every((_,i)=>s.mathAnswered&&s.mathAnswered[i]==="correct");
  if(allDone)h+=`<div style="text-align:center;margin-top:12px"><button class="btn-blue" onclick="completeSection('maths');switchSection('task')">Do the Task! ✍️</button></div>`;
  return h+`</div>`;
}
function renderTask(child,s){
  const id=child.id;const task=TASKS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="task-box"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✍️ ${child.ks}: Writing Task</div><div class="task-title">${task.icon} ${task.title}</div><div class="task-level">${task.level}</div><div class="task-brief">${task.brief}</div><textarea class="task-ta" placeholder="${task.placeholder}" oninput="updateTask(this.value)">${s.taskText||""}</textarea><br><button class="task-btn" onclick="saveTask()">Save 💾</button>`;
  if(s.taskSaved)h+=`<div class="saved-ok">✅ Saved!</div>`;
  if((s.taskText||"").length>80)h+=`<div style="margin-top:10px"><button class="btn-blue" onclick="completeSection('task');switchSection('quiz')">Take the Quiz! ✅</button></div>`;
  return h+`</div>`;
}
function renderQuiz(child,s){
  const id=child.id;const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];const idx=s.quizIdx||0;
  if(s.quizDone||idx>=qs.length){
    const score=s.quizScore||0;const pct=Math.round((score/qs.length)*100);
    return`<div class="quiz-wrap"><div class="score-banner"><h2>Chapter 8 Complete! ⚓</h2><div style="font-size:3rem;margin:8px 0">${pct>=80?"🏆":pct>=60?"⭐":"💪"}</div><div style="color:#ccc">${score}/${qs.length} (${pct}%)</div><div style="display:flex;gap:8px;justify-content:center;margin-top:12px"><button onclick="resetQuiz()" style="background:rgba(255,255,255,0.07);color:#ccc;border:1px solid rgba(255,255,255,0.12);padding:9px 18px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer">Try Again 🔄</button><a href="chapter9.html" class="btn-blue" style="padding:9px 18px;text-decoration:none">Chapter 9 → Empires and Colonies</a></div></div></div>`;
  }
  const q=qs[idx];const answers=s.quizAnswers||[];const thisAns=answers[idx];
  let h=`<div class="quiz-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✅ ${child.ks} Quiz</div><div class="section-label">Quiz · Q${idx+1} of ${qs.length}</div><div class="score-dots">`;
  qs.forEach((_,i)=>{const a=answers[i];h+=`<div class="sdot ${i===idx?"current":a===undefined?"":a===qs[i].ans?"done":"wrong"}"></div>`;});
  h+=`</div><div class="q-text">${q.q}</div><div class="q-opts">`;
  q.opts.forEach((opt,i)=>{let cls="q-opt";if(thisAns!==undefined){if(i===q.ans)cls+=" correct";else if(i===thisAns&&i!==q.ans)cls+=" wrong";}h+=`<button class="${cls}" ${thisAns!==undefined?"disabled":""} onclick="answerQuiz(${i})">${opt}</button>`;});
  h+=`</div>`;
  if(thisAns!==undefined){h+=`<div class="q-fact">🤩 ${q.fact}</div><div style="text-align:right;margin-top:8px"><button class="btn-blue" onclick="nextQuiz()">Next →</button></div>`;}
  return h+`</div>`;
}
function selectChild(id){ui.child=id;ui.view="learn";ui.section="story";render();}
function switchSection(s){ui.section=s;render();}
function completeSection(s){const comp=state[ui.child].sectionsComplete||[];if(!comp.includes(s))state[ui.child].sectionsComplete=[...comp,s];saveState();}
function nextPage(){if(state[ui.child].storyPage<STORY.length-1){state[ui.child].storyPage++;saveState();render();}}
function selectExp(id){state[ui.child].selectedExp=id;saveState();render();}
function updateMath(idx,v){if(!state[ui.child].mathInputs)state[ui.child].mathInputs={};state[ui.child].mathInputs[idx]=v;}
function checkMath(idx){
  const id=ui.child;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];const ch=chs[idx];
  const input=(state[id].mathInputs&&state[id].mathInputs[idx]||"").trim().replace(/,/g,"");
  const correctVal=ch.answer.replace(/,/g,"");
  const userNum=parseFloat(input);const correctNum=parseFloat(correctVal);
  const correct=!isNaN(userNum)&&!isNaN(correctNum)&&Math.abs(userNum-correctNum)/Math.max(correctNum,0.001)<0.05;
  if(!state[id].mathAnswered)state[id].mathAnswered={};state[id].mathAnswered[idx]=correct?"correct":"wrong";saveState();render();
}
function answerQuiz(i){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const idx=s.quizIdx||0;const q=qs[idx];
  const answers=[...(s.quizAnswers||[])];while(answers.length<=idx)answers.push(undefined);
  answers[idx]=i;if(i===q.ans)state[id].quizScore=(s.quizScore||0)+1;
  state[id].quizAnswers=answers;saveState();render();
}
function nextQuiz(){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const next=(s.quizIdx||0)+1;state[id].quizIdx=next;if(next>=qs.length)state[id].quizDone=true;saveState();render();
}
function resetQuiz(){const id=ui.child;state[id].quizIdx=0;state[id].quizAnswers=[];state[id].quizDone=false;state[id].quizScore=0;saveState();render();}
function updateTask(v){state[ui.child].taskText=v;}
function saveTask(){state[ui.child].taskSaved=true;saveState();render();}
render();
</script>
</body>
