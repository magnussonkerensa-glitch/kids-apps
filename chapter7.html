<body>
<div class="wrap" id="app"></div>
<script>
const CHILDREN=[
  {id:"owl",name:"Owl",age:12,avatar:"🦉",ks:"KS3",level:"KS3 — Secondary Level"},
  {id:"cub",name:"Cub",age:9,avatar:"🐻",ks:"KS2",level:"KS2 — Primary Level"},
  {id:"bay",name:"Bay",age:7,avatar:"🌿",ks:"KS1",level:"KS1/KS2 — Foundation"}
];
const STORY=[
  {emoji:"🏺",text:(id)=>`<p>Everything was invented once — for the first time.</p><p>Writing. Law. Mathematics. Philosophy. Democracy. Engineering. Plumbing. Concrete. All of it was invented by someone, somewhere, at some point in history. And the civilisations of the ancient world invented more of the things we depend on than most people realise. We tend to think of history as a long march from primitive to modern — but the ancient world was not primitive. It was different.</p>
<div class="fact-pull"><strong>🏺 Ancient firsts that still run your life</strong>The wheel (Mesopotamia, ~3500 BCE). Writing (Mesopotamia and Egypt, ~3200 BCE). Democracy (Athens, ~508 BCE). Concrete (Rome, ~300 BCE — stronger than most modern concrete). Running water and sewage systems (Indus Valley, ~2500 BCE — over 4,000 years ago). The concept of zero (India, 5th century CE, via Arab scholars to Europe). Time zones (Rome — they divided the day into 12 hours). Calendar (Egypt — 365 days, 12 months, leap years). Modern legal systems (Rome). You are living in a world built on ancient foundations.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal in the ancient world — as Lusitania</strong>Portugal did not exist in the ancient world, but the land that is now Portugal was called Lusitania by the Romans. The Lusitani were a Celtic people who fiercely resisted Roman conquest — their leader Viriato is still considered Portugal's first national hero, a guerrilla fighter who humiliated several Roman armies before being assassinated (by his own people, bribed by Rome) in 139 BCE. Roman Portugal left permanent marks: the Latin language that became Portuguese, the road network, the cities (Lisbon was Olisipo; Evora was Ebora), and Roman law that underlies Portuguese legal tradition to this day.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Why we study ancient history — and it's not what teachers usually say</strong>The standard justification for studying ancient history is "to understand where we came from." That's true but insufficient. The real reasons are more interesting.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Ancient history shows that democratic institutions can die: Athens invented democracy and lost it within 200 years; Rome had a republic for 500 years before becoming a dictatorship</li><li>It shows that highly sophisticated civilisations can collapse completely — the Bronze Age collapse (~1200 BCE) destroyed multiple advanced civilisations simultaneously within decades</li><li>It provides a perspective on timescale that prevents short-termism: our current civilisation is young by historical standards</li><li>The questions ancient philosophers asked — about justice, power, the good life — remain unanswered</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: Athens invented democracy, used it to build an empire, voted to execute Socrates, and then lost its democracy to Macedon within 150 years. What does this tell us about the fragility of democratic institutions?</em></div>`:""}`},
  {emoji:"🏛️",text:(id)=>`<p>Egypt is the oldest story still being told.</p><p>Egyptian civilisation lasted approximately 3,000 years — from around 3100 BCE to the Roman conquest in 30 BCE. For comparison, Christianity is about 2,000 years old. The Roman Empire lasted about 500 years. The United States is 250 years old. Egypt's 3,000-year run makes it the most durable complex civilisation in human history. And for most of that time, it was the richest, most powerful state on Earth.</p><p>The pyramids at Giza were built around 2560-2500 BCE. They were already ancient when Cleopatra was alive. They were already 2,500 years old when Alexander the Great conquered Egypt. They were the tallest human-made structures on Earth for 3,800 years.</p>
<div class="fact-pull"><strong>🏛️ Egypt — numbers that should stop you cold</strong>The Great Pyramid of Giza contains approximately 2.3 million stone blocks, weighing 2.5-15 tonnes each. It was built in approximately 20 years — meaning roughly 800 blocks per day, or one block every 2 minutes, for 20 years, without cranes, electricity or steel tools. The workforce was not slaves (contrary to popular belief) but skilled workers paid in bread and beer, with medical care and time off. The Egyptians invented hieroglyphic writing around 3200 BCE. They had antibiotics (mouldy bread applied to infected wounds). They performed successful brain surgery.</div>
<div class="portugal-pull"><strong>🇵🇹 Egypt and Portugal — separated by millennia but connected by trade</strong>Portugal's Age of Discovery explorers were deeply interested in the ancient civilisations of Africa. When they reached Egypt via their Indian Ocean routes, they found a culture that had been old for 3,000 years before Portugal even existed. Egyptian obelisks were brought to Rome by Roman emperors — some eventually ended up across Europe. The Portuguese fascination with ancient Egypt influenced the Manueline architectural style, which incorporated Egyptian and eastern motifs alongside Atlantic imagery.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 How do we know what happened 4,500 years ago? And how confident should we be?</strong>This is the core question of historical methodology: sources, corroboration, and the limits of knowledge.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Primary sources: physical artefacts, contemporary written records, architectural evidence, human remains</li><li>Problem: almost all written records from ancient Egypt were written by elites — we know very little about how ordinary Egyptians thought and lived</li><li>The Rosetta Stone (deciphered 1822) unlocked hieroglyphs — before that, scholars could only guess at ancient Egyptian texts</li><li>Archaeological interpretation involves educated inference: we conclude "this was a temple" from evidence that could theoretically mean something else</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: most of what we know about ancient history was written by the winners. How does this affect what we think we know — and what might we be completely wrong about?</em></div>`:""}`},
  {emoji:"🏛️",text:(id)=>`<p>Greece didn't just invent democracy. It invented the questions.</p><p>What is justice? What is the good life? Can we know anything for certain? What do we owe each other? How should we be governed? These questions — first asked systematically by Greek philosophers around 500-350 BCE — have never been fully answered. Every political argument, every ethical debate, every scientific dispute uses tools of reasoning that Greeks developed. We are still living inside the intellectual framework they built.</p><p>And they got a lot wrong. They practised slavery on a massive scale. They excluded women from political life entirely. They could be ferociously violent. The same civilisation that produced Socrates, Plato and Aristotle also voted to massacre the entire adult male population of conquered cities.</p>
<div class="fact-pull"><strong>🏛️ Greece — the original Western civilisation, with all its contradictions</strong>Athens in the 5th century BCE had a population of about 300,000 — of which roughly 80,000 were citizens (adult male, Athenian-born) who could vote. About 100,000 were slaves. Women, foreigners and freed slaves had no political rights. This was the world's first democracy. The word 'idiot' comes from the Greek 'idiotes' — meaning someone who doesn't participate in public life. In Athens, not caring about politics was considered a character flaw.</div>
<div class="portugal-pull"><strong>🇵🇹 Greek thought in Portugal — via Rome, via Arabic scholars</strong>Greek philosophical texts reached medieval Europe largely through Arabic translations: Arab scholars had preserved and extended Greek mathematics, medicine and philosophy while European libraries were being burned. When these texts were retranslated into Latin in the 12th century, they triggered the intellectual renaissance that led to European universities, scientific method, and eventually the curiosity that drove the Age of Discovery. The Portuguese navigators who mapped the world were applying Greek-derived mathematics and astronomy. Greece → Rome → Arabic scholars → Medieval Europe → Portuguese explorers.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Democracy's original sin — and whether it matters</strong>Athenian democracy was built on slavery and excluded women and foreigners. Does this invalidate its contribution? This is not a trivial question.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>The argument for invalidity: a democracy that enslaves 1/3 of its population is not a democracy in any meaningful modern sense</li><li>The argument for contextual evaluation: judging ancient institutions by modern standards is anachronistic — every culture has been wrong about things future generations will find monstrous</li><li>The historical claim: Athenian democracy developed institutional forms (assembly, courts, rule of law) that influenced all subsequent democratic theory, regardless of its limits</li><li>The continuing question: who is currently excluded from democratic participation that future generations will judge us for?</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: the USA declared "all men are created equal" while enslaving 500,000 people. Does this make the Declaration of Independence worthless as a democratic document — or does it create an obligation to be better?</em></div>`:""}`},
  {emoji:"⚔️",text:(id)=>`<p>Rome built something no one had built before: a system.</p><p>Other empires had ruled large territories before Rome — the Persians, Alexander's empire, the Maurya empire in India. But Rome built something that lasted centuries and worked: a legal system that applied from Britain to Syria, a road network that moved armies and trade, a professional civil service that ran provinces, a common currency, a common language. It was the world's first genuine attempt at supranational governance.</p><p>And then it collapsed. In 476 CE, the Western Roman Empire ended — not with a bang but a whimper, as Germanic kings replaced emperors so gradually that contemporaries barely noticed. The eastern half — the Byzantine Empire — continued for another 1,000 years, until Constantinople fell in 1453 CE.</p>
<div class="fact-pull"><strong>⚔️ Rome — the scale is staggering</strong>At its peak (around 100 CE), the Roman Empire contained approximately 70 million people — about 25% of the world's entire population. It covered 5 million km² — comparable to the USA. It had 400,000km of roads — enough to circle the Earth 10 times. Roman concrete (opus caementicium) is still standing 2,000 years later, and is in some respects superior to modern concrete (it actually gets stronger over time in seawater). The Pantheon's dome (built 125 CE) remained the world's largest concrete dome for 1,300 years.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal is Roman — literally</strong>Portugal speaks Portuguese because Rome conquered Lusitania and Latin replaced the local languages. Portugal's cities were Roman cities: Lisbon (Olisipo), Evora (Liberalitas Julia), Braga (Bracara Augusta — still one of Portugal's major cities), Coimbra (Aeminium). Roman roads determined where Portuguese roads run. Roman law is the foundation of Portuguese law. The Roman calendar is the Portuguese calendar. The Roman concept of civil administration is the model for the Portuguese state. Portugal as a cultural and institutional entity is, in fundamental ways, a continuation of Rome.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Why did Rome fall? (It's more complicated than barbarians)</strong>Edward Gibbon blamed Christianity. Henri Pirenne blamed Islam closing Mediterranean trade. More recent historians emphasise multiple simultaneous causes — the complexity itself is the lesson.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Military overextension: maintaining frontiers across 5 million km² became unsustainable</li><li>Economic strain: debasement of currency caused inflation; taxation increased; investment declined</li><li>Political instability: 26 emperors in 50 years (235-284 CE) — the military created and murdered them at will</li><li>Climate and disease: the Antonine Plague (165 CE, possibly smallpox) killed up to 5 million people</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: the Roman Empire lasted about 500 years. The USA is 250 years old. Does the study of Rome's fall tell us anything useful about the long-term durability of powerful states?</em></div>`:""}`},
  {emoji:"🌍",text:(id)=>`<p>The ancient world was not separate from our world. It is our world.</p><p>Every time you use the alphabet, you are using a system descended from Phoenician traders. Every time you use a number, you are using a system preserved by Arab scholars from Indian mathematicians. Every time a government makes a law, it is working within a tradition of Roman jurisprudence. Every time a philosopher asks "what is justice?", they are continuing a conversation started in Athens 2,500 years ago.</p><p>History is not a museum of dead things. It is the invisible architecture of the present — the structures we live inside without seeing them.</p>
<div class="fact-pull"><strong>🌍 The longest chain — how ancient knowledge reached you</strong>Euclid wrote his geometry textbook in Alexandria around 300 BCE. It was translated into Arabic in Baghdad around 800 CE. It was retranslated into Latin from Arabic in Toledo around 1120 CE. It became the standard mathematics textbook in European universities for 500 years. It was used by Portuguese navigators to calculate positions at sea in the 1400s. It is still taught in modified form in schools today. One man's ideas, travelling 2,300 years and 8,000 km, still shaping how children learn mathematics.</div>
<div class="portugal-pull"><strong>🇵🇹 Viriato — Portugal's first hero, fighting Rome</strong>Viriato was a Lusitanian shepherd-warrior who led a guerrilla resistance against Roman conquest from approximately 147-139 BCE. He defeated multiple Roman armies using tactics of mobility, deception and knowledge of terrain — centuries before guerrilla warfare was theorised. The Romans eventually had him assassinated (by his own ambassadors, who were bribed). He is still considered one of Portugal's national founding figures — the original defender of the land that would become Portugal, fighting against the empire whose language and culture would ultimately define it. History contains irony.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Continuity and change — the historian's core question</strong>Good historical thinking requires holding two ideas simultaneously: things change profoundly over time AND surprising amounts stay the same.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>Continuity:</strong> Roman law → Portuguese law. Greek democracy → modern democracy. Phoenician alphabet → English alphabet. Hindu-Arabic numerals → the numbers you use</li><li><strong>Change:</strong> slavery was universal in the ancient world; democracy excluded most people; the concept of human rights didn't exist; average life expectancy was ~35 years</li><li>The historian's job is to trace which things are genuinely continuous and which have changed beyond recognition</li><li>Presentism: the mistake of judging the past by present values — useful as a moral exercise but misleading as history</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: make a list of five things from the ancient world that are genuinely continuous into modern life, and five things that have changed completely. What does the pattern tell you?</em></div>`:""}`}
];
const CIVS=[
  {id:"egypt",name:"Ancient Egypt",emoji:"🏺",period:"~3100 BCE — 30 BCE (3,070 years)",location:"Nile Valley, North Africa",peak:"New Kingdom (~1550-1070 BCE)",story:"Egypt is the oldest continuous complex civilisation. It lasted so long that Cleopatra (died 30 BCE) was closer in time to us than to the building of the pyramids. Egyptian achievements include: hieroglyphic writing, advanced mathematics, astronomy, medicine (including brain surgery), architecture (pyramids, temples), mummification, agriculture (irrigation from the Nile), and a complex religious and legal system. The pharaoh was considered both god and king — a theocratic monarchy that lasted 3,000 years.",portugal:"Roman-conquered Egypt became a key source of grain for the empire, including for Lusitania (Portugal). Portuguese explorers knew Egypt through Roman history and sought to reach it via sea routes. The 1755 Lisbon earthquake destroyed most of Portugal's historical archive — but some Egyptian-influence Manueline architecture survived, particularly in the Mosteiro dos Jerónimos in Belém.",ks3:"Egypt challenges the 'progress narrative' — the idea that history is a story of continuous improvement. Egyptian medicine in 1500 BCE was sophisticated enough to identify disease symptoms, prescribe treatments, and perform surgeries. Then knowledge was lost. The Library of Alexandria's destruction (multiple incidents, 48 BCE-642 CE) resulted in permanent loss of ancient knowledge. Progress is not linear — civilisations can and do lose knowledge. This has implications for how we think about the fragility of our own knowledge systems."},
  {id:"greece",name:"Ancient Greece",emoji:"🏛️",period:"~800 BCE — 146 BCE",location:"Aegean region, Mediterranean",peak:"Classical Period (480-323 BCE)",story:"Ancient Greece was not one country but a collection of city-states (poleis) — Athens, Sparta, Corinth, Thebes — that competed, fought, and occasionally cooperated. Their greatest contribution is intellectual: democracy, philosophy, mathematics, theatre, Olympic games, scientific reasoning, the concept of citizenship. Greek culture spread across the Mediterranean and Middle East through Alexander the Great's conquests (356-323 BCE), creating the Hellenistic world.",portugal:"Greek traders established trading contacts with the Iberian Peninsula from around 600 BCE — archaeological evidence of Greek pottery has been found in Portugal. Greek geographical knowledge (including early estimates of the Earth's circumference by Eratosthenes, c. 240 BCE) informed the knowledge base that Portuguese navigators used 1,700 years later. The Portuguese word for 'philosophy' (filosofia) is directly from Greek.",ks3:"Greek democracy is often presented as an unambiguous good — the foundation of Western political tradition. A more honest assessment requires acknowledging that it was democracy for the few: perhaps 10-15% of the population had political rights. Women, slaves and foreigners were excluded. Yet the institutional innovation — elected assemblies, public debate, rule of law, accountability of officials — was genuinely radical and has proved durable. The question for KS3 is: at what point does an institution become valuable enough to preserve, even when its origins are morally compromised?"},
  {id:"rome",name:"Ancient Rome",emoji:"⚔️",period:"~753 BCE — 476 CE (Western Empire)",location:"Italian Peninsula, then Mediterranean basin",peak:"Pax Romana (27 BCE — 180 CE)",story:"Rome began as a small city on the Tiber River and grew to control the entire Mediterranean world. It went through three phases: Kingdom (753-509 BCE), Republic (509-27 BCE), and Empire (27 BCE-476 CE). Rome's contribution to Western civilisation is immense: legal system (the basis of most European legal codes), engineering (roads, aqueducts, concrete), Latin language (ancestor of Portuguese, Spanish, French, Italian, Romanian), Christianity (adopted as state religion 380 CE), concept of citizenship, administrative systems, and more.",portugal:"Portugal is Roman. Full stop. The Latin spoken in Lusitania evolved into Portuguese. Portuguese law derives from Roman law. Portuguese cities were Roman cities. The calendar is Roman. The concept of empire that drove Portugal's Age of Discovery was explicitly modelled on Rome. The Jerónimos Monastery contains the tomb of Vasco da Gama — but Vasco da Gama navigated using mathematical tools derived from Greek scholarship transmitted through Arabic translations of Roman-era texts. You cannot separate Portugal from Rome.",ks3:"Rome's fall is the most debated question in Western history. Edward Gibbon's 'The History of the Decline and Fall of the Roman Empire' (1776-1789, 6 volumes) attributed it primarily to Christianity weakening Roman martial values. Modern historians emphasise: military overextension, economic problems (currency debasement, trade disruption), political instability (the 'Crisis of the Third Century'), climate change (the Roman Warm Period ended ~250 CE), and pandemic (the Antonine Plague 165-180 CE, Plague of Cyprian 249-262 CE). The multi-causal explanation is not just historically more accurate — it models how complex systems fail."}

const QUIZ={
  owl:[
    {q:"Why does the study of ancient democracy require acknowledging its contradictions rather than simply celebrating it?",opts:["Because ancient democracy was completely different from modern democracy and has no relevance","Because honest historical analysis requires acknowledging that Athenian democracy excluded roughly 85% of the population (women, slaves, foreigners) while making genuine institutional innovations in assembly governance, rule of law and civic accountability — both things are true simultaneously","Because ancient democracy was not actually democratic at all","Because Greek civilisation was morally inferior to modern civilisation"],ans:1,fact:"Historical analysis that simply celebrates or simply condemns is intellectually dishonest. Athens invented institutional forms — elected assemblies, public debate, accountability of officials, rule of law — that influenced all subsequent democratic theory. Athens also enslaved approximately 1/3 of its population and excluded women completely. Both are historical facts. The ability to hold contradictory truths about the same subject simultaneously is a core historical thinking skill."},
    {q:"What does the multi-causal explanation for Rome's fall tell us about how complex systems collapse?",opts:["That Rome's fall was inevitable from the beginning","That complex systems typically fail from multiple simultaneous pressures rather than a single cause — military overextension, economic strain, political instability, disease and climate change all contributed. This has implications for how we think about the fragility of current complex systems","That historians cannot agree on anything","That military factors always determine civilisational survival"],ans:1,fact:"The 'Rome's fall' debate is one of the most productive in historical methodology. The multi-causal explanation (now mainstream among historians) suggests that looking for THE cause of a civilisational collapse is the wrong question. Complex systems — whether empires, ecosystems, or economies — typically fail through cascading failures where multiple weakened systems interact catastrophically. This is directly relevant to climate change, biodiversity loss, and geopolitical fragility today."},
    {q:"What does the transmission chain from Euclid to Portuguese navigators demonstrate about how knowledge travels through history?",opts:["That knowledge progresses in a straight line from discovery to application","That knowledge transmission is non-linear, crossing linguistic and cultural boundaries, often preserved by cultures different from the originators, sometimes lost for centuries and rediscovered, and that the origins of 'Western' science are genuinely global — Greek, Indian, Arab, not exclusively European","That ancient knowledge is always superior to modern knowledge","That Portuguese navigators were unusually well-educated"],ans:1,fact:"The transmission chain Euclid→Arabic→Latin→universities→Portuguese navigators is a microcosm of how knowledge actually moves through history. The 12th-century translation movement in Toledo (translating Arabic texts into Latin) was one of the most consequential intellectual events in Western history — it brought back Greek philosophy and mathematics that had been unknown in Europe for centuries, including mathematical tools that enabled the Age of Discovery. The common narrative of Western science as a purely European achievement ignores the essential Arab, Indian and Chinese contributions."},
    {q:"What does the concept of 'anachronism' mean in historical thinking and why is it important?",opts:["A type of ancient clock","Judging past events or people by standards that did not exist at the time — e.g. condemning Julius Caesar for not supporting women's suffrage. It is a methodological error because it prevents understanding the past on its own terms, though moral evaluation of past practices using modern values can be legitimate as a separate exercise","The study of how dates are calculated in different calendar systems","When ancient artifacts are found in the wrong historical layer"],ans:1,fact:"Anachronism is one of the most common errors in popular history. It typically appears as: 'why didn't the ancient Greeks [do something obvious by modern standards]?' The answer is usually that the relevant concepts, technologies or social conditions didn't exist. However, historians also debate the limits of contextual understanding — we can explain why slavery existed in ancient societies without approving of it. The distinction is between explanation (understanding why something happened given its context) and moral evaluation (judging it by universal ethical standards)."},
    {q:"Portugal's first national hero, Viriato, fought against Rome — yet Portuguese culture is fundamentally Roman. What does this paradox illustrate?",opts:["That Portuguese history is confused and contradictory","That the identity of a modern nation can be shaped by both the resistance to and the absorption of a conquering culture — Viriato represents indigenous resistance and cultural continuity; Portuguese language, law and cities represent the Roman transformation. Both are part of Portuguese identity simultaneously.","That Viriato actually helped Rome","That Roman culture was superior to Lusitanian culture"],ans:1,fact:"This paradox appears throughout colonial and post-colonial history. Modern nations frequently celebrate both indigenous resistance to conquest and the cultural products of conquest simultaneously. Brazil celebrates indigenous heritage and Portuguese cultural legacy. Mexico celebrates Aztec civilisation and Spanish architectural tradition. The ability to hold multiple, contradictory cultural inheritances is a feature of most modern national identities — Portugal is simply unusually old, giving more time for the synthesis to become invisible."}

    {q:"Approximately how long did ancient Egyptian civilisation last?",opts:["About 500 years (same as the Roman Empire)","About 1,000 years","About 3,000 years","About 10,000 years"],ans:2,fact:"About 3,000 years — from around 3100 BCE to 30 BCE. To put that in perspective: if you stood at the building of the Great Pyramid (2560 BCE) and looked forward the same amount of time as we now look back at it, you would be looking at the year 4580! Egyptian civilisation lasted so long that by Cleopatra's time (50 BCE), the pyramids were already 2,500 years old — as ancient to her as ancient Rome is to us."},
    {q:"What did ancient Rome give to Portugal that still exists today?",opts:["The Portuguese king's family came from Rome","The language (Latin evolved into Portuguese), the law, the cities (Lisbon was a Roman city called Olisipo), and the road network","The football stadiums","The castle of São Jorge"],ans:1,fact:"Portugal is essentially Roman! The Latin that Roman soldiers and settlers spoke in Lusitania (Roman Portugal) slowly changed and evolved over centuries into Portuguese. Roman law is the basis of Portuguese law today. The streets of Lisbon, Evora, Braga and Coimbra follow patterns laid down by Roman city planners 2,000 years ago. Even the calendar you use — 365 days, 12 months, leap years — is Roman. You are living in a world shaped by Rome every single day."},
    {q:"Who was Viriato and why is he important to Portugal?",opts:["A Roman emperor who was kind to the Portuguese people","A Lusitanian warrior leader who fought against Roman conquest of what is now Portugal — considered Portugal's first national hero","A medieval Portuguese king who built Lisbon's castle","A famous Portuguese navigator who explored Africa"],ans:1,fact:"Viriato was a shepherd who became one of the most successful guerrilla fighters in ancient history, leading the Lusitanian people (who lived in what is now Portugal) against Roman conquest from about 147-139 BCE. He defeated several Roman armies using tactics of speed, deception and knowledge of the terrain. The Romans couldn't beat him — so they bribed his own ambassadors to murder him in his sleep. He is remembered in Portugal as the first defender of Portuguese land, even though Portugal as a country wouldn't exist for another 1,300 years!"},
    {q:"Ancient Athens invented democracy. But who was allowed to vote?",opts:["Everyone who lived in Athens","All free adults","Only adult male citizens born in Athens — women, slaves and foreigners had no vote","Only wealthy people"],ans:2,fact:"Only about 10-15% of Athens's population could vote — adult males who had been born in Athens to Athenian parents. Women couldn't vote. Enslaved people (about 1/3 of the population) couldn't vote. Foreigners who had lived in Athens their whole lives couldn't vote. Despite this, the institutional idea of elected assemblies, public debate and rule of law that Athens developed was genuinely new and influential. Modern democracy has expanded the idea far beyond what Athens imagined."},
    {q:"The Roman Empire eventually collapsed. What is the most accurate explanation for why?",opts:["One barbarian army defeated Rome in a single battle","Rome was struck by lightning","Multiple problems happened at once: military overextension, economic difficulties, political instability, disease and climate change all combined to weaken the empire over centuries","The Romans forgot how to build things"],ans:2,fact:"Rome's fall was a slow process, not a single event. Many things went wrong at the same time over about 200 years: the empire became too big to defend; the currency lost its value causing economic problems; there were 26 different emperors in just 50 years (most killed by their own armies); a devastating plague killed millions; and climate change made agriculture less productive. Complex systems — whether empires, ecosystems, or economies — usually don't fail from one cause. They fail when many things go wrong at once."}

    {q:"How old are the pyramids at Giza?",opts:["About 500 years old","About 1,000 years old","About 2,000 years old","About 4,500 years old"],ans:3,fact:"About 4,500 years old! The Great Pyramid was built around 2560 BCE, which is roughly 4,585 years ago. It was so massive and impressive that it remained the tallest human-made structure on Earth for 3,800 years. The ancient Egyptians didn't have cranes, electricity or steel tools — but they organised thousands of workers so well that they moved 2.3 million stone blocks, some weighing up to 15 tonnes, to build something that still stands today."},
    {q:"What did the ancient Greeks invent that we still use today?",opts:["Cars and trains","Democracy, philosophy, the Olympic Games, and mathematical tools still used in schools","Computers and the internet","Pizza"],ans:1,fact:"The ancient Greeks invented democracy (the idea that citizens should vote on decisions), philosophy (systematic thinking about big questions), the Olympic Games (first held in 776 BCE — we revived them in 1896), and mathematical tools including geometry that is still taught in schools. The word 'democracy' itself comes from Greek: 'demos' (people) and 'kratos' (power). Greek ideas spread across Europe through Rome and through Arab scholars who preserved and built on Greek knowledge."},
    {q:"What language did the Romans bring to Portugal?",opts:["Greek","Latin — which slowly changed over hundreds of years into Portuguese","Italian","Spanish"],ans:1,fact:"Latin! When the Romans conquered Lusitania (the Roman name for Portugal) around 140 BCE, they spread the Latin language throughout the region. Over hundreds of years, as the Roman Empire weakened and disappeared, the Latin spoken in Lusitania slowly changed and evolved — by about 900 CE it had become recognisably Portuguese. This is why Portuguese, Spanish, French and Italian are all related — they all descended from Latin. They are called 'Romance languages' because they came from Rome."},

    {title:"The Pyramid — Engineering at Scale",story:"The Great Pyramid contains approximately 2.3 million stone blocks and was built in approximately 20 years. The builders worked approximately 365 days per year.",q:"How many blocks were placed per day? And if work continued for 10 hours per day, how many blocks were placed per hour? Per minute?",working:"Per day: 2,300,000 ÷ (20×365) = 315 per day. Per hour: 315 ÷ 10 = 31.5/hr. Per minute: 31.5 ÷ 60 = 0.525/min ≈ one block every 2 minutes.",answer:"315",unit:"blocks per day (1 block every 2 minutes during work hours)",fact:"One block placed every 2 minutes, without cranes, electricity, or steel tools, for 20 years. How? Recent archaeological work suggests a combination of sledges, water-lubricated ramps, and an extraordinarily organised workforce — workers were paid in bread, beer and fish, had medical care, and were rotated so they didn't burn out. The workforce was not slaves — tomb inscriptions show they had names, families and pride in their work. The pyramid is not a monument to slave labour; it is a monument to organisational genius."},
    {title:"Roman Roads — The Scale of Empire",story:"The Roman Empire had approximately 400,000km of roads at its peak. The circumference of Earth is approximately 40,075km.",q:"How many times could Roman roads circle the Earth? And if the Empire covered 5 million km², what was the road density (km of road per km² of territory)?",working:"Times around Earth: 400,000 ÷ 40,075 = 9.98 times. Road density: 400,000 ÷ 5,000,000 = 0.08 km of road per km².",answer:"9.98",unit:"times Roman roads could circle the Earth (0.08 km road per km² territory)",fact:"10 times around the Earth — built without machines, mostly by soldiers (road-building was standard military training). Roman roads were engineered to last: layered construction with drainage, cambered surfaces to shed rain, and stone or gravel paving. Many Roman roads are still in use today, under modern tarmac. The Fosse Way in England, the Via Aurelia in Italy, the Via Augusta that ran through Lusitania (Portugal) — all still determine where roads run 2,000 years later. Infrastructure creates path dependency."},
    {title:"Timeline Calculations",story:"The Great Pyramid was built approximately 2560 BCE. The Roman Empire fell in 476 CE. We are now in 2025 CE.",q:"How many years separate the building of the Great Pyramid from the fall of Rome? And how long ago did Rome fall (from 2025)?",working:"Pyramid to Rome's fall: 2560 + 476 = 3,036 years. Rome's fall to now: 2025 − 476 = 1,549 years.",answer:"3036",unit:"years from Pyramid to Rome's fall (Rome fell 1,549 years ago)",fact:"3,036 years separate the building of the pyramid from Rome's fall — and Rome fell 1,549 years ago. Ancient history covers an enormous timespan. The Roman Empire at its fall was further in time from the pyramid-builders than we are from Rome's fall. This perspective matters: our current civilisation (roughly 250 years old if we date it from the Enlightenment and Industrial Revolution) is extraordinarily young by historical standards. The comforting assumption that progress is permanent and irreversible is not supported by history."}

  cub:[
    {title:"Egyptian Maths — The Pyramid",story:"The Great Pyramid of Giza contains approximately 2.3 million stone blocks. It was built in approximately 20 years.",q:"If 20,000 workers built the pyramid, working 300 days a year, how many blocks did each worker need to place per day on average?",working:"Total days: 20 × 300 = 6,000 days. Total block-placements: 2,300,000. Per worker per day: 2,300,000 ÷ (20,000 × 6,000) = 0.019 blocks per worker per day — about 1 block every 52 worker-days.",answer:"0.019",unit:"blocks per worker per day (1 block per worker every ~52 days)",fact:"Less than 1 block per worker per day — which means the challenge wasn't individual effort, it was coordination. Moving and placing 2.3 million blocks required thousands of people working in precisely timed sequences: quarrying, transporting, finishing, and placing — all without modern communication, without computers, without machinery. The pyramid is not a monument to individual strength; it is a monument to collective organisation. The same principle applies to everything humans have built, from cities to space stations."},
    {title:"Roman Empire Scale",story:"The Roman Empire at its peak had approximately 70 million people — about 25% of the world's population at the time (estimated 280 million).",q:"If Rome had 25% of the world's population, how many people lived outside the Roman Empire?",working:"280,000,000 − 70,000,000 = 210,000,000 people lived outside Rome",answer:"210000000",unit:"people living outside the Roman Empire",fact:"210 million people outside Rome — including the Han Dynasty in China (population roughly 60 million), the Parthian Empire in Persia, the Gupta Empire in India, and hundreds of smaller civilisations across Africa, the Americas and the Pacific. Rome was dominant in the Mediterranean world but was never truly global. The world had multiple major civilisations simultaneously — none knew of all the others. The idea of a single world history is a modern invention."},
    {title:"How Long Ago?",story:"Cleopatra died in 30 BCE. The Great Pyramid was built in approximately 2560 BCE.",q:"How many years before Cleopatra were the pyramids built? And how long ago did Cleopatra die (from 2025)?",working:"Pyramid to Cleopatra: 2560 − 30 = 2,530 years before her. Cleopatra to now: 2025 + 30 = 2,055 years ago.",answer:"2530",unit:"years before Cleopatra the pyramids were built (she died 2,055 years ago)",fact:"Cleopatra lived closer in time to us than to the pyramids — by about 475 years! She was as much an archaeologist looking at ancient history as a participant in it. This gives a sense of Egypt's extraordinary timescale. When Julius Caesar visited Egypt and marvelled at the pyramids, they were already 2,500 years old. When tourists visit the pyramids today and marvel at them, they are looking at something that was ancient history to the ancient Romans."}

<p>Include: a headline, an opening paragraph explaining what happened, a quote from a witness, and your reaction as a reporter.</p>`,
   placeholder:"Event chosen:\n\nHEADLINE:\n\nOpening paragraph:\n\nWitness quote:\n\nMy reaction as reporter:"},
  bay:{icon:"🌿",title:"My Favourite Ancient Wonder",level:"KS1/KS2 Foundation",
   brief:`<p>Choose your favourite thing from the ancient world that you've learned about. Write about:</p>
<ul><li>What it is and when it was made</li><li>Why you think it's amazing</li><li>Would you like to visit it? Why?</li><li>Something it has in common with Portugal</li></ul>`,
   placeholder:"My favourite ancient thing is...\nIt was made about...\n\nWhy it's amazing:\n\nI would/wouldn't like to visit because...\n\nIts connection to Portugal:"}
};
const SAVE_KEY="atlas_ch7_v1";
function defaultState(){const s={};CHILDREN.forEach(c=>{s[c.id]={storyPage:0,selectedCiv:null,showTimeline:false,quizIdx:0,quizAnswers:[],quizDone:false,quizScore:0,mathInputs:{},mathAnswered:{},taskText:"",taskSaved:false,sectionsComplete:[]};});return s;}
function loadState(){try{const s=localStorage.getItem(SAVE_KEY);if(s)return{...defaultState(),...JSON.parse(s)};}catch(e){}return defaultState();}
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}}
let state=loadState();let ui={view:"profiles",child:null,section:"story"};
function render(){
  const app=document.getElementById("app");const child=CHILDREN.find(c=>c.id===ui.child);
  let h=`<div class="hero"><h1>🌍 The Atlas Chronicles</h1><p>Chapter 7: The Ancient World</p><div class="ks-badges"><span class="ks-badge">📚 KS1 Bay</span><span class="ks-badge">📚 KS2 Cub</span><span class="ks-badge" style="background:rgba(240,180,41,0.1);border-color:rgba(240,180,41,0.2);color:#f0b429">📚 KS3 Owl</span></div></div>`;
  if(ui.view==="profiles")h+=renderProfiles();
  else if(ui.view==="learn"&&child)h+=renderLearn(child);
  app.innerHTML=h;
}
function renderProfiles(){
  let h=`<div class="section-label">Choose your explorer</div><div class="profile-grid">`;
  CHILDREN.forEach(c=>{const s=state[c.id];const comp=(s.sectionsComplete||[]).length;h+=`<div class="profile-card ${ui.child===c.id?"active":""}" onclick="selectChild('${c.id}')"><div style="font-size:2.8rem">${c.avatar}</div><div class="pname">${c.name}</div><div class="plevel">${c.level}</div><div class="pstars">${comp>0?"⭐".repeat(comp)+" ("+comp+"/5)":"Ready!"}</div></div>`;});
  return h+`</div>`;
}
function renderLearn(child){
  const s=state[child.id];const comp=s.sectionsComplete||[];
  const sections=[{id:"story",icon:"📖",name:"Story"},{id:"civs",icon:"🏺",name:"Civs"},{id:"maths",icon:"📐",name:"Maths"},{id:"task",icon:"✍️",name:"Task"},{id:"quiz",icon:"✅",name:"Quiz"}];
  let h=`<a href="index.html" class="back-btn">← Home</a>`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:2rem">${child.avatar}</span><div><div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#ffd54f">${child.name} — Chapter 7</div><div style="color:#666;font-size:0.73rem">${child.level} · ⭐ ${comp.length}/${sections.length} done</div></div></div>`;
  h+=`<div class="progress-overview">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<div class="prog-tile ${done?"done":""}"><div class="prog-icon">${sec.icon}</div><div class="prog-name">${done?"✓ ":""}${sec.name}</div></div>`;});
  h+=`</div><div class="nav-tabs">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<button class="nav-tab ${ui.section===sec.id?"active":""} ${done?"done":""}" onclick="switchSection('${sec.id}')">${sec.icon} ${sec.name}</button>`;});
  h+=`</div>`;
  if(ui.section==="story")h+=renderStory(child,s);
  else if(ui.section==="civs")h+=renderCivs(child,s);
  else if(ui.section==="maths")h+=renderMaths(child,s);
  else if(ui.section==="task")h+=renderTask(child,s);
  else if(ui.section==="quiz")h+=renderQuiz(child,s);
  return h;
}
function renderStory(child,s){
  const pg=Math.min(s.storyPage,STORY.length-1);const page=STORY[pg];const isLast=pg>=STORY.length-1;
  let h=`<div class="story-panel"><div class="chapter-label">Chapter 7 · Page ${pg+1} of ${STORY.length}</div><div class="story-h">The Ancient World</div><div class="story-emoji">${page.emoji}</div><div class="story-body">${page.text(child.id)}</div><div class="page-nav"><span class="page-ctr">${pg+1}/${STORY.length}</span>`;
  if(!isLast)h+=`<button class="cont-btn" onclick="nextPage()">Continue →</button>`;
  else h+=`<button class="cont-btn" onclick="completeSection('story');switchSection('civs')">Explore Civilisations! 🏺</button>`;
  return h+`</div></div>`;
}
function renderCivs(child,s){
  let h=`<div class="explorer-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">🏺 ${child.ks}: Ancient Civilisations</div><div class="explorer-title">🏺 Civilisation Explorer</div><div class="explorer-sub">Three civilisations that built the world you live in</div><div class="civ-grid">`;
  CIVS.forEach(c=>{h+=`<div class="civ-card ${s.selectedCiv===c.id?"selected":""}" onclick="selectCiv('${c.id}')"><div class="civ-emoji">${c.emoji}</div><div class="civ-name">${c.name}</div><div class="civ-sub">${c.period}</div></div>`;});
  h+=`</div>`;
  if(s.selectedCiv){
    const c=CIVS.find(x=>x.id===s.selectedCiv);
    if(c){
      h+=`<div class="civ-detail"><div style="font-family:'Fredoka One',cursive;color:#ffd54f;font-size:1.2rem;margin-bottom:8px">${c.emoji} ${c.name}</div><div class="c-stats">`;
      [["📅 Period",c.period],["📍 Location",c.location],["⭐ Peak",c.peak],["🌍 Legacy","Still shaping the world"]].forEach(([l,v])=>{h+=`<div class="cstat2"><div class="cstat2-label">${l}</div><div class="cstat2-val" style="font-size:0.74rem">${v}</div></div>`;});
      h+=`</div><div style="font-size:0.85rem;color:#fff9c4;line-height:1.65;margin-bottom:8px">${c.story}</div>`;
      h+=`<div class="portugal-pull"><strong>🇵🇹 Portugal Connection</strong>${c.portugal}</div>`;
      if(child.id==="owl")h+=`<div class="ks3-pull"><strong>🦉 The bigger picture</strong>${c.ks3}</div>`;
      h+=`</div>`;
    }
  }
  // Timeline
  h+=`<div style="margin-top:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-family:'Fredoka One',cursive;color:#ffd54f;font-size:1rem">📅 Ancient World Timeline</div><button class="btn-gold" style="font-size:0.72rem;padding:5px 12px" onclick="toggleTimeline()">Show/Hide</button></div>`;
  h+=`<div id="timeline-content" style="display:none">`;
  TIMELINE.forEach(t=>{h+=`<div class="timeline-item"><div class="t-date">${t.date}</div><div class="t-body"><div class="t-title">${t.title}</div><div class="t-desc">${t.desc}</div></div></div>`;});
  h+=`</div></div>`;
  if(s.selectedCiv)h+=`<div style="margin-top:12px;text-align:center"><button class="btn-gold" onclick="completeSection('civs');switchSection('maths')">Maths! 📐</button></div>`;
  else h+=`<div style="text-align:center;padding:14px;color:#555;font-size:0.82rem">👆 Click any civilisation to explore</div>`;
  return h+`</div>`;
}
function renderMaths(child,s){
  const id=child.id;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="math-panel"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">📐 ${child.ks}: Ancient Maths</div><div style="font-family:'Fredoka One',cursive;color:#f0b429;font-size:1.2rem;margin-bottom:4px">📐 Ancient Numbers</div><div style="color:#777;font-size:0.78rem;margin-bottom:14px">Calculations from the ancient world — using real data</div>`;
  chs.forEach((ch,idx)=>{
    const answered=s.mathAnswered&&s.mathAnswered[idx];const inputVal=(s.mathInputs&&s.mathInputs[idx])||"";
    h+=`<div class="challenge-card"><div class="ch-title">📐 ${ch.title}</div><div class="ch-story">${ch.story}</div><div class="ch-q">${ch.q}</div>`;
    if(!answered){h+=`<div class="math-row"><input class="math-in" type="text" value="${inputVal.replace(/"/g,'&quot;')}" placeholder="Answer..." oninput="updateMath(${idx},this.value)" onkeydown="if(event.key==='Enter')checkMath(${idx})"><span class="math-unit">${ch.unit}</span><button class="math-go" onclick="checkMath(${idx})">Check ✓</button></div>`;if(s.mathAnswered&&s.mathAnswered[idx]==="wrong")h+=`<div class="math-no">Not quite — try again!</div>`;}
    else{h+=`<div class="math-ok">✅ Correct!</div><div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 12px;font-size:0.78rem;color:#aaa;line-height:1.6;margin-top:6px"><strong style="color:#f0b429">Working:</strong> ${ch.working}</div><div class="math-fact">🤩 ${ch.fact}</div>`;}
    h+=`</div>`;});
  const allDone=chs.every((_,i)=>s.mathAnswered&&s.mathAnswered[i]==="correct");
  if(allDone)h+=`<div style="text-align:center;margin-top:12px"><button class="btn-gold" onclick="completeSection('maths');switchSection('task')">Do the Task! ✍️</button></div>`;
  return h+`</div>`;
}
function renderTask(child,s){
  const id=child.id;const task=TASKS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="task-box"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✍️ ${child.ks}: Writing Task</div><div class="task-title">${task.icon} ${task.title}</div><div class="task-level">${task.level}</div><div class="task-brief">${task.brief}</div><textarea class="task-ta" placeholder="${task.placeholder}" oninput="updateTask(this.value)">${s.taskText||""}</textarea><br><button class="task-btn" onclick="saveTask()">Save 💾</button>`;
  if(s.taskSaved)h+=`<div class="saved-ok">✅ Saved!</div>`;
  if((s.taskText||"").length>80)h+=`<div style="margin-top:10px"><button class="btn-gold" onclick="completeSection('task');switchSection('quiz')">Take the Quiz! ✅</button></div>`;
  return h+`</div>`;
}
function renderQuiz(child,s){
  const id=child.id;const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];const idx=s.quizIdx||0;
  if(s.quizDone||idx>=qs.length){
    const score=s.quizScore||0;const pct=Math.round((score/qs.length)*100);
    return`<div class="quiz-wrap"><div class="score-banner"><h2>Chapter 7 Complete! 🏺</h2><div style="font-size:3rem;margin:8px 0">${pct>=80?"🏆":pct>=60?"⭐":"💪"}</div><div style="color:#ccc">${score}/${qs.length} (${pct}%)</div><div style="display:flex;gap:8px;justify-content:center;margin-top:12px"><button onclick="resetQuiz()" style="background:rgba(255,255,255,0.07);color:#ccc;border:1px solid rgba(255,255,255,0.12);padding:9px 18px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer">Try Again 🔄</button><a href="chapter8.html" class="btn-gold" style="padding:9px 18px;text-decoration:none">Chapter 8 → Age of Explorers</a></div></div></div>`;
  }
  const q=qs[idx];const answers=s.quizAnswers||[];const thisAns=answers[idx];
  let h=`<div class="quiz-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✅ ${child.ks} Quiz</div><div class="section-label">Quiz · Q${idx+1} of ${qs.length}</div><div class="score-dots">`;
  qs.forEach((_,i)=>{const a=answers[i];h+=`<div class="sdot ${i===idx?"current":a===undefined?"":a===qs[i].ans?"done":"wrong"}"></div>`;});
  h+=`</div><div class="q-text">${q.q}</div><div class="q-opts">`;
  q.opts.forEach((opt,i)=>{let cls="q-opt";if(thisAns!==undefined){if(i===q.ans)cls+=" correct";else if(i===thisAns&&i!==q.ans)cls+=" wrong";}h+=`<button class="${cls}" ${thisAns!==undefined?"disabled":""} onclick="answerQuiz(${i})">${opt}</button>`;});
  h+=`</div>`;
  if(thisAns!==undefined){h+=`<div class="q-fact">🤩 ${q.fact}</div><div style="text-align:right;margin-top:8px"><button class="btn-gold" onclick="nextQuiz()">Next →</button></div>`;}
  return h+`</div>`;
}
function selectChild(id){ui.child=id;ui.view="learn";ui.section="story";render();}
function switchSection(s){ui.section=s;render();}
function completeSection(s){const comp=state[ui.child].sectionsComplete||[];if(!comp.includes(s))state[ui.child].sectionsComplete=[...comp,s];saveState();}
function nextPage(){if(state[ui.child].storyPage<STORY.length-1){state[ui.child].storyPage++;saveState();render();}}
function selectCiv(id){state[ui.child].selectedCiv=id;saveState();render();}
function toggleTimeline(){const el=document.getElementById('timeline-content');if(el)el.style.display=el.style.display==='none'?'block':'none';}
function updateMath(idx,v){if(!state[ui.child].mathInputs)state[ui.child].mathInputs={};state[ui.child].mathInputs[idx]=v;}
function checkMath(idx){
  const id=ui.child;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];const ch=chs[idx];
  const input=(state[id].mathInputs&&state[id].mathInputs[idx]||"").trim().replace(/,/g,"");
  const correctVal=ch.answer.replace(/,/g,"");
  const userNum=parseFloat(input);const correctNum=parseFloat(correctVal);
  const correct=!isNaN(userNum)&&!isNaN(correctNum)&&Math.abs(userNum-correctNum)/Math.max(correctNum,0.001)<0.05;
  if(!state[id].mathAnswered)state[id].mathAnswered={};state[id].mathAnswered[idx]=correct?"correct":"wrong";saveState();render();
}
function answerQuiz(i){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const idx=s.quizIdx||0;const q=qs[idx];
  const answers=[...(s.quizAnswers||[])];while(answers.length<=idx)answers.push(undefined);
  answers[idx]=i;if(i===q.ans)state[id].quizScore=(s.quizScore||0)+1;
  state[id].quizAnswers=answers;saveState();render();
}
function nextQuiz(){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const next=(s.quizIdx||0)+1;state[id].quizIdx=next;if(next>=qs.length)state[id].quizDone=true;saveState();render();
}
function resetQuiz(){const id=ui.child;state[id].quizIdx=0;state[id].quizAnswers=[];state[id].quizDone=false;state[id].quizScore=0;saveState();render();}
function updateTask(v){state[ui.child].taskText=v;}
function saveTask(){state[ui.child].taskSaved=true;saveState();render();}
render();
</script>
</body>
