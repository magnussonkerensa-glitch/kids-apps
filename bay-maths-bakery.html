<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bay's Maths Bakery</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;overflow-x:hidden}
body{
  font-family:'Nunito',sans-serif;color:#3a1a5e;
  background:
    radial-gradient(circle at 15% 20%,rgba(255,182,230,0.55) 0%,transparent 35%),
    radial-gradient(circle at 85% 15%,rgba(255,244,170,0.55) 0%,transparent 32%),
    radial-gradient(circle at 80% 80%,rgba(186,230,255,0.5) 0%,transparent 35%),
    radial-gradient(circle at 18% 85%,rgba(200,255,210,0.5) 0%,transparent 32%),
    #fdf3ff;
  padding-top:env(safe-area-inset-top);
}
.confetti{position:fixed;inset:0;z-index:50;pointer-events:none;overflow:hidden}
.cdot{position:absolute;border-radius:50%;animation:fall var(--ft) linear forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0)}100%{transform:translateY(105vh) rotate(540deg)}}

.wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:28px 20px 110px;text-align:center}

h1{font-family:'Lilita One',cursive;font-size:clamp(2.2rem,9vw,3.6rem);line-height:1.1;
  background:linear-gradient(135deg,#ff6bcd,#b06bff,#4db8ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:6px 0 2px}
.tag{font-weight:900;color:#b06bff;font-size:0.95rem;margin-bottom:22px}
.cake{font-size:3.4rem;display:inline-block;animation:bounce 2.4s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-12px) rotate(4deg)}}

/* menu */
.menu{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
.mbtn{border:none;border-radius:28px;padding:26px 14px;cursor:pointer;font-family:'Nunito',sans-serif;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  box-shadow:0 6px 0 rgba(0,0,0,0.1),0 10px 22px rgba(0,0,0,0.08);
  transition:transform .15s}
.mbtn:active{transform:scale(0.94)}
.mbtn .e{font-size:2.6rem}
.mbtn .n{font-family:'Lilita One',cursive;font-size:1rem;color:#3a1a5e}
.m1{background:linear-gradient(160deg,#ffd9f0,#ffaede)}
.m2{background:linear-gradient(160deg,#e3d2ff,#c8a4ff)}
.m3{background:linear-gradient(160deg,#fff2c2,#ffdf8a)}
.m4{background:linear-gradient(160deg,#d2f4ff,#a4dfff)}
.m5{background:linear-gradient(160deg,#d9ffe2,#a8efbb)}

/* game screen */
.hidden{display:none!important}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.back{border:none;background:#fff;border-radius:999px;padding:12px 20px;font-weight:900;color:#b06bff;
  font-size:1rem;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.08)}
.stars{font-size:1.4rem;letter-spacing:2px}
.qcard{background:rgba(255,255,255,0.85);border-radius:32px;padding:28px 22px;
  box-shadow:0 10px 30px rgba(176,107,255,0.15);margin-bottom:18px}
.qtitle{font-family:'Lilita One',cursive;font-size:1.3rem;color:#b06bff;margin-bottom:10px}
.visual{font-size:2rem;line-height:1.6;margin:10px 0 16px;word-break:break-word}
.qtext{font-size:1.35rem;font-weight:900;margin-bottom:20px}
.answers{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:14px}
.abtn{border:none;border-radius:22px;padding:22px 10px;font-size:1.6rem;font-weight:900;font-family:'Nunito',sans-serif;
  color:#3a1a5e;background:linear-gradient(160deg,#fff,#f3e8ff);cursor:pointer;
  box-shadow:0 5px 0 rgba(0,0,0,0.1);transition:transform .12s}
.abtn:active{transform:scale(0.93)}
.abtn.right{background:linear-gradient(160deg,#c8ffd6,#8fe9a8);box-shadow:0 5px 0 #4caf50}
.abtn.try{background:linear-gradient(160deg,#ffe1ee,#ffc2dd);box-shadow:0 5px 0 #ff8ab8}
.fb{min-height:34px;font-family:'Lilita One',cursive;font-size:1.3rem;margin-top:16px;color:#ff6bcd}
.fb.good{color:#2fa84f}
.next{border:none;border-radius:999px;padding:16px 34px;font-family:'Lilita One',cursive;font-size:1.15rem;
  color:#fff;background:linear-gradient(90deg,#ff6bcd,#b06bff);cursor:pointer;margin-top:8px;
  box-shadow:0 5px 0 rgba(0,0,0,0.12);display:none}
.next.show{display:inline-block}

/* finish */
.bigstar{font-size:4rem;animation:bounce 1.6s ease-in-out infinite}
.fin-msg{font-family:'Lilita One',cursive;font-size:1.6rem;color:#b06bff;margin:12px 0 20px}

/* break button */
.break{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:40;
  border:none;border-radius:999px;padding:14px 26px;font-family:'Lilita One',cursive;font-size:1rem;
  color:#fff;background:linear-gradient(90deg,#8fd0ff,#b06bff);cursor:pointer;
  box-shadow:0 5px 0 rgba(0,0,0,0.15)}
.breakscreen{position:fixed;inset:0;z-index:60;background:#fdf3ffee;display:none;
  flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
.breakscreen.show{display:flex}
.breakscreen .e{font-size:4rem;margin-bottom:14px}
.breakscreen h2{font-family:'Lilita One',cursive;color:#b06bff;font-size:1.8rem;margin-bottom:10px}
.breakscreen p{font-weight:800;color:#7a5ea3;font-size:1.05rem;max-width:330px;line-height:1.6}
</style>
</head>
<body>
<div class="confetti" id="confetti"></div>

<div class="wrap">

  <!-- HOME -->
  <div id="home">
    <span class="cake">🧁</span>
    <h1>Bay's Maths Bakery</h1>
    <p class="tag">pick a yummy game! 🍓</p>
    <div class="menu">
      <button class="mbtn m1" onclick="start('count')"><span class="e">🧁</span><span class="n">Count the Cupcakes</span></button>
      <button class="mbtn m2" onclick="start('add')"><span class="e">🍓</span><span class="n">Adding Sprinkles</span></button>
      <button class="mbtn m3" onclick="start('sub')"><span class="e">🍪</span><span class="n">Cookie Munch</span></button>
      <button class="mbtn m4" onclick="start('bonds')"><span class="e">🎂</span><span class="n">Make 10 Cake</span></button>
      <button class="mbtn m5" onclick="start('shapes')"><span class="e">🍩</span><span class="n">Shape Treats</span></button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <div class="topbar">
      <button class="back" onclick="goHome()">← Bakery</button>
      <div class="stars" id="stars"></div>
    </div>
    <div class="qcard">
      <div class="qtitle" id="gname"></div>
      <div class="visual" id="visual"></div>
      <div class="qtext" id="qtext"></div>
      <div class="answers" id="answers"></div>
      <div class="fb" id="fb"></div>
      <button class="next" id="next" onclick="nextQ()">Next ✨</button>
    </div>
  </div>

  <!-- FINISH -->
  <div id="finish" class="hidden">
    <div class="bigstar">🌟</div>
    <div class="fin-msg" id="finmsg">You did it!</div>
    <button class="next show" onclick="goHome()">Back to the Bakery 🧁</button>
  </div>

</div>

<button class="break" onclick="document.getElementById('bs').classList.add('show')">🌸 I need a break</button>
<div class="breakscreen" id="bs">
  <span class="e">🫖</span>
  <h2>Break time!</h2>
  <p>Have a stretch, a sip of water and a big breath. The bakery will wait for you — no rush at all! 💜</p>
  <button class="next show" style="margin-top:22px" onclick="document.getElementById('bs').classList.remove('show')">I'm ready! 🌈</button>
</div>

<script>
const PRAISE=['Yummy! 🧁','Amazing, Bay! 🌟','Super star! ⭐','Delicious work! 🍓','Wow wow wow! 🎀','You are SO clever! 💜'];
const GENTLE=['Almost — try again! 💪','So close! Have another go 🌸','Not quite — you can do it! 💜'];
const TREATS=['🧁','🍓','🍪','🍩','🍰','🍭'];
let topic='',qnum=0,starsEarned=0,current=null;

const $=id=>document.getElementById(id);
const rnd=n=>Math.floor(Math.random()*n);

function start(t){
  topic=t;qnum=0;starsEarned=0;
  $('home').classList.add('hidden');
  $('finish').classList.add('hidden');
  $('game').classList.remove('hidden');
  $('gname').textContent={count:'🧁 Count the Cupcakes',add:'🍓 Adding Sprinkles',sub:'🍪 Cookie Munch',bonds:'🎂 Make 10 Cake',shapes:'🍩 Shape Treats'}[t];
  makeQ();
}
function goHome(){
  $('game').classList.add('hidden');
  $('finish').classList.add('hidden');
  $('home').classList.remove('hidden');
}
function drawStars(){
  $('stars').textContent='⭐'.repeat(starsEarned)+'☆'.repeat(5-starsEarned);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
function opts(ans,max){
  const s=new Set([ans]);
  while(s.size<3){
    let w=ans+(rnd(5)-2);
    if(w<0||w>max||s.has(w)) w=rnd(max+1);
    s.add(w);
  }
  return shuffle([...s]);
}

function makeQ(){
  drawStars();
  $('fb').textContent='';$('fb').className='fb';
  $('next').classList.remove('show');
  const t=TREATS[rnd(TREATS.length)];
  if(topic==='count'){
    const n=3+rnd(13);
    current={a:n,o:opts(n,20)};
    $('visual').textContent=(t+' ').repeat(n).trim();
    $('qtext').textContent='How many treats can you count?';
  }
  if(topic==='add'){
    const a=1+rnd(9),b=1+rnd(9);
    current={a:a+b,o:opts(a+b,20)};
    $('visual').textContent=(t+' ').repeat(a).trim()+'  ➕  '+('🍬 '.repeat(b)).trim();
    $('qtext').textContent=a+' + '+b+' = ?';
  }
  if(topic==='sub'){
    const a=5+rnd(11),b=1+rnd(a-1);
    current={a:a-b,o:opts(a-b,15)};
    $('visual').textContent='🍪 '.repeat(a).trim();
    $('qtext').textContent='There were '+a+' cookies. We munched '+b+'! 😋 How many are left?';
  }
  if(topic==='bonds'){
    const a=1+rnd(9);
    current={a:10-a,o:opts(10-a,10)};
    $('visual').textContent='🎂 '+('🍓 '.repeat(a)).trim();
    $('qtext').textContent='The cake has '+a+' strawberries. How many MORE to make 10?';
  }
  if(topic==='shapes'){
    const shapes=[
      ['🟧 This biscuit has 4 equal sides!','Square',['Square','Circle','Triangle']],
      ['🔵 This biscuit is perfectly round!','Circle',['Circle','Square','Rectangle']],
      ['🔺 This treat has 3 sides!','Triangle',['Triangle','Circle','Square']],
      ['🟦 This wafer has 2 long sides and 2 short sides!','Rectangle',['Rectangle','Triangle','Circle']],
      ['⭐ This sparkly biscuit has 5 points!','Star',['Star','Heart','Square']],
      ['💜 This sweetie shape means love!','Heart',['Heart','Star','Triangle']]
    ];
    const s=shapes[rnd(shapes.length)];
    current={a:s[1],o:shuffle([...s[2]])};
    $('visual').textContent=s[0].split(' ')[0];
    $('qtext').textContent=s[0].slice(s[0].indexOf(' ')+1)+' What shape is it?';
  }
  const box=$('answers');box.innerHTML='';
  current.o.forEach(o=>{
    const b=document.createElement('button');
    b.className='abtn';b.textContent=o;
    b.onclick=()=>answer(b,o);
    box.appendChild(b);
  });
}

function answer(btn,val){
  if(val===current.a){
    [...$('answers').children].forEach(b=>b.disabled=true);
    btn.classList.add('right');
    starsEarned++;drawStars();
    $('fb').textContent=PRAISE[rnd(PRAISE.length)];
    $('fb').classList.add('good');
    confetti();
    $('next').classList.add('show');
  } else {
    btn.classList.add('try');btn.disabled=true;
    $('fb').textContent=GENTLE[rnd(GENTLE.length)];
  }
}

function nextQ(){
  qnum++;
  if(qnum>=5){
    $('game').classList.add('hidden');
    $('finish').classList.remove('hidden');
    $('finmsg').textContent='5 stars, Bay! '+'⭐'.repeat(starsEarned)+' Time for a little wiggle break! 💃';
    bigConfetti();
  } else makeQ();
}

const COLOURS=['#ff6bcd','#b06bff','#ffd700','#6bcb77','#4db8ff','#ff9a6c'];
function confetti(n=22){
  const c=$('confetti');
  for(let i=0;i<n;i++){
    const d=document.createElement('div');d.className='cdot';
    const sz=6+rnd(8);
    d.style.cssText=`width:${sz}px;height:${sz}px;background:${COLOURS[rnd(COLOURS.length)]};left:${rnd(100)}%;top:-20px;--ft:${1.6+Math.random()*1.6}s`;
    c.appendChild(d);
    setTimeout(()=>d.remove(),3500);
  }
}
function bigConfetti(){confetti(70)}
</script>
</body>
</html>
