.saved-ok{font-size:0.75rem;color:#ffd54f;margin-top:6px}
.back-btn{background:rgba(255,255,255,0.07);color:#ccc;border:1px solid rgba(255,255,255,0.12);padding:9px 18px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;margin-bottom:14px;display:inline-block;text-decoration:none}
.btn-gold{background:linear-gradient(135deg,#f57f17,#e65100);color:#fff9c4;border:none;border-radius:22px;padding:9px 18px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer}

.ks-tag.ks3{background:rgba(240,180,41,0.07);border-color:rgba(240,180,41,.13);color:#f0b429}

.prog-tile.done .prog-name{color:#ffd54f}
.completion-card{background:linear-gradient(135deg,rgba(255,213,79,0.08),rgba(245,127,23,0.05));border:2px solid rgba(255,213,79,0.2);border-radius:18px;padding:24px;text-align:center;margin-bottom:18px}
.stars-row{font-size:2rem;margin:10px 0;letter-spacing:4px}

<script>
const CHILDREN=[
  {id:"owl",name:"Owl",age:12,avatar:"🦉",ks:"KS3",level:"KS3 — Secondary Level"},
  {id:"cub",name:"Cub",age:9,avatar:"🐻",ks:"KS2",level:"KS2 — Primary Level"},
  {id:"bay",name:"Bay",age:7,avatar:"🌿",ks:"KS1",level:"KS1/KS2 — Foundation"}
];
const STORY=[
  {emoji:"🌍",text:(id)=>`<p>Atlas has been everywhere. Now it's time to come home.</p><p>Twelve chapters. Twelve slices of a world that is simultaneously ancient and brand new, broken and beautiful, knowable and endlessly surprising. Geography, history, science, economics, politics, language, ecology — all connected, all one story. The story of a species that came out of Africa 70,000 years ago, walked into every corner of the planet, invented language and mathematics and music and war and democracy and the internet and the atom bomb and penicillin, and is now facing the consequences of its own extraordinary restlessness.</p>
<div class="fact-pull"><strong>🌍 Everything connects to everything — the Atlas lesson</strong>The water you drink fell as rain on the Serra da Estrela, filtered through limestone and granite, flowed down a river engineered partly by Roman technology, purified using chemistry developed by Arabic scholars, delivered through pipes designed using Greek mathematics, governed by Portuguese law descended from Rome, in a country whose language carries DNA from Latin, Arabic, African languages and languages from every continent Portugal's explorers reached. One glass of water. The whole world in it.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal — a summary, 12 chapters later</strong>You live in the oldest continuously defined territory in Europe (roughly unchanged since 1139). At the western edge of a continent, facing the Atlantic. A country of 10 million people whose language is spoken by 264 million. Shaped by Celtic peoples, Roman conquerors, Moorish culture, and the extraordinary maritime adventures of the 15th and 16th centuries. A dictatorship until 1974. A democracy — one of Europe's most stable — since April 25th of that year. One of the sunniest countries in Europe, moving rapidly to renewable energy, facing climate change it did almost nothing to cause. A country with a history so rich it can feel like a weight. And a future entirely open.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The thread that ran through all twelve chapters</strong>Here it is: power shapes everything — geography, language, history, economics, ecology. Who has power determines which version of events gets told, which borders are drawn, which languages survive, which technologies get deployed, which communities bear the costs of progress.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Maps reflect power (Chapter 1)</li><li>Cities grow where power concentrates (Chapter 2)</li><li>Ecosystems collapse when power ignores them (Chapter 3)</li><li>Water wars are contests over power (Chapter 4)</li><li>Geological hazards kill proportional to poverty (Chapter 5)</li><li>Languages die when they have no power (Chapter 6)</li><li>History is written by the powerful (Chapter 7)</li><li>Exploration was driven by commercial power (Chapter 8)</li><li>Empires were power structures in territory (Chapter 9)</li><li>Industrialisation concentrated economic power (Chapter 10)</li><li>Climate inaction reflects fossil fuel power (Chapter 11)</li></ul><em style="color:#f0b429;font-size:0.8rem">Final question: knowing that power shapes everything — what will you do with yours?</em></div>`:""}`},
  {emoji:"🗺️",text:(id)=>`<p>The world is not what it looks like on a map.</p><p>Maps always lie. They simplify, they distort, they make choices about what to show and what to leave out. The same is true of textbooks, news programmes, social media feeds, and this course. Every representation of the world is a selection — shaped by the person or institution that made it, by the technology available, by what the audience is expected to want.</p><p>The geographer's most important tool is not a compass or a satellite. It is scepticism: the habit of asking who made this representation, what choices were made, what is included and excluded, and whose interests are served by this version of reality.</p>
<div class="fact-pull"><strong>🗺️ What geographers actually do — and why it matters</strong>Modern geography is at the intersection of everything: climate science, economics, political science, ecology, urban planning, demography, public health. Geographic Information Systems (GIS) are used to map disease outbreaks, plan renewable energy locations, track deforestation, model sea level rise, plan cities and fight crime. Geographers were central to the COVID-19 response — tracking spread, identifying vulnerable communities, planning vaccine distribution. If you want to work on the actual problems the world faces, geography is one of the most useful disciplines you can study.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal as a geographical laboratory</strong>Portugal contains, in a relatively small territory, an extraordinary range of geographical phenomena: Atlantic climate in the north, Mediterranean in the south, semi-arid in the Alentejo interior, volcanic island chains in the Atlantic (Azores, Madeira), one of Europe's largest exclusive economic zones, a history that connects it to every continent, and an economy that combines traditional sectors (wine, cork, tourism) with modern ones (renewables, technology). To understand Portugal is to understand an enormous amount about how geography shapes human life.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Critical thinking — the most transferable skill in the Atlas Chronicles</strong>You have spent twelve chapters examining how the world works. More important than any specific fact is the habit of mind these chapters tried to develop.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>Ask who benefits:</strong> every claim, every policy, every representation serves someone's interest. Whose?</li><li><strong>Ask what's missing:</strong> what is not said is often more important than what is</li><li><strong>Seek the structural explanation:</strong> individual choices happen within systems. Understanding the system matters more than judging the individual</li><li><strong>Hold contradictions:</strong> most important things are genuinely ambiguous — the ability to hold two true but contradictory things simultaneously is a mark of intellectual maturity</li></ul><em style="color:#f0b429;font-size:0.8rem">Final question: think of a major news story you've heard recently. Apply these four questions to it. What do you see that you didn't see before?</em></div>`:""}`},
  {emoji:"🇵🇹",text:(id)=>`<p>Portugal is a good place to think from.</p><p>Not because it is perfect — it isn't. Not because it is the centre of the world — it demonstrably is not. But because it sits at the crossroads of everything: Atlantic and Mediterranean, European and global, ancient and modern, colonial and post-colonial, small and unexpectedly influential. From the edge of Europe, you can see the whole thing more clearly than from the middle.</p><p>The country you live in was the first to connect the world's oceans. Its sailors drew the maps that made the modern world possible. Its language is spoken from Brazil to Mozambique to Macau. Its April 25th is one of the most joyful democratic moments in modern history. And its children are taking European governments to court over climate change.</p>
<div class="fact-pull"><strong>🇵🇹 12 connections between Portugal and the world you've studied</strong>1. Plate tectonics: Azores on the Mid-Atlantic Ridge 2. Water systems: Tagus as a transboundary river 3. Languages: Portuguese spoken on 5 continents 4. Ancient history: Roman Lusitania → modern Portugal 5. Exploration: da Gama, Magellan, Cabral changed the world 6. Migration: 22% of Portuguese born abroad 7. Climate: one of Europe's most vulnerable countries 8. Empires: first and longest European overseas empire 9. Democracy: 1974 Carnation Revolution 10. Renewable energy: 60%+ renewable electricity 11. Climate law: six Portuguese young people changing European courts 12. Saudade: one word that captures something the rest of the world couldn't name</div>
<div class="portugal-pull"><strong>🇵🇹 Growing up Portuguese in the 21st century</strong>You are inheriting a country with extraordinary assets: a beautiful and resilient language, an exceptionally rich history, a democracy that was hard-won and is consciously celebrated, a geography well-suited to the renewable energy future, and a position within the EU that gives access to the world's largest single market. You are also inheriting serious challenges: climate vulnerability, economic inequality, emigration of young talent, and a global history that requires honest reckoning rather than simple celebration. This is the inheritance. What you do with it is the open question.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Portugal's unfinished project</strong>Every country has an unfinished project — the gap between its stated values and its actual practice.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Portugal professes CPLP solidarity — but the economic relationship with Lusophone Africa remains post-colonial in character</li><li>Portugal celebrates the Age of Discovery — but has not fully reckoned with the slave trade that funded it</li><li>Portugal is a democracy — but political participation rates are low, especially among young people</li><li>Portugal is pursuing climate targets — but implementation of forest management and water policy is slow</li></ul><em style="color:#f0b429;font-size:0.8rem">Final Atlas question: what do you think is the most important unfinished project for your generation in Portugal — and in the world? The Atlas Chronicles ends here. The work doesn't.</em></div>`:""}`},
  {emoji:"🔭",text:(id)=>`<p>You have been somewhere. Now you know where you are.</p><p>That is what geography does. Not just locating you on a map — but locating you in time, in history, in systems, in the human story. You live in a house, in a city, in a country, on a tectonic plate, in a climate zone, in a biome, in a language community, in a historical moment. All of these are your address. All of them are connected. And all of them are changing.</p><p>The world needs people who understand these connections. Who can read a map critically. Who know that a border is a choice and not a fact. Who understand that the language they speak carries a history. Who know that the climate they live in was made — partly by human choices — and can be affected by future ones.</p>
<div class="fact-pull"><strong>🔭 The geographer's toolkit — what you have now</strong>You can now do things you couldn't do twelve chapters ago: Read a map critically and ask whose interests it serves. Explain why a city exists where it does. Connect a wildfire in Portugal to global climate systems. Trace how your language arrived in your mouth. Understand why a border causes conflict. Calculate a carbon budget. Explain why some countries are rich and some are poor — and why it's not about hard work. These are not just academic skills. They are tools for understanding the world you live in and participating in its future.</div>
<div class="portugal-pull"><strong>🇵🇹 Your turn</strong>The Atlas Chronicles told you about the world. More importantly, it told you about your world — the specific, particular, irreplaceable place you come from and the specific moment in history you occupy. Portugal in the 21st century. Atlantic edge of Europe. Country of saudade and April carnations and cork oak and bacalhau and fado and surf and seven-hilled Lisbon and the Azores rising from volcanic ridges in the middle of the Atlantic. You know where you are. Now you can decide where you want to go.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 One final thought — on uncertainty</strong>The hardest lesson in the Atlas Chronicles is not any of the facts. It is the tolerance of uncertainty.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>We don't know exactly when climate tipping points will be reached</li><li>We don't know whether democracy will hold or authoritarian systems will spread</li><li>We don't know what AI will do to work and society</li><li>We don't know whether this generation will solve climate change or not</li></ul><p style="margin:8px 0">The people who will navigate this uncertainty best are not the most confident — they are the most intellectually honest. They are the people who can say "I don't know but here's what the evidence suggests" and sit with that.</p><em style="color:#f0b429;font-size:0.8rem">That's what a good geographer does. That's what a good citizen does. Go well.</em></div>`:""}`}

const CONNECTIONS=[
  {id:"portuguese",name:"Your Language",emoji:"🗣️",chapter:"Chapter 6",story:"The language you speak was shaped by Romans, Moors, African traders, Brazilian settlers and Pacific islanders. It contains DNA from Latin (from Roman soldiers in Lusitania), Arabic (from 500 years of Moorish presence), Tupi (from Brazil), and languages from every continent Portuguese explorers reached. When you say 'arroz' you are using a word that arrived with Arab traders 1,300 years ago. When you say 'abacaxi' (pineapple) you are using a word from the Tupi language of Brazil. Your language is not just a communication tool — it is a record of Portuguese history.",portugal:"264 million people share your language across 9 countries on 5 continents. Portuguese is the 6th most spoken language in the world. Brazil — the largest Portuguese-speaking country — will be one of the world's top 5 economies within decades. The language that launched from this small Atlantic country 600 years ago is still spreading.",ks3:"Portuguese exemplifies how languages are historical artefacts. Every contact, every conquest, every trade relationship left traces in vocabulary, grammar and pronunciation. The Portuguese spoken in Brazil differs from that spoken in Portugal partly because of African influence (Brazil's enslaved population shaped its Portuguese) and partly because the two varieties evolved separately for 200 years. Language is never static — it is always being changed by its speakers and their experiences."},
  {id:"april25",name:"April 25th",emoji:"🌸",chapter:"Chapter 9",story:"The Carnation Revolution of April 25, 1974 is one of the most extraordinary events in 20th-century European history. The signal was two songs on national radio. The military moved. The streets filled with people. Flowers went into gun barrels. A 48-year dictatorship fell in hours, with almost no violence. Portugal went from Europe's last colonial empire to a liberal democracy in under two years. April 25th is not just a Portuguese event — it is proof that political systems that seem permanent can change rapidly, that ordinary people have agency, and that history is not determined.",portugal:"Freedom Day (Dia da Liberdade) is celebrated every April 25th — and it is one of the few national holidays in Europe that is still genuinely, joyfully celebrated rather than simply observed. The carnation — the red flower people put in soldiers' guns — remains the symbol of Portuguese democracy. Portugal's democracy is 50 years old: young enough to be consciously valued, old enough to have proved durable.",ks3:"The Carnation Revolution illustrates the concept of punctuated equilibrium in political change: long periods of stability interrupted by rapid transformation. Portugal was a dictatorship for 48 years with very little visible change — then transformed in hours. This pattern appears throughout history: the French Revolution, the fall of the Berlin Wall, the Arab Spring. Systems that appear stable can be more fragile than they look. The conditions for change can build invisibly for years before they become visible. Understanding this should make people both more patient with slow change and more alert to the possibility of rapid transformation."},
  {id:"tagus",name:"The River Tagus",emoji:"🌊",chapter:"Chapter 4",story:"The River Tagus (Tejo) is 1,007km long, flowing from the mountains of eastern Spain to the Atlantic at Lisbon. It created the estuary that became one of Europe's finest natural harbours — the reason Lisbon exists where it does. Romans, Moors and Portuguese all chose this location because of the Tagus. The river shaped the city; the city shaped Portugal; Portugal shaped the Atlantic world. It all starts with a river. The Mar da Palha (Sea of Straw) — the broad shallow estuary — is one of Europe's most important wetland habitats, supporting hundreds of thousands of migrating birds each year.",portugal:"Every time you look across the Tagus from Lisbon, you are seeing the same view that Roman engineers, Moorish scholars, medieval merchants, Age of Discovery navigators, and 20th-century democrats have seen. The river is constant; the history flows through it. The Vasco da Gama Bridge (17.2km — Europe's longest when built) crosses the Tagus 17km upstream from the sea. The monument to the Discoveries in Belém stands at the river's mouth — the exact spot where the explorers left and returned.",ks3:"The Tagus illustrates transboundary resource management: a river shared by two EU member states (Spain and Portugal) under the 1998 Albufeira Convention. Climate change is stressing the agreement — reduced rainfall and increased Spanish irrigation are reducing Tagus flows into Portugal. Portugal has formally complained that Spain is not meeting minimum flow obligations. Two EU neighbours, bound by the same legal framework, both committed to climate action, still struggling to agree on sharing a river they have shared for centuries."},
  {id:"cork",name:"Cork Oak and Montado",emoji:"🌳",chapter:"Chapter 3",story:"Portugal produces approximately 50% of the world's cork. The cork oak (Quercus suber) lives up to 200 years. Its bark is harvested every 9 years without killing the tree — one of the only materials humans can harvest at commercial scale without cutting the plant down. The montado ecosystem (cork oak savanna) is one of the most biodiverse habitats in Europe, supporting the Iberian lynx, black storks, azure-winged magpies, and hundreds of plant species. It stores carbon, prevents soil erosion, maintains water quality, and provides habitat.",portugal:"Cork is one of Portugal's most important exports and one of its ecological treasures simultaneously. The montado covers approximately 700,000 hectares — about 7.5% of Portugal's land. Climate change and the spread of synthetic wine stoppers (plastic and aluminium corks) have threatened its future. But growing awareness of cork's ecological value and sustainability has revived demand. Portuguese cork is found in wine bottles, flooring, insulation and space rockets. The most sustainable material in the world grows in Portugal's fields.",ks3:"Cork oak montado is an example of a cultural landscape — a habitat maintained by centuries of human management that has itself become ecologically valuable. If farming stopped entirely, the montado would succeed to dense oak woodland, losing the open grassy structure that supports its unique biodiversity. This complicates the relationship between conservation and human land use: sometimes the most valuable habitats require continued careful human management rather than total rewilding. This is also true of the traditional Portuguese landscape of vineyards, olive groves and wheat fields, which have coexisted with nature for millennia."},
  {id:"azores",name:"The Azores",emoji:"🌋",chapter:"Chapters 1, 5",story:"The nine islands of the Azores sit on the Mid-Atlantic Ridge — where the North American, Eurasian and African tectonic plates meet. They are some of the most geologically dynamic places on Earth, with active volcanoes, hot springs, calderas, and black lava beaches. All nine islands were formed by volcanic eruptions from the seafloor. The last eruption was Capelinhos in 1957-58, which added a new peninsula to Faial. The Azores EEZ is enormous — the ocean territory they add to Portugal is larger than the entire territory of Spain.",portugal:"The Azores are simultaneously Portugal's most distant territory and one of its most strategically important: they add 600,000km² of exclusive economic zone to Portugal's maritime territory, they sit astride the transatlantic shipping lanes, and their geology makes them scientifically extraordinary. The whale-watching industry in the Azores is world-class (28 cetacean species recorded). Geothermal energy powers a significant fraction of the islands' electricity. The Azores are not a tourist destination — they are a window into how the Earth works.",ks3:"The Azores triple junction — where three tectonic plates meet — is one of the most studied geological features on Earth. Understanding how plates interact here helps scientists model plate tectonics globally. The islands also demonstrate island biogeography: isolated by hundreds of kilometres of ocean, they have developed unique species assemblages through evolution in isolation, with high rates of endemism (species found nowhere else on Earth). The Azores laurisilva (laurel forest) is a relic of the ancient forests that covered southern Europe before the Pleistocene — preserved on Atlantic islands while the mainland equivalent was destroyed by climate change and human activity."},
  {id:"fado",name:"Fado and Saudade",emoji:"🎵",chapter:"Chapter 6",story:"Fado is a UNESCO-listed musical tradition born in Lisbon's Alfama neighbourhood in the early 19th century, among sailors' families and the urban poor. The word 'fado' comes from Latin 'fatum' — fate. It is the sound of saudade: that deep, bittersweet longing for something absent that cannot easily be named in any other language. Fado requires three things: a Portuguese guitar (guitarra portuguesa), a classical guitar, and a voice that is not performing emotion but transmitting it. The greatest fado singers — Amália Rodrigues, Carlos do Carmo, Mariza — are among the most emotionally powerful vocalists in the history of recorded music.",portugal:"Fado is not nostalgia — it is a living music that continues to evolve. New fado singers like Ana Moura, Mariza and Camané have taken the tradition to new generations and new audiences worldwide. Fado is performed in the Alfama's fado houses, in concert halls from Tokyo to New York, and on streets worldwide. It is Portugal's most distinct cultural export — a music that cannot be mistaken for anything else. When you hear fado, you hear the sea, the ships going out, the waiting, the return, and the grief of absence.",ks3:"Fado is a case study in how geography creates culture. The Atlantic coast, the maritime economy, the years of waiting for sailors to return, the social world of the Alfama — these geographical and social conditions created specific emotional experiences that found expression in a specific musical form. Saudade — the emotional concept at fado's heart — is itself a geographical product: a maritime nation that sent its people across oceans for years at a time developed a specific word for the specific grief of those who waited. Place makes culture; culture names place."}

  owl:[
    {q:"The Atlas Chronicles argued that 'power shapes everything.' Give the strongest possible argument AGAINST this claim.",opts:["Power doesn't matter at all — individuals make free choices","The strongest counter-argument is that geography, technology, ideas and ecological systems have autonomous effects that power cannot fully control: the Black Death reshaped European society without any powerful actor intending it; the printing press democratised information despite powerful interests opposing it; the internet emerged from decentralised networks that resisted centralised control; and ecological collapse (the collapse of Atlantic cod stocks) happened despite the economic power of the fishing industry wanting to avoid it","Power is the only thing that matters — everything else is irrelevant","Individual merit, not power, determines outcomes"],ans:1,fact:"The honest intellectual position acknowledges both claims: power shapes trajectories, constrains options, and determines whose version of events gets told — but systems, technologies and natural processes have their own dynamics that power cannot always control. Climate change is killing the fossil fuel industry's business model through physical consequences, not because any powerful actor chose it. The internet is reshaping democratic politics in ways that both empower and threaten established power. The best analysis holds the power critique alongside an understanding of the limits of that critique."},
    {q:"What is the geographer's most important intellectual tool — and why is scepticism more important than any factual knowledge?",opts:["GPS navigation technology","Critical scepticism — the habit of asking who made this representation, what choices were made, what is included and excluded, and whose interests are served. Facts become outdated; the method for evaluating them does not. In a world of information abundance and deliberate disinformation, the ability to critically evaluate representations of reality is more valuable than any specific piece of knowledge.","The ability to memorise capital cities and country borders","Mathematical ability for calculating distances"],ans:1,fact:"The distinction between knowing facts and knowing how to evaluate them is one of the most important in education. Facts about geography change (borders move, cities grow, climates shift), but the method for critically evaluating geographic claims does not. The ability to ask 'who made this map and what choices did they make?' is useful for evaluating news coverage, political claims, advertising, and scientific results — not just maps. Geography, at its best, is training in critical thinking about representations of reality."},
    {q:"How does the concept of 'path dependency' appear in multiple chapters of the Atlas Chronicles?",opts:["It only applies to economic systems and doesn't appear in other chapters","Path dependency — the idea that past choices constrain future options — appears throughout: colonial economic structures outlasting colonial rule (Chapter 9); Roman roads determining where Portuguese roads run (Chapter 7); the Tagus estuary determining Lisbon's location (Chapter 4); Portuguese language spreading because explorers went where they went, not vice versa (Chapter 6); building stock determining future energy efficiency (Chapter 10); carbon already emitted committing future warming (Chapter 11). History is not background — it is the accumulated path dependencies we live inside.","Path dependency only matters for geographical features, not human decisions","Path dependency shows that nothing from the past affects the present"],ans:1,fact:"Path dependency is one of the most powerful concepts for understanding why things are the way they are rather than some other way. It appears in physical geography (river valleys determine settlement), institutional geography (colonial borders determining state structure), economic geography (industrial infrastructure determining industrial location), linguistic geography (language spread following exploration routes), and climate science (committed warming from past emissions). Every chapter of the Atlas Chronicles could be reread through the lens of path dependency — what choices in the past are constraining options in the present?"},
    {q:"The Atlas Chronicles tried to show that 'everything connects.' What is the most compelling connection you found across multiple chapters?",opts:["There are no real connections between different topics in geography","Multiple compelling connections exist — for example: the Portuguese language's spread (Ch 6) resulted directly from the Age of Discovery (Ch 8) enabled by Atlantic wind knowledge (Ch 8) from Portugal's Atlantic position (Ch 1) which also means it faces the first European impact of climate change (Ch 11) partly caused by the industrial revolution (Ch 10) which was financed partly by colonial extraction (Ch 9) including from territories reached by Portuguese explorers (Ch 8). One country, one story, all twelve chapters.","Geography only connects to history, not to science or economics","Individual chapters are completely separate topics"],ans:1,fact:"The interconnection is the point. Geography as a discipline exists precisely because the world is interconnected in ways that disciplinary boundaries obscure. Climate change is simultaneously physics, economics, politics, ecology, and human geography. Migration is simultaneously economics, culture, law, and physical geography. The most important problems facing humanity — climate change, inequality, biodiversity loss, democratic backsliding — are all interdisciplinary problems requiring the kind of connected thinking that geography at its best provides."},
    {q:"The Atlas Chronicles ends by saying 'The work doesn't.' What does this mean — and what kind of work does it refer to?",opts:["It refers to homework and assignments that continue after the course","The Atlas Chronicles was fundamentally about preparing students to participate in shaping the future — not just understand the past. 'The work' refers to: the political work of participating in democracy, the intellectual work of thinking critically about representations of the world, the ethical work of reckoning honestly with histories of power and their present consequences, and the practical work of contributing to climate solutions, democratic resilience, and a more just world. The course ends; the questions it raised are permanent.","It means students should re-read the chapters repeatedly","It refers to geography homework"],ans:1,fact:"This is the question that matters most in education: not 'what do you know?' but 'what will you do with it?' The Atlas Chronicles covered enormous ground — from plate tectonics to climate justice, from ancient Rome to the Carnation Revolution, from the water cycle to the Atlantic slave trade. The purpose was not to fill heads with facts but to develop the thinking tools — systems thinking, critical scepticism, historical perspective, scientific literacy, moral seriousness — that make someone capable of participating usefully in the world. Whether that preparation leads to action is, ultimately, a choice."}

  cub:[
    {q:"If you could visit one place you learned about in the Atlas Chronicles, which would have the most to teach you — and why?",opts:["Disneyland in the USA","The Azores — because they sit on three tectonic plates, have active volcanoes, are part of Portugal, and sit in the middle of the Atlantic: geology, ecology, history and geography all visible in one place","A shopping centre","A theme park"],ans:1,fact:"The Azores really are extraordinary — geologically, ecologically and historically. On one island (São Miguel) you can see a caldera lake, geysers, hot springs, ancient laurel forest, and whale-watching opportunities for 28 species — all in a few hours. On Faial, you can walk to the Capelinhos volcano that created new land in 1957-58 and see the museum built on the boundary between the old island and the new land. The islands sit on the triple junction of three tectonic plates. The Azores are one of the few places on Earth where the geology is so young and active that you can watch the planet being made."},
    {q:"What is the single most important thing the Atlas Chronicles taught you?",opts:["The capital cities of all European countries","Everything connects — geography, history, science, economics, language and ecology are all one story. Understanding any one thing properly requires understanding how it connects to everything else.","The names of all the world's rivers","How to draw maps accurately"],ans:1,fact:"Everything connects — this is the Atlas Chronicles' core message. The wildfire that burns a Portuguese forest connects to the temperature of the Atlantic Ocean connects to the carbon in the atmosphere connects to the Industrial Revolution connects to the colonial economy connects to the Atlantic slave trade connects to the Age of Discovery connects to the Tagus estuary connects to the geology of the Iberian Peninsula. Pull one thread and the whole tapestry moves. This is what geography is for: understanding the connections that individual disciplines miss."},
    {q:"April 25, 1974 is one of Portugal's most important dates. What happened and why does it still matter?",opts:["Portugal won the football World Cup","The Carnation Revolution ended the 48-year dictatorship, with people putting flowers in soldiers' guns instead of shooting. Portugal became a democracy and ended its colonial empire. It still matters because it shows that political systems that seem permanent can change rapidly — and that people have power to change them.","Portugal joined the European Union","Vasco da Gama returned from India"],ans:1,fact:"The Carnation Revolution matters beyond Portugal because it is one of the cleanest examples in modern history of a peaceful democratic transition. The dictatorship fell in hours, with almost no violence. The people in the streets were not armed — they had carnations. The military officers who acted were motivated partly by exhaustion from colonial wars and partly by genuine democratic conviction. Portugal then consolidated its democracy over the following decades, joining the EU in 1986 and becoming one of Europe's most stable democracies. The lesson: change that seems impossible can happen quickly when conditions are right."},
    {q:"The Atlas Chronicles covered 12 chapters about the world. Which chapter taught you something that most surprised you?",opts:["Chapter 1 was most surprising because maps are accurate","Many possible answers — for example: Chapter 3's discovery that wolves changing their behaviour changed the course of rivers in Yellowstone; or Chapter 6's revelation that hundreds of Portuguese words came from Arabic; or Chapter 8's finding that 93% of Magellan's crew died; or Chapter 11's fact that Portugal ran on 100% renewable electricity for 6 consecutive days in 2023","Nothing in the Atlas Chronicles was surprising","Geography contains no surprises"],ans:1,fact:"The most surprising things in the Atlas Chronicles were often the connections — things that seem completely unrelated turning out to be deeply linked. Wolves changing rivers. One maritime vocabulary still present in Portuguese words after 1,300 years. The Treaty of Tordesillas line in 1494 determining that 215 million Brazilians speak Portuguese today. Six young people from Portugal potentially changing European human rights law. The world is full of these connections, and the Atlas Chronicles was designed to make them visible."},
    {q:"The Atlas Chronicles ends. What do YOU think is the most important issue facing your generation?",opts:["Fashion trends","Climate change and its justice dimensions — who caused it and who suffers — combined with the need to maintain and strengthen democracy in a world where authoritarian governments are gaining ground. Both are about whether power is used responsibly and whether ordinary people have agency in shaping their world.","Sports results","Social media trends"],ans:1,fact:"Climate change and democracy are connected issues: democratic governments with informed, engaged citizens make better long-term decisions than authoritarian ones, but democratic governments struggle with long-term problems that require short-term costs. The climate crisis is ultimately a test of whether democracies can act on evidence about long-term threats. Portugal faces both challenges: significant climate vulnerability and the pressures on democracy that affect all countries. Your generation will be making the key decisions on both issues within the next 10-20 years."}

    {q:"What is the most important message of the Atlas Chronicles?",opts:["That geography is just about learning country capitals","That everything in the world is connected — rivers to cities, languages to empires, earthquakes to wealth, climate to justice — and that understanding these connections makes you better able to understand what's happening in the world and help shape what happens next","That maps are the only important thing in geography","That history has already decided everything"],ans:1,fact:"Everything connects. That's the Atlas Chronicles in two words. When you understand that the language you speak carries the history of the people who spoke it before you, that the river outside your city shaped why the city is there, that the weather is changing because of choices made 100 years ago, that young people in Portugal are changing European law — you understand that the world is not something that happens to you. It's something you are part of. And that means you have more power in it than you might think."},
    {q:"What would you like to explore more after the Atlas Chronicles?",opts:["Nothing — I've learned everything I need to know","So much still to explore! Every chapter opened more questions: How does GIS mapping work? What will Portugal look like in 2100? How does the EU decide things? What are the untranslatable words in other languages? What's under the ocean around the Azores? What will happen to the Iberian lynx? The Atlas Chronicles was a beginning, not an end.","Geography is finished after 12 chapters","The world has been fully explained"],ans:1,fact:"The Atlas Chronicles is the beginning of a lifelong conversation with the world, not a summary of it. Every chapter raised more questions than it answered. Every connection revealed more connections. The most important outcome of this course is not what you now know — it is what you now want to know. Curiosity is the engine of learning, and the Atlas Chronicles tried above all to keep that engine running. Keep asking questions."},

const TASKS={
  owl:{icon:"🦉",title:"My Atlas — Twelve Chapters of My Own World",level:"KS3 Synthesis and Reflection",
   brief:`<p>The Atlas Chronicles ends here. Your task is to write your own version: twelve brief paragraphs (one per chapter topic) connecting the Atlas themes to your own life and your own country.</p>
<p>For each theme, answer: <strong>what do I now understand about this that I didn't before, and how does it connect to my daily life in Portugal?</strong></p>
<ol style="padding-left:16px;margin-top:8px">
<li>My place on the map</li><li>The city I live in</li><li>The natural world around me</li><li>The water I drink</li><li>The ground beneath me</li><li>My language</li><li>The ancient world I inherited</li><li>The explorers who shaped my country</li><li>The empires that made my world</li><li>The modern world I was born into</li><li>The climate I will live through</li><li>The future I am part of making</li>
</ol>`,
   placeholder:"My Atlas Chronicles:\n\n1. My place on the map:\n2. My city:\n3. The natural world:\n4. Water:\n5. The ground:\n6. My language:\n7. Ancient world:\n8. Explorers:\n9. Empires:\n10. Modern world:\n11. Climate:\n12. My future:"},
  cub:{icon:"🐻",title:"Letter to Atlas",level:"KS2 Reflection + Creative Writing",
   brief:`<p>Write a letter to Atlas (the character who travelled through all 12 chapters). Tell Atlas:</p>
<ul><li>What was the most amazing thing you learned</li><li>What surprised you most</li><li>What made you feel proud to be Portuguese</li><li>What worried you</li><li>What you want to do differently because of the Atlas Chronicles</li><li>One question Atlas didn't answer that you still want to know</li></ul>`,
   placeholder:"Dear Atlas,\n\nI can't believe what I learned about...\n\nI was most surprised by...\n\nI feel proud to be Portuguese because...\n\nI am worried about...\n\nBecause of the Atlas Chronicles I want to...\n\nOne question I still have:\n\nYours,\n[Your name]"},
  bay:{icon:"🌿",title:"My World Book",level:"KS1/KS2 Foundation",
   brief:`<p>Make a mini world book! For each of these topics, write one sentence and draw a picture:</p>
<ul><li>My favourite animal from the Atlas Chronicles</li><li>My favourite place we visited</li><li>Something amazing about Portugal</li><li>Something I want to change about the world</li><li>Something I am hopeful about</li></ul>`,
   placeholder:"My favourite animal:\n(Draw it here! 🎨)\n\nMy favourite place:\n\nSomething amazing about Portugal:\n\nSomething I want to change:\n\nSomething I am hopeful about:"}
};
const SAVE_KEY="atlas_ch12_v1";
function defaultState(){const s={};CHILDREN.forEach(c=>{s[c.id]={storyPage:0,selectedConnect:null,quizIdx:0,quizAnswers:[],quizDone:false,quizScore:0,mathInputs:{},mathAnswered:{},taskText:"",taskSaved:false,sectionsComplete:[]};});return s;}
function loadState(){try{const s=localStorage.getItem(SAVE_KEY);if(s)return{...defaultState(),...JSON.parse(s)};}catch(e){}return defaultState();}
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}}
let state=loadState();let ui={view:"profiles",child:null,section:"story"};
function render(){
  const app=document.getElementById("app");const child=CHILDREN.find(c=>c.id===ui.child);
  let h=`<div class="hero"><h1>🌍 The Atlas Chronicles</h1><p>Chapter 12: Atlas Comes Home</p><div class="ks-badges"><span class="ks-badge">📚 KS1 Bay</span><span class="ks-badge">📚 KS2 Cub</span><span class="ks-badge" style="background:rgba(240,180,41,0.1);border-color:rgba(240,180,41,0.2);color:#f0b429">📚 KS3 Owl</span></div></div>`;
  if(ui.view==="profiles")h+=renderProfiles();
  else if(ui.view==="learn"&&child)h+=renderLearn(child);
  app.innerHTML=h;
}
function renderProfiles(){
  let h=`<div class="section-label">Choose your explorer</div><div class="profile-grid">`;
  CHILDREN.forEach(c=>{const s=state[c.id];const comp=(s.sectionsComplete||[]).length;h+=`<div class="profile-card ${ui.child===c.id?"active":""}" onclick="selectChild('${c.id}')"><div style="font-size:2.8rem">${c.avatar}</div><div class="pname">${c.name}</div><div class="plevel">${c.level}</div><div class="pstars">${comp>0?"⭐".repeat(comp)+" ("+comp+"/5)":"Ready!"}</div></div>`;});
  return h+`</div>`;
}
function renderLearn(child){
  const s=state[child.id];const comp=s.sectionsComplete||[];
  const sections=[{id:"story",icon:"📖",name:"Story"},{id:"connections",icon:"🔗",name:"Connections"},{id:"maths",icon:"📐",name:"Maths"},{id:"task",icon:"✍️",name:"Task"},{id:"quiz",icon:"✅",name:"Quiz"}];
  let h=`<a href="index.html" class="back-btn">← Home</a>`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:2rem">${child.avatar}</span><div><div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#ffd54f">${child.name} — Chapter 12</div><div style="color:#666;font-size:0.73rem">${child.level} · ⭐ ${comp.length}/${sections.length} done</div></div></div>`;
  h+=`<div class="progress-overview">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<div class="prog-tile ${done?"done":""}"><div class="prog-icon">${sec.icon}</div><div class="prog-name">${done?"✓ ":""}${sec.name}</div></div>`;});
  h+=`</div><div class="nav-tabs">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<button class="nav-tab ${ui.section===sec.id?"active":""} ${done?"done":""}" onclick="switchSection('${sec.id}')">${sec.icon} ${sec.name}</button>`;});
  h+=`</div>`;
  if(ui.section==="story")h+=renderStory(child,s);
  else if(ui.section==="connections")h+=renderConnections(child,s);
  else if(ui.section==="maths")h+=renderMaths(child,s);
  else if(ui.section==="task")h+=renderTask(child,s);
  else if(ui.section==="quiz")h+=renderQuiz(child,s);
  return h;
}
function renderStory(child,s){
  const pg=Math.min(s.storyPage,STORY.length-1);const page=STORY[pg];const isLast=pg>=STORY.length-1;
  let h=`<div class="story-panel"><div class="chapter-label">Chapter 12 · Page ${pg+1} of ${STORY.length}</div><div class="story-h">Atlas Comes Home</div><div class="story-emoji">${page.emoji}</div><div class="story-body">${page.text(child.id)}</div><div class="page-nav"><span class="page-ctr">${pg+1}/${STORY.length}</span>`;
  if(!isLast)h+=`<button class="cont-btn" onclick="nextPage()">Continue →</button>`;
  else h+=`<button class="cont-btn" onclick="completeSection('story');switchSection('connections')">Explore Connections! 🔗</button>`;
  return h+`</div></div>`;
}
function renderConnections(child,s){
  let h=`<div class="explorer-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">🔗 ${child.ks}: Portugal's Connections</div><div class="explorer-title">🔗 Everything Connects</div><div class="explorer-sub">Six threads connecting Portugal to the world you've explored</div><div class="connect-grid">`;
  CONNECTIONS.forEach(c=>{h+=`<div class="connect-card ${s.selectedConnect===c.id?"selected":""}" onclick="selectConnect('${c.id}')"><div class="connect-emoji">${c.emoji}</div><div class="connect-name">${c.name}</div><div class="connect-sub">${c.chapter}</div></div>`;});
  h+=`</div>`;
  if(s.selectedConnect){
    const c=CONNECTIONS.find(x=>x.id===s.selectedConnect);
    if(c){
      h+=`<div class="connect-detail"><div style="font-family:'Fredoka One',cursive;color:#ffd54f;font-size:1.2rem;margin-bottom:8px">${c.emoji} ${c.name} <span style="font-size:0.8rem;color:#888">(${c.chapter})</span></div><div style="font-size:0.85rem;color:#fff9c4;line-height:1.65;margin-bottom:8px">${c.story}</div>`;
      h+=`<div class="portugal-pull"><strong>🇵🇹 Portugal Today</strong>${c.portugal}</div>`;
      if(child.id==="owl")h+=`<div class="ks3-pull"><strong>🦉 The bigger picture</strong>${c.ks3}</div>`;
      h+=`</div>`;
    }
    h+=`<div style="margin-top:12px;text-align:center"><button class="btn-gold" onclick="completeSection('connections');switchSection('maths')">Maths! 📐</button></div>`;
  } else h+=`<div style="text-align:center;padding:14px;color:#555;font-size:0.82rem">👆 Click any connection to explore</div>`;
  return h+`</div>`;
}
function renderMaths(child,s){
  const id=child.id;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="math-panel"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">📐 ${child.ks}: Final Numbers</div><div style="font-family:'Fredoka One',cursive;color:#f0b429;font-size:1.2rem;margin-bottom:4px">📐 Portugal — The Complete Picture</div><div style="color:#777;font-size:0.78rem;margin-bottom:14px">Putting it all together in numbers</div>`;
  chs.forEach((ch,idx)=>{
    const answered=s.mathAnswered&&s.mathAnswered[idx];const inputVal=(s.mathInputs&&s.mathInputs[idx])||"";
    h+=`<div class="challenge-card"><div class="ch-title">📐 ${ch.title}</div><div class="ch-story">${ch.story}</div><div class="ch-q">${ch.q}</div>`;
    if(!answered){h+=`<div class="math-row"><input class="math-in" type="text" value="${inputVal.replace(/"/g,'&quot;')}" placeholder="Answer..." oninput="updateMath(${idx},this.value)" onkeydown="if(event.key==='Enter')checkMath(${idx})"><span class="math-unit">${ch.unit}</span><button class="math-go" onclick="checkMath(${idx})">Check ✓</button></div>`;if(s.mathAnswered&&s.mathAnswered[idx]==="wrong")h+=`<div class="math-no">Not quite — try again!</div>`;}
    else{h+=`<div class="math-ok">✅ Correct!</div><div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 12px;font-size:0.78rem;color:#aaa;line-height:1.6;margin-top:6px"><strong style="color:#f0b429">Working:</strong> ${ch.working}</div><div class="math-fact">🤩 ${ch.fact}</div>`;}
    h+=`</div>`;});
  const allDone=chs.every((_,i)=>s.mathAnswered&&s.mathAnswered[i]==="correct");
  if(allDone)h+=`<div style="text-align:center;margin-top:12px"><button class="btn-gold" onclick="completeSection('maths');switchSection('task')">Final Task! ✍️</button></div>`;
  return h+`</div>`;
}
function renderTask(child,s){
  const id=child.id;const task=TASKS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="task-box"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✍️ ${child.ks}: Final Task</div><div class="task-title">${task.icon} ${task.title}</div><div class="task-level">${task.level}</div><div class="task-brief">${task.brief}</div><textarea class="task-ta" placeholder="${task.placeholder}" oninput="updateTask(this.value)">${s.taskText||""}</textarea><br><button class="task-btn" onclick="saveTask()">Save 💾</button>`;
  if(s.taskSaved)h+=`<div class="saved-ok">✅ Saved!</div>`;
  if((s.taskText||"").length>80)h+=`<div style="margin-top:10px"><button class="btn-gold" onclick="completeSection('task');switchSection('quiz')">Final Quiz! ✅</button></div>`;
  return h+`</div>`;
}
function renderQuiz(child,s){
  const id=child.id;const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];const idx=s.quizIdx||0;
  if(s.quizDone||idx>=qs.length){
    const score=s.quizScore||0;const pct=Math.round((score/qs.length)*100);
    const msg=pct>=80?"You have mastered the Atlas Chronicles! The world makes more sense now — and so does Portugal.":pct>=60?"Strong work — you've absorbed the Atlas Chronicles well. Keep exploring.":"Keep going — the Atlas Chronicles rewards rereading. Every pass reveals new connections.";
    return`<div class="quiz-wrap"><div class="completion-card"><div style="font-size:3rem">🌍</div><div class="stars-row">${pct>=80?"⭐⭐⭐⭐⭐":pct>=60?"⭐⭐⭐⭐":"⭐⭐⭐"}</div><div style="font-family:'Fredoka One',cursive;color:#ffd54f;font-size:1.6rem;margin-bottom:8px">The Atlas Chronicles</div><div style="font-family:'Fredoka One',cursive;color:#ffd54f;font-size:1.2rem;margin-bottom:12px">Complete</div><div style="font-size:0.95rem;color:#ffe082;margin-bottom:16px;line-height:1.6">${msg}</div><div style="font-size:0.85rem;color:#888;margin-bottom:20px">Score: ${score}/${qs.length} (${pct}%)</div><div style="font-size:0.9rem;color:#fff9c4;line-height:1.8;margin-bottom:20px;font-style:italic">"The world needs people who understand its connections. Who can read a map critically. Who know that a border is a choice. Who know that the language they speak carries a history. Who know that the climate they live in was made — and can be changed."</div><a href="index.html" class="btn-gold" style="padding:12px 24px;text-decoration:none;font-size:0.95rem">← Back to Home</a></div></div>`;
  }
  const q=qs[idx];const answers=s.quizAnswers||[];const thisAns=answers[idx];
  let h=`<div class="quiz-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✅ Final Quiz</div><div class="section-label">Final Quiz · Q${idx+1} of ${qs.length}</div><div class="score-dots">`;
  qs.forEach((_,i)=>{const a=answers[i];h+=`<div class="sdot ${i===idx?"current":a===undefined?"":a===qs[i].ans?"done":"wrong"}"></div>`;});
  h+=`</div><div class="q-text">${q.q}</div><div class="q-opts">`;
  q.opts.forEach((opt,i)=>{let cls="q-opt";if(thisAns!==undefined){if(i===q.ans)cls+=" correct";else if(i===thisAns&&i!==q.ans)cls+=" wrong";}h+=`<button class="${cls}" ${thisAns!==undefined?"disabled":""} onclick="answerQuiz(${i})">${opt}</button>`;});
  h+=`</div>`;
  if(thisAns!==undefined){h+=`<div class="q-fact">🤩 ${q.fact}</div><div style="text-align:right;margin-top:8px"><button class="btn-gold" onclick="nextQuiz()">Next →</button></div>`;}
  return h+`</div>`;
}
function selectChild(id){ui.child=id;ui.view="learn";ui.section="story";render();}
function switchSection(s){ui.section=s;render();}
function completeSection(s){const comp=state[ui.child].sectionsComplete||[];if(!comp.includes(s))state[ui.child].sectionsComplete=[...comp,s];saveState();}
function nextPage(){if(state[ui.child].storyPage<STORY.length-1){state[ui.child].storyPage++;saveState();render();}}
function selectConnect(id){state[ui.child].selectedConnect=id;saveState();render();}
function updateMath(idx,v){if(!state[ui.child].mathInputs)state[ui.child].mathInputs={};state[ui.child].mathInputs[idx]=v;}
function checkMath(idx){
  const id=ui.child;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];const ch=chs[idx];
  const input=(state[id].mathInputs&&state[id].mathInputs[idx]||"").trim().replace(/,/g,"");
  const correctVal=ch.answer.replace(/,/g,"");
  const userNum=parseFloat(input);const correctNum=parseFloat(correctVal);
  const correct=!isNaN(userNum)&&!isNaN(correctNum)&&Math.abs(userNum-correctNum)/Math.max(correctNum,0.001)<0.05;
  if(!state[id].mathAnswered)state[id].mathAnswered={};state[id].mathAnswered[idx]=correct?"correct":"wrong";saveState();render();
}
function answerQuiz(i){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const idx=s.quizIdx||0;const q=qs[idx];
  const answers=[...(s.quizAnswers||[])];while(answers.length<=idx)answers.push(undefined);
  answers[idx]=i;if(i===q.ans)state[id].quizScore=(s.quizScore||0)+1;
  state[id].quizAnswers=answers;saveState();render();
}
function nextQuiz(){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const next=(s.quizIdx||0)+1;state[id].quizIdx=next;if(next>=qs.length)state[id].quizDone=true;saveState();render();
}
function resetQuiz(){const id=ui.child;state[id].quizIdx=0;state[id].quizAnswers=[];state[id].quizDone=false;state[id].quizScore=0;saveState();render();}
function updateTask(v){state[ui.child].taskText=v;}
function saveTask(){state[ui.child].taskSaved=true;saveState();render();}
render();
</script>
</body>
