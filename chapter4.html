.btn-teal{background:linear-gradient(135deg,#006064,#00838f);color:#b2ebf2;border:none;border-radius:22px;padding:9px 18px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer}

.ks-tag.ks3{background:rgba(240,180,41,0.07);border-color:rgba(240,180,41,.13);color:#f0b429}

<body>
<div class="wrap" id="app"></div>
<script>
const CHILDREN=[
  {id:"owl",name:"Owl",age:12,avatar:"🦉",ks:"KS3",level:"KS3 — Secondary Level"},
  {id:"cub",name:"Cub",age:9,avatar:"🐻",ks:"KS2",level:"KS2 — Primary Level"},
  {id:"bay",name:"Bay",age:7,avatar:"🌿",ks:"KS1",level:"KS1/KS2 — Foundation"}
];
const STORY=[
  {emoji:"🌊",text:(id)=>`<p>Every civilisation on Earth began next to water. Not a coincidence — a rule.</p><p>The Egyptians had the Nile. The Mesopotamians had the Tigris and Euphrates. The Chinese had the Yellow River. The Indus Valley civilisation had the Indus. Water meant crops. Crops meant food surpluses. Food surpluses meant some people didn't have to farm — they could be priests, soldiers, scribes, architects. Cities followed. Writing followed. Civilisation followed. Take away the river, and none of it happens.</p>
<div class="fact-pull"><strong>🌊 Rivers — the original motorways</strong>Before roads, before railways, rivers were how everything moved. Goods, armies, ideas, diseases, people. The Rhine connected Roman Europe. The Mississippi opened up North America. The Congo is still the main transport route through central Africa today. Rivers flow downhill to the sea — which means boats could carry enormous cargo with almost no energy. A horse could pull a 1-tonne cart on a road, but the same horse could pull a 30-tonne barge on a canal. Water transport was 30 times more efficient. That efficiency built empires.</div>
<div class="portugal-pull"><strong>🇵🇹 The Tagus — Portugal's spine</strong>The River Tagus (Tejo) is 1,007km long, flowing from the mountains of eastern Spain to the Atlantic at Lisbon. It is the longest river on the Iberian Peninsula. Lisbon sits at its mouth — exactly where the Romans, Moors and Portuguese all chose to build their great city, because the Tagus estuary is one of Europe's finest natural harbours. The river shaped the city; the city shaped Portugal; Portugal shaped the Atlantic world. It all starts with a river.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Why water wars are coming — and they've already started</strong>Water is the resource that geopoliticians are most worried about in the 21st century. Unlike oil, there is no substitute for fresh water. And unlike oil, it falls from the sky unevenly.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>97.5% of Earth's water is saltwater. Of the 2.5% fresh, two-thirds is frozen in ice caps</li><li>Only 0.3% of all water on Earth is accessible fresh water — and it's not distributed equally</li><li>14 countries already face severe water stress. By 2025, two-thirds of the world's population will live in water-stressed areas</li><li>The Grand Ethiopian Renaissance Dam is already creating conflict between Ethiopia, Sudan and Egypt over Nile water rights</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if you control the river upstream, you control the water supply of everyone downstream. What gives a country the right to dam a river that flows through multiple countries?</em></div>`:""}`},
  {emoji:"💧",text:(id)=>`<p>Water never disappears. It just moves.</p><p>The water you drink today has been drunk before — by dinosaurs, by Roman emperors, by the first fish that ever lived. Water cycles endlessly through the Earth system: evaporating from oceans, condensing into clouds, falling as rain, flowing into rivers, soaking into groundwater, evaporating again. The water cycle is the planet's recycling system, and it has been running for 4 billion years without stopping.</p><p>But humans are disrupting it. We pump groundwater out faster than it recharges. We pave surfaces so rain runs off instead of soaking in. We drain wetlands. We warm the atmosphere, changing where rain falls and where it doesn't. The cycle still runs — but it no longer runs the way our agriculture and cities were designed around.</p>
<div class="fact-pull"><strong>💧 The water cycle — faster than you think</strong>A water molecule spends an average of 3,000 years in the ocean before evaporating. In a river, the average residence time is just 2-6 months. In the atmosphere, a water molecule stays for just 9 days before falling as rain. In a glacier, water may be locked away for 20,000-100,000 years. The water in the Sahara desert's deep aquifers fell as rain during the last Ice Age, 10,000 years ago — it is essentially a non-renewable resource. When it runs out, it runs out.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal's water stress is real and getting worse</strong>Southern Portugal — the Alentejo and Algarve — already experiences water stress in summer. Climate change is reducing annual rainfall and increasing evaporation. Portugal's major rivers (Tagus, Douro, Guadiana) all originate in Spain, meaning Portugal's water supply partly depends on Spanish water management decisions and international agreements. The Alqueva dam on the Guadiana, completed in 2002, created the largest artificial lake in Western Europe — a deliberate strategy to store winter rain for use in Portugal's driest summers.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Virtual water — the hidden water in everything you buy</strong>Every product contains "virtual water" — the water used to make it. This is one of the most important and least-known concepts in resource geography.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>1kg of beef requires approximately 15,400 litres of water to produce</li><li>1 cotton t-shirt requires approximately 2,700 litres</li><li>1 smartphone requires approximately 12,700 litres</li><li>When the UK imports beef from water-stressed Australia, it is effectively importing Australia's water</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if a country exports water-intensive crops from a water-scarce region, is it effectively exporting its water? Should water be included in trade agreements?</em></div>`:""}`},
  {emoji:"🏔️",text:(id)=>`<p>Rivers are not just water. They are the landscape in motion.</p><p>Every river is carving its valley, grain by grain, year by year. The Grand Canyon was carved by the Colorado River over 5-6 million years — one of the most dramatic examples of what water and time can do to rock. The Mississippi Delta grows into the Gulf of Mexico as the river deposits the sediment it has carried from the Rocky Mountains, 3,000km upstream. The Nile Delta has been building for millions of years, creating the most fertile land in North Africa.</p><p>But humans have interrupted this. Dams trap sediment. Without the annual Nile flood that used to deposit rich silt on Egyptian farmland, Egyptian farmers now depend on artificial fertilisers. The Mississippi Delta is shrinking — starved of sediment by upstream dams — while sea levels rise.</p>
<div class="fact-pull"><strong>🏔️ The Nile without its floods — a warning</strong>For 5,000 years, Egyptian farmers didn't need fertiliser. The Nile flooded every year, depositing rich silt on the fields, then retreating. The flood was so reliable the ancient Egyptians built their entire calendar around it. When the Aswan High Dam was completed in 1970, the floods stopped. Downstream farmers now use 1 million tonnes of artificial fertiliser per year to replace the silt that the dam traps. The dam produces electricity and prevents floods — but it has broken a system that worked for 5,000 years.</div>
<div class="portugal-pull"><strong>🇵🇹 The Douro — wine, dams and energy</strong>The Douro River descends dramatically from the Spanish meseta to Porto, dropping 700m over its Portuguese section — making it one of the most powerful rivers in Europe. Portugal has built a cascade of hydroelectric dams on the Douro that provide a significant portion of Portugal's electricity. In wet years, the Douro alone can supply over 20% of Portugal's electricity needs. The same river that made the Douro Valley wine country possible now powers Portuguese homes — a river doing double duty, 600 years apart.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Dams: the development trap that nobody warns you about</strong>Dams seem like an obvious solution — store water, generate electricity, prevent floods. But the long-term costs are often hidden.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>The Three Gorges Dam (China) displaced 1.3 million people — the largest forced relocation in history</li><li>Dams trap sediment, starving downstream agriculture and deltas</li><li>Reservoirs in hot climates lose enormous amounts of water to evaporation</li><li>All dams eventually fill with sediment — typical lifespan 50-200 years — then what?</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: the Aswan Dam solved Egypt's flooding problem and generates electricity. It also ended 5,000 years of natural fertilisation. How do you weigh those against each other — and who gets to decide?</em></div>`:""}`},
  {emoji:"🌍",text:(id)=>`<p>The ocean does not respect borders.</p><p>A plastic bottle dropped in a river in Portugal can wash up on a beach in Brazil. A chemical spill in the Rhine affects the North Sea. Radioactive water released from Fukushima in Japan reaches the coast of Canada. The ocean connects everything — it is the ultimate commons, shared by everyone and owned by no one.</p><p>This creates what economists call the "tragedy of the commons" — resources shared by all tend to be overexploited by each, because each individual benefits from exploitation while the costs are shared by everyone. Fisheries are the classic example: no individual fishing boat has an incentive to fish less. But if every boat fishes at maximum capacity, the fish stock collapses — and everyone loses.</p>
<div class="fact-pull"><strong>🌍 How trade routes shaped the world</strong>The spice trade routes of the 15th century were the internet of their day — the networks through which wealth, power and information flowed. Whoever controlled them controlled the world economy. Portugal's achievement in finding a sea route around Africa to Asia was not just geographical — it was the most important economic disruption of the millennium, rerouting the global flow of wealth from the overland Silk Road and Arab merchants to the Atlantic and Portuguese ships. The world economy pivoted on one navigator's successful voyage.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal and the Atlantic — the ocean that made a country great</strong>Portugal has 1,793km of Atlantic coastline — and that coastline gave it the greatest strategic advantage in the 15th century: understanding of Atlantic wind patterns. The volta do mar (return route from Africa using the westerly winds further out in the Atlantic) was a Portuguese discovery, kept secret for decades. It made long-distance Atlantic navigation possible. Without that knowledge, the Age of Discovery does not happen — or happens much later, and perhaps not from Lisbon.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The tragedy of the commons — why shared resources get destroyed</strong>Garrett Hardin's 1968 essay "The Tragedy of the Commons" described something humans had been doing for millennia without having a name for it.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Individual rational behaviour + shared resource = collective destruction</li><li>Atlantic cod: fished to near-extinction by the 1990s despite everyone knowing the stocks were collapsing</li><li>The solution is either privatisation (give someone ownership so they have reason to protect it) or regulation (international agreements with enforcement)</li><li>Climate change is the ultimate tragedy of the commons — every country benefits from emitting, everyone shares the costs</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if the atmosphere is a commons that everyone is overusing, what would a fair solution look like? Who should have to cut emissions most — the countries that emitted most historically, or the countries emitting most today?</em></div>`:""}`},
  {emoji:"🌱",text:(id)=>`<p>Water is politics. Always has been.</p><p>The word "rival" comes from the Latin "rivalis" — meaning someone who uses the same river. From the beginning, water has caused conflict. And as climate change reduces fresh water availability and increases demand, water conflicts are becoming one of the defining geopolitical challenges of the 21st century.</p><p>But water is also cooperation. The Mekong River Commission manages the river shared by China, Myanmar, Laos, Thailand, Cambodia and Vietnam. The International Joint Commission manages the US-Canada border waters including the Great Lakes. The Rhine Action Programme cleaned up a river that ran through six countries and was once so polluted it caught fire. When countries choose to cooperate on water, remarkable things are possible.</p>
<div class="fact-pull"><strong>🌱 The Rhine caught fire — and came back</strong>In 1986 a fire at a Swiss chemical plant washed 30 tonnes of pesticides into the Rhine. Half a million fish died. The river turned red. It was a catastrophe — but it was also a turning point. The countries sharing the Rhine (Switzerland, France, Germany, Netherlands) agreed to the Rhine Action Programme, the most ambitious river clean-up in history. By 2000, Atlantic salmon — absent from the Rhine for 150 years — had returned. The Rhine is now one of Europe's cleanest major rivers. It took 14 years and six countries working together.</div>
<div class="portugal-pull"><strong>🇵🇹 The Guadiana — Portugal and Spain's shared river</strong>The Guadiana River forms part of the Portugal-Spain border before flowing to the Atlantic at the Algarve. It is one of Europe's most important examples of transboundary river management — and tension. Spain's upstream irrigation withdrawals affect water flows into Portugal. The Alqueva Dam (Portugal, 2002) created a reservoir that partially compensates for variable flows. The 1998 Albufeira Convention between Portugal and Spain is meant to guarantee minimum water flows — but droughts are testing it. Two EU member states, sharing a river, still struggling to agree on water.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Hydropolitics — water as a weapon of geopolitics</strong>Water has always been political. In the 21st century it is becoming a primary driver of international conflict.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Ethiopia's Grand Renaissance Dam reduces Nile flow to Egypt — Egypt has called it an "existential threat"</li><li>Turkey controls the headwaters of the Tigris and Euphrates — giving it leverage over Iraq and Syria</li><li>India and Pakistan dispute the Indus Waters Treaty signed in 1960 — it has survived three wars but climate stress is testing it</li><li>China controls the headwaters of the Mekong, Brahmaputra, Yellow and Yangtze rivers — giving it hydrological power over a dozen downstream countries</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: should international law treat water the same way as other shared resources? What would a "water rights" framework for shared rivers look like?</em></div>`:""}`}

  {id:"mekong",name:"Mekong",emoji:"🐟",continent:"Asia",length:"4,350km",flow:"16,000 m³/sec",basin:"795,000 km² across 6 countries",story:"The Mekong flows from the Tibetan Plateau through China, Myanmar, Laos, Thailand, Cambodia and Vietnam before emptying into the South China Sea. It supports the world's largest inland fishery — 70 million people depend on its fish as their primary protein source. The Tonle Sap lake in Cambodia expands to six times its dry-season size during the Mekong flood, creating one of the world's most productive freshwater fisheries. China has built 11 dams on the upper Mekong — affecting water levels, fish migration and sediment flows downstream.",portugal:"The Portuguese reached the Mekong delta region (present-day Vietnam) in 1516, establishing trading posts and the first European contacts with the kingdoms of mainland Southeast Asia. Portuguese missionaries developed the Romanised script (quoc ngu) still used as the Vietnamese alphabet — one of the most lasting legacies of Portuguese contact in Asia.",ks3:"China's dams on the upper Mekong have dramatically reduced dry-season flows and disrupted the seasonal flood pulse that the entire downstream fishery depends on. Research shows that Chinese dam operations can release or withhold water in ways that benefit Chinese agriculture while damaging downstream food security. This is a direct example of upstream hydrological power — the ability to control a shared resource without being accountable to those who depend on it. The Mekong River Commission exists, but China is not a member."},
  {id:"tagus",name:"Tagus (Tejo)",emoji:"🇵🇹",continent:"Europe (Iberia)",length:"1,007km — longest Iberian river",flow:"~400 m³/sec (highly variable)",basin:"80,600 km² across Portugal and Spain",story:"The Tagus begins in the mountains of eastern Spain and flows westward for over 1,000km before emptying into the Atlantic at Lisbon. It created the estuary that became one of Europe's finest natural harbours — the reason Lisbon exists where it does. Romans, Moors and Portuguese all recognised the strategic value of this location. Today the Tagus estuary (the Mar da Palha) is one of the most important wetland habitats in Europe, supporting hundreds of thousands of migrating birds each year.",portugal:"The Tagus is Portugal's river. It flows through or near Santarém, Abrantes, Vila Franca de Xira and Lisbon before meeting the Atlantic. The Vasco da Gama Bridge crosses it 17.2km upstream from the sea — the longest bridge in Europe. The Belém district, from which Portugal's great explorers sailed, sits at the river's mouth. The river's estuary gives Lisbon its remarkable light — the reason Lisbon is considered one of Europe's most photogenic capitals.",ks3:"The Tagus illustrates the geopolitics of transboundary rivers at a small scale. Spain and Portugal share the river under the 1998 Albufeira Convention, which guarantees minimum annual flows from Spain into Portugal. But climate change is reducing overall river flows, and Spanish irrigation in the upper basin (for one of Europe's most intensive agricultural regions) is increasing demand. Portugal has raised formal concerns about Spain not meeting minimum flow obligations. Two EU neighbours, bound by the same legal framework, still finding water sharing genuinely difficult."},

    {q:"Why did all the world's earliest civilisations begin next to rivers?",opts:["Because people liked the sound of running water","Because rivers provided fresh water, fish, fertile soil from flooding, and transport — everything needed to build a city","Because rivers were easier to defend than open land","Because rivers provided stones for building"],ans:1,fact:"Rivers provided the complete package for civilisation: drinking water, irrigation for crops, fish for food, annual floods that deposited rich soil, and transport for trade. The Egyptians, Mesopotamians, Indus Valley people and Chinese all independently discovered that river valleys were the best places to build civilisations — not because they copied each other but because rivers genuinely are the best locations. Remove the river and the civilisation collapses — as happened to the Indus Valley civilisation when its rivers changed course."},
