<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#0d0820;min-height:100vh;color:#eee}

.nav-tab{padding:7px 11px;border-radius:8px;border:none;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.73rem;cursor:pointer;transition:all .15s;background:transparent;color:#777}

.chapter-label{font-family:'Fredoka One',cursive;color:#b39ddb;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;opacity:.8}

.city-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}

.explorer-wrap{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:18px;padding:20px;margin-bottom:18px}

.q-text{font-size:0.97rem;font-weight:700;color:white;line-height:1.5;margin-bottom:12px}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.q-opt{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.09);border-radius:10px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all .15s;color:#ccc;text-align:left;line-height:1.35}
.q-opt:hover:not(:disabled){border-color:#b39ddb;background:rgba(179,157,219,0.07);color:white}
.q-opt.correct{background:rgba(46,125,50,0.22);border-color:#66bb6a;color:#a5d6a7}
.q-opt.wrong{background:rgba(198,40,40,0.18);border-color:#ef9a9a;color:#ef9a9a}
.q-fact{background:rgba(179,157,219,0.06);border:1px solid rgba(179,157,219,0.12);border-radius:8px;padding:9px;margin-top:8px;font-size:0.77rem;color:#e1bee7;line-height:1.55}
.score-dots{display:flex;gap:4px;margin-bottom:12px}
.sdot{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,0.09)}
.sdot.done{background:#66bb6a}.sdot.current{background:#f0b429}.sdot.wrong{background:#f44336}

.score-banner h2{font-family:'Fredoka One',cursive;color:#b39ddb;font-size:1.5rem;margin-bottom:6px}
.math-panel{background:rgba(240,180,41,0.04);border:1px solid rgba(240,180,41,0.12);border-radius:18px;padding:20px;margin-bottom:18px}
.challenge-card{background:rgba(255,255,255,0.04);border-radius:12px;padding:16px;margin-bottom:12px}
.ch-title{font-family:'Fredoka One',cursive;color:#f0b429;font-size:0.95rem;margin-bottom:6px}
.ch-story{font-size:0.87rem;color:#e1bee7;line-height:1.7;margin-bottom:10px;font-style:italic;padding-left:10px;border-left:2px solid rgba(240,180,41,0.25)}
.ch-q{font-size:0.95rem;font-weight:700;color:white;margin-bottom:8px}
.math-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.math-in{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:9px;padding:9px 13px;color:white;font-family:'Nunito',sans-serif;font-size:0.95rem;outline:none;width:180px}

.math-unit{color:#888;font-size:0.8rem}
.math-go{background:linear-gradient(135deg,#f57f17,#e65100);color:white;border:none;border-radius:22px;padding:8px 18px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer}
.math-ok{color:#a5d6a7;font-weight:700;margin-top:7px;font-size:0.88rem}
.math-no{color:#ef9a9a;margin-top:7px;font-size:0.82rem}
.math-fact{background:rgba(240,180,41,0.07);border-radius:8px;padding:9px;margin-top:7px;font-size:0.76rem;color:#ffe080;line-height:1.5}
.task-box{background:rgba(13,8,40,0.4);border:1px solid rgba(179,157,219,0.15);border-radius:18px;padding:20px;margin-bottom:18px}
.task-title{font-family:'Fredoka One',cursive;color:#b39ddb;font-size:1.1rem;margin-bottom:3px}
.task-level{font-size:0.68rem;color:#888;margin-bottom:10px}
.task-brief{font-size:0.87rem;color:#e1bee7;line-height:1.72;margin-bottom:12px}
.task-brief ul{padding-left:16px;margin:6px 0}
.task-brief li{margin-bottom:5px;color:#b39ddb}
.task-ta{width:100%;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.09);border-radius:10px;padding:12px 14px;color:white;font-family:'Nunito',sans-serif;font-size:0.88rem;min-height:120px;outline:none;resize:vertical}
.task-ta:focus{border-color:#b39ddb}
.task-btn{background:linear-gradient(135deg,#4a148c,#311b92);color:white;border:none;border-radius:22px;padding:9px 20px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;margin-top:8px}
.saved-ok{font-size:0.75rem;color:#b39ddb;margin-top:6px}
.back-btn{background:rgba(255,255,255,0.07);color:#ccc;border:1px solid rgba(255,255,255,0.12);padding:9px 18px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;margin-bottom:14px;display:inline-block;text-decoration:none}
.btn-purple{background:linear-gradient(135deg,#4a148c,#311b92);color:#e1bee7;border:none;border-radius:22px;padding:9px 18px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer}
.section-label{font-family:'Fredoka One',cursive;color:#b39ddb;font-size:0.78rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;opacity:.7}
.ks-tag{display:inline-block;background:rgba(179,157,219,0.07);border:1px solid rgba(179,157,219,0.13);color:#b39ddb;font-size:0.62rem;font-weight:800;padding:2px 8px;border-radius:20px;margin-bottom:10px;letter-spacing:.5px}
.ks-tag.ks3{background:rgba(240,180,41,0.07);border-color:rgba(240,180,41,.13);color:#f0b429}
.progress-overview{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:18px}
.prog-tile{background:rgba(255,255,255,0.03);border-radius:9px;padding:8px 3px;text-align:center;border:1px solid rgba(255,255,255,0.05)}
.prog-tile.done{border-color:rgba(179,157,219,0.35);background:rgba(179,157,219,0.06)}
.prog-icon{font-size:1.1rem}.prog-name{font-size:0.52rem;color:#555;margin-top:2px}
.prog-tile.done .prog-name{color:#b39ddb}
.pill{display:inline-block;background:rgba(255,255,255,0.06);border-radius:20px;padding:3px 10px;font-size:0.72rem;color:#aaa;margin-right:5px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
@media(max-width:600px){.profile-grid,.city-grid,.q-opts{grid-template-columns:1fr}.progress-overview{grid-template-columns:repeat(3,1fr)}}
</style>

<body>
<div class="wrap" id="app"></div>
<script>
const CHILDREN=[
  {id:"owl",name:"Owl",age:12,avatar:"🦉",ks:"KS3",level:"KS3 — Secondary Level"},
  {id:"cub",name:"Cub",age:9,avatar:"🐻",ks:"KS2",level:"KS2 — Primary Level"},
  {id:"bay",name:"Bay",age:7,avatar:"🌿",ks:"KS1",level:"KS1/KS2 — Foundation"}
];
const STORY=[
  {emoji:"🏙️",text:(id)=>`<p>Cities are where most humans live now — for the first time in history.</p><p>In 1800, only 3% of the world's population lived in cities. Today it's over 56%. By 2050, it will be nearly 70%. The shift from countryside to city is the biggest change in how humans live since we invented farming. And it happened mostly in the last 200 years.</p><p>Atlas looked at a city from above — any city — and saw the same thing every time: a centre, rings spreading outward, roads connecting everything like veins. But each city was also utterly unique. Because cities are shaped by the rivers that determined where they were built, the hills that decided where walls would go, the trade routes that made some places rich and others forgotten.</p>
<div class="fact-pull"><strong>🏙️ The world is going urban — fast</strong>In 1950 there were just 2 megacities (cities over 10 million people): New York and Tokyo. Today there are 35. By 2030 there will be 43. Tokyo is the largest city on Earth with 37 million people — bigger than the entire population of Canada. And the fastest growing cities right now? Almost all in Africa and Asia, where the urban shift is happening at a speed Europe and America never experienced.</div>
<div class="portugal-pull"><strong>🇵🇹 Lisbon — a city shaped by disaster</strong>Lisbon is one of Europe's oldest capitals, built on seven hills above the River Tagus. In 1755, an earthquake — one of the most powerful in European history — destroyed most of the city in minutes. What was rebuilt became one of the world's first planned cities: straight streets, earthquake-resistant buildings, the famous Pombaline Baixa grid that you can still walk today. Disaster made Lisbon modern, 250 years before most cities thought about urban planning.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Why do cities exist where they do? It's almost always the same reason.</strong>Every major city on Earth sits where it does for one of three reasons: a river crossing, a natural harbour, or a defensible hill. London: Thames crossing. Paris: Seine island. Lisbon: Tagus estuary. New York: natural harbour. Tokyo: bay. The geography came first. The city followed.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Rivers = fresh water + transport + trade = settlement</li><li>Harbours = sea trade = wealth = growth</li><li>Hills = defence = survival = permanence</li><li>Once a city exists, it creates its own gravity — more people attract more services attract more people</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: Lisbon was almost abandoned after the 1755 earthquake. The king wanted to move the capital. It wasn't. Why do you think cities almost never get abandoned even after catastrophes?</em></div>`:""}`},
  {emoji:"🌍",text:(id)=>`<p>Every city has its own personality — and that personality comes from its geography.</p><p>Cairo exists because of the Nile — the only reliable water source in a desert that stretches for thousands of kilometres. Without the Nile, Egypt simply does not exist. The ancient Egyptians understood this: they called the narrow green strip along the river "the gift of the Nile." Everything else was the Red Land — desert, death, nothing.</p><p>Mumbai is built on what was originally seven islands — connected over centuries by land reclamation until they became one peninsula. The city has been physically constructed out of the sea. It is the financial capital of India, home to Bollywood, packed with 20 million people in a space that should barely support a town.</p>
<div class="fact-pull"><strong>🌍 Cities that shouldn't exist — but do</strong>Dubai is a city built in a desert with almost no fresh water, no agricultural land, and until 1966, almost no money. It now has the world's tallest building, one of the world's busiest airports, and 3.5 million people. Las Vegas gets less than 100mm of rain per year (the Sahara gets more in places) but has fountains, golf courses and a permanent population of 650,000. Sometimes humans just decide geography doesn't apply to them.</div>
<div class="portugal-pull"><strong>🇵🇹 Porto — where the wine came from, and why</strong>Porto sits at the mouth of the Douro River, which flows from the mountains of Spain through Portugal to the Atlantic. The Douro Valley — upstream from Porto — is one of the oldest wine-producing regions in the world. For centuries, barrels of wine floated down the river on flat-bottomed boats called barcos rabelos to Porto, where they were aged in cellars in the suburb of Vila Nova de Gaia and shipped to Britain. Portugal's wine gave Porto its name to the world: port wine. Geography, river, trade, product, city — all one story.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The city that keeps growing even when it shouldn't</strong>São Paulo, Brazil: 22 million people. It has terrible traffic, flooding, air pollution, and massive inequality. So why do people keep moving there? Because the alternative — rural poverty in Brazil's northeast — is worse. This is called rural push / urban pull, and it drives almost all urban growth in the developing world.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>Push factors:</strong> lack of jobs, drought, mechanised farming replacing workers</li><li><strong>Pull factors:</strong> jobs (even low-paid ones), schools, hospitals, possibility</li><li>This creates <strong>megacity slums</strong> (favelas in Brazil, dharavi in Mumbai) — massive informal settlements with no planning permission</li><li>1 billion people on Earth currently live in informal settlements</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: is it better to try to improve life in the countryside so people don't leave, or to build better cities to absorb the people who do? There's no easy answer.</em></div>`:""}`},
  {emoji:"💰",text:(id)=>`<p>Not all cities are equal. Some are rich. Some are poor. And the gap between them is enormous.</p><p>The GDP of New York City alone is larger than the GDP of most countries in the world. London generates more economic output than most of sub-Saharan Africa combined. Tokyo's economy is bigger than Brazil's. A handful of global cities contain a wildly disproportionate share of the world's wealth, talent, and power.</p><p>This is not an accident. Cities become rich because they attract skilled workers, who attract companies, who attract more skilled workers. Economists call it <span class="hl">agglomeration</span> — the tendency for economic activity to cluster together and reinforce itself. Once a city gets ahead, it is very hard to catch up with it.</p>
<div class="fact-pull"><strong>💰 The currency game — how wild is it?</strong>There are 180 official currencies in the world. The US dollar is used in 65 countries as either the official or main practical currency. The euro is used by 20 countries. The British pound — currency of a country of 68 million people — is the world's oldest currency still in use, dating to 757 CE. And the currency with the most zeros? Zimbabwe printed a 100 trillion dollar note in 2009. It was worth about 40 US cents.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal and the Euro — what joining meant</strong>Portugal used the escudo for centuries before joining the euro in 1999. Switching currency was not just practical — it was a statement about belonging to Europe. Portugal is one of the poorer countries in Western Europe, and EU membership plus the euro brought investment, infrastructure and stability. But it also meant giving up control of interest rates and exchange rates — meaning Portugal cannot devalue its currency in a crisis the way it used to. The 2008 financial crisis hit Portugal hard partly for this reason.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Why some cities got rich and stayed rich — and what keeps others poor</strong>The gap between rich and poor cities is not about hard work or intelligence. It is about history, geography, and something called path dependency — the idea that where you start determines where you can go.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Cities that were on colonial trade routes got investment first — and that advantage compounded over centuries</li><li><strong>Agglomeration effect:</strong> skilled workers cluster together, which attracts companies, which attracts more workers — a self-reinforcing loop</li><li>Poor cities are often trapped: they need investment to attract workers but need workers to attract investment</li><li>Colonial extraction actively impoverished some cities to enrich others — that legacy persists today</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: Lagos in Nigeria has 15 million people and a massive economy — yet it is not counted as a "global city" by most economists. What do you think that tells us about how we measure and value cities?</em></div>`:""}`},
  {emoji:"🏛️",text:(id)=>`<p>Behind every great city is a monument that tells you what that city thinks matters.</p><p>The Pyramids of Giza tell you that ancient Egypt believed in eternal life so strongly they moved millions of tonnes of stone to prepare for it. The Colosseum in Rome tells you that Roman civilisation was built on spectacle and violence — 50,000 people watching gladiators fight to the death as public entertainment. The Eiffel Tower tells you that 19th century France believed in engineering as a form of national pride.</p><p>And the Jerónimos Monastery in Belém, Lisbon — built to celebrate Vasco da Gama's return from India — tells you that Portugal, in the 16th century, believed it had just changed the world. Because it had.</p>
<div class="fact-pull"><strong>🏛️ Monuments that changed their meaning</strong>The Eiffel Tower was originally meant to be torn down after 20 years — Parisians hated it when it was built in 1889. The Statue of Liberty was a gift from France to America in 1886, but the US government nearly refused it because nobody could afford to build the plinth. Stonehenge's purpose is still genuinely unknown — the most visited prehistoric monument in the world and we still don't know exactly what it was for. Monuments outlast their creators and their original meanings. They become what later generations decide they mean.</div>
<div class="portugal-pull"><strong>🇵🇹 The monument that Portugal built to say "we did this"</strong>The Tower of Belém and the Jerónimos Monastery both sit at the spot where the Tagus meets the Atlantic — the exact point where Portuguese explorers set sail and returned. They were built in the Manueline style, a uniquely Portuguese architectural style that wraps stone columns in ropes, coral, armillary spheres and sea creatures — literally putting the ocean into the architecture. Both are UNESCO World Heritage Sites. Walk through Jerónimos and you are walking through stone made from the profits of a global empire.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 What cities build tells you what they value. What they demolish tells you even more.</strong>Every generation inherits monuments from the previous one — and has to decide what to do with them. Statues of slave traders. Monuments to colonial generals. Memorials to leaders who committed atrocities.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>In 2020, protesters in Bristol (UK) pulled down the statue of Edward Colston, a slave trader, and threw it in the harbour</li><li>In Berlin, Nazi-era architecture has been largely demolished — but some preserved as a reminder</li><li>In Portugal, debate continues about how to memorialise the Age of Discovery given its role in colonialism and the slave trade</li><li>There is no neutral answer: keeping a statue endorses it, removing it erases history, context boards are a compromise nobody loves</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if you were in charge of Lisbon's public monuments, how would you handle the ones that celebrate explorers who also initiated the slave trade?</em></div>`:""}`},
  {emoji:"🌆",text:(id)=>`<p>The city of the future does not look like the city of the past.</p><p>Climate change is forcing cities to redesign themselves. Cities that flood need walls, or higher buildings, or to be moved. Cities that overheat need trees, green roofs, and buildings that reflect rather than absorb heat. Cities that choke on pollution need electric transport, cycling lanes, and pedestrianised centres.</p><p>Some cities are doing this brilliantly. Copenhagen aims to be the world's first carbon-neutral capital. Singapore has planted so many trees and green walls that it calls itself a "city in a garden." Rotterdam has built floating homes, water plazas, and underground reservoirs to manage the flooding that comes with being a city largely below sea level.</p>
<div class="fact-pull"><strong>🌆 The urban heat island effect — and why your city is hotter than the countryside</strong>Cities are consistently 1-3°C hotter than surrounding countryside — sometimes more. Tarmac and concrete absorb heat that forests and fields would reflect. Buildings trap air. Machinery generates heat. This creates an urban heat island that makes heatwaves in cities significantly more deadly. In the 2003 European heatwave, Paris reached 40°C and over 14,000 people died in France — most of them elderly city-dwellers. Green spaces, trees and reflective surfaces are now seen as essential infrastructure, not just decoration.</div>
<div class="portugal-pull"><strong>🇵🇹 Lisbon's wildfire and heat challenge</strong>Lisbon experienced its hottest day on record in July 2023 — 44°C. Portugal as a whole is one of the European countries most vulnerable to climate change: longer droughts, more extreme heat, and wildfire risk increasing every decade. Lisbon is working on urban greening — more trees, more parks, green corridors through the city — but the challenge is enormous. The city you live near is already adapting to a climate that is changing faster than any planning process can easily keep up with.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The city that decided to give the river back its space — and it worked</strong>Seoul, South Korea had a motorway running over a river through the city centre called the Cheonggyecheon. In 2005 they demolished the motorway, restored the river, and built a public greenway. Traffic engineers predicted gridlock. The opposite happened — traffic levels fell because people switched to public transport and walking.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>This is called <strong>induced demand in reverse</strong> — remove road space and some traffic simply disappears</li><li>The restored river lowered nearby temperatures by 3-5°C</li><li>Property values rose, tourism increased, air quality improved</li><li>The lesson: city planners often assume their city is fixed. It isn't. Cities can be fundamentally redesigned.</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if you could redesign one thing about the nearest city to where you live, what would have the biggest positive impact — and what would be the hardest obstacle to making it happen?</em></div>`:""}`}
];
const CITIES=[
  {id:"tokyo",name:"Tokyo",emoji:"🗼",country:"Japan",pop:"37 million (world's largest city)",founded:"1457 as Edo castle town",currency:"Japanese Yen (¥)",capital:"Yes — capital of Japan",famous:"Mount Fuji visible from city, world's busiest rail network, highest Michelin stars of any city",story:"Tokyo should not be the size it is. It sits on an active earthquake zone — the Great Kanto Earthquake of 1923 killed over 100,000 people, and the city was firebombed in WW2. Yet Tokyo rebuilt, twice, and became the world's largest city. Its success comes from extraordinary public transport (13 million daily metro journeys), extreme urban density making walking practical, and a culture of efficiency that makes the city function despite its scale. Tokyo has more Michelin-starred restaurants than Paris.",portugal:"The Portuguese were the first Europeans to reach Japan in 1543 — the word for playing cards in Japanese (karuta) comes from Portuguese (carta). Portuguese missionaries introduced Christianity to Japan. Japan then closed itself to all foreigners for 200 years — except Dutch and Chinese traders. The Portuguese footprint in Japan is tiny but linguistically permanent.",ks3:"Tokyo's earthquake vulnerability is a masterclass in hazard management. Japan invests billions in earthquake-resistant construction, early warning systems (that give 30-60 seconds warning before shaking — enough to stop trains and alert hospitals), and public education. In 2011, the Tohoku earthquake (M9.0) triggered a tsunami that killed 15,000 people — but the earthquake itself killed relatively few because the building standards were so high. Compare this to Haiti 2010 (M7.0) which killed 200,000+ in poorly constructed buildings. The death toll from earthquakes is largely a function of wealth, not geology."},
  {id:"cairo",name:"Cairo",emoji:"🏺",country:"Egypt",pop:"21 million — Africa's largest city",founded:"Founded 969 CE, but built on millennia of settlement",currency:"Egyptian Pound (E£)",capital:"Yes — capital of Egypt",famous:"Pyramids of Giza visible from city, River Nile, oldest Islamic city in the world",story:"Cairo exists because the Nile exists. Egypt is 96% desert — the entire population lives along the thin green strip of the Nile valley. Cairo sits at the point where the Nile fans out into its delta before reaching the Mediterranean. It has been one of the world's great cities for over a thousand years, and was the largest city in the world for several periods in medieval history. Modern Cairo is chaotic, vibrant, polluted, and culturally extraordinary.",portugal:"In the 15th century, Portuguese explorers were trying to find a sea route to India partly to bypass Cairo — which controlled the overland spice trade through Egypt. Vasco da Gama's successful route around Africa made Cairo less strategically crucial as a trade hub. The Age of Discovery, launched from Lisbon, indirectly weakened Cairo's economic position by creating an alternative route.",ks3:"Cairo illustrates the concept of water security as geopolitical power. The Nile flows through 11 countries before reaching Egypt — and Egypt has historically treated it as an Egyptian river. The construction of the Grand Ethiopian Renaissance Dam (GERD) by Ethiopia — which reduces the Nile's flow into Egypt — has created a genuine geopolitical crisis. Egypt has called it an existential threat. This water conflict illustrates a principle that will become increasingly important with climate change: freshwater scarcity creates political conflict."},
  {id:"mexico_city",name:"Mexico City",emoji:"🌮",country:"Mexico",pop:"22 million — largest Spanish-speaking city",founded:"1325 CE as Tenochtitlan by the Aztecs",currency:"Mexican Peso (MX$)",capital:"Yes — capital of Mexico",famous:"Built on ancient lake bed, sinking by 50cm per year in some areas, world's most densely served metro system",story:"Mexico City is built on a drained lake. The Aztecs built Tenochtitlan on an island in Lake Texcoco — when the Spanish conquered it in 1521 they drained the lake and built their city on top. The problem: the clay underneath is still compressing. Mexico City sinks by 50cm per year in some areas and has sunk 9 metres in total over the last century. The city's famous colonial buildings lean visibly. An entire metropolis is slowly subsiding into the ghost of the lake it was built to replace.",portugal:"The Treaty of Tordesillas (1494) — negotiated between Portugal and Spain with the Pope as mediator — divided the entire world between the two empires. The line ran through the Atlantic at approximately 46° west. Everything east went to Portugal; everything west to Spain. This is why Mexico speaks Spanish and Brazil speaks Portuguese — the line passed through eastern Brazil, putting it in Portugal's zone.",ks3:"Mexico City is a case study in urban sustainability failure — and the lessons are transferable everywhere. A city of 22 million people in a water-scarce region, built on an unstable foundation, in an earthquake zone, with chronic air pollution from altitude (2,240m above sea level means engines burn fuel less efficiently). The city extracts groundwater faster than it recharges, causing subsidence that damages infrastructure, which costs money to repair, which means less money for... groundwater management. This is a negative feedback loop with no easy exit."},
  {id:"lagos",name:"Lagos",emoji:"🌊",country:"Nigeria",pop:"15-20 million — Africa's fastest growing megacity",founded:"Originally a Yoruba fishing village; Portuguese trading post from 1472",currency:"Nigerian Naira (₦)",capital:"No — capital is Abuja (moved 1991). Lagos is the economic capital.",famous:"Fastest growing large city on Earth, major film industry (Nollywood), extraordinary street food culture",story:"Lagos is the city the 21st century belongs to. It is the most populous city in Africa, the fastest growing large city on Earth, and will be one of the world's largest cities by 2050. It sits on a series of islands and peninsulas connected by bridges, perpetually gridlocked, enormously creative, chaotic, and full of a young population that is inventing new things — in music, fashion, technology, film — faster than most cities on Earth. Nollywood (Nigeria's film industry) is the world's second largest by number of films produced.",portugal:"The Portuguese arrived in Lagos, Nigeria in 1472 — and named it after Lagos, the city in the Algarve where many of their expeditions launched. They established a trading post and, tragically, a slave trading operation. The Portuguese connection to Lagos, Nigeria goes back 550 years and is both a story of first contact and one of the darker chapters of Portuguese and world history.",ks3:"Lagos illustrates the concept of the demographic dividend — and why it matters enormously for the 21st century. Nigeria has a median age of 18. Over half the population is under 20. If these young people are educated and employed, they drive economic growth (as happened in South Korea and China). If they are not, they create political instability. The difference between these two outcomes is education policy, governance, and economic opportunity. Lagos is where this plays out most visibly — and the outcome will shape not just Nigeria but all of West Africa."},
  {id:"lisbon",name:"Lisbon",emoji:"🇵🇹",country:"Portugal",pop:"3 million in greater metro area",founded:"Possibly 3,000 years old — Phoenician, then Roman (Olisipo), then Moorish (Lixbuna)",currency:"Euro (€)",capital:"Yes — capital and largest city of Portugal",famous:"Built on 7 hills, survived massive 1755 earthquake, birthplace of fado music, start of the Age of Discovery",story:"Lisbon is the westernmost capital city in continental Europe and one of the oldest continuously inhabited cities anywhere. It has been Phoenician, Roman, Moorish, and Portuguese in turn — each culture leaving visible traces. The Alfama neighbourhood, with its steep alleys and azulejo tiles, retains the street pattern of the Moorish city. The Pombaline Baixa was designed after the 1755 earthquake as one of the world's first earthquake-resistant urban grids. And the Belém district is where the whole Atlantic world began.",portugal:"This is your city. The city on 7 hills, where the Tagus meets the Atlantic, where everything you've read about in this chapter connects. The city that was destroyed and rebuilt. That sent explorers to every corner of the world. That became a democracy in 1974. That now runs mostly on renewable energy. That gave the world the word 'saudade' and the music called fado and the pastéis de nata and the armillary sphere on the flag. You live in a city that has been changing the world for 3,000 years.",ks3:"Lisbon's 1755 earthquake is considered the birth of modern seismology, modern urban planning, and arguably modern philosophy. The earthquake, tsunami and fires killed up to 50,000 people in a city of 250,000. It destroyed Lisbon on All Saints' Day — churches full of worshippers collapsed. Philosopher Voltaire used it as evidence against the idea that we live in 'the best of all possible worlds.' The Marquis of Pombal rebuilt the city using the first systematic earthquake-resistant construction principles. Modern Lisbon is literally built on the intellectual and physical rubble of one of history's most transformative disasters."}

   brief:`<p>Write about your favourite city from the ones you've learned about (or Lisbon!). Tell us:</p>
<ul><li>What city and which country it's in</li><li>One amazing fact about it</li><li>What you'd most like to see or do there</li><li>Something that connects it to Portugal</li></ul>`,
   placeholder:"My favourite city is...\nIt is in...\n\nOne amazing fact:\n\nI'd most like to...\n\nIts connection to Portugal:"}
};
const SAVE_KEY="atlas_ch2_v1";
function defaultState(){const s={};CHILDREN.forEach(c=>{s[c.id]={storyPage:0,selectedCity:null,quizIdx:0,quizAnswers:[],quizDone:false,quizScore:0,mathInputs:{},mathAnswered:{},taskText:"",taskSaved:false,sectionsComplete:[]};});return s;}
function loadState(){try{const s=localStorage.getItem(SAVE_KEY);if(s)return{...defaultState(),...JSON.parse(s)};}catch(e){}return defaultState();}
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}}
let state=loadState();
let ui={view:"profiles",child:null,section:"story"};
function render(){
  const app=document.getElementById("app");const child=CHILDREN.find(c=>c.id===ui.child);
  let h=`<div class="hero"><h1>🌍 The Atlas Chronicles</h1><p>Chapter 2: Cities of the World</p><div class="ks-badges"><span class="ks-badge">📚 KS1 Bay</span><span class="ks-badge">📚 KS2 Cub</span><span class="ks-badge" style="background:rgba(240,180,41,0.1);border-color:rgba(240,180,41,0.2);color:#f0b429">📚 KS3 Owl</span></div></div>`;
  if(ui.view==="profiles")h+=renderProfiles();
  else if(ui.view==="learn"&&child)h+=renderLearn(child);
  app.innerHTML=h;
}
function renderProfiles(){
  let h=`<div class="section-label">Choose your explorer</div><div class="profile-grid">`;
  CHILDREN.forEach(c=>{const s=state[c.id];const comp=(s.sectionsComplete||[]).length;
    h+=`<div class="profile-card ${ui.child===c.id?"active":""}" onclick="selectChild('${c.id}')"><div style="font-size:2.8rem">${c.avatar}</div><div class="pname">${c.name}</div><div class="plevel">${c.level}</div><div class="pstars">${comp>0?"⭐".repeat(comp)+" ("+comp+"/5)":"Ready!"}</div></div>`;});
  return h+`</div>`;
}
function renderLearn(child){
  const s=state[child.id];const comp=s.sectionsComplete||[];
  const sections=[{id:"story",icon:"📖",name:"Story"},{id:"cities",icon:"🏙️",name:"Cities"},{id:"maths",icon:"📐",name:"Maths"},{id:"task",icon:"✍️",name:"Task"},{id:"quiz",icon:"✅",name:"Quiz"}];
  let h=`<a href="index.html" class="back-btn">← Home</a>`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:2rem">${child.avatar}</span><div><div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#b39ddb">${child.name} — Chapter 2</div><div style="color:#666;font-size:0.73rem">${child.level} · ⭐ ${comp.length}/${sections.length} done</div></div></div>`;
  h+=`<div class="progress-overview">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<div class="prog-tile ${done?"done":""}"><div class="prog-icon">${sec.icon}</div><div class="prog-name">${done?"✓ ":""}${sec.name}</div></div>`;});
  h+=`</div><div class="nav-tabs">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<button class="nav-tab ${ui.section===sec.id?"active":""} ${done?"done":""}" onclick="switchSection('${sec.id}')">${sec.icon} ${sec.name}</button>`;});
  h+=`</div>`;
  if(ui.section==="story")h+=renderStory(child,s);
  else if(ui.section==="cities")h+=renderCities(child,s);
  else if(ui.section==="maths")h+=renderMaths(child,s);
  else if(ui.section==="task")h+=renderTask(child,s);
  else if(ui.section==="quiz")h+=renderQuiz(child,s);
  return h;
}
function renderStory(child,s){
  const pg=Math.min(s.storyPage,STORY.length-1);const page=STORY[pg];const isLast=pg>=STORY.length-1;
  let h=`<div class="story-panel"><div class="chapter-label">Chapter 2 · Page ${pg+1} of ${STORY.length}</div><div class="story-h">Cities of the World</div><div class="story-emoji">${page.emoji}</div><div class="story-body">${page.text(child.id)}</div><div class="page-nav"><span class="page-ctr">${pg+1}/${STORY.length}</span>`;
  if(!isLast)h+=`<button class="cont-btn" onclick="nextPage()">Continue →</button>`;
  else h+=`<button class="cont-btn" onclick="completeSection('story');switchSection('cities')">Explore Cities! 🏙️</button>`;
  return h+`</div></div>`;
}
function renderCities(child,s){
  let h=`<div class="explorer-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">🏙️ ${child.ks}: Cities of the World</div><div class="explorer-title">🏙️ City Explorer</div><div class="explorer-sub">Click each city to explore — geography, culture, and Portugal connections</div><div class="city-grid">`;
  CITIES.forEach(c=>{h+=`<div class="city-card ${s.selectedCity===c.id?"selected":""}" onclick="selectCity('${c.id}')"><div class="city-emoji">${c.emoji}</div><div class="city-name">${c.name}</div><div class="city-sub">${c.country}</div></div>`;});
  h+=`</div>`;
  if(s.selectedCity){
    const city=CITIES.find(c=>c.id===s.selectedCity);
    if(city){
      h+=`<div class="city-detail"><div style="font-family:'Fredoka One',cursive;color:#b39ddb;font-size:1.2rem;margin-bottom:8px">${city.emoji} ${city.name}</div><div class="city-stats">`;
      [["👥 Population",city.pop],["📅 Founded",city.founded],["💰 Currency",city.currency],["🏛️ Capital",city.capital]].forEach(([l,v])=>{h+=`<div class="cstat"><div class="cstat-label">${l}</div><div class="cstat-val" style="font-size:0.76rem">${v}</div></div>`;});
      h+=`</div><div style="font-size:0.85rem;color:#e1bee7;line-height:1.65;margin-bottom:8px">${city.story}</div>`;
      h+=`<div class="portugal-pull"><strong>🇵🇹 Portugal Connection</strong>${city.portugal}</div>`;
      if(child.id==="owl")h+=`<div class="ks3-pull"><strong>🦉 ${city.name} — the bigger picture</strong>${city.ks3}</div>`;
      h+=`</div>`;
    }
    h+=`<div style="margin-top:12px;text-align:center"><button class="btn-purple" onclick="completeSection('cities');switchSection('maths')">Maths! 📐</button></div>`;
  } else h+=`<div style="text-align:center;padding:14px;color:#555;font-size:0.82rem">👆 Click any city to explore</div>`;
  return h+`</div>`;
}
function renderMaths(child,s){
  const id=child.id;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="math-panel"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">📐 ${child.ks}: City Maths</div><div style="font-family:'Fredoka One',cursive;color:#f0b429;font-size:1.2rem;margin-bottom:4px">📐 Cities in Numbers</div><div style="color:#777;font-size:0.78rem;margin-bottom:14px">Real data from the world's cities</div>`;
  chs.forEach((ch,idx)=>{
    const answered=s.mathAnswered&&s.mathAnswered[idx];const inputVal=(s.mathInputs&&s.mathInputs[idx])||"";
    h+=`<div class="challenge-card"><div class="ch-title">📐 ${ch.title}</div><div class="ch-story">${ch.story}</div><div class="ch-q">${ch.q}</div>`;
    if(!answered){h+=`<div class="math-row"><input class="math-in" type="text" value="${inputVal.replace(/"/g,'&quot;')}" placeholder="Answer..." oninput="updateMath(${idx},this.value)" onkeydown="if(event.key==='Enter')checkMath(${idx})"><span class="math-unit">${ch.unit}</span><button class="math-go" onclick="checkMath(${idx})">Check ✓</button></div>`;if(s.mathAnswered&&s.mathAnswered[idx]==="wrong")h+=`<div class="math-no">Not quite — try again!</div>`;}
    else{h+=`<div class="math-ok">✅ Correct!</div><div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 12px;font-size:0.78rem;color:#aaa;line-height:1.6;margin-top:6px"><strong style="color:#f0b429">Working:</strong> ${ch.working}</div><div class="math-fact">🤩 ${ch.fact}</div>`;}
    h+=`</div>`;});
  const allDone=chs.every((_,i)=>s.mathAnswered&&s.mathAnswered[i]==="correct");
  if(allDone)h+=`<div style="text-align:center;margin-top:12px"><button class="btn-purple" onclick="completeSection('maths');switchSection('task')">Do the Task! ✍️</button></div>`;
  return h+`</div>`;
}
function renderTask(child,s){
  const id=child.id;const task=TASKS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="task-box"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✍️ ${child.ks}: Writing Task</div><div class="task-title">${task.icon} ${task.title}</div><div class="task-level">${task.level}</div><div class="task-brief">${task.brief}</div><textarea class="task-ta" placeholder="${task.placeholder}" oninput="updateTask(this.value)">${s.taskText||""}</textarea><br><button class="task-btn" onclick="saveTask()">Save 💾</button>`;
  if(s.taskSaved)h+=`<div class="saved-ok">✅ Saved!</div>`;
  if((s.taskText||"").length>80)h+=`<div style="margin-top:10px"><button class="btn-purple" onclick="completeSection('task');switchSection('quiz')">Take the Quiz! ✅</button></div>`;
  return h+`</div>`;
}
function renderQuiz(child,s){
  const id=child.id;const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];const idx=s.quizIdx||0;
  if(s.quizDone||idx>=qs.length){
    const score=s.quizScore||0;const pct=Math.round((score/qs.length)*100);
    return`<div class="quiz-wrap"><div class="score-banner"><h2>Chapter 2 Complete! 🏙️</h2><div style="font-size:3rem;margin:8px 0">${pct>=80?"🏆":pct>=60?"⭐":"💪"}</div><div style="color:#ccc">${score}/${qs.length} (${pct}%)</div><div style="display:flex;gap:8px;justify-content:center;margin-top:12px"><button onclick="resetQuiz()" style="background:rgba(255,255,255,0.07);color:#ccc;border:1px solid rgba(255,255,255,0.12);padding:9px 18px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer">Try Again 🔄</button><a href="chapter3.html" class="btn-purple" style="padding:9px 18px;text-decoration:none">Chapter 3 → Into the Wild</a></div></div></div>`;
  }
  const q=qs[idx];const answers=s.quizAnswers||[];const thisAns=answers[idx];
  let h=`<div class="quiz-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✅ ${child.ks} Quiz</div><div class="section-label">Quiz · Q${idx+1} of ${qs.length}</div><div class="score-dots">`;
  qs.forEach((_,i)=>{const a=answers[i];h+=`<div class="sdot ${i===idx?"current":a===undefined?"":a===qs[i].ans?"done":"wrong"}"></div>`;});
  h+=`</div><div class="q-text">${q.q}</div><div class="q-opts">`;
  q.opts.forEach((opt,i)=>{let cls="q-opt";if(thisAns!==undefined){if(i===q.ans)cls+=" correct";else if(i===thisAns&&i!==q.ans)cls+=" wrong";}h+=`<button class="${cls}" ${thisAns!==undefined?"disabled":""} onclick="answerQuiz(${i})">${opt}</button>`;});
  h+=`</div>`;
  if(thisAns!==undefined){h+=`<div class="q-fact">🤩 ${q.fact}</div><div style="text-align:right;margin-top:8px"><button class="btn-purple" onclick="nextQuiz()">Next →</button></div>`;}
  return h+`</div>`;
}
function selectChild(id){ui.child=id;ui.view="learn";ui.section="story";render();}
function switchSection(s){ui.section=s;render();}
function completeSection(s){const comp=state[ui.child].sectionsComplete||[];if(!comp.includes(s))state[ui.child].sectionsComplete=[...comp,s];saveState();}
function nextPage(){if(state[ui.child].storyPage<STORY.length-1){state[ui.child].storyPage++;saveState();render();}}
function selectCity(id){state[ui.child].selectedCity=id;saveState();render();}
function updateMath(idx,v){if(!state[ui.child].mathInputs)state[ui.child].mathInputs={};state[ui.child].mathInputs[idx]=v;}
function checkMath(idx){
  const id=ui.child;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];const ch=chs[idx];
  const input=(state[id].mathInputs&&state[id].mathInputs[idx]||"").trim().replace(/,/g,"");
  const correctVal=ch.answer.replace(/,/g,"");
  const userNum=parseFloat(input);const correctNum=parseFloat(correctVal);
  const correct=!isNaN(userNum)&&!isNaN(correctNum)&&Math.abs(userNum-correctNum)/Math.max(correctNum,0.001)<0.05;
  if(!state[id].mathAnswered)state[id].mathAnswered={};state[id].mathAnswered[idx]=correct?"correct":"wrong";saveState();render();
}
function answerQuiz(i){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const idx=s.quizIdx||0;const q=qs[idx];
  const answers=[...(s.quizAnswers||[])];while(answers.length<=idx)answers.push(undefined);
  answers[idx]=i;if(i===q.ans)state[id].quizScore=(s.quizScore||0)+1;
  state[id].quizAnswers=answers;saveState();render();
}
function nextQuiz(){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const next=(s.quizIdx||0)+1;state[id].quizIdx=next;if(next>=qs.length)state[id].quizDone=true;saveState();render();
}
function resetQuiz(){const id=ui.child;state[id].quizIdx=0;state[id].quizAnswers=[];state[id].quizDone=false;state[id].quizScore=0;saveState();render();}
function updateTask(v){state[ui.child].taskText=v;}
function saveTask(){state[ui.child].taskSaved=true;saveState();render();}
render();
</script>
