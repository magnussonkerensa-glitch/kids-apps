<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Family Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0f;--s1:#0e1118;--s2:#141720;--s3:#1a1e28;
  --ac:#4fc3f7;--acd:rgba(79,195,247,0.12);--acg:rgba(79,195,247,0.25);
  --owl:#00e676;--cub:#b388ff;--bay:#ffd600;--mum:#4fc3f7;
  --t:#fff;--t2:rgba(255,255,255,0.55);--t3:rgba(255,255,255,0.25);
  --border:rgba(79,195,247,0.18);--border2:rgba(255,255,255,0.07);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t);
  max-width:430px;margin:0 auto;padding:0 0 40px}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.4}
.blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.blob1{width:350px;height:350px;background:rgba(79,195,247,0.07);top:-150px;right:-100px}
.blob2{width:300px;height:300px;background:rgba(0,230,118,0.05);bottom:50px;left:-100px}
.blob3{width:250px;height:250px;background:rgba(179,136,255,0.05);top:40%;left:40%}

.wrap{position:relative;z-index:1;padding:50px 24px 20px}

/* HEADER */
.header{text-align:center;margin-bottom:44px}
.header-emoji{font-size:3rem;display:block;margin-bottom:14px;
  filter:drop-shadow(0 0 20px rgba(79,195,247,0.4));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.header-title{font-size:1.8rem;font-weight:800;color:var(--ac);margin-bottom:4px;
  text-shadow:0 0 30px rgba(79,195,247,0.3)}
.header-sub{font-size:0.75rem;color:var(--t3);font-weight:600;letter-spacing:1.5px;text-transform:uppercase}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--border2);border-radius:20px;
  padding:18px 20px;margin-bottom:12px;display:flex;align-items:center;gap:16px;
  cursor:pointer;text-decoration:none;color:var(--t);transition:all .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.card.owl::before{background:var(--owl)}
.card.cub::before{background:var(--cub)}
.card.bay::before{background:var(--bay)}
.card.mum::before{background:var(--mum)}
.card:hover{transform:translateX(4px)}
.card.owl:hover{background:#0a1e14;border-color:rgba(0,230,118,0.25)}
.card.cub:hover{background:#120e1e;border-color:rgba(179,136,255,0.25)}
.card.bay:hover{background:#1a1800;border-color:rgba(255,214,0,0.25)}
.card.mum:hover{background:#081420;border-color:rgba(79,195,247,0.25)}

.card-avatar{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;overflow:hidden}
.card.owl .card-avatar{background:rgba(0,230,118,0.12);border:1px solid rgba(0,230,118,0.25)}
.card.cub .card-avatar{background:rgba(179,136,255,0.12);border:1px solid rgba(179,136,255,0.25)}
.card.bay .card-avatar{background:rgba(255,214,0,0.12);border:1px solid rgba(255,214,0,0.25)}
.card.mum .card-avatar{background:rgba(79,195,247,0.12);border:1px solid rgba(79,195,247,0.25)}

.card-info{flex:1}
.card-name{font-size:1.1rem;font-weight:800;margin-bottom:3px}
.card.owl .card-name{color:var(--owl)}
.card.cub .card-name{color:var(--cub)}
.card.bay .card-name{color:var(--bay)}
.card.mum .card-name{color:var(--mum)}
.card-sub{font-size:0.75rem;color:var(--t3);font-weight:500}
.card-owed{font-size:0.72rem;font-weight:700;margin-top:3px}
.card.owl .card-owed{color:rgba(0,230,118,0.7)}
.card.cub .card-owed{color:rgba(179,136,255,0.7)}
.card.bay .card-owed{color:rgba(255,214,0,0.7)}

.card-arrow{color:var(--t3);font-size:1.3rem;flex-shrink:0;transition:transform .2s}
.card:hover .card-arrow{transform:translateX(3px);color:var(--t2)}

footer{text-align:center;margin-top:28px;color:var(--t3);font-size:0.72rem;
  font-weight:500;letter-spacing:.5px;position:relative;z-index:1}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="wrap">
  <div class="header">
    <span class="header-emoji">🏠</span>
    <div class="header-title">Family Dashboard</div>
    <div class="header-sub">Choose a profile</div>
  </div>

  <a class="card owl" href="dashboard-owl.html">
    <div class="card-avatar">
      <svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="10" fill="#0e1a15"/>
        <ellipse cx="18" cy="26" rx="9" ry="8" fill="#1a5c3a"/>
        <ellipse cx="18" cy="28" rx="5" ry="5" fill="#2a7a50" opacity="0.6"/>
        <polygon points="18,24 16,25.5 16.5,27.5 18,27 19.5,27.5 20,25.5" fill="#ffd700" opacity="0.9"/>
        <ellipse cx="18" cy="16" rx="9" ry="8" fill="#1a5c3a"/>
        <polygon points="11,11 9,6 13,10" fill="#1a5c3a"/>
        <polygon points="25,11 27,6 23,10" fill="#1a5c3a"/>
        <rect x="10" y="8" width="16" height="3" rx="1.5" fill="#1a1a2e"/>
        <rect x="8" y="10" width="20" height="2" rx="1" fill="#111133"/>
        <polygon points="18,9 17,10 17.5,11 18,10.5 18.5,11 19,10" fill="#ffd700"/>
        <rect x="10" y="14" width="6" height="4" rx="2" fill="#111" opacity="0.95"/>
        <rect x="20" y="14" width="6" height="4" rx="2" fill="#111" opacity="0.95"/>
        <line x1="16" y1="16" x2="20" y2="16" stroke="#555" stroke-width="1"/>
        <rect x="10" y="14" width="6" height="4" rx="2" fill="none" stroke="#00e676" stroke-width="0.8" opacity="0.6"/>
        <rect x="20" y="14" width="6" height="4" rx="2" fill="none" stroke="#00e676" stroke-width="0.8" opacity="0.6"/>
        <path d="M15 21 Q18 23.5 21 21" stroke="#00e676" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <polygon points="18,19 16.5,21 19.5,21" fill="#f59e0b" opacity="0.9"/>
        <ellipse cx="10" cy="27" rx="4" ry="3" fill="#124a2e" transform="rotate(-20 10 27)"/>
        <ellipse cx="26" cy="27" rx="4" ry="3" fill="#124a2e" transform="rotate(20 26 27)"/>
      </svg>
    </div>
    <div class="card-info">
      <div class="card-name">Owl</div>
      <div class="card-sub">Open my dashboard</div>
      <div class="card-owed" id="owed-owl"></div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <a class="card cub" href="dashboard-cub.html">
    <div class="card-avatar">
      <svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="10" fill="#1a0f1e"/>
        <ellipse cx="18" cy="27" rx="9" ry="7" fill="#cc6600"/>
        <ellipse cx="18" cy="29" rx="5" ry="4" fill="#ffcc88" opacity="0.6"/>
        <ellipse cx="18" cy="16" rx="10" ry="9" fill="#ff8c00"/>
        <polygon points="10,10 7,5 13,9" fill="#ff8c00"/>
        <polygon points="26,10 29,5 23,9" fill="#ff8c00"/>
        <polygon points="10,10 8,7 13,9" fill="#ffb3b3"/>
        <polygon points="26,10 28,7 23,9" fill="#ffb3b3"/>
        <rect x="9" y="14" width="7" height="5" rx="2.5" fill="#1a0030" opacity="0.95"/>
        <rect x="20" y="14" width="7" height="5" rx="2.5" fill="#1a0030" opacity="0.95"/>
        <line x1="16" y1="16.5" x2="20" y2="16.5" stroke="#666" stroke-width="1"/>
        <rect x="9" y="14" width="7" height="5" rx="2.5" fill="none" stroke="#b388ff" stroke-width="0.8" opacity="0.7"/>
        <rect x="20" y="14" width="7" height="5" rx="2.5" fill="none" stroke="#b388ff" stroke-width="0.8" opacity="0.7"/>
        <ellipse cx="18" cy="21" rx="2.5" ry="1.8" fill="#cc3366"/>
        <path d="M15 23 Q18 26 21 23" stroke="#cc3366" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <line x1="7" y1="20" x2="13" y2="21" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="23" y1="21" x2="29" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="card-info">
      <div class="card-name">Cub</div>
      <div class="card-sub">Open my dashboard</div>
      <div class="card-owed" id="owed-cub"></div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <a class="card bay" href="dashboard-bay.html">
    <div class="card-avatar">
      <svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="10" fill="#1e1a00"/>
        <path d="M18 4 C8 4 4 12 4 20 C4 28 10 33 18 33 C26 33 32 28 32 20 C32 12 28 4 18 4 Z" fill="#4cce52"/>
        <path d="M18 4 C11 4 7 10 6 16" stroke="rgba(255,255,255,0.25)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <line x1="18" y1="6" x2="18" y2="30" stroke="#3ab840" stroke-width="1.5" opacity="0.4"/>
        <circle cx="13" cy="19" r="4.5" fill="#1a0000" opacity="0.92"/>
        <circle cx="23" cy="19" r="4.5" fill="#1a0000" opacity="0.92"/>
        <line x1="17.5" y1="19" x2="18.5" y2="19" stroke="#555" stroke-width="1"/>
        <circle cx="13" cy="19" r="4.5" fill="none" stroke="#ffd600" stroke-width="0.9" opacity="0.7"/>
        <circle cx="23" cy="19" r="4.5" fill="none" stroke="#ffd600" stroke-width="0.9" opacity="0.7"/>
        <circle cx="18" cy="24" r="1.5" fill="#2a8a30"/>
        <path d="M14 27 Q18 30 22 27" stroke="#1a5500" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="card-info">
      <div class="card-name">Bay</div>
      <div class="card-sub">Open my dashboard</div>
      <div class="card-owed" id="owed-bay"></div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <a class="card mum" href="dashboard-mum.html">
    <div class="card-avatar" style="font-size:1.6rem">👩</div>
    <div class="card-info">
      <div class="card-name">Mum</div>
      <div class="card-sub">View all kids & approve chores</div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <footer>Family Dashboard · Updated live 💙</footer>
</div>

<script>
['owl','cub','bay'].forEach(kid=>{
  try{
    const m=JSON.parse(localStorage.getItem(kid+'_money')||'{}');
    const t=m.t||0;
    if(t>0){
      const el=document.getElementById('owed-'+kid);
      if(el)el.textContent='💰 €'+t.toFixed(2)+' earned';
    }
  }catch(e){}
});
</script>
</body>
</html>
