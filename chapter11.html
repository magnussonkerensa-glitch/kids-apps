<body>
<div class="wrap" id="app"></div>
<script>
const CHILDREN=[
  {id:"owl",name:"Owl",age:12,avatar:"🦉",ks:"KS3",level:"KS3 — Secondary Level"},
  {id:"cub",name:"Cub",age:9,avatar:"🐻",ks:"KS2",level:"KS2 — Primary Level"},
  {id:"bay",name:"Bay",age:7,avatar:"🌿",ks:"KS1",level:"KS1/KS2 — Foundation"}
];
const STORY=[
  {emoji:"🌡️",text:(id)=>`<p>The planet is sending signals. We built the instruments to read them.</p><p>Earth's average temperature has risen 1.2°C since pre-industrial times. That sounds small. It isn't. The difference between today's average temperature and the last ice age — when ice sheets covered most of Europe and North America — is about 5°C. A 1.2°C rise in average temperature is already producing measurable changes: glaciers retreating, seas rising, weather patterns shifting, ecosystems moving towards the poles.</p>
<div class="fact-pull"><strong>🌡️ Climate change — what 1.2°C actually means on the ground</strong>Record wildfires in Australia (2019-20), Canada (2023), Portugal (2017, 2022). Record flooding in Pakistan (2022 — one-third of the country underwater). Arctic temperatures 30°C above normal in 2022. Coral bleaching on 50% of the Great Barrier Reef. Extreme heat events that would have been almost impossible without climate change are now occurring regularly. The science is clear: climate change is not a future problem. It is a present one. The question is how much worse we allow it to get.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal — already living the climate future</strong>Portugal is experiencing climate change faster than the European average. Summer temperatures regularly exceed 40°C in the Alentejo and Algarve. The 2017 and 2022 wildfire seasons were catastrophic — destroying hundreds of thousands of hectares and killing people. Winter rainfall is declining in the south. The Tagus and Douro rivers carry less water each decade. Portugal is not a future climate scenario — it is a present reality that shows what Mediterranean Europe will increasingly look like.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Tipping points — why 1.5°C matters more than 2°C</strong>Climate change is not linear. Beyond certain thresholds, systems can shift rapidly and irreversibly to new states.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>West Antarctic Ice Sheet:</strong> may be destabilised above 1.5°C — contributing up to 3.3m sea level rise over centuries</li><li><strong>Amazon dieback:</strong> deforestation + warming could convert the Amazon to savanna, releasing stored carbon and accelerating warming</li><li><strong>Permafrost thaw:</strong> releases methane (80x more potent than CO2 over 20 years) — currently estimated to add 0.3-0.4°C beyond current projections</li><li><strong>AMOC weakening:</strong> could cool northwest Europe even as global temperatures rise</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if multiple tipping points are triggered simultaneously (a cascade), the climate system could shift rapidly beyond any level of human intervention. What level of risk is acceptable when the consequences are potentially irreversible?</em></div>`:""}`},
  {emoji:"⚡",text:(id)=>`<p>The good news: we know how to fix the energy problem. We have the technology. The question is whether we deploy it fast enough.</p><p>Renewable energy has undergone one of the most dramatic cost reductions in technological history. Solar power costs have fallen 99% since 1976. Wind power costs have fallen 90% since 1980. Both are now cheaper than coal or gas in most of the world. The barrier to a zero-carbon energy system is no longer technology or cost — it is the speed of deployment and the political will to phase out fossil fuels that still power enormous economic interests.</p>
<div class="fact-pull"><strong>⚡ The renewable revolution — in numbers</strong>In 2010, renewables were 1% of global electricity. By 2023, they were over 30%. Solar power capacity doubled between 2020 and 2023 alone. Electric vehicle sales hit 18% of all new car sales globally in 2023. The International Energy Agency, which was consistently too pessimistic about renewable growth, now says renewable capacity additions are the fastest in energy history. The transition is happening — but not yet fast enough to meet Paris Agreement targets.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal as a renewable energy model</strong>Portugal consistently generates 50-65% of its electricity from renewables, with peaks above 100% (exporting the surplus to Spain). In April 2023, Portugal ran entirely on renewable energy for 6 consecutive days. The country has invested heavily in offshore wind (the Atlantic coast is one of the world's best offshore wind resources), solar (averaging 2,800+ sunshine hours per year), and hydroelectric. Portugal is on track for 80% renewable electricity by 2030 and net zero by 2045. For a small country, this is remarkable ambition being turned into reality.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The just transition — who pays the cost of decarbonisation?</strong>Decarbonisation involves destroying enormous amounts of existing capital: coal mines, oil fields, gas pipelines, petrol cars. The people who own these assets will resist, and the workers who depend on them need alternatives.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Polish coal mining communities, German lignite workers, oil workers in Alberta — all facing job losses from decarbonisation</li><li>"Just Transition" frameworks aim to ensure the costs fall equitably rather than on the most vulnerable workers</li><li>Developing countries argue they should not be forced to give up cheap fossil fuels that wealthy countries used to develop</li><li>The global Loss and Damage fund (COP27, 2022) is a first step toward climate finance for vulnerable countries</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if India argues it has the same right to develop using cheap coal that Britain used in the 19th century, what is the counter-argument — and is it convincing?</em></div>`:""}`},
  {emoji:"🌊",text:(id)=>`<p>Some climate change is now unavoidable. The question is how much more we add.</p><p>The carbon already in the atmosphere will warm the planet for decades even if all emissions stopped today. Sea level rise already committed by current warming is estimated at 20-30cm by 2100 even in the most optimistic scenarios. This means adaptation — changing how we live to deal with climate change that is already locked in — is as important as mitigation (reducing emissions).</p><p>Coastal cities will need sea walls or managed retreat. Farmers in southern Europe will need drought-resistant crops and irrigation. Urban designers will need to make cities cooler. Migration from the most vulnerable areas is already happening and will increase. Every country, every city, every farm needs a climate adaptation plan.</p>
<div class="fact-pull"><strong>🌊 Sea level rise — the slow catastrophe</strong>Global average sea level has risen approximately 20cm since 1900. The rate is accelerating: the rate of rise in 2013-2022 was 4.5mm per year — more than double the 1971-2006 rate. By 2100, sea level is projected to rise 0.5-1.0m in a mid-range scenario, 1.5-2.0m in a high-emission scenario. The countries most at risk: the Netherlands, Bangladesh, Vietnam, Egypt's Nile Delta, small island states (Maldives, Tuvalu, Marshall Islands). Portugal's Algarve coast is directly affected — beaches are already narrowing.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal's climate adaptation challenges</strong>Portugal faces three main climate adaptation challenges. First, wildfires: the government has invested in forest management, native reforestation (replacing eucalyptus), and early warning systems. Second, water security: the south faces increasing drought — the Alqueva dam system is critical, and water pricing and agricultural reform are needed. Third, coastal erosion: sea level rise and stronger storms are accelerating erosion of the Algarve and Costa Vicentina coastlines. Portugal has a National Adaptation Strategy, but implementation is uneven. The mismatch between the pace of climate change and the pace of policy response is a global problem that Portugal exemplifies.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Climate attribution science — we can now prove specific events were made worse by climate change</strong>A new field of science allows researchers to calculate how much more likely a specific weather event was because of climate change.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>The 2021 Pacific Northwest heat dome (50°C in Canada): "virtually impossible" without climate change</li><li>The 2019-20 Australian bushfires: at least 30% more likely due to climate change</li><li>The 2022 Pakistan floods: made 50% more likely by climate change</li><li>This matters legally: attribution science is being used in climate litigation — companies and governments are being sued for climate damages with scientific evidence</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if attribution science can prove a specific flood was 50% more likely because of emissions, should the companies that produced those emissions be legally liable for the damage? What would a fair liability framework look like?</em></div>`:""}`},
  {emoji:"✊",text:(id)=>`<p>Nothing in the history of climate action has moved faster than the last five years. And it is still not fast enough.</p><p>The Paris Agreement (2015) committed nearly every country in the world to limiting warming to well below 2°C. Current policies put us on track for 2.5-3°C. The gap between commitment and action is wide, but it is narrowing — global emissions growth has slowed significantly from the pre-2015 trajectory. The energy transition is accelerating. Electric vehicles are disrupting the car industry. Coal use is declining in most developed countries.</p><p>But the hardest parts remain. Aviation, shipping, cement, steel — sectors where decarbonisation is technically difficult. Agricultural methane. Political resistance from fossil fuel interests. Coordination failures between nations. And the clock: every year of delay narrows the remaining carbon budget.</p>
<div class="fact-pull"><strong>✊ Youth climate movements — what they actually achieved</strong>Greta Thunberg's school strike began in August 2018 — one teenager outside the Swedish Parliament. By September 2019, the Global Climate Strike brought an estimated 4 million people onto streets in 161 countries — the largest climate protest in history. Did it work? The evidence is mixed: political rhetoric intensified; some policy changed; many commitments remain unmet. But the movement raised the salience of climate change for an entire generation and shifted what politicians believed they could say without being challenged. Movements create the political conditions for change — they rarely produce change directly.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal — what young people are actually doing about climate</strong>Portugal has some of Europe's most active youth climate movements. Portuguese young people have been central to European climate litigation — the landmark Duarte Aguilar et al v. 33 European states case was brought by six young Portuguese people, citing the wildfires of 2017 as evidence of climate harm. The European Court of Human Rights agreed to hear the case — a major step toward climate accountability. Six young people from Portugal potentially changed European climate law. Agency is real.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The politics of climate — why it's so hard to solve a problem everyone acknowledges</strong>Climate change is the clearest possible example of a collective action problem — the tragedy of the commons at a global scale.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Every country benefits from emitting; everyone shares the warming costs</li><li>The benefits of emission (economic growth) are immediate; the costs (warming) are delayed and diffuse</li><li>Democratic governments face election cycles of 4-5 years; climate change operates on century timescales</li><li>Fossil fuel companies have invested billions in political lobbying and disinformation — delaying action by decades</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if democratic governments struggle to act on long-term problems, does climate change reveal a fundamental limitation of democracy — or does it reveal the influence of money in democratic systems? These are different problems with different solutions.</em></div>`:""}`},
  {emoji:"🌱",text:(id)=>`<p>There will be a future. The question is what kind.</p><p>Climate change is not a binary — it is not "catastrophe or fine." Every fraction of a degree of warming that is avoided represents millions of lives, billions of dollars, and irreplaceable ecosystems. Every year of delay matters. Every policy change matters. Every decision to deploy renewable energy rather than fossil fuels matters. The future is not fixed. It is being made now, by decisions being taken by governments, companies, and individuals — including decisions made by people your age about what kind of future they want to inherit and create.</p>
<div class="fact-pull"><strong>🌱 The solutions exist — they just need to be deployed</strong>The IPCC's synthesis report (2023) is clear: we have all the technologies needed to limit warming to 1.5°C. Solar, wind, batteries, heat pumps, electric vehicles, reforestation, building efficiency, sustainable agriculture — all the pieces exist. The barrier is not technical; it is political, economic, and social. This is both more frustrating (we could solve this if we chose to) and more hopeful (we don't need to wait for an invention) than people often assume. The climate crisis is a crisis of political will and economic incentives, not of scientific knowledge or technological capability.</div>
<div class="portugal-pull"><strong>🇵🇹 What Portugal's children will inherit — and what they can change</strong>The children growing up in Portugal today will see average temperatures 2-3°C higher, longer fire seasons, less water in summer, and higher sea levels — even in the most optimistic scenarios. They will also inherit a country that has already made significant progress on renewables, that has the most active climate litigation in Europe, and that sits in a language community of 264 million people with enormous renewable energy potential. The Portugal of 2050 will be shaped more by decisions made in the next decade than by anything that has happened before. The Atlas Chronicles ends here — but the story is yours to write.</div>

const SOLUTIONS=[
  {id:"renewables",name:"Renewable Energy",emoji:"⚡",status:"Deployed and growing fast",potential:"Could provide 100% of global electricity",story:"Solar and wind power have achieved something economists called impossible: costs have fallen so far and so fast that they are now the cheapest forms of new electricity generation in most of the world. Solar power costs fell 99% between 1976 and 2023. Wind costs fell 90%. Both are now cheaper than coal or gas in most conditions. Global renewable electricity generation is growing at record rates. The challenge is no longer cost or technology — it is the speed of deployment, grid integration, and energy storage.",portugal:"Portugal is a world leader in renewable deployment — consistently generating 50-65% of its electricity from wind, solar and hydro. In April 2023, Portugal ran for 6 consecutive days on 100% renewable electricity. The country is developing major offshore wind projects in the Atlantic. Its geography — sunny, windy, with a large exclusive economic zone — makes it naturally suited to become a renewable energy exporter.",ks3:"The renewable revolution is an example of learning curves and technology diffusion. Learning curves describe how costs fall predictably as cumulative production increases — solar's 99% cost fall followed a predictable learning curve. This matters: it means future cost trajectories are estimable. Offshore wind, green hydrogen, and grid-scale batteries are all on similar learning curves. The policy implication: early investment in deployment accelerates learning, reducing costs for everyone. Countries that deploy early gain both economic advantage and contribute to global cost reductions."},
  {id:"forests",name:"Nature-Based Solutions",emoji:"🌳",status:"Available now, underfunded",potential:"Could provide up to 30% of needed emission reductions",story:"Forests, wetlands, grasslands and oceans absorb enormous quantities of carbon. Protecting existing forests and restoring degraded ones could contribute up to 30% of the emissions reductions needed by 2030. Rewilding — restoring ecosystems to allow natural carbon sequestration — is one of the cheapest and most co-beneficial climate solutions: it reduces emissions, protects biodiversity, improves water cycles, and provides recreational value. The Amazon, Congo Basin and Boreal forests are particularly important.",portugal:"Portugal is Europe's most forested country by percentage. However, its forests are dominated by eucalyptus and maritime pine — both highly flammable and not native. The transition to native oak and cork forests (montado ecosystem) would: sequester more carbon, dramatically reduce wildfire risk, support biodiversity, and protect watersheds. Portugal's government has committed to reforestation with native species, but implementation is slow. The Faia Brava rewilding project in the Côa Valley shows what's possible.",ks3:"Nature-based solutions raise genuine questions about additionality and permanence. A forest planted today to offset emissions needs to survive for decades to actually 'offset' anything. The history of carbon offset programmes is littered with forests that burned, were cut, or were never planted. Rigorous measurement, reporting and verification (MRV) is essential. The Voluntary Carbon Market (currently worth ~$2bn/year) has serious integrity problems. Nature-based solutions are real and important — but claims about their potential are often overstated by interests that want to avoid cutting actual emissions."},
  {id:"food",name:"Food Systems Transformation",emoji:"🥗",status:"Technically possible, socially complex",potential:"25% of global emissions from food — major reduction possible",story:"Food systems are responsible for approximately 25% of global greenhouse gas emissions — more than all the world's electricity generation. Most comes from: beef and dairy (methane from livestock and land use change for pasture), rice cultivation (methane from flooded paddies), food waste (30% of all food produced is wasted), and deforestation for agriculture. The solutions: less meat (especially beef), less food waste, precision fermentation (lab-grown meat), sustainable agriculture practices, and protecting tropical forests. None of these require giving up good food — but they do require changing patterns that are deeply embedded in culture.",portugal:"Portugal has a traditionally Mediterranean diet — olive oil, fish, vegetables, legumes, moderate meat. This is one of the world's healthiest and lowest-carbon diets. However, Portuguese meat consumption has risen toward European averages over recent decades. Fish consumption is very high — Portugal is one of the world's largest per-capita fish consumers — which is generally low-carbon but raises sustainability questions for specific fish species. The traditional Portuguese diet is actually a low-carbon diet. The challenge is maintaining it against the cultural pressure toward high-meat consumption.",ks3:"Agricultural emissions present a particularly difficult political economy problem. Unlike electricity (where renewables are now cheaper), there is no simple technical fix that makes beef carbon-neutral while tasting the same. Behaviour change is required — and behaviour change involving food, which is deeply cultural, is slow and contested. The political science term is 'contested consumption': when addressing a problem requires changing what people eat, wear, or do for pleasure, the backlash is much stronger than when it involves switching energy sources. This is why carbon taxes on food are politically toxic in most countries."},
  {id:"cities",name:"Smart Cities and Buildings",emoji:"🏙️",status:"Technology available, investment needed",potential:"Buildings produce 38% of global emissions",story:"Buildings are responsible for approximately 38% of global greenhouse gas emissions — heating, cooling, lighting and construction. Most of this is unnecessary: buildings in Europe and North America lose enormous amounts of energy through poor insulation, inefficient heating systems, and single-glazed windows. The solutions — insulation, heat pumps, triple glazing, green roofs, smart energy management — all exist and are economically beneficial over their lifetimes. The barrier is the upfront cost of retrofitting existing buildings.",portugal:"Portuguese buildings are notoriously energy-inefficient. Traditional Portuguese construction used thermal mass (thick walls) for passive cooling — effective and beautiful. Modern Portuguese buildings often have large windows, poor insulation, and no thermal mass — expensive to heat and cool. Portugal's building renovation programme aims to retrofit millions of homes, combining EU structural funds with new regulations. Lisbon's urban greening programme — more trees, green corridors, green roofs — is an example of climate adaptation integrated with urban design.",ks3:"Buildings present a 'split incentive' problem: landlords pay for insulation but tenants pay heating bills — so neither has sufficient incentive to invest. This market failure is a classic justification for regulation. Building standards (minimum insulation requirements) and subsidy programmes (heat pump grants, insulation subsidies) are the standard policy responses. Germany's Energiewende (energy transition) has the world's most comprehensive building renovation programme. The UK's failed Green Deal (poorly designed subsidies) shows how these programmes can go wrong."},
  {id:"politics",name:"Climate Politics and Policy",emoji:"🗳️",status:"Improving but insufficient",potential:"Policy change is the highest-leverage intervention",story:"Climate policy — carbon taxes, renewable energy standards, building regulations, aviation taxes, fossil fuel subsidy removal — is the highest-leverage climate intervention. Individual actions matter at the margin; systemic change requires policy. The good news: climate policy has dramatically improved in the last decade. The EU's Emissions Trading System, the US Inflation Reduction Act (2022), China's renewable energy expansion — all represent substantial progress. The bad news: current policies are still consistent with 2.5-3°C of warming. The gap between where we are and where we need to be is large but closing.",portugal:"Portugal has been a positive contributor to EU climate ambition — supporting strong EU emissions targets and renewable mandates. Its domestic policies (carbon tax, renewable energy targets, nature restoration) are among the more ambitious in the EU. The landmark European Court of Human Rights case brought by young Portuguese people (Duarte Aguilar et al) may have lasting impact on climate law across Europe. Portugal demonstrates that small countries can punch above their weight on climate ambition.",ks3:"The economics of climate policy has been transformed by one key insight: decarbonisation is not economically costly — it is economically beneficial. The Stern Review (2006) argued the benefits of climate action far exceed the costs. The IEA now says the clean energy transition will create more jobs than it destroys. The political economy therefore depends on transitional costs — who loses their jobs in the short term — rather than aggregate costs. This is the 'just transition' challenge: managing the transition fairly so that the workers and communities who bear short-term costs receive adequate support."},
  {id:"youth",name:"Youth and Climate Action",emoji:"🌱",status:"Growing rapidly",potential:"Creates political conditions for systemic change",story:"The youth climate movement — triggered by Greta Thunberg's school strikes in 2018 — has been one of the most significant social movements of the 21st century. 4 million people in 161 countries striking in September 2019 represented a generation asserting its right to a liveable future. The movement's legacy is mixed: it changed political rhetoric, influenced some policies, and created a generation of climate-literate young people. It did not, by itself, change the trajectory of emissions. Social movements create political conditions; they rarely produce change directly. They are necessary but not sufficient.",portugal:"Portugal's youth climate movement includes some of Europe's most legally consequential climate action. The Duarte Aguilar case — six young Portuguese people suing 33 European governments for inadequate climate action — was admitted by the European Court of Human Rights in 2023. This is the furthest any climate human rights case has advanced in European courts. Win or lose, the case has established the legal principle that inadequate climate action can violate human rights. Six Portuguese young people may have changed the course of European climate law.",ks3:"The youth climate movement raises a political philosophy question: does civil society action (protests, litigation, advocacy) or electoral politics produce more durable change? Historical evidence suggests they work together: movements that lack electoral expression rarely achieve lasting policy change; electoral politics without social movement pressure tends to preserve the status quo. The most effective change agents have combined both — the civil rights movement, the feminist movement, and the environmental movement all operated in both arenas simultaneously."}

    {q:"Why is the 'just transition' concept necessary for successful climate policy?",opts:["Because only rich people can afford to buy electric cars","Because decarbonisation involves destroying existing fossil fuel assets and employment, and without deliberate policy to support affected workers and communities, the political coalition for climate action will collapse as fossil fuel workers resist a transition that imposes all the costs on them while distributing benefits broadly. Just transition frameworks are therefore both ethically necessary and politically strategic.","Because developing countries need financial support to build renewable energy","Because the climate transition creates no new jobs"],ans:1,fact:"The just transition concept recognises a basic political economy reality: diffuse benefits (everyone benefits from less warming) are politically weaker than concentrated costs (miners losing jobs are a specific, organised interest group). Without deliberate support for affected workers — retraining, income support, community investment — the political opposition to decarbonisation from fossil fuel communities will successfully slow or block the transition. The EU's Just Transition Fund and the US Inflation Reduction Act's investment in fossil fuel communities both reflect this insight."},
    {q:"How does climate attribution science change the legal and political landscape for climate action?",opts:["It only has academic significance — no practical applications","By allowing scientists to calculate how much more likely specific extreme weather events were due to climate change, attribution science creates the evidential basis for climate litigation: lawsuits against governments for inadequate climate policy and against fossil fuel companies for knowingly causing climate damage. The Portuguese climate case, Australia's climate litigation, and suits against major oil companies are all built on attribution science evidence.","It proves that all extreme weather events are caused by climate change","It shows that climate change has no effect on extreme weather"],ans:1,fact:"Climate attribution science is transforming the legal landscape. In 2023, the US state of Montana lost a lawsuit brought by young people on the grounds that its fossil fuel policies violated their constitutional right to a clean environment. The EU's highest court ruled in 2024 that states have human rights obligations regarding climate. The Duarte Aguilar case at the European Court of Human Rights (brought by six young Portuguese people) may establish that inadequate climate policy violates human rights across 33 European states. Scientific attribution transforms moral claims into legally actionable ones."},
    {q:"Why have solar and wind power costs fallen so dramatically — and what does the learning curve concept predict about future climate technologies?",opts:["Government subsidies artificially reduced the price","Learning curves describe how manufacturing costs fall predictably as cumulative production increases — more manufacturing experience produces efficiency gains. Solar followed a consistent learning curve (costs halving every time cumulative production doubled) for decades. The policy implication: early deployment accelerates learning for everyone, reducing future costs. Technologies currently on steep learning curves — offshore wind, green hydrogen, grid batteries — should follow similar trajectories if deployment is supported.","The materials in solar panels became much cheaper","Competition from China is the only reason renewables became cheap"],ans:1,fact:"Learning curves (Wright's Law) are one of the most powerful predictive tools in technology economics. Solar has followed a strikingly consistent learning curve: every time cumulative solar capacity doubled, costs fell by approximately 20%. This happened for over 40 years — from 1976 to 2023. The policy insight: early deployment creates cost reductions that benefit all future deployment. Countries that invested in renewables early (Germany, Denmark, Portugal) helped reduce costs for the entire world. The same logic applies to green hydrogen, offshore wind, and grid-scale batteries — deploying them now reduces costs for the future."},
    {q:"The Portuguese Duarte Aguilar climate case was admitted by the European Court of Human Rights. What is its potential significance?",opts:["It has no significance outside Portugal","If successful, it could establish the legal principle that governments across 33 European states have human rights obligations to take adequate climate action — creating a legally enforceable standard for climate policy that goes beyond current voluntary commitments. Even if unsuccessful, it has advanced climate human rights law by bringing the question to the highest European court.","It will only require Portugal to change its climate policy","It is a symbolic gesture with no legal consequence"],ans:1,fact:"The Duarte Aguilar case represents the most advanced climate human rights litigation in European history. Six young Portuguese people, citing the wildfires of 2017 and 2022 as evidence of climate harm to their health and wellbeing, sued 33 European states for inadequate climate action. The ECHR's decision to admit the case is itself significant — it establishes that the court considers climate action within its jurisdiction under the European Convention on Human Rights. A ruling in the applicants' favour would create legally enforceable climate obligations for all 46 Council of Europe member states. This case shows that individual agency — even without institutional power — can change systems."}

    {q:"What is a climate tipping point?",opts:["The moment when people decide to care about climate change","A point in the climate system where a small change triggers a much larger, unstoppable change — like the melting of a glacier that then causes a chain reaction affecting sea levels worldwide","The temperature at which rain becomes snow","The point where renewable energy becomes cheaper than fossil fuels"],ans:1,fact:"Climate tipping points are like dominoes — once one falls, it can knock over others. For example: if the Amazon rainforest loses too much of its area through deforestation and warming, the remaining forest might not be able to create its own rainfall anymore, causing it to convert to dry grassland. This would release enormous amounts of carbon into the atmosphere, causing more warming, which affects other systems. Scientists worry that we may be approaching several tipping points simultaneously, which is why limiting warming to 1.5°C instead of 2°C matters so much."},
    {q:"Six young Portuguese people are taking 33 European governments to court over climate change. What is this case about?",opts:["A dispute about fishing rights in the Atlantic","The Duarte Aguilar case argues that European governments' inadequate climate action is violating their human rights — specifically their right to a healthy environment. They cited Portugal's catastrophic 2017 wildfires as evidence of climate harm to their lives.","A claim that Portugal's forests belong to them","A disagreement about Portugal's renewable energy policy"],ans:1,fact:"Six young Portuguese people — all under 20 when they filed the case — are suing 33 European governments (including Germany, France and the UK) at the European Court of Human Rights, arguing that inadequate climate action violates their fundamental rights. The Court admitted the case in 2023 — a major step. If they win, it could force all 46 Council of Europe countries to take stronger climate action. This is an extraordinary example of young people using legal tools to try to change the world — and it's happening right now, in Portugal."},
    {q:"What percentage of Portugal's electricity came from renewable sources in 2023?",opts:["About 20%","About 40%","About 60%","About 80%"],ans:2,fact:"About 60%! And on some days in 2023, Portugal generated more renewable electricity than it needed — it had to export the surplus to Spain. Portugal runs on wind (strong Atlantic winds along its coast), hydro (rivers including the Douro and Tagus feed large reservoirs), and solar (it's one of the sunniest countries in Europe with over 2,800 sunshine hours per year). Portugal is aiming for 80% renewable electricity by 2030. This is one of Portugal's most impressive achievements — a small country showing what's possible with the right investment and geography."},
    {q:"What is the 'just transition' and why does it matter for climate action?",opts:["A type of electric bus","The idea that the move away from fossil fuels must be fair to workers who currently have jobs in coal mines, oil fields and gas plants — giving them retraining, income support, and investment in their communities","The legal process for countries to join climate agreements","A new type of renewable energy technology"],ans:1,fact:"If we close coal mines and oil refineries to fight climate change, the people who work there lose their jobs — and that's not their fault. If governments just shut down fossil fuel industries without helping workers, those workers (and their communities) will oppose climate action, making it harder to achieve. The 'just transition' means making sure the benefits of clean energy are shared widely and the costs don't fall on the most vulnerable workers. Germany, for example, is spending billions to support communities in coal regions as it closes its mines. Getting this right is one of the key challenges of climate policy."}

    {title:"The Carbon Budget in Detail",story:"To have a 67% chance of staying below 1.5°C of warming, humanity can emit approximately 380 billion tonnes more CO2. Current annual emissions are approximately 37 billion tonnes. Emissions need to reach net zero by approximately 2050 to stay within budget.",q:"If emissions decline linearly from 37 Gt/year to 0 by 2050 (27 years), what is the total emissions over that period? Does this fit within the 380 Gt budget?",working:"Linear decline from 37 to 0 over 27 years: average = 18.5 Gt/year. Total = 18.5 × 27 = 499.5 Gt. This EXCEEDS the 380 Gt budget — meaning even a linear decline to zero by 2050 overshoots 1.5°C. We need steeper near-term cuts.",answer:"499.5",unit:"Gt CO2 emitted (exceeds 380 Gt budget — 1.5°C likely missed)",fact:"This calculation shows why scientists and activists emphasise that near-term emission cuts matter more than long-term commitments. A straight-line decline to zero by 2050 still exceeds the 1.5°C carbon budget by 31%. Staying within 1.5°C requires front-loading emission reductions — cutting faster in the 2020s and 2030s, not gradually. This is why the IPCC says emissions need to nearly halve by 2030. It is also why countries that commit to net zero by 2050 while making slow progress in the 2020s are being criticised: the timing of cuts matters as much as the endpoint."},
    {title:"Portugal's Renewable Record",story:"In April 2023, Portugal ran on 100% renewable electricity for 6 consecutive days. Portugal uses approximately 5.3 MWh of electricity per person per year. Population: approximately 10.3 million.",q:"How many MWh of electricity does Portugal use per day? And how many tonnes of CO2 were avoided during those 6 days compared to generating the same electricity from natural gas (natural gas emits approximately 490g CO2/kWh)?",working:"Daily usage: (10.3M × 5.3) / 365 = 149,534 MWh/day. 6-day total: 897,205 MWh = 897,205,000 kWh. CO2 avoided: 897,205,000 × 0.49 = 439,630 tonnes CO2.",answer:"439630",unit:"tonnes CO2 avoided in 6 days of 100% renewable",fact:"440,000 tonnes of CO2 avoided in 6 days — equivalent to taking about 95,000 cars off the road for a year. This is the real-world impact of Portugal's renewable investment. Portugal didn't start here: in 2005 renewables were 17% of electricity. Two decades of investment in wind, solar and hydro, supported by policy and enabled by geography, created this capability. The lesson is not just the outcome but the trajectory: consistent investment in the right direction produces results that seem impossible from the starting point."},
    {title:"Solar Learning Curve",story:"Solar power costs approximately $38/MWh in 2023, down from $359/MWh in 2010. Solar capacity has grown from about 40 GW globally in 2010 to about 1,600 GW in 2023.",q:"By what factor did cost decrease? By what factor did capacity increase? Does this match a learning curve (costs should fall ~20% for each doubling of capacity)?",working:"Cost decrease: 359/38 = 9.4x cheaper. Capacity increase: 1600/40 = 40x more. Doublings: log₂(40) ≈ 5.3 doublings. Expected cost reduction: 0.8^5.3 ≈ 0.33 — so costs should be about 33% of 2010 levels. Actual: 38/359 = 10.6% — costs fell even faster than the learning curve predicted.",answer:"9.4",unit:"times cheaper (capacity grew 40x — even beat the learning curve)",fact:"Costs fell even faster than the theoretical learning curve predicted — by a factor of 9.4 vs the predicted factor of 3. This happened because: geopolitical competition between China and Western manufacturers drove extra efficiency gains; demand surged faster than predicted, enabling larger manufacturing scale; and material costs (silicon) fell faster than expected. The implication: projections for future clean energy costs should probably be more optimistic than mainstream forecasts. The IEA has consistently underestimated renewable growth and will probably continue to do so."}

  bay:[
    {title:"Portugal's Sunshine",story:"Portugal gets approximately 2,800 hours of sunshine per year. The UK gets approximately 1,500 hours of sunshine per year.",q:"How many more hours of sunshine does Portugal get than the UK per year?",working:"2,800 - 1,500 = 1,300 more sunshine hours per year",answer:"1300",unit:"more sunshine hours than the UK per year",fact:"1,300 extra hours of sunshine per year — that's nearly 4 extra hours of sunshine every single day! This makes Portugal one of the sunniest countries in Europe, which is great news for solar power. A solar panel in Portugal generates roughly twice as much electricity as the same panel in the UK or Germany, just because of the extra sunshine. Combined with Portugal's strong Atlantic winds (great for wind turbines) and rivers (for hydroelectric power), Portugal has amazing natural resources for clean energy."},
    {title:"How Many Trees?",story:"Portugal has approximately 3.2 million hectares of forest. Each hectare of growing forest absorbs approximately 2 tonnes of CO2 per year.",q:"How many tonnes of CO2 does Portugal's forest absorb per year?",working:"3,200,000 × 2 = 6,400,000 tonnes of CO2 per year",answer:"6400000",unit:"tonnes CO2 absorbed by Portugal's forests per year",fact:"6.4 million tonnes of CO2 absorbed by Portugal's forests every year — that's like taking about 1.4 million cars off the road! Forests are nature's carbon capture system: trees breathe in CO2 and store the carbon in their wood and roots. This is why protecting and growing forests is so important for climate change. Portugal is planting more native trees to replace the fast-burning eucalyptus plantations. Native trees like cork oak (which can live 200+ years) store much more carbon over time, and they're much less likely to catch fire."},
    {title:"Temperature Rise",story:"Earth's average temperature has risen approximately 1.2°C since pre-industrial times. Scientists want to limit future rise to 1.5°C total.",q:"How much more warming is allowed before we reach the 1.5°C limit?",working:"1.5 - 1.2 = 0.3°C more warming allowed",answer:"0.3",unit:"°C more warming before reaching the 1.5°C limit",fact:"Only 0.3°C more — we've already used up most of our allowed warming! This is why scientists and young people are so urgent about climate action. The good news is that the world is already working on it: renewable energy is growing fast, electric cars are replacing petrol cars, and countries are committing to cutting emissions. Every bit of warming we prevent really matters. Portugal is doing well — lots of renewable energy, planting trees, and even young Portuguese people taking European governments to court to push for stronger action!"}
  ]
};
const TASKS={
  owl:{icon:"🦉",title:"Climate Policy — Design Your Own",level:"KS3 Extended Writing / Design Challenge",
   brief:`<p>You are advising the Portuguese government on a climate policy package. Design a plan that:</p>
<ul><li>Sets emission reduction targets for 2030 and 2050</li><li>Addresses at least three sectors (energy, transport, buildings, agriculture, land use)</li><li>Includes a just transition component for affected workers</li><li>Addresses climate justice (Portugal's vulnerability vs its responsibility)</li><li>Explains how you would build political support for it</li></ul>
<p>Be realistic about costs and trade-offs — there is no free lunch in climate policy.</p>`,
   placeholder:"Portugal Climate Plan 2024-2050\n\n2030 target:\n2050 target:\n\nSector 1 (Energy):\nSector 2 (Transport):\nSector 3:\n\nJust transition measures:\n\nClimate justice approach:\n\nBuilding political support:"},
  cub:{icon:"🐻",title:"Our Climate Commitment",level:"KS2 Geography + Science",
   brief:`<p>Write a letter from your generation to the next generation (children who will be your age in 2050). Tell them:</p>
<ul><li>What the climate situation was like when you were young (2024)</li><li>What actions your generation took</li><li>What you are most proud of</li><li>What you wish you had done differently</li><li>What the world is like in 2050 as a result of those choices</li></ul>`,
   placeholder:"Dear children of 2050,\n\nWhen we were young in 2024...\n\nOur generation decided to...\n\nWe are most proud that...\n\nWe wish we had...\n\nAs a result, in your world of 2050..."},
  bay:{icon:"🌿",title:"My Climate Promise",level:"KS1/KS2 Foundation",
   brief:`<p>Make three promises about what YOU will do to help with climate change. For each promise, explain:</p>
<ul><li>What you will do</li><li>Why it helps the climate</li><li>How hard it will be (easy / medium / hard)</li></ul>
<p>Then draw a picture of the world you want to live in when you grow up!</p>`,
   placeholder:"Promise 1: I will...\nWhy it helps:\nHow hard: easy / medium / hard\n\nPromise 2: I will...\nWhy it helps:\nHow hard: easy / medium / hard\n\nPromise 3: I will...\nWhy it helps:\nHow hard: easy / medium / hard\n\nThe world I want to live in:"}
};
const SAVE_KEY="atlas_ch11_v1";
function defaultState(){const s={};CHILDREN.forEach(c=>{s[c.id]={storyPage:0,selectedSol:null,quizIdx:0,quizAnswers:[],quizDone:false,quizScore:0,mathInputs:{},mathAnswered:{},taskText:"",taskSaved:false,sectionsComplete:[]};});return s;}
function loadState(){try{const s=localStorage.getItem(SAVE_KEY);if(s)return{...defaultState(),...JSON.parse(s)};}catch(e){}return defaultState();}
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}}
let state=loadState();let ui={view:"profiles",child:null,section:"story"};
function render(){
  const app=document.getElementById("app");const child=CHILDREN.find(c=>c.id===ui.child);
  let h=`<div class="hero"><h1>🌍 The Atlas Chronicles</h1><p>Chapter 11: Climate and Our Future</p><div class="ks-badges"><span class="ks-badge">📚 KS1 Bay</span><span class="ks-badge">📚 KS2 Cub</span><span class="ks-badge" style="background:rgba(240,180,41,0.1);border-color:rgba(240,180,41,0.2);color:#f0b429">📚 KS3 Owl</span></div></div>`;
  if(ui.view==="profiles")h+=renderProfiles();
  else if(ui.view==="learn"&&child)h+=renderLearn(child);
  app.innerHTML=h;
}
function renderProfiles(){
  let h=`<div class="section-label">Choose your explorer</div><div class="profile-grid">`;
  CHILDREN.forEach(c=>{const s=state[c.id];const comp=(s.sectionsComplete||[]).length;h+=`<div class="profile-card ${ui.child===c.id?"active":""}" onclick="selectChild('${c.id}')"><div style="font-size:2.8rem">${c.avatar}</div><div class="pname">${c.name}</div><div class="plevel">${c.level}</div><div class="pstars">${comp>0?"⭐".repeat(comp)+" ("+comp+"/5)":"Ready!"}</div></div>`;});
  return h+`</div>`;
}
function renderLearn(child){
  const s=state[child.id];const comp=s.sectionsComplete||[];
  const sections=[{id:"story",icon:"📖",name:"Story"},{id:"solutions",icon:"⚡",name:"Solutions"},{id:"maths",icon:"📐",name:"Maths"},{id:"task",icon:"✍️",name:"Task"},{id:"quiz",icon:"✅",name:"Quiz"}];
  let h=`<a href="index.html" class="back-btn">← Home</a>`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:2rem">${child.avatar}</span><div><div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#2dd4bf">${child.name} — Chapter 11</div><div style="color:#666;font-size:0.73rem">${child.level} · ⭐ ${comp.length}/${sections.length} done</div></div></div>`;
  h+=`<div class="progress-overview">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<div class="prog-tile ${done?"done":""}"><div class="prog-icon">${sec.icon}</div><div class="prog-name">${done?"✓ ":""}${sec.name}</div></div>`;});
  h+=`</div><div class="nav-tabs">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<button class="nav-tab ${ui.section===sec.id?"active":""} ${done?"done":""}" onclick="switchSection('${sec.id}')">${sec.icon} ${sec.name}</button>`;});
  h+=`</div>`;
  if(ui.section==="story")h+=renderStory(child,s);
  else if(ui.section==="solutions")h+=renderSolutions(child,s);
  else if(ui.section==="maths")h+=renderMaths(child,s);
  else if(ui.section==="task")h+=renderTask(child,s);
  else if(ui.section==="quiz")h+=renderQuiz(child,s);
  return h;
}
function renderStory(child,s){
  const pg=Math.min(s.storyPage,STORY.length-1);const page=STORY[pg];const isLast=pg>=STORY.length-1;
  let h=`<div class="story-panel"><div class="chapter-label">Chapter 11 · Page ${pg+1} of ${STORY.length}</div><div class="story-h">Climate and Our Future</div><div class="story-emoji">${page.emoji}</div><div class="story-body">${page.text(child.id)}</div><div class="page-nav"><span class="page-ctr">${pg+1}/${STORY.length}</span>`;
  if(!isLast)h+=`<button class="cont-btn" onclick="nextPage()">Continue →</button>`;
  else h+=`<button class="cont-btn" onclick="completeSection('story');switchSection('solutions')">Explore Solutions! ⚡</button>`;
  return h+`</div></div>`;
}
function renderSolutions(child,s){
  let h=`<div class="explorer-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">⚡ ${child.ks}: Climate Solutions</div><div class="explorer-title">⚡ Climate Solutions</div><div class="explorer-sub">The tools we have — and how Portugal fits in</div><div class="sol-grid">`;
  SOLUTIONS.forEach(sol=>{h+=`<div class="sol-card ${s.selectedSol===sol.id?"selected":""}" onclick="selectSol('${sol.id}')"><div class="sol-emoji">${sol.emoji}</div><div class="sol-name">${sol.name}</div><div class="sol-sub">${sol.status}</div></div>`;});
  h+=`</div>`;
  if(s.selectedSol){
    const sol=SOLUTIONS.find(x=>x.id===s.selectedSol);
    if(sol){
      h+=`<div class="sol-detail"><div style="font-family:'Fredoka One',cursive;color:#2dd4bf;font-size:1.2rem;margin-bottom:8px">${sol.emoji} ${sol.name}</div><div class="s-stats">`;
      [["📊 Status",sol.status],["🎯 Potential",sol.potential],["💡 Barrier","Political will + investment"],["🌍 Scale","Global + local"]].forEach(([l,v])=>{h+=`<div class="sstat"><div class="sstat-label">${l}</div><div class="sstat-val" style="font-size:0.74rem">${v}</div></div>`;});
      h+=`</div><div style="font-size:0.85rem;color:#ccfbf1;line-height:1.65;margin-bottom:8px">${sol.story}</div>`;
      h+=`<div class="portugal-pull"><strong>🇵🇹 Portugal's Role</strong>${sol.portugal}</div>`;
      if(child.id==="owl")h+=`<div class="ks3-pull"><strong>🦉 The bigger picture</strong>${sol.ks3}</div>`;
      h+=`</div>`;
    }
    h+=`<div style="margin-top:12px;text-align:center"><button class="btn-teal" onclick="completeSection('solutions');switchSection('maths')">Maths! 📐</button></div>`;
  } else h+=`<div style="text-align:center;padding:14px;color:#555;font-size:0.82rem">👆 Click any solution to explore</div>`;
  return h+`</div>`;
}
function renderMaths(child,s){
  const id=child.id;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="math-panel"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">📐 ${child.ks}: Climate Numbers</div><div style="font-family:'Fredoka One',cursive;color:#f0b429;font-size:1.2rem;margin-bottom:4px">📐 Climate in Numbers</div><div style="color:#777;font-size:0.78rem;margin-bottom:14px">Real data — the science of climate change and solutions</div>`;
  chs.forEach((ch,idx)=>{
    const answered=s.mathAnswered&&s.mathAnswered[idx];const inputVal=(s.mathInputs&&s.mathInputs[idx])||"";
    h+=`<div class="challenge-card"><div class="ch-title">📐 ${ch.title}</div><div class="ch-story">${ch.story}</div><div class="ch-q">${ch.q}</div>`;
    if(!answered){h+=`<div class="math-row"><input class="math-in" type="text" value="${inputVal.replace(/"/g,'&quot;')}" placeholder="Answer..." oninput="updateMath(${idx},this.value)" onkeydown="if(event.key==='Enter')checkMath(${idx})"><span class="math-unit">${ch.unit}</span><button class="math-go" onclick="checkMath(${idx})">Check ✓</button></div>`;if(s.mathAnswered&&s.mathAnswered[idx]==="wrong")h+=`<div class="math-no">Not quite — try again!</div>`;}
    else{h+=`<div class="math-ok">✅ Correct!</div><div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 12px;font-size:0.78rem;color:#aaa;line-height:1.6;margin-top:6px"><strong style="color:#f0b429">Working:</strong> ${ch.working}</div><div class="math-fact">🤩 ${ch.fact}</div>`;}
    h+=`</div>`;});
  const allDone=chs.every((_,i)=>s.mathAnswered&&s.mathAnswered[i]==="correct");
  if(allDone)h+=`<div style="text-align:center;margin-top:12px"><button class="btn-teal" onclick="completeSection('maths');switchSection('task')">Do the Task! ✍️</button></div>`;
  return h+`</div>`;
}
function renderTask(child,s){
  const id=child.id;const task=TASKS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="task-box"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✍️ ${child.ks}: Writing Task</div><div class="task-title">${task.icon} ${task.title}</div><div class="task-level">${task.level}</div><div class="task-brief">${task.brief}</div><textarea class="task-ta" placeholder="${task.placeholder}" oninput="updateTask(this.value)">${s.taskText||""}</textarea><br><button class="task-btn" onclick="saveTask()">Save 💾</button>`;
  if(s.taskSaved)h+=`<div class="saved-ok">✅ Saved!</div>`;
  if((s.taskText||"").length>80)h+=`<div style="margin-top:10px"><button class="btn-teal" onclick="completeSection('task');switchSection('quiz')">Take the Quiz! ✅</button></div>`;
  return h+`</div>`;
}
function renderQuiz(child,s){
  const id=child.id;const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];const idx=s.quizIdx||0;
  if(s.quizDone||idx>=qs.length){
    const score=s.quizScore||0;const pct=Math.round((score/qs.length)*100);
    return`<div class="quiz-wrap"><div class="score-banner"><h2>Chapter 11 Complete! 🌱</h2><div style="font-size:3rem;margin:8px 0">${pct>=80?"🏆":pct>=60?"⭐":"💪"}</div><div style="color:#ccc">${score}/${qs.length} (${pct}%)</div><div style="display:flex;gap:8px;justify-content:center;margin-top:12px"><button onclick="resetQuiz()" style="background:rgba(255,255,255,0.07);color:#ccc;border:1px solid rgba(255,255,255,0.12);padding:9px 18px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer">Try Again 🔄</button><a href="chapter12.html" class="btn-teal" style="padding:9px 18px;text-decoration:none">Chapter 12 → Atlas Comes Home</a></div></div></div>`;
  }
  const q=qs[idx];const answers=s.quizAnswers||[];const thisAns=answers[idx];
  let h=`<div class="quiz-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✅ ${child.ks} Quiz</div><div class="section-label">Quiz · Q${idx+1} of ${qs.length}</div><div class="score-dots">`;
  qs.forEach((_,i)=>{const a=answers[i];h+=`<div class="sdot ${i===idx?"current":a===undefined?"":a===qs[i].ans?"done":"wrong"}"></div>`;});
  h+=`</div><div class="q-text">${q.q}</div><div class="q-opts">`;
  q.opts.forEach((opt,i)=>{let cls="q-opt";if(thisAns!==undefined){if(i===q.ans)cls+=" correct";else if(i===thisAns&&i!==q.ans)cls+=" wrong";}h+=`<button class="${cls}" ${thisAns!==undefined?"disabled":""} onclick="answerQuiz(${i})">${opt}</button>`;});
  h+=`</div>`;
  if(thisAns!==undefined){h+=`<div class="q-fact">🤩 ${q.fact}</div><div style="text-align:right;margin-top:8px"><button class="btn-teal" onclick="nextQuiz()">Next →</button></div>`;}
  return h+`</div>`;
}
function selectChild(id){ui.child=id;ui.view="learn";ui.section="story";render();}
function switchSection(s){ui.section=s;render();}
function completeSection(s){const comp=state[ui.child].sectionsComplete||[];if(!comp.includes(s))state[ui.child].sectionsComplete=[...comp,s];saveState();}
function nextPage(){if(state[ui.child].storyPage<STORY.length-1){state[ui.child].storyPage++;saveState();render();}}
function selectSol(id){state[ui.child].selectedSol=id;saveState();render();}
function updateMath(idx,v){if(!state[ui.child].mathInputs)state[ui.child].mathInputs={};state[ui.child].mathInputs[idx]=v;}
function checkMath(idx){
  const id=ui.child;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];const ch=chs[idx];
  const input=(state[id].mathInputs&&state[id].mathInputs[idx]||"").trim().replace(/,/g,"");
  const correctVal=ch.answer.replace(/,/g,"");
  const userNum=parseFloat(input);const correctNum=parseFloat(correctVal);
  const correct=!isNaN(userNum)&&!isNaN(correctNum)&&Math.abs(userNum-correctNum)/Math.max(correctNum,0.001)<0.05;
  if(!state[id].mathAnswered)state[id].mathAnswered={};state[id].mathAnswered[idx]=correct?"correct":"wrong";saveState();render();
}
function answerQuiz(i){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const idx=s.quizIdx||0;const q=qs[idx];
  const answers=[...(s.quizAnswers||[])];while(answers.length<=idx)answers.push(undefined);
  answers[idx]=i;if(i===q.ans)state[id].quizScore=(s.quizScore||0)+1;
  state[id].quizAnswers=answers;saveState();render();
}
function nextQuiz(){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const next=(s.quizIdx||0)+1;state[id].quizIdx=next;if(next>=qs.length)state[id].quizDone=true;saveState();render();
}
function resetQuiz(){const id=ui.child;state[id].quizIdx=0;state[id].quizAnswers=[];state[id].quizDone=false;state[id].quizScore=0;saveState();render();}
function updateTask(v){state[ui.child].taskText=v;}
function saveTask(){state[ui.child].taskSaved=true;saveState();render();}
render();
</script>
</body>
</html>
