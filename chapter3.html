.task-ta:focus{border-color:#81c784}
.task-btn{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:white;border:none;border-radius:22px;padding:9px 20px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;margin-top:8px}
.saved-ok{font-size:0.75rem;color:#81c784;margin-top:6px}
.back-btn{background:rgba(255,255,255,0.07);color:#ccc;border:1px solid rgba(255,255,255,0.12);padding:9px 18px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;margin-bottom:14px;display:inline-block;text-decoration:none}
.btn-green{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#c8e6c9;border:none;border-radius:22px;padding:9px 18px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer}

.ks-tag.ks3{background:rgba(240,180,41,0.07);border-color:rgba(240,180,41,.13);color:#f0b429}

<body>
<div class="wrap" id="app"></div>
<script>
const CHILDREN=[
  {id:"owl",name:"Owl",age:12,avatar:"🦉",ks:"KS3",level:"KS3 — Secondary Level"},
  {id:"cub",name:"Cub",age:9,avatar:"🐻",ks:"KS2",level:"KS2 — Primary Level"},
  {id:"bay",name:"Bay",age:7,avatar:"🌿",ks:"KS1",level:"KS1/KS2 — Foundation"}
];
const STORY=[
  {emoji:"🌿",text:(id)=>`<p>The wild places are running out. Not all at once — slowly, patch by patch, forest by forest, species by species. And most people don't notice because they don't live in them.</p><p>Atlas did notice. Atlas had been paying attention to the natural world — to the biomes, the great living zones that cover Earth's surface like a patchwork quilt, each one shaped by temperature and rainfall into its own distinct ecosystem. Tropical rainforest. Savanna. Desert. Temperate forest. Taiga. Tundra. Each one a complete world, with its own rules, its own inhabitants, its own smell and sound and rhythm.</p>
<div class="fact-pull"><strong>🌿 Biomes — the living zones of Earth</strong>A biome is a large area characterised by its climate, plants and animals. There are roughly 8 major terrestrial biomes. The tropical rainforest covers only 6% of Earth's surface but contains over 50% of all species. The taiga (boreal forest) is the world's largest land biome, stretching across Canada, Russia and Scandinavia. Deserts cover about 33% of Earth's land. The ocean is its own biome — the largest on Earth by far.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal's extraordinary biodiversity</strong>Portugal has more plant species per square kilometre than almost anywhere else in Europe — a result of its location at the crossroads of Atlantic, Mediterranean and African climate zones. The Alentejo's cork oak forests (montado) are a UNESCO-recognised ecosystem found almost nowhere else. The Azores sit on the boundary of three biomes: Atlantic marine, subtropical island, and volcanic alpine. For a small country, Portugal's ecological diversity is remarkable.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The 6% that runs the world</strong>Tropical rainforests cover just 6% of Earth's surface but do an extraordinary amount of work — more than any other biome by far.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Over 50% of all terrestrial species live there</li><li>The Amazon alone produces roughly 20% of Earth's oxygen through photosynthesis</li><li>Rainforests regulate regional rainfall patterns — deforesting the Amazon would dry out farmland thousands of kilometres away</li><li>We are losing roughly 4.7 million hectares per year — about the size of Denmark, every year, forever</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if the Amazon is producing oxygen and regulating climate that benefits the whole world, should Brazil be compensated by other countries for preserving it? Who should decide?</em></div>`:""}`},
  {emoji:"🦁",text:(id)=>`<p>Every animal is perfectly shaped by its environment. Not by choice — by millions of years of evolutionary pressure.</p><p>The polar bear's white fur is not for camouflage in snow (polar bears have no natural predators). It's transparent and hollow — each hair acts as a light pipe, channelling sunlight to dark skin beneath, which absorbs heat. The giraffe's long neck didn't evolve just to reach high leaves — it also evolved for neck-fighting between males competing for females. The camel's hump doesn't store water: it stores fat, which can be metabolised into water. Almost everything you learned in primary school about adaptations is oversimplified.</p>
<div class="fact-pull"><strong>🦁 Adaptations — the real stories</strong>The axolotl (Mexican salamander) can regenerate entire limbs, including parts of its brain and heart. The tardigrade (water bear) can survive in outer space, in boiling water, in the deepest ocean trench, and after being frozen for 30 years. The mantis shrimp sees 16 types of colour (humans see 3) and can punch with the force of a bullet. The pistol shrimp generates a bubble so hot it briefly reaches the temperature of the sun's surface. Evolution has produced things far stranger than anything we could invent.</div>
<div class="portugal-pull"><strong>🇵🇹 The Iberian lynx — back from the edge</strong>The Iberian lynx is the world's most endangered wild cat species. In 2002, only 94 individuals remained — it was the most endangered felid on Earth and appeared headed for extinction. A coordinated Portuguese-Spanish conservation programme began breeding them in captivity and reintroducing them into the wild. By 2024, numbers had recovered to over 2,000. It is one of the greatest conservation success stories in the world — and it happened largely in Portugal and Spain. The lynx lives in the montado cork oak forests of the Alentejo.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Evolution is not what most people think it is</strong>Common misconception: animals "decide" to adapt, or evolution has a direction or goal. It doesn't. Evolution is just: things that survive reproduce more. That's it.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Evolution has no foresight — it can't "plan" for climate change</li><li>It operates over thousands to millions of years — too slow for current climate change rates</li><li>A species can evolve rapidly if selection pressure is strong enough (some bacteria evolve antibiotic resistance in days)</li><li>Most extinctions are permanent — evolution cannot undo them once a species is gone</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: humans are causing climate change roughly 1,000 times faster than natural climate shifts. What does this mean for whether species can adapt in time?</em></div>`:""}`},
  {emoji:"🌊",text:(id)=>`<p>The ocean is Earth's life support system — and we're breaking it.</p><p>Coral reefs cover less than 1% of the ocean floor but support 25% of all marine species. They are sometimes called "the rainforests of the sea." When ocean temperatures rise even 1°C above normal for several weeks, corals expel the algae that give them colour and energy — they turn white and starve. This is called bleaching. Half of the Great Barrier Reef has bleached since 2016.</p><p>The ocean also absorbs about a third of the CO2 humans produce — which is slowing climate change, but at a cost: the water becomes more acidic. Acidification dissolves the shells of molluscs, starfish and coral. The ocean is saving us from ourselves, and we're killing it for doing so.</p>
<div class="fact-pull"><strong>🌊 Ocean numbers that should make you sit down</strong>The ocean contains 97% of Earth's water. It has absorbed over 90% of the excess heat from climate change. Plastic production since 1950 totals 9.2 billion tonnes — most of it is still on Earth. An estimated 8 million tonnes of plastic enters the ocean every year. The Great Pacific Garbage Patch covers an area twice the size of Texas. And yet: the ocean produces 50% of Earth's oxygen (from phytoplankton, not trees) and regulates the climate of every country on Earth.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal has the largest ocean territory in the EU</strong>Portugal's exclusive economic zone (EEZ) — the ocean area over which it has sovereign rights — covers approximately 1.7 million km², making it the largest in the European Union and the 11th largest in the world. This is partly due to the Azores and Madeira sitting in the middle of the Atlantic. Portugal's ocean is larger than Portugal's land area by a factor of 18. This gives Portugal enormous potential in offshore wind energy, wave energy, fisheries, and ocean research — resources it is only beginning to develop.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The ocean is saving us — and we're letting it die doing it</strong>The ocean absorbs 30% of human CO2 emissions and 90% of the excess heat from climate change. Without this, Earth would already be 2-3°C warmer. But the costs are severe.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>Ocean acidification:</strong> absorbed CO2 forms carbonic acid — pH has dropped 0.1 since industrialisation (that's a 26% increase in acidity)</li><li><strong>Coral bleaching:</strong> 50% of Great Barrier Reef bleached since 2016. At 2°C warming, 99% of coral reefs will be gone</li><li><strong>Deoxygenation:</strong> warmer water holds less oxygen — dead zones are expanding</li><li>The ocean's ability to absorb carbon is decreasing as it warms — a dangerous positive feedback</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if the ocean stops absorbing our CO2 emissions because it's too warm and acidic to do so, what happens to the rate of climate change? Draw out the feedback loop.</em></div>`:""}`},
  {emoji:"🔥",text:(id)=>`<p>Fire has always been part of Earth's ecosystems. Many biomes evolved with fire — and need it.</p><p>The eucalyptus forests of Australia evolved with fire: their seeds only germinate after a fire passes through. The Florida scrub ecosystem needs fire every 3-15 years to maintain its structure. The African savanna is partly maintained by fire. For millions of years, fire was nature's pruning tool — clearing dead wood, releasing nutrients, making space for new growth.</p><p>But climate change is making fires hotter, faster, larger and more frequent than ecosystems evolved to handle. Portugal knows this better than almost any country in Europe.</p>
<div class="fact-pull"><strong>🔥 Portugal's wildfire crisis — in numbers</strong>2017 was Portugal's worst year for wildfires in modern history. The Pedrógão Grande fire in June 2017 killed 66 people in a single night — many trapped in their cars trying to escape. In October 2017, a second wave of fires killed 45 more people. In total, over 500,000 hectares burned in 2017 — roughly 5% of Portugal's entire land area in a single year. Scientists have directly linked the conditions (extreme heat, drought, strong winds) to climate change.</div>
<div class="portugal-pull"><strong>🇵🇹 Why Portugal burns — and what it's doing about it</strong>Portugal has a perfect wildfire recipe: hot dry summers (climate change making them worse), large areas of eucalyptus plantations (highly flammable, planted for the paper industry), abandoned rural land (with no one to manage undergrowth), and mountainous terrain that channels wind. Since 2017, Portugal has invested in forest management, fire breaks, earlier warning systems, and replanting with fire-resistant native species. But the underlying driver — hotter, drier summers — continues to get worse.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Why eucalyptus is a political and ecological disaster — and why it's still being planted</strong>Portugal has more eucalyptus trees per capita than almost any country on Earth. They were planted from the 1950s onwards for the paper pulp industry. They are economically valuable. They are also ecologically catastrophic in a Mediterranean climate.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Eucalyptus absorbs 3-5 times more water than native oak — draining streams and springs</li><li>Its oils make it highly flammable — eucalyptus fires burn hotter and faster than native forest fires</li><li>It produces no food or habitat value for native wildlife</li><li>Yet the paper industry employs thousands of people and generates billions in exports</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if you were the Portuguese government, how would you handle the eucalyptus problem? Who benefits from keeping it? Who suffers?</em></div>`:""}`},
  {emoji:"🌱",text:(id)=>`<p>The good news: ecosystems can recover. If we let them.</p><p>Rewilding is the idea that if you remove the human pressures on a landscape — hunting, farming, logging, pollution — nature will start to rebuild itself. And the results, where it has been tried, have been extraordinary.</p><p>In Yellowstone National Park in the USA, wolves were reintroduced in 1995 after being absent for 70 years. Within years, elk behaviour changed (they avoided riverbanks where they could be hunted), which allowed riverside vegetation to recover, which stabilised riverbanks, which changed the course of rivers. Wolves changed the rivers. This phenomenon — where the presence of a predator changes the behaviour of prey, which changes the landscape — is called a trophic cascade. It means ecosystems are held together by relationships more than by numbers.</p>
<div class="fact-pull"><strong>🌱 Rewilding that worked — and blew people's minds</strong>The Knepp Estate in West Sussex, England: a former conventional farm that was rewilding from 2001. Now has turtle doves, nightingales, purple emperor butterflies and white storks breeding — species that had disappeared from the UK. The rewilded area covers 1,400 hectares. Chernobyl Exclusion Zone: abandoned after the 1986 nuclear disaster, it is now one of Europe's largest wildlife reserves. Brown bears, lynx, wolves and rare Przewalski's horses roam freely. Radiation is less damaging to wildlife than humans are.</div>
<div class="portugal-pull"><strong>🇵🇹 Rewilding Portugal — the Faia Brava reserve</strong>In the Côa Valley in northeastern Portugal, the Rewilding Europe and ATN project has been returning native species to the landscape since 2011. Wild horses (Garrano breed), aurochs (reconstructed wild cattle), griffon vultures and golden eagles are now established. The project works with local farmers, creating wildlife corridors and ecotourism income. It is one of Europe's most ambitious rewilding projects and a model for how conservation and rural development can work together rather than against each other.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Trophic cascades — why removing one species can collapse everything</strong>The Yellowstone wolf example is not unusual. It is how ecosystems actually work — through chains of relationships, not just numbers.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Remove wolves → elk overpopulate → riverbank vegetation stripped → rivers destabilise → fish lose habitat → bear populations drop → and so on</li><li>This is a <strong>trophic cascade</strong> — changes rippling up and down the food web</li><li>Keystone species: species whose removal causes disproportionate ecosystem change (wolves, sharks, sea otters, elephants)</li><li>Biodiversity is not just about having lots of species — it is about having the right relationships</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: the Iberian lynx is a keystone predator in Portugal's cork oak ecosystem. What might happen to the montado if it had gone extinct in 2002 when only 94 remained?</em></div>`:""}`}

const BIOMES=[
  {id:"rainforest",name:"Tropical Rainforest",emoji:"🌴",climate:"Hot and wet year-round. 25-35°C, 2000-10000mm rain/year",area:"~6% of Earth's land",species:"50%+ of all land species",threats:"Deforestation (4.7M ha/year), climate change, agriculture",story:"The tropical rainforest is Earth's most biodiverse biome — a cathedral of life where the canopy can be 40m high and the forest floor so dark that barely 2% of sunlight reaches it. Every layer is a different world: emergent trees towering above the canopy, the canopy itself a superhighway for monkeys and birds, the understorey of ferns and saplings waiting for a gap, and the forest floor where decomposers recycle everything that falls. One hectare of Amazon can contain more tree species than the whole of the UK.",portugal:"Portugal's Atlantic coast, Azores and Madeira have subtropical laurisilva (laurel forest) — a relic of the ancient forests that covered southern Europe before the last ice age. The Azores laurisilva is UNESCO listed. Madeira's laurisilva is one of the most extensive surviving examples in the world. These are not tropical rainforests, but they are the nearest equivalent in European territory.",ks3:"The Amazon produces something called 'flying rivers' — columns of water vapour transported by air currents across South America, feeding rainfall in the agricultural heartland of Brazil and Argentina. Deforesting the Amazon doesn't just reduce biodiversity — it reduces rainfall for farmland thousands of kilometres away. Brazilian scientists estimate that deforestation of the Amazon beyond a certain threshold (possibly 25-30% of the total — currently at about 20%) will trigger a 'dieback' where the forest can no longer generate its own rainfall and will convert to savanna. This is called a tipping point."},

  {id:"savanna",name:"Tropical Savanna",emoji:"🦒",climate:"Wet and dry seasons. Hot. 500-1500mm rain/year",area:"~20% of Earth's land",species:"Large mammals, migratory birds, specialised grasses",threats:"Agricultural expansion, poaching, climate change altering rainfall patterns",story:"The savanna is the biome that made us. Homo sapiens evolved in the African savanna — our upright posture, distance vision, endurance running, and social intelligence all evolved here, in this landscape of grass and scattered trees and large animals. We are savanna creatures who have colonised every other biome. The Serengeti's annual wildebeest migration — 1.5 million animals moving in a circuit across Kenya and Tanzania — is the largest overland migration of mammals on Earth.",portugal:"Portugal's Alentejo has patches of montado (cork oak savanna) — not African savanna, but functionally similar: open grassland with scattered trees, grazed by cattle and sheep, supporting enormous biodiversity. The montado is technically a human-modified landscape (the cork oaks are managed), but it has existed long enough that it now functions as a distinct ecosystem, complete with its own keystone species including the Iberian lynx.",ks3:"The African savanna is experiencing significant pressure from multiple directions simultaneously — agricultural expansion from growing populations, climate change altering rainfall patterns, and wildlife poaching. The concept of transboundary conservation — creating wildlife corridors that cross national borders — has emerged as a response. The KAZA Transfrontier Conservation Area in southern Africa covers 520,000 km² across five countries (Botswana, Namibia, Zimbabwe, Zambia, Angola). It requires five governments to cooperate on conservation, tourism revenue sharing, and anti-poaching — showing that ecology and geopolitics are inseparable."},
  {id:"temperate",name:"Temperate Forest",emoji:"🍂",climate:"Four distinct seasons. Moderate rainfall. -5 to 25°C",area:"~25% of Earth's original land (much now cleared)",threats:"Historical deforestation (most cleared for farming), now threatened by invasive species and climate change",species:"Deciduous trees, bears, deer, wolves, rich birdlife",story:"Temperate deciduous forests once covered most of western Europe, eastern North America and parts of East Asia. Most have been cleared for agriculture over the last 5,000 years — what remains is typically secondary forest (regrown after clearing) rather than ancient woodland. Ancient woodland in the UK, for example, covers only 2.5% of land area. When you walk through an old beech forest in autumn, you are in something genuinely rare.",portugal:"Portugal's northern mountains (Gerês, Peneda, Montesinho) retain patches of native deciduous forest — Atlantic oak, chestnut and birch. Portugal's first and only national park, Peneda-Gerês, protects the largest area of this native habitat. It's where you'll find the last wild wolves in Portugal — the Iberian wolf, subspecies of grey wolf, a protected species since 1988.",ks3:"Temperate forests are critical carbon stores — mature forest soils and biomass store enormous amounts of carbon that was removed from the atmosphere over centuries. Ancient woodland is particularly valuable: old growth forests store more carbon per hectare than young forests, and are vastly more biodiverse. Despite this, the UK approved the destruction of ancient woodland for the HS2 rail project in the 2020s. This represents a direct conflict between infrastructure development and carbon storage — a conflict that will become more common as climate targets tighten."},
  {id:"tundra",name:"Arctic Tundra",emoji:"❄️",climate:"Extremely cold. -50 to 10°C. Very low precipitation",area:"~10% of Earth's land",species:"Polar bears, lemmings, migratory birds, lichens, mosses",threats:"Permafrost thaw, Arctic warming (4x faster than global average), oil exploration",story:"The tundra sits at the top of the world and is warming four times faster than the global average — the Arctic is the fastest-changing environment on Earth. The permafrost (permanently frozen ground) that underlies the tundra has been frozen for thousands of years — and it contains enormous quantities of methane and CO2 from decomposed organic matter. As it thaws, it releases these gases, which accelerate warming, which thaws more permafrost. The tundra is a climate time bomb.",portugal:"Portugal has no tundra — but tundra thaw directly affects Portugal through two pathways: sea level rise (melting permafrost and ice contributes to ocean expansion) and weather disruption (Arctic warming disrupts the jet stream, causing the kind of extreme weather events — prolonged heat domes, intense storms — that Portugal has experienced more frequently since 2000).",ks3:"The permafrost carbon feedback is one of the most serious tipping points in climate science. Permafrost covers 25% of the Northern Hemisphere's land surface and contains an estimated 1.5 trillion tonnes of carbon — roughly double what is currently in the atmosphere. As it thaws, it releases methane (80x more potent than CO2 over 20 years) and CO2. Scientists estimate that significant permafrost thaw could add 0.3-0.4°C of warming beyond current projections — meaning climate targets calculated without this feedback may be systematically too optimistic."},

    {q:"What happened to rivers in Yellowstone National Park after wolves were reintroduced in 1995?",opts:["The rivers became more polluted","The rivers changed course — because wolves changed elk behaviour, which allowed riverside plants to recover, which stabilised the banks","The rivers dried up because wolves drank too much water","Nothing changed — wolves don't affect rivers"],ans:1,fact:"Wolves changed the rivers! This sounds impossible but it's true. Wolves hunted elk, so elk stopped grazing on riverbanks (too dangerous to stay in one place). Plants grew back. Roots stabilised the banks. Rivers stopped eroding their sides and began to narrow and deepen. The whole shape of the river changed — because of wolves. This is called a trophic cascade and it shows how everything in an ecosystem connects to everything else."},
    {q:"Why does Portugal have more wildfires than most European countries?",opts:["Because Portuguese people are careless with fire","Because of a combination of hot dry summers, large areas of flammable eucalyptus plantations, and climate change making both worse","Because Portugal has no fire service","Because Portugal has more forests than any other country"],ans:1,fact:"Portugal has a perfect recipe for wildfires: hot, dry summers (getting worse with climate change), large areas of eucalyptus trees (which are full of flammable oils and were planted for the paper industry), and lots of abandoned farmland where dry undergrowth builds up. In 2017, over 500,000 hectares burned — about 5% of the whole country in a single year. 111 people died. Since then, Portugal has worked hard on forest management and fire prevention."},

<li>Propose two concrete policy interventions with costs and benefits</li>
<li>Address the political obstacles to your proposals</li></ul>`,
   placeholder:"Biome chosen:\nWhy it matters (beyond 'biodiversity'):\n\nThreats and causes:\n\nPortugal connection:\n\nPolicy 1:\nPolicy 2:\n\nPolitical obstacles:"},
  cub:{icon:"🐻",title:"Design a Nature Reserve",level:"KS2 Geography + Creative Writing",
   brief:`<p>You are designing a nature reserve somewhere in Portugal. Include:</p>
<ul><li>Where it is (north, south, coast, mountains, Azores?) and what habitat it protects</li><li>Three species you want to protect there and why</li><li>Two threats the reserve needs to defend against</li><li>How local people will benefit (jobs, tourism, food)</li><li>What you'd call it and why</li></ul>`,
   placeholder:"Location:\nHabitat type:\n\nThree species to protect:\n1.\n2.\n3.\n\nThreats:\n\nBenefits for local people:\n\nName of reserve and why:"},
  bay:{icon:"🌿",title:"My Favourite Wild Animal",level:"KS1/KS2 Foundation",
   brief:`<p>Choose your favourite wild animal. Tell us:</p>
<ul><li>What it is and where it lives (which biome/country)</li><li>Something amazing about how it's adapted to survive</li><li>Whether it is endangered and why</li><li>What you would do to help protect it</li></ul>`,
   placeholder:"My favourite wild animal is...\nIt lives in...\n\nSomething amazing about it:\n\nIs it endangered?\n\nHow I would help protect it:"}
};
const SAVE_KEY="atlas_ch3_v1";
function defaultState(){const s={};CHILDREN.forEach(c=>{s[c.id]={storyPage:0,selectedBiome:null,quizIdx:0,quizAnswers:[],quizDone:false,quizScore:0,mathInputs:{},mathAnswered:{},taskText:"",taskSaved:false,sectionsComplete:[]};});return s;}
function loadState(){try{const s=localStorage.getItem(SAVE_KEY);if(s)return{...defaultState(),...JSON.parse(s)};}catch(e){}return defaultState();}
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}}
let state=loadState();let ui={view:"profiles",child:null,section:"story"};
function render(){
  const app=document.getElementById("app");const child=CHILDREN.find(c=>c.id===ui.child);
  let h=`<div class="hero"><h1>🌍 The Atlas Chronicles</h1><p>Chapter 3: Into the Wild</p><div class="ks-badges"><span class="ks-badge">📚 KS1 Bay</span><span class="ks-badge">📚 KS2 Cub</span><span class="ks-badge" style="background:rgba(240,180,41,0.1);border-color:rgba(240,180,41,0.2);color:#f0b429">📚 KS3 Owl</span></div></div>`;
  if(ui.view==="profiles")h+=renderProfiles();
  else if(ui.view==="learn"&&child)h+=renderLearn(child);
  app.innerHTML=h;
}
function renderProfiles(){
  let h=`<div class="section-label">Choose your explorer</div><div class="profile-grid">`;
  CHILDREN.forEach(c=>{const s=state[c.id];const comp=(s.sectionsComplete||[]).length;h+=`<div class="profile-card ${ui.child===c.id?"active":""}" onclick="selectChild('${c.id}')"><div style="font-size:2.8rem">${c.avatar}</div><div class="pname">${c.name}</div><div class="plevel">${c.level}</div><div class="pstars">${comp>0?"⭐".repeat(comp)+" ("+comp+"/5)":"Ready!"}</div></div>`;});
  return h+`</div>`;
}
function renderLearn(child){
  const s=state[child.id];const comp=s.sectionsComplete||[];
  const sections=[{id:"story",icon:"📖",name:"Story"},{id:"biomes",icon:"🌿",name:"Biomes"},{id:"maths",icon:"📐",name:"Maths"},{id:"task",icon:"✍️",name:"Task"},{id:"quiz",icon:"✅",name:"Quiz"}];
  let h=`<a href="index.html" class="back-btn">← Home</a>`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:2rem">${child.avatar}</span><div><div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#81c784">${child.name} — Chapter 3</div><div style="color:#666;font-size:0.73rem">${child.level} · ⭐ ${comp.length}/${sections.length} done</div></div></div>`;
  h+=`<div class="progress-overview">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<div class="prog-tile ${done?"done":""}"><div class="prog-icon">${sec.icon}</div><div class="prog-name">${done?"✓ ":""}${sec.name}</div></div>`;});
  h+=`</div><div class="nav-tabs">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<button class="nav-tab ${ui.section===sec.id?"active":""} ${done?"done":""}" onclick="switchSection('${sec.id}')">${sec.icon} ${sec.name}</button>`;});
  h+=`</div>`;
  if(ui.section==="story")h+=renderStory(child,s);
  else if(ui.section==="biomes")h+=renderBiomes(child,s);
  else if(ui.section==="maths")h+=renderMaths(child,s);
  else if(ui.section==="task")h+=renderTask(child,s);
  else if(ui.section==="quiz")h+=renderQuiz(child,s);
  return h;
}
function renderStory(child,s){
  const pg=Math.min(s.storyPage,STORY.length-1);const page=STORY[pg];const isLast=pg>=STORY.length-1;
  let h=`<div class="story-panel"><div class="chapter-label">Chapter 3 · Page ${pg+1} of ${STORY.length}</div><div class="story-h">Into the Wild</div><div class="story-emoji">${page.emoji}</div><div class="story-body">${page.text(child.id)}</div><div class="page-nav"><span class="page-ctr">${pg+1}/${STORY.length}</span>`;
  if(!isLast)h+=`<button class="cont-btn" onclick="nextPage()">Continue →</button>`;
  else h+=`<button class="cont-btn" onclick="completeSection('story');switchSection('biomes')">Explore Biomes! 🌿</button>`;
  return h+`</div></div>`;
}
function renderBiomes(child,s){
  let h=`<div class="explorer-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">🌿 ${child.ks}: Biomes & Ecosystems</div><div class="explorer-title">🌿 Biome Explorer</div><div class="explorer-sub">Click each biome to explore — climate, species, threats, and Portugal connections</div><div class="biome-grid">`;
  BIOMES.forEach(b=>{h+=`<div class="biome-card ${s.selectedBiome===b.id?"selected":""}" onclick="selectBiome('${b.id}')"><div class="biome-emoji">${b.emoji}</div><div class="biome-name">${b.name}</div><div class="biome-sub">${b.area}</div></div>`;});
  h+=`</div>`;
  if(s.selectedBiome){
    const b=BIOMES.find(x=>x.id===s.selectedBiome);
    if(b){
      h+=`<div class="biome-detail"><div style="font-family:'Fredoka One',cursive;color:#81c784;font-size:1.2rem;margin-bottom:8px">${b.emoji} ${b.name}</div><div class="b-stats">`;
      [["🌡️ Climate",b.climate],["📍 Coverage",b.area],["🦎 Species",b.species],["⚠️ Threats",b.threats]].forEach(([l,v])=>{h+=`<div class="bstat"><div class="bstat-label">${l}</div><div class="bstat-val" style="font-size:0.74rem">${v}</div></div>`;});
      h+=`</div><div style="font-size:0.85rem;color:#c8e6c9;line-height:1.65;margin-bottom:8px">${b.story}</div>`;
      h+=`<div class="portugal-pull"><strong>🇵🇹 Portugal Connection</strong>${b.portugal}</div>`;
      if(child.id==="owl")h+=`<div class="ks3-pull"><strong>🦉 The bigger picture</strong>${b.ks3}</div>`;
      h+=`</div>`;
    }
    h+=`<div style="margin-top:12px;text-align:center"><button class="btn-green" onclick="completeSection('biomes');switchSection('maths')">Maths! 📐</button></div>`;
  } else h+=`<div style="text-align:center;padding:14px;color:#555;font-size:0.82rem">👆 Click any biome to explore</div>`;
  return h+`</div>`;
}
function renderMaths(child,s){
  const id=child.id;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="math-panel"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">📐 ${child.ks}: Nature in Numbers</div><div style="font-family:'Fredoka One',cursive;color:#f0b429;font-size:1.2rem;margin-bottom:4px">📐 Wild Numbers</div><div style="color:#777;font-size:0.78rem;margin-bottom:14px">Real data from the natural world</div>`;
  chs.forEach((ch,idx)=>{
    const answered=s.mathAnswered&&s.mathAnswered[idx];const inputVal=(s.mathInputs&&s.mathInputs[idx])||"";
    h+=`<div class="challenge-card"><div class="ch-title">📐 ${ch.title}</div><div class="ch-story">${ch.story}</div><div class="ch-q">${ch.q}</div>`;
    if(!answered){h+=`<div class="math-row"><input class="math-in" type="text" value="${inputVal.replace(/"/g,'&quot;')}" placeholder="Answer..." oninput="updateMath(${idx},this.value)" onkeydown="if(event.key==='Enter')checkMath(${idx})"><span class="math-unit">${ch.unit}</span><button class="math-go" onclick="checkMath(${idx})">Check ✓</button></div>`;if(s.mathAnswered&&s.mathAnswered[idx]==="wrong")h+=`<div class="math-no">Not quite — try again!</div>`;}
    else{h+=`<div class="math-ok">✅ Correct!</div><div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 12px;font-size:0.78rem;color:#aaa;line-height:1.6;margin-top:6px"><strong style="color:#f0b429">Working:</strong> ${ch.working}</div><div class="math-fact">🤩 ${ch.fact}</div>`;}
    h+=`</div>`;});
  const allDone=chs.every((_,i)=>s.mathAnswered&&s.mathAnswered[i]==="correct");
  if(allDone)h+=`<div style="text-align:center;margin-top:12px"><button class="btn-green" onclick="completeSection('maths');switchSection('task')">Do the Task! ✍️</button></div>`;
  return h+`</div>`;
}
function renderTask(child,s){
  const id=child.id;const task=TASKS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="task-box"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✍️ ${child.ks}: Writing Task</div><div class="task-title">${task.icon} ${task.title}</div><div class="task-level">${task.level}</div><div class="task-brief">${task.brief}</div><textarea class="task-ta" placeholder="${task.placeholder}" oninput="updateTask(this.value)">${s.taskText||""}</textarea><br><button class="task-btn" onclick="saveTask()">Save 💾</button>`;
  if(s.taskSaved)h+=`<div class="saved-ok">✅ Saved!</div>`;
  if((s.taskText||"").length>80)h+=`<div style="margin-top:10px"><button class="btn-green" onclick="completeSection('task');switchSection('quiz')">Take the Quiz! ✅</button></div>`;
  return h+`</div>`;
}
function renderQuiz(child,s){
  const id=child.id;const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];const idx=s.quizIdx||0;
  if(s.quizDone||idx>=qs.length){
    const score=s.quizScore||0;const pct=Math.round((score/qs.length)*100);
    return`<div class="quiz-wrap"><div class="score-banner"><h2>Chapter 3 Complete! 🌿</h2><div style="font-size:3rem;margin:8px 0">${pct>=80?"🏆":pct>=60?"⭐":"💪"}</div><div style="color:#ccc">${score}/${qs.length} (${pct}%)</div><div style="display:flex;gap:8px;justify-content:center;margin-top:12px"><button onclick="resetQuiz()" style="background:rgba(255,255,255,0.07);color:#ccc;border:1px solid rgba(255,255,255,0.12);padding:9px 18px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer">Try Again 🔄</button><a href="chapter4.html" class="btn-green" style="padding:9px 18px;text-decoration:none">Chapter 4 → Rivers & Oceans</a></div></div></div>`;
  }
  const q=qs[idx];const answers=s.quizAnswers||[];const thisAns=answers[idx];
  let h=`<div class="quiz-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✅ ${child.ks} Quiz</div><div class="section-label">Quiz · Q${idx+1} of ${qs.length}</div><div class="score-dots">`;
  qs.forEach((_,i)=>{const a=answers[i];h+=`<div class="sdot ${i===idx?"current":a===undefined?"":a===qs[i].ans?"done":"wrong"}"></div>`;});
  h+=`</div><div class="q-text">${q.q}</div><div class="q-opts">`;
  q.opts.forEach((opt,i)=>{let cls="q-opt";if(thisAns!==undefined){if(i===q.ans)cls+=" correct";else if(i===thisAns&&i!==q.ans)cls+=" wrong";}h+=`<button class="${cls}" ${thisAns!==undefined?"disabled":""} onclick="answerQuiz(${i})">${opt}</button>`;});
  h+=`</div>`;
  if(thisAns!==undefined){h+=`<div class="q-fact">🤩 ${q.fact}</div><div style="text-align:right;margin-top:8px"><button class="btn-green" onclick="nextQuiz()">Next →</button></div>`;}
  return h+`</div>`;
}
function selectChild(id){ui.child=id;ui.view="learn";ui.section="story";render();}
function switchSection(s){ui.section=s;render();}
function completeSection(s){const comp=state[ui.child].sectionsComplete||[];if(!comp.includes(s))state[ui.child].sectionsComplete=[...comp,s];saveState();}
function nextPage(){if(state[ui.child].storyPage<STORY.length-1){state[ui.child].storyPage++;saveState();render();}}
function selectBiome(id){state[ui.child].selectedBiome=id;saveState();render();}
function updateMath(idx,v){if(!state[ui.child].mathInputs)state[ui.child].mathInputs={};state[ui.child].mathInputs[idx]=v;}
function checkMath(idx){
  const id=ui.child;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];const ch=chs[idx];
  const input=(state[id].mathInputs&&state[id].mathInputs[idx]||"").trim().replace(/,/g,"");
  const correctVal=ch.answer.replace(/,/g,"");
  const userNum=parseFloat(input);const correctNum=parseFloat(correctVal);
  const correct=!isNaN(userNum)&&!isNaN(correctNum)&&Math.abs(userNum-correctNum)/Math.max(correctNum,0.001)<0.05;
  if(!state[id].mathAnswered)state[id].mathAnswered={};state[id].mathAnswered[idx]=correct?"correct":"wrong";saveState();render();
}
function answerQuiz(i){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const idx=s.quizIdx||0;const q=qs[idx];
  const answers=[...(s.quizAnswers||[])];while(answers.length<=idx)answers.push(undefined);
  answers[idx]=i;if(i===q.ans)state[id].quizScore=(s.quizScore||0)+1;
  state[id].quizAnswers=answers;saveState();render();
}
function nextQuiz(){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const next=(s.quizIdx||0)+1;state[id].quizIdx=next;if(next>=qs.length)state[id].quizDone=true;saveState();render();
}
function resetQuiz(){const id=ui.child;state[id].quizIdx=0;state[id].quizAnswers=[];state[id].quizDone=false;state[id].quizScore=0;saveState();render();}
function updateTask(v){state[ui.child].taskText=v;}
function saveTask(){state[ui.child].taskSaved=true;saveState();render();}
render();
</script>
