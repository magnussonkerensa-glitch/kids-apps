.btn-red{background:linear-gradient(135deg,#bf360c,#d84315);color:#ffccbc;border:none;border-radius:22px;padding:9px 18px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer}

.ks-tag.ks3{background:rgba(240,180,41,0.07);border-color:rgba(240,180,41,.13);color:#f0b429}

<body>
<div class="wrap" id="app"></div>
<script>
const CHILDREN=[
  {id:"owl",name:"Owl",age:12,avatar:"🦉",ks:"KS3",level:"KS3 — Secondary Level"},
  {id:"cub",name:"Cub",age:9,avatar:"🐻",ks:"KS2",level:"KS2 — Primary Level"},
  {id:"bay",name:"Bay",age:7,avatar:"🌿",ks:"KS1",level:"KS1/KS2 — Foundation"}
];
const STORY=[
  {emoji:"🌍",text:(id)=>`<p>The ground beneath your feet is moving. Right now. You can't feel it — but it is.</p><p>The Earth's surface is broken into about 20 large pieces called tectonic plates, floating on a layer of semi-molten rock called the mantle. They drift at between 2-8cm per year — roughly the speed your fingernails grow. Slow, yes. But they've been moving for 4.5 billion years. That's enough time to build mountain ranges, open oceans, and close them again.</p>
<div class="fact-pull"><strong>🌍 Plates — Earth's jigsaw puzzle</strong>There are about 7 major plates and 13 minor ones. The Pacific Plate is the largest, covering most of the Pacific Ocean. Plates move because of convection currents in the mantle — hot rock rises, spreads sideways, cools, sinks, heats up again. This conveyor belt of rock drives everything: earthquakes, volcanoes, mountain building and ocean formation. The Atlantic Ocean is currently growing by about 2.5cm per year. The Pacific is shrinking. In about 250 million years, the continents will have merged into a new supercontinent.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal sits on a fault line — this is not a metaphor</strong>The Azores archipelago sits directly on the Mid-Atlantic Ridge — the boundary between the North American and Eurasian tectonic plates. New ocean floor is being created there right now. The last volcanic eruption in the Azores was Capelinhos in 1957-58, which created a new peninsula still visible today. Mainland Portugal is also seismically active — the 1755 Lisbon earthquake (M8.5-9.0) was caused by movement on the Azores-Gibraltar fault, and killed up to 50,000 people. Portugal lives with tectonic risk every day.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Three types of plate boundary — three very different results</strong>How plates meet determines what happens. There are only three options.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>Divergent</strong> (pulling apart): new ocean floor created, gentle earthquakes, shield volcanoes. Mid-Atlantic Ridge — the Azores sit on this.</li><li><strong>Convergent</strong> (crashing together): if ocean meets continent, ocean dives under (subduction) — deep trenches, violent earthquakes, explosive volcanoes. If continent meets continent — mountains. Himalayas = India crashing into Asia.</li><li><strong>Transform</strong> (sliding past): no crust created or destroyed — violent earthquakes, no volcanoes. San Andreas Fault, California.</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: the Himalayas are still growing by about 5mm per year because India is still moving north into Asia. They started forming 50 million years ago. How tall might they be in another 50 million years?</em></div>`:""}`},
  {emoji:"🌋",text:(id)=>`<p>Volcanoes are where the inside of the Earth comes out.</p><p>There are about 1,500 potentially active volcanoes on Earth, and about 50-70 erupt every year. Most eruptions are relatively minor — effusive lava flows, ash clouds, steam. But occasionally something much bigger happens. The 1815 eruption of Mount Tambora in Indonesia was so powerful it ejected enough ash and sulphur dioxide into the upper atmosphere to cool the entire planet. 1816 became "the Year Without a Summer" — crop failures across Europe and North America caused famines that killed hundreds of thousands of people. A volcano in Indonesia killed people in Switzerland.</p>
<div class="fact-pull"><strong>🌋 Volcanoes — the variety is extraordinary</strong>Shield volcanoes (Hawaii): gently sloping, runny lava, rarely explosive. Composite/stratovolcanoes (Vesuvius, Krakatoa, Etna): steep-sided, silica-rich thick lava, extremely explosive. Supervolcanoes (Yellowstone, Toba): capable of eruptions 1,000x more powerful than normal volcanoes. A Yellowstone supereruption would blanket North America in ash and cool the planet for years. Calderas (collapsed volcano craters) mark where supervolcanoes sit. The last Toba supereruption 74,000 years ago may have reduced the entire human population to as few as 10,000 individuals.</div>
<div class="portugal-pull"><strong>🇵🇹 The Azores — volcanoes you can walk on</strong>All nine Azorean islands were formed by volcanic eruptions from the Mid-Atlantic Ridge. They are geologically young — Faial island's Capelinhos eruption was in 1957-58. The islands have hot springs, geysers, volcanic craters (calderas), and black lava beaches. Sete Cidades on São Miguel island is a stunning caldera lake. The Azores sit at the triple junction where three tectonic plates meet — North American, Eurasian and African — making them one of the most geologically complex places on Earth.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The Year Without a Summer — how one volcano changed history</strong>Mount Tambora erupted in April 1815 with 100 times the energy of Hiroshima. The human consequences were global and lasted years.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Ejected 150km³ of material — enough to cool global temperatures by 0.4-0.7°C</li><li>1816: crop failures in Europe, North America and Asia caused famines killing 200,000+ people</li><li>Mary Shelley wrote Frankenstein that summer, stuck indoors at Lake Geneva during the grey, cold weather</li><li>Famine-driven migration changed the demographics of North America as Irish and European farmers emigrated</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: a volcanic eruption in Indonesia caused a famine in Ireland and influenced a novel written in Switzerland. How does this illustrate the concept of interconnected systems?</em></div>`:""}`},
  {emoji:"🏔️",text:(id)=>`<p>Mountains don't just sit there looking beautiful. They run the world.</p><p>Mountains determine where rain falls (and therefore where people can farm). They channel winds, create rain shadows, block invasions, channel trade routes, define national borders. The Alps divided northern and southern Europe for most of history. The Himalayas separate South Asia from Central Asia so completely that they created distinct civilisations on each side. The Andes run the entire length of South America, splitting it into Pacific coast and Atlantic basin, two completely different worlds.</p><p>And mountains store the water that billions of people depend on. Snow and glaciers on mountain ranges act as water towers — storing winter precipitation and releasing it slowly through summer. As climate change melts glaciers, the water tower is draining.</p>
<div class="fact-pull"><strong>🏔️ Mountains — the world's water towers are melting</strong>The Hindu Kush-Himalaya range provides fresh water to 240 million people directly, and to 1.65 billion people in river valleys below. Its glaciers are retreating at accelerating rates — in the last 40 years, the region has lost 40% of its ice. Short term: more flooding as glaciers melt faster. Long term: rivers run dry in summer as there is no ice left to melt. The Ganges, Brahmaputra, Yellow River and Yangtze all originate here. China, India, Pakistan, Bangladesh and Nepal are all affected.</div>
<div class="portugal-pull"><strong>🇵🇹 Serra da Estrela — Portugal's own mountain weather system</strong>The Serra da Estrela in central Portugal reaches 1,993m — mainland Portugal's highest point. It acts as a weather barrier: Atlantic moisture from the west rises, cools and falls as rain (or snow in winter) on the western slopes, leaving the eastern side significantly drier. This is called the rain shadow effect, and it creates two distinct landscapes either side of the same mountain range. The Serra da Estrela also feeds several of Portugal's rivers, including the Mondego, and provides water to a significant portion of central Portugal. It is Portugal's miniature version of the Himalayan water tower problem — its snowpack is declining.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Why mountains make countries — and why that's changing</strong>For most of human history, mountains were the most reliable natural borders. They were almost impossible to cross in winter, expensive to defend, and clear to everyone on both sides. The Alps defined European geopolitics for 2,000 years.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Switzerland exists partly because it's surrounded by mountains — hard to conquer, good for banking</li><li>The Pyrenees defined the France-Spain border so naturally that it barely changed for 1,000 years</li><li>The Himalayas created such a complete barrier that India and China developed entirely independently for millennia</li><li>Climate change is making mountain passes more accessible — geopolitical borders that relied on geographical inaccessibility are becoming more permeable</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if Himalayan glaciers disappear, the rivers that 240 million people depend on for water will eventually run dry in summer. Which countries would be most affected — and would this cause cooperation or conflict?</em></div>`:""}`},
  {emoji:"💥",text:(id)=>`<p>Earthquakes are honest. They show you exactly where the risk is — if you're paying attention.</p><p>The 1755 Lisbon earthquake is one of the most significant in European history — not just for the destruction it caused, but for what came after. The Marquis of Pombal, Portugal's effective prime minister, organised the response with remarkable efficiency. He surveyed every parish in Portugal, systematically recording what had happened — the first systematic scientific study of an earthquake's effects. He rebuilt Lisbon using new earthquake-resistant construction methods. He is, in a real sense, the founder of modern seismology and modern disaster management.</p>
<div class="fact-pull"><strong>💥 Earthquake scale — the Richter scale is not what you think</strong>The Richter scale is logarithmic: each whole number represents 10 times more ground motion and about 31 times more energy. So a M7.0 earthquake releases 31 times more energy than a M6.0 — not 1.17 times more. A M9.0 (like the 2011 Tohoku earthquake in Japan) releases about 31,000 times more energy than a M6.0. The deadliest earthquake in history was the 1556 Shaanxi earthquake in China (M8.0 estimated) which killed approximately 830,000 people — mostly because the population lived in cave-dwellings carved into soft loess cliffs that collapsed completely.</div>
<div class="portugal-pull"><strong>🇵🇹 The 1755 Lisbon earthquake — where modern science began</strong>On 1 November 1755 — All Saints' Day — an earthquake estimated at M8.5-9.0 struck off the coast of Portugal. In Lisbon, churches full of worshippers collapsed. Fires broke out. A tsunami arrived 40 minutes later. Between 40,000 and 50,000 people died — about 20% of Lisbon's population. The earthquake was felt as far away as Finland. Pombal's systematic survey of the damage — asking parish priests across Portugal identical questions about the earthquake's effects — was the first scientific earthquake questionnaire in history, and the birth of seismology as a discipline.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Why the same earthquake kills 200 in Japan but 200,000 in Haiti</strong>The 2010 Haiti earthquake (M7.0) killed approximately 230,000 people. The 2011 Japan earthquake (M9.0 — 1,000 times more powerful) killed approximately 20,000. The explanation is not the earthquake. It's everything else.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Japan: strict building codes since 1981, earthquake early warning system (30-60 sec warning), public earthquake drills, well-funded emergency services</li><li>Haiti: poorest country in the Americas, buildings constructed without codes, no warning system, overwhelmed emergency services</li><li>Death tolls from natural hazards are primarily a function of <strong>wealth and governance</strong>, not geology</li><li>This has a name: the <strong>hazard vs disaster</strong> distinction — an earthquake is a hazard; a disaster is what happens when a hazard meets a vulnerable society</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if death tolls from earthquakes reflect wealth and governance rather than geological severity, what does this tell us about international development priorities?</em></div>`:""}`},
  {emoji:"🌐",text:(id)=>`<p>The planet is restless. And it is more restless now than it was.</p><p>Not because of tectonic activity — plates move at their own pace regardless of what humans do. But because climate change is triggering secondary geological events that we are only beginning to understand. Melting glaciers reduce the weight pressing down on mountains and continental shelves — and rock, freed from that weight, can move. Iceland has documented increased volcanic activity as its glaciers retreat. Parts of Scandinavia, freed from the weight of ice sheets that melted 12,000 years ago, are still rising by several millimetres per year.</p><p>The ground beneath us is not as stable as we imagine. And we are changing it in ways our grandparents could not have anticipated.</p>
<div class="fact-pull"><strong>🌐 Isostatic rebound — land that is still bouncing back from the ice age</strong>During the last ice age, ice sheets up to 3km thick covered Scandinavia, Canada and other high-latitude regions. The weight of this ice pushed the land down — in some places by hundreds of metres. When the ice melted (12,000 years ago), the land started to rise back up. This process — called isostatic rebound — is still happening. Stockholm is rising by 4-5mm per year. In 7,000 years, the Baltic Sea will be a large lake. The Earth is still responding to something that happened 12,000 years ago.</div>
<div class="portugal-pull"><strong>🇵🇹 The Azores — Earth's most visible tectonic laboratory</strong>The Azores sit at the triple junction of three tectonic plates — the North American, Eurasian and African. This makes them one of the most geologically dynamic places on Earth and also one of the most scientifically valuable. Portuguese geologists and international researchers study the Azores to understand how plates interact, how islands form and grow, and how submarine volcanoes create new land. The Azores are not just a beautiful tourist destination — they are a window into how the planet works, right on Portugal's doorstep.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Climate change is waking up volcanoes — this is not science fiction</strong>The connection between ice melt and volcanic activity sounds unlikely. The physics is straightforward.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Ice caps weigh millions of tonnes — they press down on the crust and suppress magma movement</li><li>When ice melts, pressure decreases — magma can rise more easily</li><li>Iceland study (2010): as Vatnajokull glacier retreats, magma chamber fills faster and eruptions become more likely</li><li>This is called a <strong>positive feedback</strong>: climate change → glacier melt → volcanic activity → more CO2 in atmosphere → more climate change</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: we think of volcanoes and climate change as separate systems. This example shows they are connected. What other connections between geological systems and climate systems might exist that we haven't discovered yet?</em></div>`:""}`}

losophy and urban planning all changed because of one morning in Lisbon."}

   brief:`<p>Write an analytical essay responding to:</p>
<blockquote style="border-left:3px solid #ff7043;padding:8px 14px;color:#ffccbc;font-style:italic;margin:10px 0">"Natural disasters are not natural — they are products of human inequality." How far do you agree?</blockquote>
<ul><li>Define the distinction between hazard and disaster</li><li>Use at least <strong>two contrasting case studies</strong> (e.g. Japan vs Haiti; Lisbon 1755 and its aftermath)</li><li>Consider the role of <strong>wealth, governance and building codes</strong></li><li>Address the counter-argument: some hazards are extreme enough to cause disasters regardless of preparation</li><li>Reach a clear conclusion</li></ul>`,
   placeholder:"Definition of hazard vs disaster:\n\nCase study 1:\n\nCase study 2:\n\nCounter-argument:\n\nConclusion:"},
  cub:{icon:"🐻",title:"Design an Earthquake-Safe City",level:"KS2 Geography + Science",
   brief:`<p>You are building a new city in an earthquake zone. Using what you've learned, explain:</p>
<ul><li>What type of buildings would you design?</li><li>What early warning systems would you install?</li><li>How would you prepare the people who live there?</li><li>What would you do in the first 24 hours after an earthquake?</li><li>Why might a poor country find it harder to do these things?</li></ul>`,
   placeholder:"Building design:\n\nEarly warning systems:\n\nPreparing people:\n\nFirst 24 hours after earthquake:\n\nWhy poor countries find it harder:"},
  bay:{icon:"🌿",title:"My Volcano Story",level:"KS1/KS2 Foundation",
   brief:`<p>Imagine you are a scientist visiting the Azores to study the Capelinhos volcano. Write about your visit:</p>
<ul><li>What does the volcano look like?</li><li>What can you see, hear and smell?</li><li>What does it tell you about how the islands were formed?</li><li>Would you like to live near a volcano? Why or why not?</li></ul>`,
   placeholder:"When I arrived at Capelinhos...\n\nI could see...\nI could hear...\nI could smell...\n\nThe volcano tells me...\n\nI would/wouldn't like to live near a volcano because..."}
};
const SAVE_KEY="atlas_ch5_v1";
function defaultState(){const s={};CHILDREN.forEach(c=>{s[c.id]={storyPage:0,selectedPlate:null,quizIdx:0,quizAnswers:[],quizDone:false,quizScore:0,mathInputs:{},mathAnswered:{},taskText:"",taskSaved:false,sectionsComplete:[]};});return s;}
function loadState(){try{const s=localStorage.getItem(SAVE_KEY);if(s)return{...defaultState(),...JSON.parse(s)};}catch(e){}return defaultState();}
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}}
let state=loadState();let ui={view:"profiles",child:null,section:"story"};
function render(){
  const app=document.getElementById("app");const child=CHILDREN.find(c=>c.id===ui.child);
  let h=`<div class="hero"><h1>🌍 The Atlas Chronicles</h1><p>Chapter 5: Mountains and Plates</p><div class="ks-badges"><span class="ks-badge">📚 KS1 Bay</span><span class="ks-badge">📚 KS2 Cub</span><span class="ks-badge" style="background:rgba(240,180,41,0.1);border-color:rgba(240,180,41,0.2);color:#f0b429">📚 KS3 Owl</span></div></div>`;
  if(ui.view==="profiles")h+=renderProfiles();
  else if(ui.view==="learn"&&child)h+=renderLearn(child);
  app.innerHTML=h;
}
function renderProfiles(){
  let h=`<div class="section-label">Choose your explorer</div><div class="profile-grid">`;
  CHILDREN.forEach(c=>{const s=state[c.id];const comp=(s.sectionsComplete||[]).length;h+=`<div class="profile-card ${ui.child===c.id?"active":""}" onclick="selectChild('${c.id}')"><div style="font-size:2.8rem">${c.avatar}</div><div class="pname">${c.name}</div><div class="plevel">${c.level}</div><div class="pstars">${comp>0?"⭐".repeat(comp)+" ("+comp+"/5)":"Ready!"}</div></div>`;});
  return h+`</div>`;
}
function renderLearn(child){
  const s=state[child.id];const comp=s.sectionsComplete||[];
  const sections=[{id:"story",icon:"📖",name:"Story"},{id:"plates",icon:"🌋",name:"Plates"},{id:"maths",icon:"📐",name:"Maths"},{id:"task",icon:"✍️",name:"Task"},{id:"quiz",icon:"✅",name:"Quiz"}];
  let h=`<a href="index.html" class="back-btn">← Home</a>`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:2rem">${child.avatar}</span><div><div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#ff7043">${child.name} — Chapter 5</div><div style="color:#666;font-size:0.73rem">${child.level} · ⭐ ${comp.length}/${sections.length} done</div></div></div>`;
  h+=`<div class="progress-overview">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<div class="prog-tile ${done?"done":""}"><div class="prog-icon">${sec.icon}</div><div class="prog-name">${done?"✓ ":""}${sec.name}</div></div>`;});
  h+=`</div><div class="nav-tabs">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<button class="nav-tab ${ui.section===sec.id?"active":""} ${done?"done":""}" onclick="switchSection('${sec.id}')">${sec.icon} ${sec.name}</button>`;});
  h+=`</div>`;
  if(ui.section==="story")h+=renderStory(child,s);
  else if(ui.section==="plates")h+=renderPlates(child,s);
  else if(ui.section==="maths")h+=renderMaths(child,s);
  else if(ui.section==="task")h+=renderTask(child,s);
  else if(ui.section==="quiz")h+=renderQuiz(child,s);
  return h;
}
function renderStory(child,s){
  const pg=Math.min(s.storyPage,STORY.length-1);const page=STORY[pg];const isLast=pg>=STORY.length-1;
  let h=`<div class="story-panel"><div class="chapter-label">Chapter 5 · Page ${pg+1} of ${STORY.length}</div><div class="story-h">Mountains and Plates</div><div class="story-emoji">${page.emoji}</div><div class="story-body">${page.text(child.id)}</div><div class="page-nav"><span class="page-ctr">${pg+1}/${STORY.length}</span>`;
  if(!isLast)h+=`<button class="cont-btn" onclick="nextPage()">Continue →</button>`;
  else h+=`<button class="cont-btn" onclick="completeSection('story');switchSection('plates')">Explore Plates! 🌋</button>`;
  return h+`</div></div>`;
}
function renderPlates(child,s){
  let h=`<div class="explorer-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">🌋 ${child.ks}: Tectonic Plates and Hazards</div><div class="explorer-title">🌋 Plate Boundary Explorer</div><div class="explorer-sub">Click each boundary — geology, hazards, and Portugal connections</div><div class="plates-grid">`;
  PLATES.forEach(p=>{h+=`<div class="plate-card ${s.selectedPlate===p.id?"selected":""}" onclick="selectPlate('${p.id}')"><div class="plate-emoji">${p.emoji}</div><div class="plate-name">${p.name}</div><div class="plate-sub">${p.type}</div></div>`;});
  h+=`</div>`;
  if(s.selectedPlate){
    const p=PLATES.find(x=>x.id===s.selectedPlate);
    if(p){
      h+=`<div class="plate-detail"><div style="font-family:'Fredoka One',cursive;color:#ff7043;font-size:1.2rem;margin-bottom:8px">${p.emoji} ${p.name}</div><div class="p-stats">`;
      [["🔬 Type",p.type],["➡️ Movement",p.movement],["⛰️ Effect",p.effect],["⚠️ Hazard",p.hazard]].forEach(([l,v])=>{h+=`<div class="pstat"><div class="pstat-label">${l}</div><div class="pstat-val" style="font-size:0.74rem">${v}</div></div>`;});
      h+=`</div><div style="font-size:0.85rem;color:#ffccbc;line-height:1.65;margin-bottom:8px">${p.story}</div>`;
      h+=`<div class="portugal-pull"><strong>🇵🇹 Portugal Connection</strong>${p.portugal}</div>`;
      if(child.id==="owl")h+=`<div class="ks3-pull"><strong>🦉 The bigger picture</strong>${p.ks3}</div>`;
      h+=`</div>`;
    }
    h+=`<div style="margin-top:12px;text-align:center"><button class="btn-red" onclick="completeSection('plates');switchSection('maths')">Maths! 📐</button></div>`;
  } else h+=`<div style="text-align:center;padding:14px;color:#555;font-size:0.82rem">👆 Click any boundary to explore</div>`;
  return h+`</div>`;
}
function renderMaths(child,s){
  const id=child.id;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="math-panel"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">📐 ${child.ks}: Tectonic Numbers</div><div style="font-family:'Fredoka One',cursive;color:#f0b429;font-size:1.2rem;margin-bottom:4px">📐 Mountains in Numbers</div><div style="color:#777;font-size:0.78rem;margin-bottom:14px">Real data from Earth's tectonic systems</div>`;
  chs.forEach((ch,idx)=>{
    const answered=s.mathAnswered&&s.mathAnswered[idx];const inputVal=(s.mathInputs&&s.mathInputs[idx])||"";
    h+=`<div class="challenge-card"><div class="ch-title">📐 ${ch.title}</div><div class="ch-story">${ch.story}</div><div class="ch-q">${ch.q}</div>`;
    if(!answered){h+=`<div class="math-row"><input class="math-in" type="text" value="${inputVal.replace(/"/g,'&quot;')}" placeholder="Answer..." oninput="updateMath(${idx},this.value)" onkeydown="if(event.key==='Enter')checkMath(${idx})"><span class="math-unit">${ch.unit}</span><button class="math-go" onclick="checkMath(${idx})">Check ✓</button></div>`;if(s.mathAnswered&&s.mathAnswered[idx]==="wrong")h+=`<div class="math-no">Not quite — try again!</div>`;}
    else{h+=`<div class="math-ok">✅ Correct!</div><div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 12px;font-size:0.78rem;color:#aaa;line-height:1.6;margin-top:6px"><strong style="color:#f0b429">Working:</strong> ${ch.working}</div><div class="math-fact">🤩 ${ch.fact}</div>`;}
    h+=`</div>`;});
  const allDone=chs.every((_,i)=>s.mathAnswered&&s.mathAnswered[i]==="correct");
  if(allDone)h+=`<div style="text-align:center;margin-top:12px"><button class="btn-red" onclick="completeSection('maths');switchSection('task')">Do the Task! ✍️</button></div>`;
  return h+`</div>`;
}
function renderTask(child,s){
  const id=child.id;const task=TASKS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="task-box"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✍️ ${child.ks}: Writing Task</div><div class="task-title">${task.icon} ${task.title}</div><div class="task-level">${task.level}</div><div class="task-brief">${task.brief}</div><textarea class="task-ta" placeholder="${task.placeholder}" oninput="updateTask(this.value)">${s.taskText||""}</textarea><br><button class="task-btn" onclick="saveTask()">Save 💾</button>`;
  if(s.taskSaved)h+=`<div class="saved-ok">✅ Saved!</div>`;
  if((s.taskText||"").length>80)h+=`<div style="margin-top:10px"><button class="btn-red" onclick="completeSection('task');switchSection('quiz')">Take the Quiz! ✅</button></div>`;
  return h+`</div>`;
}
function renderQuiz(child,s){
  const id=child.id;const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];const idx=s.quizIdx||0;
  if(s.quizDone||idx>=qs.length){
    const score=s.quizScore||0;const pct=Math.round((score/qs.length)*100);
    return`<div class="quiz-wrap"><div class="score-banner"><h2>Chapter 5 Complete! 🏔️</h2><div style="font-size:3rem;margin:8px 0">${pct>=80?"🏆":pct>=60?"⭐":"💪"}</div><div style="color:#ccc">${score}/${qs.length} (${pct}%)</div><div style="display:flex;gap:8px;justify-content:center;margin-top:12px"><button onclick="resetQuiz()" style="background:rgba(255,255,255,0.07);color:#ccc;border:1px solid rgba(255,255,255,0.12);padding:9px 18px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer">Try Again 🔄</button><a href="chapter6.html" class="btn-red" style="padding:9px 18px;text-decoration:none">Chapter 6 → Languages and Cultures</a></div></div></div>`;
  }
  const q=qs[idx];const answers=s.quizAnswers||[];const thisAns=answers[idx];
  let h=`<div class="quiz-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✅ ${child.ks} Quiz</div><div class="section-label">Quiz · Q${idx+1} of ${qs.length}</div><div class="score-dots">`;
  qs.forEach((_,i)=>{const a=answers[i];h+=`<div class="sdot ${i===idx?"current":a===undefined?"":a===qs[i].ans?"done":"wrong"}"></div>`;});
  h+=`</div><div class="q-text">${q.q}</div><div class="q-opts">`;
  q.opts.forEach((opt,i)=>{let cls="q-opt";if(thisAns!==undefined){if(i===q.ans)cls+=" correct";else if(i===thisAns&&i!==q.ans)cls+=" wrong";}h+=`<button class="${cls}" ${thisAns!==undefined?"disabled":""} onclick="answerQuiz(${i})">${opt}</button>`;});
  h+=`</div>`;
  if(thisAns!==undefined){h+=`<div class="q-fact">🤩 ${q.fact}</div><div style="text-align:right;margin-top:8px"><button class="btn-red" onclick="nextQuiz()">Next →</button></div>`;}
  return h+`</div>`;
}
function selectChild(id){ui.child=id;ui.view="learn";ui.section="story";render();}
function switchSection(s){ui.section=s;render();}
function completeSection(s){const comp=state[ui.child].sectionsComplete||[];if(!comp.includes(s))state[ui.child].sectionsComplete=[...comp,s];saveState();}
function nextPage(){if(state[ui.child].storyPage<STORY.length-1){state[ui.child].storyPage++;saveState();render();}}
function selectPlate(id){state[ui.child].selectedPlate=id;saveState();render();}
function updateMath(idx,v){if(!state[ui.child].mathInputs)state[ui.child].mathInputs={};state[ui.child].mathInputs[idx]=v;}
function checkMath(idx){
  const id=ui.child;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];const ch=chs[idx];
  const input=(state[id].mathInputs&&state[id].mathInputs[idx]||"").trim().replace(/,/g,"");
  const correctVal=ch.answer.replace(/,/g,"");
  const userNum=parseFloat(input);const correctNum=parseFloat(correctVal);
  const correct=!isNaN(userNum)&&!isNaN(correctNum)&&Math.abs(userNum-correctNum)/Math.max(correctNum,0.001)<0.05;
  if(!state[id].mathAnswered)state[id].mathAnswered={};state[id].mathAnswered[idx]=correct?"correct":"wrong";saveState();render();
}
function answerQuiz(i){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const idx=s.quizIdx||0;const q=qs[idx];
  const answers=[...(s.quizAnswers||[])];while(answers.length<=idx)answers.push(undefined);
  answers[idx]=i;if(i===q.ans)state[id].quizScore=(s.quizScore||0)+1;
  state[id].quizAnswers=answers;saveState();render();
}
function nextQuiz(){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const next=(s.quizIdx||0)+1;state[id].quizIdx=next;if(next>=qs.length)state[id].quizDone=true;saveState();render();
}
function resetQuiz(){const id=ui.child;state[id].quizIdx=0;state[id].quizAnswers=[];state[id].quizDone=false;state[id].quizScore=0;saveState();render();}
function updateTask(v){state[ui.child].taskText=v;}
function saveTask(){state[ui.child].taskSaved=true;saveState();render();}
render();
</script>
</body>
