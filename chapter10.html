<style>

.challenge-card{background:rgba(255,255,255,0.04);border-radius:12px;padding:16px;margin-bottom:12px}

.math-ok{color:#a5d6a7;font-weight:700;margin-top:7px;font-size:0.88rem}
.math-no{color:#ef9a9a;margin-top:7px;font-size:0.82rem}
.math-fact{background:rgba(240,180,41,0.07);border-radius:8px;padding:9px;margin-top:7px;font-size:0.76rem;color:#ffe080;line-height:1.5}
.task-box{background:rgba(13,17,23,0.4);border:1px solid rgba(96,165,250,0.15);border-radius:18px;padding:20px;margin-bottom:18px}
.task-title{font-family:'Fredoka One',cursive;color:#60a5fa;font-size:1.1rem;margin-bottom:3px}

.task-ta{width:100%;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.09);border-radius:10px;padding:12px 14px;color:white;font-family:'Nunito',sans-serif;font-size:0.88rem;min-height:120px;outline:none;resize:vertical}
.task-ta:focus{border-color:#60a5fa}
.task-btn{background:linear-gradient(135deg,#1d4ed8,#1e40af);color:white;border:none;border-radius:22px;padding:9px 20px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;margin-top:8px}
.saved-ok{font-size:0.75rem;color:#60a5fa;margin-top:6px}
.back-btn{background:rgba(255,255,255,0.07);color:#ccc;border:1px solid rgba(255,255,255,0.12);padding:9px 18px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;margin-bottom:14px;display:inline-block;text-decoration:none}
.btn-blue{background:linear-gradient(135deg,#1d4ed8,#1e40af);color:#bfdbfe;border:none;border-radius:22px;padding:9px 18px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer}
.section-label{font-family:'Fredoka One',cursive;color:#60a5fa;font-size:0.78rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;opacity:.7}
.ks-tag{display:inline-block;background:rgba(96,165,250,0.07);border:1px solid rgba(96,165,250,0.13);color:#60a5fa;font-size:0.62rem;font-weight:800;padding:2px 8px;border-radius:20px;margin-bottom:10px;letter-spacing:.5px}
.ks-tag.ks3{background:rgba(240,180,41,0.07);border-color:rgba(240,180,41,.13);color:#f0b429}

.prog-tile{background:rgba(255,255,255,0.03);border-radius:9px;padding:8px 3px;text-align:center;border:1px solid rgba(255,255,255,0.05)}
.prog-tile.done{border-color:rgba(96,165,250,0.35);background:rgba(96,165,250,0.06)}
.prog-icon{font-size:1.1rem}.prog-name{font-size:0.52rem;color:#555;margin-top:2px}
.prog-tile.done .prog-name{color:#60a5fa}

</style>

<body>
<div class="wrap" id="app"></div>
<script>
const CHILDREN=[
  {id:"owl",name:"Owl",age:12,avatar:"🦉",ks:"KS3",level:"KS3 — Secondary Level"},
  {id:"cub",name:"Cub",age:9,avatar:"🐻",ks:"KS2",level:"KS2 — Primary Level"},
  {id:"bay",name:"Bay",age:7,avatar:"🌿",ks:"KS1",level:"KS1/KS2 — Foundation"}
];
const STORY=[
  {emoji:"⚙️",text:(id)=>`<p>The modern world was built in about 200 years. Everything before was prologue.</p><p>In 1800, most humans farmed. Travel was by foot, horse or sail. Communication was by letter. Life expectancy was 30-35 years. Most people never travelled more than 30km from where they were born. In 2000, half of all humans lived in cities. Travel spanned continents in hours. Communication was instant and global. Life expectancy was over 70. The transformation was so complete and so rapid that we struggle to grasp it.</p>
<div class="fact-pull"><strong>⚙️ The Industrial Revolution — a hinge in human history</strong>Before 1760: almost all energy came from human muscles, animal muscles, wind and water. After 1760: coal, then oil and gas, then nuclear and renewables. The steam engine changed everything — manufacturing moved to factories, people moved to cities, and for the first time in human history, economic growth became a normal expectation rather than a rare surprise. From 1800 to 2000, average global living standards (measured by GDP per capita) increased approximately 10 times. That had never happened before in all of human history.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal missed the first Industrial Revolution — and caught up differently</strong>Portugal industrialised late — primarily in the 20th century, and significantly after joining the European Community in 1986. The reasons: the Salazar dictatorship (1926-1974) maintained a largely agricultural, colonial economy; Portugal lacked significant coal deposits (the fuel of the first Industrial Revolution); and the political instability following the Carnation Revolution delayed economic development. EU membership and access to structural funds transformed Portugal's infrastructure, education system and economy in two decades — a different route to development than the 19th-century industrial model.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Why the Industrial Revolution happened in Britain first — and nowhere else</strong>This is one of history's most debated questions. Several factors converged in 18th-century Britain that existed nowhere else simultaneously.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Accessible coal near manufacturing centres and navigable rivers/canals to move it</li><li>A legal system protecting property rights and patents — incentivising innovation</li><li>Capital accumulated from colonial trade and slave plantations (Eric Williams' argument)</li><li>A culture of practical engineering innovation (the Royal Society, scientific culture)</li><li>High wages in Britain made labour-saving machinery economically worthwhile — in low-wage countries, machines weren't worth building</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if high wages incentivised labour-saving innovation in Britain, what does this suggest about the relationship between workers' rights and technological progress?</em></div>`:""}`},
  {emoji:"🌐",text:(id)=>`<p>The 20th century tried to solve the question of how to organise society — and produced catastrophe in the process.</p><p>The three great political ideologies of the 20th century were liberalism (democracy + market economy), fascism (authoritarian nationalism), and communism (state control of economy + abolition of private property). They went to war with each other — literally. World War Two was partly a war between fascism and liberalism; the Cold War was a 45-year ideological confrontation between liberalism and communism. By 1991, liberalism had "won" — but the story was more complicated than a victory parade suggested.</p>
<div class="fact-pull"><strong>🌐 World Wars — the numbers that still shock</strong>World War One (1914-18): approximately 20 million dead (military and civilian). World War Two (1939-45): approximately 70-85 million dead — about 3% of the world's entire population. The Holocaust: 6 million Jewish people murdered, plus 5-6 million others (Roma, disabled people, political prisoners, gay people, Soviet POWs). The atomic bombs on Hiroshima and Nagasaki killed approximately 200,000 people in three days. These numbers are so large they resist comprehension. Each one was a person with a name, a family, a life.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal in the World Wars — neutrality as strategy</strong>Portugal was officially neutral in both World Wars, though the neutrality was complicated. In World War One, Portugal entered on the Allied side in 1916 after German submarines attacked Portuguese ships — fighting in France and Africa. In World War Two, Salazar maintained official neutrality while providing strategic facilities to both sides: the Azores base to the Allies (crucial for Atlantic anti-submarine warfare), and wolfram (tungsten, needed for weapons) to Nazi Germany. This pragmatic neutrality preserved Portugal's sovereignty and its colonies while keeping it out of the worst destruction. The Azores base was arguably more strategically important than most people realise.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The Cold War — how two countries divided the world without going to war with each other</strong>The Cold War (1947-1991) was the strangest conflict in history: two superpowers with enough nuclear weapons to destroy civilisation, competing for global dominance without directly fighting each other.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li>Proxy wars: the US and USSR fought through other countries — Korea, Vietnam, Angola, Afghanistan, Nicaragua</li><li>Nuclear deterrence: Mutually Assured Destruction (MAD) — the logic that if both sides can destroy each other, neither will attack first</li><li>The Cuban Missile Crisis (1962) came closer to nuclear war than most people know — Soviet submarine officer Vasili Arkhipov refused to authorise a nuclear torpedo launch when his submarine was being depth-charged by the US Navy</li><li>The Cold War ended not with a bang but because the Soviet economy couldn't sustain the competition</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: Vasili Arkhipov's refusal to launch a nuclear torpedo in 1962 may have prevented nuclear war. One person, in one moment, changed history. What does this tell us about individual agency in historical events?</em></div>`:""}`},
  {emoji:"💻",text:(id)=>`<p>The internet is the most transformative technology since the printing press. And we're still in the early stages.</p><p>In 1993, fewer than 1% of the world's population used the internet. By 2023, over 5 billion people did — 63% of humanity. This transformation happened in 30 years. The printing press took 100 years to change Europe. The internet changed the world in one generation, and the changes are still accelerating.</p><p>What has it changed? Communication (instant, global, free). Information access (the entire sum of human knowledge in your pocket). Commerce (global markets without physical proximity). Politics (social movements organised in hours; misinformation at unprecedented scale). Work (remote, fragmented, global). Identity (curated, performed, algorithmically shaped).</p>
<div class="fact-pull"><strong>💻 Digital inequality — the gap that runs through everything</strong>5 billion internet users sounds universal. 3 billion people don't have access — mostly in sub-Saharan Africa, South Asia, and rural areas globally. Within connected countries, digital inequality tracks economic inequality almost exactly: poor people have slower connections, older devices, less digital literacy, and less access to the platforms where economic opportunity now lives. The digital divide is not a separate problem from economic inequality — it amplifies and entrenches it.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal's digital transformation — faster than expected</strong>Portugal has become one of Europe's most digitally advanced societies relatively quickly — ranking in the top half of EU countries for digital public services, broadband coverage, and digital skills. This is partly a result of deliberate policy (the Portuguese government's digital strategy, investment in fibre broadband nationwide), partly a generational shift (young Portuguese are highly digitally literate), and partly the remote work revolution (Portugal has become a destination for international digital nomads, particularly in Lisbon, Porto and the Algarve). The NHR (Non-Habitual Resident) tax regime attracted thousands of tech workers from the US and UK.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Artificial intelligence — the most important technology since electricity, or a manageable tool?</strong>AI is generating more hype and more genuine anxiety than any technology since nuclear power. The genuine claims and the exaggerated ones are difficult to separate.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>Genuine:</strong> AI can now outperform humans on a wide range of specific tasks — medical imaging diagnosis, legal document review, coding, language translation</li><li><strong>Genuine risk:</strong> economic disruption — automation of cognitive work (previously thought safe from automation) will displace jobs across professional sectors</li><li><strong>Contested:</strong> whether current AI systems are approaching "general intelligence" — most AI researchers say no; some say yes</li><li><strong>Governance gap:</strong> AI development is primarily driven by a handful of companies in one country (USA), with minimal democratic oversight</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if AI automates 30% of current jobs over 20 years, what happens to the people whose jobs disappear? Is this the same as previous industrial revolutions — or is it different because it moves faster and affects more types of work?</em></div>`:""}`},
  {emoji:"🌍",text:(id)=>`<p>Globalisation is the word we use for the modern world becoming one interconnected system.</p><p>Trade, finance, information, culture, people, diseases, ideas — all now flow across borders at unprecedented speed and volume. A financial crisis in US mortgage markets in 2007 became a global recession by 2008. A new virus in Wuhan in December 2019 became a global pandemic by March 2020. A social media trend started in one country reaches teenagers everywhere within hours. The world is more connected than it has ever been — and more vulnerable to cascading failures for the same reason.</p>
<div class="fact-pull"><strong>🌍 Globalisation — a scorecard</strong>What has it delivered? 1 billion people lifted out of extreme poverty since 1990 (mostly China). Consumer prices lower due to global supply chains. Cultural exchange at unprecedented scale. What has it cost? Deindustrialisation in Western countries (jobs moved to lower-wage countries). Extreme concentration of wealth (the world's 8 richest people own as much as the poorest 50%). Environmental costs of global shipping and supply chains. And the vulnerability: COVID-19 revealed that just-in-time global supply chains had eliminated the buffers that resilience requires.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal and globalisation — open by necessity</strong>Portugal is a small open economy — highly dependent on trade, tourism, and foreign investment. This makes it particularly exposed to global economic shocks (the 2008 financial crisis required an IMF/EU bailout in 2011) but also particularly able to benefit from global opportunities (tourism, technology exports, renewable energy). Portugal's geographic position — at the western edge of Europe, with the largest EU exclusive economic zone — gives it potential in Atlantic shipping, renewable ocean energy and transatlantic connectivity that it is only beginning to exploit.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 Deglobalisation — why the world might be going into reverse</strong>Since about 2016, globalisation has been slowing. This is not a coincidence — it reflects deliberate political choices and structural pressures.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>Trade wars:</strong> US-China tariff conflicts from 2018; Brexit removing UK from EU single market</li><li><strong>Supply chain reshoring:</strong> COVID exposed the fragility of global supply chains — companies are moving production closer to home</li><li><strong>Technology decoupling:</strong> US restrictions on Chinese semiconductor access are creating two separate technology ecosystems</li><li><strong>Climate pressure:</strong> carbon border adjustments are making long global supply chains more expensive</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: if deglobalisation continues, which countries benefit (those with domestic manufacturing) and which lose (those dependent on global trade)? Where does Portugal sit in this picture?</em></div>`:""}`},
  {emoji:"🌱",text:(id)=>`<p>What kind of world are we building?</p><p>The modern world has created extraordinary wealth, connected humanity in unprecedented ways, and extended lives by decades. It has also concentrated that wealth in a small number of hands, changed the climate, depleted ecosystems, and built a global system so interconnected that its failures cascade everywhere.</p><p>The question for your generation is not whether the world will change — it will change, faster than any previous generation experienced. The question is whether the changes will be chosen or imposed. Whether wealth will be more or less equally shared. Whether the planet's systems will be stabilised or allowed to tip. Whether democracy will hold or authoritarian systems will spread. These are not settled questions. They are the questions your generation will answer.</p>
<div class="fact-pull"><strong>🌱 Reasons to be genuinely hopeful — not naive, just honest</strong>Extreme poverty has fallen from 36% of humanity in 1990 to under 10% today (by the World Bank's measure). Child mortality has halved since 1990. Literacy has gone from 25% of adults in 1800 to over 85% today. Renewable energy has gone from 1% of electricity in 2010 to over 30% in 2023. The ozone layer is recovering — the Montreal Protocol (1987) worked. Polio has been eradicated from all but two countries. These things happened because humans chose to make them happen. Problems can be solved when there is collective will to solve them.</div>
<div class="portugal-pull"><strong>🇵🇹 Portugal 2024 — a model for others?</strong>Portugal generates over 60% of its electricity from renewables (wind, solar, hydro) — one of the highest proportions in Europe. It ranks consistently high on social indices: safety, quality of life, healthcare, education. It has managed its post-colonial relationships through the CPLP with more thoughtfulness than most former colonial powers. It runs on a language spoken by 264 million people. It is not a perfect country — inequality is significant, wages are low, young people are emigrating. But it has navigated from dictatorship to democracy, from colonial power to post-colonial partner, from isolated to globally connected, in less than 50 years. That is something.</div>
${id==="owl"?`<div class="ks3-pull"><strong>🦉 The world in 2050 — what we can project with reasonable confidence</strong>Not predictions — projections based on current trends. The difference matters.<ul style="margin:8px 0 8px 16px;line-height:1.8"><li><strong>Demographics:</strong> global population peaks around 10-11 billion, then stabilises. Africa's population doubles. Europe's shrinks without immigration.</li><li><strong>Climate:</strong> at current trajectory, 2-3°C warming by 2100. Every 0.5°C avoided represents millions of lives</li><li><strong>Technology:</strong> AI, genetic medicine, and energy transformation will create enormous opportunities and dislocations</li><li><strong>Power:</strong> China's economy becomes the world's largest. The US-China relationship is the defining geopolitical competition</li></ul><em style="color:#f0b429;font-size:0.8rem">Think about this: you will be approximately 40 years old in 2050. What decisions made in the next 10 years will have the biggest impact on the world you live in then?</em></div>`:""}`}

const TOPICS=[
  {id:"industrial",name:"Industrial Revolution",emoji:"⚙️",period:"1760-1914",where:"Britain, then Europe and USA",story:"The Industrial Revolution transformed how humans make things, move around, and organise their lives. It began in Britain around 1760 with the steam engine and textile mills, spread through Europe and America in the 19th century, and fundamentally altered every aspect of human life. Its core innovation was replacing human and animal muscle with mechanical power fuelled by coal. This made manufacturing vastly more productive, moved populations from farms to cities, created a new working class and a new middle class, and launched 200 years of economic growth that had no precedent in human history.",portugal:"Portugal's industrialisation was late and incomplete. The country remained largely agricultural until the 20th century, with the Salazar dictatorship (1926-1974) deliberately maintaining a traditional economy partly to preserve social stability and colonial structures. Portugal's main industrial development came after the Carnation Revolution (1974) and especially after EU accession (1986), when structural funds helped modernise infrastructure. Portugal skipped parts of the industrial model and moved relatively quickly to a services and technology-based economy.",ks3:"The Industrial Revolution raises the question of who benefited and who paid the cost. In Britain: real wages rose over the 19th century, but child labour was widespread until legislation ended it; working conditions in early factories were brutal; the environment of industrial cities was catastrophic. The benefits were distributed over decades; the costs were immediate and fell on those with least power. The same pattern — private profits, socialised costs — appears in every industrial transformation, including the digital one."},
  {id:"ww2",name:"World War Two",emoji:"⚔️",period:"1939-1945",where:"Global",story:"World War Two was the most destructive conflict in human history. It began with Nazi Germany's invasion of Poland in September 1939 and ended with Japan's surrender in September 1945, after the atomic bombing of Hiroshima and Nagasaki. Between those dates: the Holocaust murdered 6 million Jewish people and millions of others; the Soviet Union lost approximately 27 million people; Allied bombing destroyed German and Japanese cities; the Pacific war killed hundreds of thousands through starvation and disease; and nuclear weapons were used in combat for the first and (so far) only time. The war's end created the world we live in: the United Nations, the Universal Declaration of Human Rights, the Cold War, decolonisation.",portugal:"Portugal was officially neutral under Salazar, making it unusual in occupied Europe as a functioning neutral state. Lisbon became a hub for refugees, spies, and black market currency — a setting captured in the film Casablanca (which is actually set partly in Lisbon). The Azores were crucial: in 1943, Portugal allowed the Allies to use the Azores as a base for anti-submarine warfare, significantly reducing Allied shipping losses in the Atlantic. This decision was essential to winning the Battle of the Atlantic.",ks3:"The Holocaust requires its own category of historical attention. It was not an aberration of history but an escalation of trends that were visible in advance: antisemitism, nationalism, dehumanising propaganda, the bureaucratisation of violence. The philosopher Hannah Arendt's concept of 'the banality of evil' — that the Holocaust was carried out largely by ordinary people following orders and bureaucratic procedures — is essential. The question for each generation is: what are the warning signs visible today that were ignored in 1930s Germany?"},
  {id:"coldwar",name:"Cold War",emoji:"☢️",period:"1947-1991",where:"Global (fought through proxy states)",story:"The Cold War was a 45-year competition between the United States and the Soviet Union for global dominance, fought through proxy wars, propaganda, arms races, space exploration, and economic competition — but never in direct combat between the superpowers, because both sides had enough nuclear weapons to destroy the world. It created the world's current geopolitical map: NATO and its Eastern equivalents; the division and reunification of Germany; the Korean War's frozen conflict; the Vietnam War; CIA coups in Guatemala, Iran and Chile; the Soviet invasion of Afghanistan that eventually contributed to the USSR's collapse.",portugal:"Portugal was a founding member of NATO in 1949 — despite being a dictatorship, its Atlantic location and the Azores base made it strategically essential to the Western alliance. This created an interesting contradiction: the United States supported Portuguese democracy rhetorically while tolerating Salazar's dictatorship for strategic reasons. The Carnation Revolution of 1974 was partly a consequence of Portugal's colonial wars — wars the USA nominally opposed (colonial wars were bad optics during the Cold War) but practically supported by allowing the use of NATO-supplied equipment.",ks3:"The Cold War ended in 1991 with the Soviet collapse — but many analysts argue the consequences are still playing out. NATO's eastward expansion after 1991 (which Russia argued violated informal guarantees given during German reunification negotiations) is directly connected to the Russia-Ukraine conflict that began in 2014 and escalated into full-scale war in 2022. Understanding the Cold War's end — what promises were made, what expectations were created, what resentments were generated — is essential for understanding the current world."},
  {id:"internet",name:"The Digital Revolution",emoji:"💻",period:"1990-present",where:"Global (but uneven)",story:"The internet was developed by US military research (ARPANET, 1969), opened to commercial use in the early 1990s, and grew from a curiosity to an essential infrastructure in 30 years. The World Wide Web (invented by Tim Berners-Lee in 1989), search engines, social media, smartphones, and cloud computing each represented step changes. Today: 5 billion people are online, $5 trillion of commerce happens digitally each year, and the platform companies (Google, Meta, Amazon, Apple, Microsoft) are the most valuable companies in history. The governance of this infrastructure — who controls it, what rules apply — is one of the defining political questions of the 21st century.",portugal:"Portugal hosts the Web Summit — one of the world's largest technology conferences — annually in Lisbon. This reflects both Portugal's reputation as a welcoming environment for tech companies and its aspiration to become a European technology hub. Lisbon and Porto have growing tech startup ecosystems. The Portuguese government has invested heavily in digital public services. Portugal is positioning itself as a bridge between European, South American, and Lusophone African technology ecosystems — using its linguistic and cultural network as a competitive advantage.",ks3:"The internet's political consequences are still unfolding. Social media platforms have enabled genuine democratic movements (Arab Spring, 2011) and enabled authoritarian ones (disinformation in multiple elections). The same technology enables both. The key question is who controls algorithmic amplification — which content gets boosted, which suppressed — because algorithmic choices shape political reality for billions of people without democratic accountability. This is not a conspiracy theory; it is a business model. Advertising-based platforms profit from engagement, and outrage drives engagement more reliably than truth."},
  {id:"climate_modern",name:"Climate Change",emoji:"🌡️",period:"1750-present (accelerating rapidly)",where:"Global",story:"Climate change is the most comprehensively documented scientific phenomenon in history. The basic mechanism has been understood since the 1850s (Eunice Newton Foote, John Tyndall): certain gases in the atmosphere trap heat. Since industrialisation began pumping CO2 into the atmosphere at scale (1750-present), global average temperatures have risen by approximately 1.2°C. The consequences — more extreme weather, sea level rise, ecosystem disruption, food security threats — are already measurable and will intensify. The gap between the scientific consensus (clear, urgent) and political action (slow, inadequate) is the defining feature of the climate crisis.",portugal:"Portugal is among Europe's most climate-vulnerable countries. It already experiences heatwaves, droughts and wildfires at increasing frequency. Climate projections for Portugal by 2100 show: average temperature 3-4°C higher, 30-40% less annual rainfall in the south, sea level rise threatening the Algarve coast, and increasing wildfire risk. Portugal has responded more proactively than most: 60%+ renewable electricity, a carbon tax, ambitious reforestation programmes. But Portugal's emissions are a fraction of the global total — the country is highly vulnerable to climate change it did almost nothing to cause.",ks3:"Climate justice is the hardest political challenge of the climate crisis. The countries most responsible for historical emissions (USA, EU, China now) are less vulnerable than the countries least responsible (small island states, sub-Saharan Africa, South Asia). Bangladesh will lose 17% of its land to sea level rise by 2050 — a country that has produced negligible CO2 emissions. The Loss and Damage framework agreed at COP27 (2022) acknowledges this injustice but the funding pledged is a fraction of what is needed. Justice requires that those who caused the problem compensate those who suffer from it."},
  {id:"democracy_today",name:"Democracy and Authoritarianism",emoji:"🗳️",period:"1945-present",where:"Global",story:"In 1941, only 11 countries in the world were full democracies. By 2000, that number had risen to over 80 — the most rapid expansion of democratic governance in history. Since about 2016, however, democratic indicators have been declining globally: authoritarian governments have become more aggressive, democratic institutions in Hungary, Turkey, Brazil, India and elsewhere have been weakened, and support for democracy among young people has fallen in many countries. This period of democratic backsliding coincides with the rise of social media, growing economic inequality, and the weakening of the institutions (free press, independent judiciary, civil society) that democracies depend on.",portugal:"Portugal's democracy was born in 1974 and is robustly healthy by European standards — consistently ranked among Europe's most stable democracies. But Portugal is not immune to the pressures affecting democracies elsewhere: populist parties have gained ground; trust in institutions is low; economic inequality is significant. April 25th remains a genuinely celebrated national holiday — the only European country where the day of democratisation is still marked with public joy rather than just official ceremony. Portugal's democratic culture was hard-won and is consciously valued.",ks3:"Democratic backsliding — the gradual weakening of democratic institutions without a formal coup — is the dominant form of autocratisation in the 21st century. Hungary under Orbán is the EU's clearest example: elected governments systematically weakening independent courts, press freedom, election rules and civil society while maintaining the forms of democracy. This is harder to resist than a coup because it uses legal mechanisms. The political scientist Steven Levitsky's 'How Democracies Die' (2018) argues that democracies today are more likely to die by a thousand cuts than by a single decisive moment."}

  owl:[
    {q:"Why did the Industrial Revolution begin in Britain rather than elsewhere, according to the 'high wage' theory?",opts:["Because British workers were more skilled","Because British wages were higher than in continental Europe, making labour-saving machinery economically worthwhile to develop and deploy. In lower-wage countries, it was cheaper to use human labour than to invest in machines. High wages thus created the economic incentive for the mechanisation that drove industrialisation.","Because Britain had better natural resources than other countries","Because the British government subsidised industrial development"],ans:1,fact:"The high-wage theory (associated with economist Robert Allen) is one of the most compelling explanations for why industrialisation happened in Britain first. In China and India in the 18th century, labour was cheap enough that using machines rather than people wasn't economically rational. In Britain, the combination of high wages (partly driven by the Black Death's lasting effect on labour markets) and cheap coal made steam-powered machinery profitable. This has an implication some find uncomfortable: workers' bargaining power may have been a driver of technological progress, not an obstacle to it."},
    {q:"What was 'Mutually Assured Destruction' during the Cold War and why did it arguably prevent nuclear war?",opts:["A US military strategy for winning a nuclear war","The logic that if both superpowers could survive a first strike and retaliate with enough nuclear weapons to destroy the attacker, neither side had a rational incentive to strike first — because any nuclear war would end in both sides' destruction. This stability (called deterrence) prevented direct US-Soviet conflict for 45 years despite enormous hostility.","A Soviet doctrine for fighting conventional wars","The reason the Cold War ended peacefully"],ans:1,fact:"MAD is a deeply strange but logically coherent theory: safety through the guarantee of mutual annihilation. The physicist Herman Kahn called it 'the delicate balance of terror.' The Cuban Missile Crisis of 1962 tested whether MAD would hold in practice — and it nearly didn't. Soviet submarine officer Vasili Arkhipov refused to authorise a nuclear torpedo launch when three officers needed to agree and two already had. One person's decision may have prevented nuclear war. MAD worked — but its maintenance required a string of rational decisions in moments of extreme pressure, and each crisis was a gamble."},
    {q:"How does algorithmic amplification on social media platforms create political consequences without democratic accountability?",opts:["Social media companies are controlled by governments who direct political content","Advertising-based platforms profit from user engagement, and outrage, fear and tribal identity consistently drive more engagement than measured reporting. Algorithms that maximise engagement therefore systematically amplify divisive content, not because of political intent but because of business model — creating a political bias toward polarisation and extremism that no one voted for and no regulator has fully addressed.","Social media platforms have no political effect","The algorithms are neutral and amplify all content equally"],ans:1,fact:"The business model insight is crucial: this is not a conspiracy, it is a consequence. Facebook's own internal research (leaked in 2021) showed that its algorithms boosted content generating 'angry reactions' disproportionately because angry reactions correlated with time-on-platform. The company knew its algorithms were amplifying divisive content and chose not to change them for business reasons. This represents a case where private profit maximisation creates public political harm — a classic market failure requiring regulatory intervention. The governance of AI and social media platforms is one of the most important policy questions of the coming decade."},
    {q:"Why is climate change described as a 'justice' issue as much as an environmental one?",opts:["Because environmental regulations are unfair to businesses","Because the countries most responsible for historical carbon emissions (USA, EU, now China) are significantly less vulnerable to climate impacts than the countries least responsible — small island states, sub-Saharan Africa, South Asia — which face existential threats from temperature rise, sea level rise and agricultural disruption they did almost nothing to cause. Climate change is the largest-scale example of consequences falling on those without power to prevent them.","Because environmental activists are treated unjustly by governments","Because all countries are equally responsible for climate change"],ans:1,fact:"Bangladesh produces less than 0.5% of global CO2 emissions but will lose 17% of its land to sea level rise by 2050. The Maldives (0.003% of global emissions) may be entirely submerged. The Marshall Islands, Tuvalu and Kiribati face complete inundation. The countries that caused this — primarily through 19th and 20th century industrialisation — are geographically buffered by wealth, geography and altitude. The Loss and Damage framework agreed at COP27 (2022) is the international community's first formal acknowledgement that climate finance should include compensation for harm caused, not just funding for mitigation."},
    {q:"What distinguishes 'democratic backsliding' from a coup, and why is it harder to resist?",opts:["Democratic backsliding is just political change within a democracy","Democratic backsliding uses legal mechanisms — changing courts, restricting press freedom, adjusting electoral rules — to weaken democratic checks and balances while maintaining the outward forms of democracy (regular elections, constitutional language). It is harder to resist than a coup because there is no single moment of clearly illegal action to trigger resistance; each step seems like a legitimate political choice.","Democratic backsliding only occurs in developing countries","Democratic backsliding is the same as healthy democratic reform"],ans:1,fact:"Hungary provides the EU's clearest case study. Since 2010, Prime Minister Orbán's government has: packed the constitutional court with loyalists, changed electoral boundaries to advantage his party, stripped the central bank of independence, brought universities under government control, restricted press freedom, and changed the constitution to make future changes difficult. Each step was legally enacted by a parliamentary majority. The result, according to Freedom House and the Economist Intelligence Unit, is that Hungary is no longer a full democracy — despite being an EU member. Levitsky and Ziblatt's 'How Democracies Die' (2018) documents similar patterns across multiple countries."}

    {q:"What was the Industrial Revolution?",opts:["A political revolution that changed governments","The transformation of how things are made — from hand-made and farm-based to machine-made and factory-based, powered by coal and steam. It started in Britain around 1760 and changed almost everything about how people lived and worked.","A revolution in cooking and food","A war between factory owners and farmers"],ans:1,fact:"The Industrial Revolution was one of the biggest changes in human history. Before it, most people farmed and made things by hand. After it, machines made goods in factories, people moved to cities, and travel became possible by steam train. Life expectancy started rising, literacy increased, and goods became cheaper. But it also created terrible working conditions (including child labour in factories and mines), polluted cities, and widened the gap between rich factory owners and poor workers. It took decades of campaigning to get laws protecting workers."},
    {q:"Why was World War Two so devastating?",opts:["Because it used more advanced weapons than any previous war","Because it was fought on more continents and killed more people than any previous conflict — approximately 70-85 million people died, including 6 million Jewish people in the Holocaust. Cities were bombed, famine was used as a weapon, and for the first time nuclear weapons were used.","Because it lasted longer than any previous war","Because it was fought at sea rather than on land"],ans:1,fact:"World War Two killed between 70 and 85 million people — about 3% of the entire world's population at the time. To understand the scale: if the same proportion of today's world population died, that would be about 240 million people. The Holocaust was the deliberate murder of 6 million Jewish people and millions of others by Nazi Germany. The war ended when the USA dropped atomic bombs on the Japanese cities of Hiroshima and Nagasaki, killing approximately 200,000 people in three days. It remains the only time nuclear weapons have been used in war."},
    {q:"What is the internet and why has it changed the world so much?",opts:["A type of fishing equipment that catches global fish","A global network of connected computers that allows instant communication, information sharing and commerce between anyone, anywhere. It has changed how we learn, shop, communicate, work and vote.","A satellite system for tracking weather","A system for connecting telephone landlines"],ans:1,fact:"The internet is the most transformative technology since the printing press. In 1993, fewer than 1% of people used it. By 2023, over 5 billion people — 63% of humanity — were online. It has made information free and instant (you can look up almost anything in seconds), commerce global (you can buy things from any country), and communication borderless (you can talk to someone on the other side of the world for free). But it has also enabled misinformation, cybercrime, and new forms of inequality between people who have good internet access and those who don't."},
    {q:"What is climate change and why does it matter for Portugal specifically?",opts:["A natural cycle that has always happened and isn't connected to human activity","The warming of Earth's climate due to human emissions of greenhouse gases — Portugal is particularly vulnerable because it already has hot dry summers, high wildfire risk, and coastal flooding concerns, and these are all getting worse","A change in fashion trends around the world","Something that only affects tropical countries"],ans:1,fact:"Climate change is already affecting Portugal — and will affect it more in the future. Temperatures are rising, making summer droughts and wildfires more frequent and severe. The devastating 2017 wildfires (which killed 111 people) are an example of what's coming more often. Sea level rise threatens the Algarve coast. The south of Portugal could become semi-arid by 2100 if emissions continue at current rates. Portugal has responded better than many countries — over 60% of its electricity already comes from renewable sources — but Portugal's own emissions are tiny; what happens to it depends largely on what bigger countries do."},
    {q:"What is democracy and why did Portugal become a democracy in 1974?",opts:["Democracy is when a king rules with the support of the army","Democracy is a system where citizens vote to choose their government and can change it if they want. Portugal became a democracy on April 25, 1974, when military officers overthrew the 48-year Salazar/Caetano dictatorship in the Carnation Revolution — named because people put carnations in soldiers' gun barrels instead of bullets.","Democracy is when the richest people make all the decisions","Democracy is a type of economy, not a type of government"],ans:1,fact:"Portugal was a dictatorship for 48 years under Salazar and then Caetano — meaning one person and their allies made all the decisions and people couldn't vote them out. On April 25, 1974, military officers who were tired of the colonial wars and the injustice of the dictatorship took action. The revolution was almost completely non-violent — it happened in a matter of hours. People celebrated in the streets and put flowers in soldiers' guns. Portugal has been a democracy ever since, and April 25th (Freedom Day) is still one of Portugal's most joyfully celebrated national holidays."}

  bay:[
    {q:"What was invented that changed how things are made — starting in Britain about 260 years ago?",opts:["The internet","The steam engine and factories — the Industrial Revolution","The printing press","The wheel"],ans:1,fact:"The steam engine! Invented in Britain around 1760, the steam engine could do the work of dozens of horses without getting tired. Factories powered by steam could make cloth, tools and goods much faster than people working by hand. This changed everything — people moved from farms to cities, trains were built, and goods became cheaper. It was called the Industrial Revolution because it completely changed (revolutionised) how things were made and how people lived. Britain went first, then other countries followed, and eventually the whole world changed."},
    {q:"What is the internet?",opts:["A giant fishing net in the ocean","A network connecting computers all over the world so people can share information and talk to each other instantly","A type of television","A road network for lorries"],ans:1,fact:"The internet connects billions of computers and phones all over the world so information can travel between them instantly. When you look something up online, your question travels to computers in other countries and the answer comes back in less than a second. The internet was invented in the USA in the 1960s for the military, but became available for everyone in the early 1990s. Today over 5 billion people use it. It has changed how we learn, how we shop, how we listen to music, how we talk to friends — almost everything!"},
    {q:"Why is April 25th important in Portugal?",opts:["It's the day Portugal discovered Brazil","It's Portugal's Freedom Day — the day in 1974 when the Carnation Revolution ended the dictatorship and Portugal became a democracy","It's Portugal's national football day","It's the day the Jerónimos Monastery was built"],ans:1,fact:"April 25, 1974 is the day Portugal became a free country — the day the military ended the 48-year dictatorship in the Carnation Revolution. Before that day, Portuguese people couldn't vote for who ran their country, couldn't freely say what they thought, and couldn't read what they liked. After that day, all of this changed. People were so happy that they put red carnations (it was the right time of year for them) into soldiers' gun barrels. Portugal celebrates this day every year as Dia da Liberdade — Freedom Day."},
    {q:"What is climate change?",opts:["When the weather changes between seasons","The warming of the whole Earth because humans are burning coal, oil and gas which releases gases that trap heat — like a blanket around the planet getting thicker","A type of storm","When different countries have different temperatures"],ans:1,fact:"Imagine Earth has a blanket of gases around it that keeps it warm. That blanket is the right thickness for life to exist. But when we burn coal, oil and gas, we're making the blanket thicker — so the Earth gets too warm. This is causing ice to melt (making sea levels rise), more extreme storms, longer droughts, and bigger wildfires. Portugal is already experiencing more wildfires and hotter summers because of this. The good news: Portugal gets more than 60% of its electricity from sun, wind and water — not coal or gas — which helps the planet."},
    {q:"What year did Portugal become a democracy?",opts:["1415","1822","1974","1999"],ans:2,fact:"1974 — on April 25th, exactly! Portugal went from being a dictatorship (where one leader made all decisions) to a democracy (where everyone votes) in a single day. The Carnation Revolution was almost completely peaceful — it was one of the most remarkable peaceful political changes in history. April 25th is still celebrated every year in Portugal. If you're in Portugal on April 25th, you'll see people wearing red carnations and celebrating in the streets."}

    {title:"Economic Growth Since Industrialisation",story:"Global average GDP per capita was approximately $1,100 in 1800 (in 2011 dollars). By 2023 it was approximately $13,000.",q:"By what factor has average global living standards increased? And what is the annual compound growth rate over 223 years?",working:"Factor: 13,000/1,100 = 11.8x. Annual growth rate: (13000/1100)^(1/223) - 1 = 11.8^(0.00448) - 1 ≈ 0.011 = 1.1% per year.",answer:"11.8",unit:"times higher living standards (1.1% annual compound growth)",fact:"11.8 times in 223 years at 1.1% annual growth — which sounds modest but represents the most sustained improvement in human living standards in history. For comparison: from 5000 BCE to 1800 CE (6,800 years), living standards improved by a factor of perhaps 2-3 times total. The Industrial Revolution compressed 6,800 years of improvement into 223 years. But the average hides extreme inequality: the richest 10% have benefited enormously more than the poorest 10%."},
    {title:"Digital Scale",story:"The internet had approximately 16 million users in 1995. By 2023 it had approximately 5.4 billion users. World population in 1995 was approximately 5.7 billion; in 2023 approximately 8 billion.",q:"What was internet penetration (%) in 1995 and 2023? And what was the annual user growth rate from 1995-2023?",working:"1995: 16/5700 × 100 = 0.28%. 2023: 5400/8000 × 100 = 67.5%. Annual growth: (5400/16)^(1/28) - 1 = 337.5^(0.0357) - 1 ≈ 0.215 = 21.5% per year.",answer:"0.28",unit:"% penetration 1995 (67.5% in 2023 — 21.5% annual growth)",fact:"From 0.28% to 67.5% in 28 years at 21.5% annual growth — the fastest adoption of any technology in human history, including television (30 years to 50% penetration in the USA), electricity (46 years), and the telephone (71 years). The remaining 32.5% who are not yet connected are disproportionately poor, rural, and located in sub-Saharan Africa and South Asia. The digital divide does not just reflect existing inequality — it deepens it, as more economic opportunity moves online."},

  bay:[
    {title:"Years Since the Carnation Revolution",story:"The Carnation Revolution happened on April 25, 1974. The current year is 2025.",q:"How many years has Portugal been a democracy?",working:"2025 - 1974 = 51 years",answer:"51",unit:"years of Portuguese democracy",fact:"51 years! That's longer than most people's lives. Portugal went from being a dictatorship where people couldn't vote or speak freely, to a modern democracy and EU member, in just one lifetime. Portugal joined the European Community (now EU) in 1986 — 12 years after the revolution. Today Portugal is consistently ranked as one of the world's safest and most peaceful countries. The carnation — the flower people put in soldiers' guns on April 25, 1974 — is still a symbol of Portuguese democracy today."},
    {title:"Internet Users",story:"In 2023 approximately 5.4 billion people use the internet. The world population is approximately 8 billion.",q:"What fraction of the world uses the internet? And how many people do NOT have internet access?",working:"Fraction: 5.4/8 = 0.675 = about 2/3. Without: 8 - 5.4 = 2.6 billion without internet.",answer:"2.6",unit:"billion people without internet access",fact:"2.6 billion people — about 1 in 3 people in the world — still don't have internet access. That's more than the entire population of China! Most of these people live in sub-Saharan Africa, South Asia, or rural areas. This matters because more and more opportunities — jobs, education, health information, banking — are moving online. Not having internet access means missing out on these opportunities. Closing the 'digital divide' is one of the most important development challenges of the 21st century."},
    {title:"Portugal's Renewable Energy",story:"In 2023 Portugal got approximately 61% of its electricity from renewable sources (wind, solar, water). The EU average was approximately 41%.",q:"By how many percentage points is Portugal above the EU average for renewable electricity?",working:"61 - 41 = 20 percentage points above EU average",answer:"20",unit:"percentage points above EU average for renewables",fact:"20 percentage points above the EU average! Portugal is one of Europe's renewable energy leaders. On some days in 2023, Portugal generated more electricity from renewables than it needed — meaning it had to export the extra to Spain! This is especially impressive because Portugal is not a wealthy country by European standards. It shows that renewable energy is not just for rich countries — it's about choosing the right policies and investing in the right technology. Portugal's sunshine and Atlantic winds make it naturally well-suited for solar and wind power."}
  ]
};
const TASKS={
  owl:{icon:"🦉",title:"The Modern World — Is Progress Real?",level:"KS3 Extended Writing",
   brief:`<p>Write an analytical essay responding to:</p>
<blockquote style="border-left:3px solid #60a5fa;padding:8px 14px;color:#bfdbfe;font-style:italic;margin:10px 0">"The modern world has made life better for most humans. The question is whether it can continue to do so." Evaluate this claim.</blockquote>
<ul><li>Define what "better" means — use specific metrics (life expectancy, poverty, literacy, etc.)</li><li>Identify at least two genuine threats to continued progress</li><li>Consider who has benefited most and least from modern development</li><li>Address climate change specifically as a test case</li><li>Conclude with your own view on whether progress is sustainable</li></ul>`,
   placeholder:"Introduction — defining progress:\n\nEvidence that life has improved:\n\nWho benefited least:\n\nThreats to continued progress:\n\nClimate change as a test case:\n\nConclusion:"},
  cub:{icon:"🐻",title:"A Day in the Life — 1800 vs 2024",level:"KS2 History + Comparison",
   brief:`<p>Write two diary entries — one for a child living in 1800 and one for a child living today in Portugal. Compare:</p>
<ul><li>What they eat and where food comes from</li><li>How they travel</li><li>What they know about the wider world</li><li>What dangers they face</li><li>What opportunities they have</li></ul>`,
   placeholder:"DIARY — 1800\nDear Diary, today I...\n\n\n\nDIARY — 2024\nDear Diary, today I..."},
  bay:{icon:"🌿",title:"My Modern World",level:"KS1/KS2 Foundation",
   brief:`<p>Draw and write about three things in the modern world that you think are amazing:</p>
<ul><li>What the invention is</li><li>Who invented it and when (roughly)</li><li>How it has changed people's lives</li><li>One problem it has caused or one way it could be improved</li></ul>`,
   placeholder:"Amazing invention 1:\nInvented by: Roughly when:\nHow it changed lives:\nOne problem:\n\nAmazing invention 2:\nInvented by: Roughly when:\nHow it changed lives:\nOne problem:\n\nAmazing invention 3:\nInvented by: Roughly when:\nHow it changed lives:\nOne problem:"}
};
const SAVE_KEY="atlas_ch10_v1";
function defaultState(){const s={};CHILDREN.forEach(c=>{s[c.id]={storyPage:0,selectedTopic:null,quizIdx:0,quizAnswers:[],quizDone:false,quizScore:0,mathInputs:{},mathAnswered:{},taskText:"",taskSaved:false,sectionsComplete:[]};});return s;}
function loadState(){try{const s=localStorage.getItem(SAVE_KEY);if(s)return{...defaultState(),...JSON.parse(s)};}catch(e){}return defaultState();}
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}}
let state=loadState();let ui={view:"profiles",child:null,section:"story"};
function render(){
  const app=document.getElementById("app");const child=CHILDREN.find(c=>c.id===ui.child);
  let h=`<div class="hero"><h1>🌍 The Atlas Chronicles</h1><p>Chapter 10: The Modern World</p><div class="ks-badges"><span class="ks-badge">📚 KS1 Bay</span><span class="ks-badge">📚 KS2 Cub</span><span class="ks-badge" style="background:rgba(240,180,41,0.1);border-color:rgba(240,180,41,0.2);color:#f0b429">📚 KS3 Owl</span></div></div>`;
  if(ui.view==="profiles")h+=renderProfiles();
  else if(ui.view==="learn"&&child)h+=renderLearn(child);
  app.innerHTML=h;
}
function renderProfiles(){
  let h=`<div class="section-label">Choose your explorer</div><div class="profile-grid">`;
  CHILDREN.forEach(c=>{const s=state[c.id];const comp=(s.sectionsComplete||[]).length;h+=`<div class="profile-card ${ui.child===c.id?"active":""}" onclick="selectChild('${c.id}')"><div style="font-size:2.8rem">${c.avatar}</div><div class="pname">${c.name}</div><div class="plevel">${c.level}</div><div class="pstars">${comp>0?"⭐".repeat(comp)+" ("+comp+"/5)":"Ready!"}</div></div>`;});
  return h+`</div>`;
}
function renderLearn(child){
  const s=state[child.id];const comp=s.sectionsComplete||[];
  const sections=[{id:"story",icon:"📖",name:"Story"},{id:"topics",icon:"🌐",name:"Topics"},{id:"maths",icon:"📐",name:"Maths"},{id:"task",icon:"✍️",name:"Task"},{id:"quiz",icon:"✅",name:"Quiz"}];
  let h=`<a href="index.html" class="back-btn">← Home</a>`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:2rem">${child.avatar}</span><div><div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:#60a5fa">${child.name} — Chapter 10</div><div style="color:#666;font-size:0.73rem">${child.level} · ⭐ ${comp.length}/${sections.length} done</div></div></div>`;
  h+=`<div class="progress-overview">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<div class="prog-tile ${done?"done":""}"><div class="prog-icon">${sec.icon}</div><div class="prog-name">${done?"✓ ":""}${sec.name}</div></div>`;});
  h+=`</div><div class="nav-tabs">`;
  sections.forEach(sec=>{const done=comp.includes(sec.id);h+=`<button class="nav-tab ${ui.section===sec.id?"active":""} ${done?"done":""}" onclick="switchSection('${sec.id}')">${sec.icon} ${sec.name}</button>`;});
  h+=`</div>`;
  if(ui.section==="story")h+=renderStory(child,s);
  else if(ui.section==="topics")h+=renderTopics(child,s);
  else if(ui.section==="maths")h+=renderMaths(child,s);
  else if(ui.section==="task")h+=renderTask(child,s);
  else if(ui.section==="quiz")h+=renderQuiz(child,s);
  return h;
}
function renderStory(child,s){
  const pg=Math.min(s.storyPage,STORY.length-1);const page=STORY[pg];const isLast=pg>=STORY.length-1;
  let h=`<div class="story-panel"><div class="chapter-label">Chapter 10 · Page ${pg+1} of ${STORY.length}</div><div class="story-h">The Modern World</div><div class="story-emoji">${page.emoji}</div><div class="story-body">${page.text(child.id)}</div><div class="page-nav"><span class="page-ctr">${pg+1}/${STORY.length}</span>`;
  if(!isLast)h+=`<button class="cont-btn" onclick="nextPage()">Continue →</button>`;
  else h+=`<button class="cont-btn" onclick="completeSection('story');switchSection('topics')">Explore Topics! 🌐</button>`;
  return h+`</div></div>`;
}
function renderTopics(child,s){
  let h=`<div class="explorer-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">🌐 ${child.ks}: The Modern World</div><div class="explorer-title">🌐 Modern World Topics</div><div class="explorer-sub">Click each topic to explore in depth</div><div class="topic-grid">`;
  TOPICS.forEach(t=>{h+=`<div class="topic-card ${s.selectedTopic===t.id?"selected":""}" onclick="selectTopic('${t.id}')"><div class="topic-emoji">${t.emoji}</div><div class="topic-name">${t.name}</div><div class="topic-sub">${t.period}</div></div>`;});
  h+=`</div>`;
  if(s.selectedTopic){
    const t=TOPICS.find(x=>x.id===s.selectedTopic);
    if(t){
      h+=`<div class="topic-detail"><div style="font-family:'Fredoka One',cursive;color:#60a5fa;font-size:1.2rem;margin-bottom:8px">${t.emoji} ${t.name}</div><div class="t-stats">`;
      [["📅 Period",t.period],["📍 Where",t.where],["💡 Theme","Power and progress"],["🌍 Legacy","Still unfolding"]].forEach(([l,v])=>{h+=`<div class="tstat"><div class="tstat-label">${l}</div><div class="tstat-val" style="font-size:0.74rem">${v}</div></div>`;});
      h+=`</div><div style="font-size:0.85rem;color:#bfdbfe;line-height:1.65;margin-bottom:8px">${t.story}</div>`;
      h+=`<div class="portugal-pull"><strong>🇵🇹 Portugal Connection</strong>${t.portugal}</div>`;
      if(child.id==="owl")h+=`<div class="ks3-pull"><strong>🦉 The bigger picture</strong>${t.ks3}</div>`;
      h+=`</div>`;
    }
    h+=`<div style="margin-top:12px;text-align:center"><button class="btn-blue" onclick="completeSection('topics');switchSection('maths')">Maths! 📐</button></div>`;
  } else h+=`<div style="text-align:center;padding:14px;color:#555;font-size:0.82rem">👆 Click any topic to explore</div>`;
  return h+`</div>`;
}
function renderMaths(child,s){
  const id=child.id;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="math-panel"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">📐 ${child.ks}: Modern World Numbers</div><div style="font-family:'Fredoka One',cursive;color:#f0b429;font-size:1.2rem;margin-bottom:4px">📐 The Modern World in Numbers</div><div style="color:#777;font-size:0.78rem;margin-bottom:14px">Real data from today's world</div>`;
  chs.forEach((ch,idx)=>{
    const answered=s.mathAnswered&&s.mathAnswered[idx];const inputVal=(s.mathInputs&&s.mathInputs[idx])||"";
    h+=`<div class="challenge-card"><div class="ch-title">📐 ${ch.title}</div><div class="ch-story">${ch.story}</div><div class="ch-q">${ch.q}</div>`;
    if(!answered){h+=`<div class="math-row"><input class="math-in" type="text" value="${inputVal.replace(/"/g,'&quot;')}" placeholder="Answer..." oninput="updateMath(${idx},this.value)" onkeydown="if(event.key==='Enter')checkMath(${idx})"><span class="math-unit">${ch.unit}</span><button class="math-go" onclick="checkMath(${idx})">Check ✓</button></div>`;if(s.mathAnswered&&s.mathAnswered[idx]==="wrong")h+=`<div class="math-no">Not quite — try again!</div>`;}
    else{h+=`<div class="math-ok">✅ Correct!</div><div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 12px;font-size:0.78rem;color:#aaa;line-height:1.6;margin-top:6px"><strong style="color:#f0b429">Working:</strong> ${ch.working}</div><div class="math-fact">🤩 ${ch.fact}</div>`;}
    h+=`</div>`;});
  const allDone=chs.every((_,i)=>s.mathAnswered&&s.mathAnswered[i]==="correct");
  if(allDone)h+=`<div style="text-align:center;margin-top:12px"><button class="btn-blue" onclick="completeSection('maths');switchSection('task')">Do the Task! ✍️</button></div>`;
  return h+`</div>`;
}
function renderTask(child,s){
  const id=child.id;const task=TASKS[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  let h=`<div class="task-box"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✍️ ${child.ks}: Writing Task</div><div class="task-title">${task.icon} ${task.title}</div><div class="task-level">${task.level}</div><div class="task-brief">${task.brief}</div><textarea class="task-ta" placeholder="${task.placeholder}" oninput="updateTask(this.value)">${s.taskText||""}</textarea><br><button class="task-btn" onclick="saveTask()">Save 💾</button>`;
  if(s.taskSaved)h+=`<div class="saved-ok">✅ Saved!</div>`;
  if((s.taskText||"").length>80)h+=`<div style="margin-top:10px"><button class="btn-blue" onclick="completeSection('task');switchSection('quiz')">Take the Quiz! ✅</button></div>`;
  return h+`</div>`;
}
function renderQuiz(child,s){
  const id=child.id;const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];const idx=s.quizIdx||0;
  if(s.quizDone||idx>=qs.length){
    const score=s.quizScore||0;const pct=Math.round((score/qs.length)*100);
    return`<div class="quiz-wrap"><div class="score-banner"><h2>Chapter 10 Complete! 🌐</h2><div style="font-size:3rem;margin:8px 0">${pct>=80?"🏆":pct>=60?"⭐":"💪"}</div><div style="color:#ccc">${score}/${qs.length} (${pct}%)</div><div style="display:flex;gap:8px;justify-content:center;margin-top:12px"><button onclick="resetQuiz()" style="background:rgba(255,255,255,0.07);color:#ccc;border:1px solid rgba(255,255,255,0.12);padding:9px 18px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer">Try Again 🔄</button><a href="chapter11.html" class="btn-blue" style="padding:9px 18px;text-decoration:none">Chapter 11 → Climate and Our Future</a></div></div></div>`;
  }
  const q=qs[idx];const answers=s.quizAnswers||[];const thisAns=answers[idx];
  let h=`<div class="quiz-wrap"><div class="ks-tag ${child.ks==="KS3"?"ks3":""}">✅ ${child.ks} Quiz</div><div class="section-label">Quiz · Q${idx+1} of ${qs.length}</div><div class="score-dots">`;
  qs.forEach((_,i)=>{const a=answers[i];h+=`<div class="sdot ${i===idx?"current":a===undefined?"":a===qs[i].ans?"done":"wrong"}"></div>`;});
  h+=`</div><div class="q-text">${q.q}</div><div class="q-opts">`;
  q.opts.forEach((opt,i)=>{let cls="q-opt";if(thisAns!==undefined){if(i===q.ans)cls+=" correct";else if(i===thisAns&&i!==q.ans)cls+=" wrong";}h+=`<button class="${cls}" ${thisAns!==undefined?"disabled":""} onclick="answerQuiz(${i})">${opt}</button>`;});
  h+=`</div>`;
  if(thisAns!==undefined){h+=`<div class="q-fact">🤩 ${q.fact}</div><div style="text-align:right;margin-top:8px"><button class="btn-blue" onclick="nextQuiz()">Next →</button></div>`;}
  return h+`</div>`;
}
function selectChild(id){ui.child=id;ui.view="learn";ui.section="story";render();}
function switchSection(s){ui.section=s;render();}
function completeSection(s){const comp=state[ui.child].sectionsComplete||[];if(!comp.includes(s))state[ui.child].sectionsComplete=[...comp,s];saveState();}
function nextPage(){if(state[ui.child].storyPage<STORY.length-1){state[ui.child].storyPage++;saveState();render();}}
function selectTopic(id){state[ui.child].selectedTopic=id;saveState();render();}
function updateMath(idx,v){if(!state[ui.child].mathInputs)state[ui.child].mathInputs={};state[ui.child].mathInputs[idx]=v;}
function checkMath(idx){
  const id=ui.child;const chs=MATHS[id==="owl"?"owl":id==="cub"?"cub":"bay"];const ch=chs[idx];
  const input=(state[id].mathInputs&&state[id].mathInputs[idx]||"").trim().replace(/,/g,"");
  const correctVal=ch.answer.replace(/,/g,"");
  const userNum=parseFloat(input);const correctNum=parseFloat(correctVal);
  const correct=!isNaN(userNum)&&!isNaN(correctNum)&&Math.abs(userNum-correctNum)/Math.max(correctNum,0.001)<0.05;
  if(!state[id].mathAnswered)state[id].mathAnswered={};state[id].mathAnswered[idx]=correct?"correct":"wrong";saveState();render();
}
function answerQuiz(i){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const idx=s.quizIdx||0;const q=qs[idx];
  const answers=[...(s.quizAnswers||[])];while(answers.length<=idx)answers.push(undefined);
  answers[idx]=i;if(i===q.ans)state[id].quizScore=(s.quizScore||0)+1;
  state[id].quizAnswers=answers;saveState();render();
}
function nextQuiz(){
  const id=ui.child;const s=state[id];const qs=QUIZ[id==="owl"?"owl":id==="cub"?"cub":"bay"];
  const next=(s.quizIdx||0)+1;state[id].quizIdx=next;if(next>=qs.length)state[id].quizDone=true;saveState();render();
}
function resetQuiz(){const id=ui.child;state[id].quizIdx=0;state[id].quizAnswers=[];state[id].quizDone=false;state[id].quizScore=0;saveState();render();}
function updateTask(v){state[ui.child].taskText=v;}
function saveTask(){state[ui.child].taskSaved=true;saveState();render();}
render();
</script>
