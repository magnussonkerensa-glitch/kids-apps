<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Grind</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
:root{--black:#0a0a0a;--dark:#111317;--card:#1a1d23;--border:#2a2d35;--neon:#c8ff00;--orange:#ff6b35;--blue:#4fc3f7;--white:#f0f0f0;--muted:#888;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;}.screen.active{display:flex;flex-direction:column;}
#home{align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative;overflow:hidden;}
#home::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(200,255,0,.08),transparent 70%);pointer-events:none;}
.home-badge{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--neon);border:1px solid var(--neon);padding:.3rem .8rem;border-radius:2px;display:inline-block;margin-bottom:1.5rem;}
.home-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(4rem,15vw,8rem);font-weight:900;line-height:.9;text-transform:uppercase;margin-bottom:.5rem;}
.home-title span{color:var(--neon);}
.home-subtitle{font-size:1rem;color:var(--muted);margin-bottom:2.5rem;}
.home-stats{display:flex;gap:2rem;justify-content:center;margin-bottom:3rem;}
.stat{text-align:center;}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:900;color:var(--neon);line-height:1;}
.stat-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.btn-primary{background:var(--neon);color:var(--black);border:none;padding:1rem 2.5rem;font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:transform .15s,box-shadow .15s;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(200,255,0,.3);}
.btn-secondary{background:transparent;color:var(--white);border:1px solid var(--border);padding:.7rem 1.5rem;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;text-transform:uppercase;cursor:pointer;border-radius:3px;}
.btn-secondary:hover{border-color:var(--neon);color:var(--neon);}
#dayselect{padding:2rem;}
.page-header{display:flex;align-items:center;gap:1rem;margin-bottom:2rem;}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;font-size:.9rem;cursor:pointer;border-radius:2px;}
.back-btn:hover{color:var(--white);border-color:var(--white);}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:900;text-transform:uppercase;}
.days-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.5rem;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden;}
.day-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--neon);transform:scaleX(0);transform-origin:left;transition:transform .2s;}
.day-card:hover{border-color:var(--neon);transform:translateY(-2px);}
.day-card:hover::after{transform:scaleX(1);}
.day-num{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.15em;color:var(--neon);text-transform:uppercase;margin-bottom:.3rem;}
.day-name{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;text-transform:uppercase;margin-bottom:.5rem;}
.day-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.8rem;}
.tag{font-size:.65rem;font-weight:600;text-transform:uppercase;padding:.2rem .5rem;border-radius:2px;background:rgba(200,255,0,.1);color:var(--neon);border:1px solid rgba(200,255,0,.2);}
.tag.orange{background:rgba(255,107,53,.1);color:var(--orange);border-color:rgba(255,107,53,.2);}
.tag.blue{background:rgba(79,195,247,.1);color:var(--blue);border-color:rgba(79,195,247,.2);}
.day-meta{font-size:.8rem;color:var(--muted);display:flex;gap:1rem;}
.completed-badge{position:absolute;top:1rem;right:1rem;width:28px;height:28px;background:var(--neon);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--black);font-weight:900;}
#workout{padding:0;}
.workout-header{background:var(--dark);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:100;}
.workout-progress{flex:1;max-width:200px;}
.progress-label{font-size:.7rem;color:var(--muted);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.1em;}
.progress-bar{height:4px;background:var(--border);border-radius:2px;}
.progress-fill{height:100%;background:var(--neon);border-radius:2px;transition:width .4s;}
.workout-timer{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:900;color:var(--neon);min-width:60px;text-align:right;}
.workout-body{padding:1.5rem;flex:1;}
.exercise-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1rem;}
.exercise-visual{width:100%;height:265px;position:relative;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.exercise-visual svg{width:100%;height:100%;}
.yt-badge{position:absolute;bottom:.7rem;right:.7rem;background:rgba(0,0,0,.8);color:var(--neon);text-decoration:none;border:1px solid rgba(200,255,0,.4);padding:.35rem .8rem;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.yt-badge:hover{background:rgba(200,255,0,.2);}
.muscles-badge{position:absolute;top:.7rem;left:.7rem;background:rgba(0,0,0,.75);color:var(--orange);font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.25rem .6rem;border-radius:2px;border:1px solid rgba(255,107,53,.35);}
.exercise-info{padding:1.2rem 1.5rem;}
.exercise-num{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.15em;margin-bottom:.3rem;}
.exercise-name{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:900;text-transform:uppercase;margin-bottom:.2rem;}
.muscles-worked{font-size:.75rem;color:var(--orange);font-weight:600;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.08em;}
.exercise-desc{font-size:.85rem;color:var(--muted);line-height:1.5;margin-bottom:1rem;}
.exercise-reps{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;}
.rep-block{background:rgba(200,255,0,.08);border:1px solid rgba(200,255,0,.15);border-radius:6px;padding:.6rem 1rem;text-align:center;}
.rep-num{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:900;color:var(--neon);line-height:1;}
.rep-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.tips-box{background:rgba(79,195,247,.06);border-left:3px solid var(--blue);padding:.7rem 1rem;border-radius:0 4px 4px 0;font-size:.8rem;color:var(--blue);line-height:1.4;}
.workout-nav{position:sticky;bottom:0;background:var(--dark);border-top:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.ex-counter{font-family:'Barlow Condensed',sans-serif;font-size:1rem;color:var(--muted);text-align:center;flex:1;}
.ex-counter strong{color:var(--white);font-size:1.2rem;}
.btn-done{background:var(--neon);color:var(--black);border:none;padding:.8rem 1.5rem;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:4px;flex:1;max-width:200px;transition:transform .1s;}
.btn-done:active{transform:scale(.96);}
.btn-done.flash{animation:doneFlash .5s ease forwards;}
@keyframes doneFlash{0%{background:var(--neon);transform:scale(1);}20%{background:#fff;transform:scale(1.08);box-shadow:0 0 35px rgba(200,255,0,.9);}60%{background:var(--neon);transform:scale(1.03);}100%{background:var(--neon);transform:scale(1);}}
.btn-prev{background:var(--card);color:var(--white);border:1px solid var(--border);padding:.8rem 1rem;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;text-transform:uppercase;cursor:pointer;border-radius:4px;flex-shrink:0;}
.btn-prev:disabled{opacity:.3;cursor:default;}
#cheerOverlay{display:none;position:fixed;inset:0;pointer-events:none;z-index:300;align-items:center;justify-content:center;}
#cheerOverlay.active{display:flex;}
.cheer-msg{font-family:'Barlow Condensed',sans-serif;font-size:clamp(3rem,12vw,6rem);font-weight:900;text-transform:uppercase;color:var(--neon);text-shadow:0 0 40px rgba(200,255,0,.7);animation:cheerPop .7s cubic-bezier(.175,.885,.32,1.275) forwards;text-align:center;line-height:1;}
@keyframes cheerPop{0%{opacity:0;transform:scale(.4) rotate(-5deg);}60%{opacity:1;transform:scale(1.1) rotate(2deg);}80%{transform:scale(.95);}100%{opacity:1;transform:scale(1);}}
.cheer-fade-out{animation:cheerFade .4s ease forwards !important;}
@keyframes cheerFade{to{opacity:0;transform:scale(1.1);}}
#confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:299;}
.rest-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.rest-overlay.active{display:flex;}
.rest-title{font-family:'Barlow Condensed',sans-serif;font-size:1rem;color:var(--muted);text-transform:uppercase;letter-spacing:.2em;margin-bottom:.5rem;}
.rest-timer{font-family:'Barlow Condensed',sans-serif;font-size:7rem;font-weight:900;color:var(--neon);line-height:1;margin-bottom:.5rem;}
.rest-next{font-size:.85rem;color:var(--muted);margin-bottom:2rem;}
.rest-next strong{color:var(--white);}
.music-player{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;display:flex;align-items:center;gap:.8rem;margin-bottom:1.2rem;}
.music-info{flex:1;}
.music-track{font-size:.8rem;font-weight:600;}
.music-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.music-btn{background:none;border:1px solid var(--border);color:var(--white);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;}
.music-btn:hover{border-color:var(--neon);color:var(--neon);}
#finish{align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative;overflow:hidden;}
#finish::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(200,255,0,.12),transparent 70%);pointer-events:none;}
.finish-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(3rem,12vw,5rem);font-weight:900;text-transform:uppercase;color:var(--neon);line-height:.9;margin-bottom:.5rem;margin-top:1rem;}
.finish-sub{color:var(--muted);margin-bottom:2rem;}
.finish-stats{display:flex;gap:2rem;justify-content:center;margin-bottom:2.5rem;flex-wrap:wrap;}
@media(max-width:480px){.days-grid{grid-template-columns:1fr;}.exercise-visual{height:210px;}.home-stats{gap:1.2rem;}}
</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>
<div id="cheerOverlay"><div class="cheer-msg" id="cheerMsg"></div></div>

<div id="home" class="screen active">
  <div class="home-badge">🔥 Morning Grind</div>
  <div class="home-title">7-Day<br><span>Workout</span></div>
  <p class="home-subtitle">~20 mins · Full body · Abs focus · Knee-friendly</p>
  <div class="home-stats">
    <div class="stat"><div class="stat-num">7</div><div class="stat-label">Workouts</div></div>
    <div class="stat"><div class="stat-num">20</div><div class="stat-label">Minutes</div></div>
    <div class="stat"><div class="stat-num">8kg</div><div class="stat-label">Kettlebell</div></div>
  </div>
  <button class="btn-primary" onclick="showDaySelect()">Start Training →</button>
</div>

<div id="dayselect" class="screen">
  <div class="page-header">
    <button class="back-btn" onclick="showScreen('home')">← Back</button>
    <div class="page-title">Choose Your Day</div>
  </div>
  <div class="days-grid" id="daysGrid"></div>
</div>

<div id="workout" class="screen">
  <div class="workout-header">
    <button class="back-btn" onclick="showDaySelect()">← Days</button>
    <div class="workout-progress">
      <div class="progress-label" id="workoutDayLabel">Day 1</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="workout-timer" id="workoutTimer">0:00</div>
  </div>
  <div class="workout-body">
    <div class="music-player">
      <div style="font-size:1.2rem">🎵</div>
      <div class="music-info"><div class="music-track" id="musicTrack">Workout Mix</div><div class="music-label">Tap to open on YouTube</div></div>
      <button class="music-btn" onclick="openMusic()">▶</button>
    </div>
    <div id="exerciseDisplay"></div>
  </div>
  <div class="workout-nav">
    <button class="btn-prev" id="prevBtn" onclick="prevExercise()" disabled>← Prev</button>
    <div class="ex-counter" id="exCounter"><strong>1</strong> / 1</div>
    <button class="btn-done" id="nextBtn" onclick="nextExercise()">Done ✓</button>
  </div>
</div>

<div id="finish" class="screen">
  <div style="font-size:4rem">🏆</div>
  <div class="finish-title">Crushed It!</div>
  <p class="finish-sub" id="finishMsg">Day complete.</p>
  <div class="finish-stats" id="finishStats"></div>
  <button class="btn-primary" onclick="showDaySelect()" style="margin-bottom:1rem">More Workouts →</button><br>
  <button class="btn-secondary" onclick="showScreen('home')" style="margin-top:1rem">Home</button>
</div>

<div class="rest-overlay" id="restOverlay">
  <div class="rest-title">Rest Time</div>
  <div class="rest-timer" id="restTimer">30</div>
  <div class="rest-next">Up next: <strong id="nextExName">–</strong></div>
  <button class="btn-secondary" onclick="skipRest()">Skip Rest</button>
</div>

<script>
// ── COLOUR PALETTE FOR SVGs ───────────────────────────────────────────────────
const BG='#0d0f13',BODY='#1e2530',OUTLINE='#3a4858',PRIME='#c8ff00',SEC='#ff6b35',REST='#1a2230',SKIN='#c8a882',SKIN2='#b8966e',HAIR='#3a2a1a';

function svgWrap(content){
  return `<svg viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg"><rect width="300" height="260" fill="${BG}"/>${content}</svg>`;
}
function legend(p,s){
  return `<rect x="12" y="244" width="11" height="11" rx="2" fill="${PRIME}"/><text x="27" y="253" font-size="9.5" font-family="Arial,sans-serif" fill="#d0d0d0">${p}</text>`
        +(s?`<rect x="160" y="244" width="11" height="11" rx="2" fill="${SEC}"/><text x="175" y="253" font-size="9.5" font-family="Arial,sans-serif" fill="#d0d0d0">${s}</text>`:'');
}
function label(x,y,t,c=BG,sz=9){
  return `<text x="${x}" y="${y}" fill="${c}" font-size="${sz}" font-weight="bold" text-anchor="middle" font-family="Arial,sans-serif">${t}</text>`;
}

// ── SVG LIBRARY ───────────────────────────────────────────────────────────────
const SVGS = {
  pushup: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/05/Push-up-muscles-worked.png" alt="pushup" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  plank: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/06/Plank-muscles-worked.png" alt="plank" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  crunch: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/06/Crunch-muscles-worked.png" alt="crunch" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  mountainclimber: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/09/Mountain-Climber-muscles-worked.png" alt="mountainclimber" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  glutebridge: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/05/Glute-Bridge-muscles-worked.png" alt="glutebridge" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  kbswing: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/10/Kettlebell-Swing-muscles-worked.png" alt="kbswing" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  goblet: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/07/Goblet-Squat-muscles-worked.png" alt="goblet" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  deadbug: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/09/Dead-Bug-muscles-worked.png" alt="deadbug" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  legrise: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/06/Leg-Raise-muscles-worked.png" alt="legrise" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  bicycle: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/06/Bicycle-Crunch-muscles-worked.png" alt="bicycle" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  sideplank: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/06/Side-Plank-muscles-worked.png" alt="sideplank" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  hollow: `<img src="https://www.strengthlog.com/wp-content/uploads/2023/01/Hollow-Body-Hold-muscles-worked.png" alt="hollow" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  kbdeadlift: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/10/Kettlebell-Deadlift-muscles-worked.png" alt="kbdeadlift" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  stretch: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/06/Childs-Pose-muscles-worked.png" alt="stretch" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`,
  generic: `<img src="https://www.strengthlog.com/wp-content/uploads/2022/09/Jumping-Jack-muscles-worked.png" alt="generic" style="width:100%;height:100%;object-fit:contain;object-position:center;padding:8px;background:#fff" onerror="this.parentElement.querySelector('.img-fallback').style.display='flex';this.style.display='none'">`
};

// ── DATA ──────────────────────────────────────────────────────────────────────
const DAYS=[
{id:1,name:"Core Ignition",tags:["Abs","Core","Full Body"],tagTypes:["","orange",""],duration:"~20 min",music:"https://www.youtube.com/results?search_query=hip+hop+workout+mix+2024",exercises_data:[
  {name:"Dead Bug",muscles:"Deep Core · Transverse Abs",svgKey:"deadbug",sets:3,reps:10,unit:"each side",rest:30,desc:"Lie on your back, arms up, knees at 90°. Slowly lower opposite arm and leg, keeping lower back pressed flat into the floor.",tip:"If your lower back lifts, you've gone too far. Ease back until it stays down.",yt:"https://www.youtube.com/results?search_query=dead+bug+exercise+tutorial"},
  {name:"Plank Hold",muscles:"Core · Shoulders · Glutes",svgKey:"plank",sets:3,reps:30,unit:"seconds",rest:30,desc:"Forearms on floor, body in a straight line head to heels. Squeeze glutes and abs the whole time.",tip:"Don't let hips sag or pike up. Look at the floor to keep neck neutral.",yt:"https://www.youtube.com/results?search_query=plank+form+tutorial"},

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let AC;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function resumeAudio(){const a=getAC();if(a.state==='suspended')a.resume();}
function playDoneSound(){
  const a=getAC();
  [523.25,659.25,783.99,1046.50].forEach((f,i)=>{
    const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
    o.type='sine';o.frequency.value=f;const t=a.currentTime+i*.08;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.22,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.35);
    o.start(t);o.stop(t+.35);
  });
}
function playFinishSound(){
  const a=getAC();
  [523.25,587.33,659.25,698.46,783.99,880,987.77,1046.50].forEach((f,i)=>{
    const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
    o.type=i<4?'triangle':'sine';o.frequency.value=f;const t=a.currentTime+i*.06;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.18,t+.03);g.gain.exponentialRampToValueAtTime(.001,t+.7);
    o.start(t);o.stop(t+.8);
  });
}

function showCheer(){
  const o=document.getElementById('cheerOverlay'),m=document.getElementById('cheerMsg');
  m.textContent=CHEERS[Math.floor(Math.random()*CHEERS.length)];
  o.classList.add('active');m.classList.remove('cheer-fade-out');
  setTimeout(()=>{m.classList.add('cheer-fade-out');setTimeout(()=>o.classList.remove('active'),400);},750);
}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
function launchConfetti(dur=1800){
  const cv=document.getElementById('confettiCanvas'),cx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const ps=Array.from({length:90},()=>({x:Math.random()*cv.width,y:-10-Math.random()*100,w:6+Math.random()*8,h:4+Math.random()*5,r:Math.random()*Math.PI*2,dr:(Math.random()-.5)*.2,vy:2+Math.random()*4,vx:(Math.random()-.5)*2,c:['#c8ff00','#ff6b35','#4fc3f7','#fff','#ffeb3b'][Math.floor(Math.random()*5)],a:1}));
  const s=performance.now();
  function draw(n){const e=n-s;cx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.r+=p.dr;if(e>dur*.5)p.a=Math.max(0,p.a-.015);cx.save();cx.globalAlpha=p.a;cx.translate(p.x,p.y);cx.rotate(p.r);cx.fillStyle=p.c;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore();});if(e<dur+500)requestAnimationFrame(draw);else cx.clearRect(0,0,cv.width,cv.height);}
  requestAnimationFrame(draw);
}

// ── APP STATE ─────────────────────────────────────────────────────────────────
let currentDay=null,currentExIdx=0,workoutStartTime=null,workoutTimerInterval=null,restInterval=null;
let completedDays=JSON.parse(localStorage.getItem('mg_completed')||'[]');

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showDaySelect(){stopWorkoutTimer();renderDayCards();showScreen('dayselect');}

function renderDayCards(){
  document.getElementById('daysGrid').innerHTML=DAYS.map(d=>{
    const done=completedDays.includes(d.id);
    return`<div class="day-card" onclick="startDay(${d.id})">${done?'<div class="completed-badge">\u2713</div>':''}
      <div class="day-num">Day ${d.id}</div><div class="day-name">${d.name}</div>
      <div class="day-tags">${d.tags.map((t,i)=>`<span class="tag ${d.tagTypes[i]}">${t}</span>`).join('')}</div>
      <div class="day-meta"><span>\u23F1 ${d.duration}</span><span>\uD83D\uDCCB ${d.exercises_data.length} exercises</span></div>
    </div>`;
  }).join('');
}

function startDay(id){
  currentDay=DAYS.find(d=>d.id===id);currentExIdx=0;workoutStartTime=Date.now();
  document.getElementById('workoutDayLabel').textContent=`Day ${currentDay.id} \u2014 ${currentDay.name}`;
  document.getElementById('musicTrack').textContent=`Day ${currentDay.id} Pump-Up Mix`;
  startWorkoutTimer();renderExercise();showScreen('workout');
}

function startWorkoutTimer(){
  stopWorkoutTimer();
  workoutTimerInterval=setInterval(()=>{const e=Math.floor((Date.now()-workoutStartTime)/1000);document.getElementById('workoutTimer').textContent=`${Math.floor(e/60)}:${String(e%60).padStart(2,'0')}`;},1000);
}
function stopWorkoutTimer(){if(workoutTimerInterval)clearInterval(workoutTimerInterval);}

function renderExercise(){
  const ex=currentDay.exercises_data[currentExIdx],total=currentDay.exercises_data.length;
  document.getElementById('progressFill').style.width=Math.round((currentExIdx/total)*100)+'%';
  document.getElementById('exCounter').innerHTML=`<strong>${currentExIdx+1}</strong> / ${total}`;
  document.getElementById('prevBtn').disabled=currentExIdx===0;
  document.getElementById('nextBtn').textContent=currentExIdx===total-1?'Finish \uD83C\uDFC6':'Done \u2713';
  document.getElementById('exerciseDisplay').innerHTML=`
    <div class="exercise-card">
      <div class="exercise-visual">
        ${SVGS[ex.svgKey]||SVGS.generic}
        <div class="muscles-badge">\uD83D\uDCAA Muscles Working</div>
        <a href="${ex.yt}" target="_blank" class="yt-badge">\u25B6 How-To Video</a>
      </div>
      <div class="exercise-info">
        <div class="exercise-num">Exercise ${currentExIdx+1} of ${total}</div>
        <div class="exercise-name">${ex.name}</div>
        <div class="muscles-worked">\uD83D\uDD25 ${ex.muscles}</div>
        <p class="exercise-desc">${ex.desc}</p>
        <div class="exercise-reps">
          <div class="rep-block"><div class="rep-num">${ex.sets}</div><div class="rep-label">Sets</div></div>
          <div class="rep-block"><div class="rep-num">${ex.reps}</div><div class="rep-label">${ex.unit}</div></div>
          <div class="rep-block"><div class="rep-num">${ex.rest}s</div><div class="rep-label">Rest</div></div>
        </div>
        <div class="tips-box">\uD83D\uDCA1 ${ex.tip}</div>
      </div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function nextExercise(){
  resumeAudio();
  const btn=document.getElementById('nextBtn'),total=currentDay.exercises_data.length,isLast=currentExIdx>=total-1;
  btn.classList.remove('flash');void btn.offsetWidth;btn.classList.add('flash');setTimeout(()=>btn.classList.remove('flash'),600);
  if(isLast){playFinishSound();launchConfetti(3000);showCheer();setTimeout(()=>finishWorkout(),900);return;}
  playDoneSound();showCheer();
  const ex=currentDay.exercises_data[currentExIdx];
  if(ex.rest>0)showRest(ex.rest,currentDay.exercises_data[currentExIdx+1]?.name||'');
  else{currentExIdx++;renderExercise();}
}
function prevExercise(){if(currentExIdx>0){currentExIdx--;renderExercise();}}

function showRest(s,n){
  let r=s;document.getElementById('restTimer').textContent=r;document.getElementById('nextExName').textContent=n;
  document.getElementById('restOverlay').classList.add('active');
  restInterval=setInterval(()=>{r--;document.getElementById('restTimer').textContent=r;if(r<=0)skipRest();},1000);
}
function skipRest(){clearInterval(restInterval);document.getElementById('restOverlay').classList.remove('active');currentExIdx++;renderExercise();}

function finishWorkout(){
  stopWorkoutTimer();const elapsed=Math.floor((Date.now()-workoutStartTime)/1000);
  if(!completedDays.includes(currentDay.id)){completedDays.push(currentDay.id);localStorage.setItem('mg_completed',JSON.stringify(completedDays));}
  const m=Math.floor(elapsed/60),s=elapsed%60;
  document.getElementById('finishMsg').textContent=`${currentDay.name} complete. ${completedDays.length}/7 days done.`;
  document.getElementById('finishStats').innerHTML=`
    <div class="stat"><div class="stat-num">${m}:${String(s).padStart(2,'0')}</div><div class="stat-label">Time</div></div>
    <div class="stat"><div class="stat-num">${currentDay.exercises_data.length}</div><div class="stat-label">Exercises</div></div>
    <div class="stat"><div class="stat-num">${completedDays.length}</div><div class="stat-label">Days Done</div></div>`;
  showScreen('finish');
}

function openMusic(){window.open(currentDay?currentDay.music:'https://www.youtube.com/results?search_query=workout+music+mix+2024','_blank');}

renderDayCards();
</script>
</body>
</html>
